<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>嘸蝦米兩碼字分類</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  [hidden] { display: none !important; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', sans-serif;
    background: #f1f5f9;
    color: #2c3e50;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .app-header {
    background: #fff;
    border-bottom: 1px solid #e2e8f0;
    padding: 14px 24px;
    min-height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
    gap: 14px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .app-header h1 {
    font-size: 16px;
    font-weight: 600;
    color: #1e293b;
    letter-spacing: .02em;
  }
  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 999px;
    border: 1px solid #e2e8f0;
    background: #f8fafc;
    color: #64748b;
    font-weight: 600;
    white-space: nowrap;
  }
  .status-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .status-pill.ok { color: #15803d; background: #ecfdf5; border-color: #bbf7d0; }

  .page-content {
    flex: 1;
    min-height: 0;
    padding: 12px 20px 20px;
    max-width: 1400px;
    width: 100%;
    margin: 0 auto;
    display: flex;
  }

  .glass {
    flex: 1;
    min-height: 0;
    position: relative;
    border-radius: 14px;
    backdrop-filter: blur(8px);
    background-color: rgba(255,255,255,0.55);
    box-shadow: rgba(0,0,0,0.10) 2px 8px 20px;
    border: 1.5px solid rgba(255,255,255,0.7);
    border-bottom: 1.5px solid rgba(40,40,40,0.15);
    border-right: 1.5px solid rgba(40,40,40,0.15);
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Toolbar ─────────────────────────── */
  .toolbar {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .search-wrap { flex: 1 1 240px; position: relative; }
  .search-input {
    width: 100%;
    padding: 9px 14px 9px 36px;
    border: 1.5px solid #cbd5e1;
    border-radius: 9px;
    background: #fff;
    color: #1e293b;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  .search-input:focus {
    border-color: #0d9488;
    box-shadow: 0 0 0 3px rgba(13,148,136,.12);
  }
  .search-input::placeholder { color: #94a3b8; }
  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: #94a3b8;
    font-size: 14px;
    pointer-events: none;
  }
  .clear-btn {
    border: 1.5px solid #cbd5e1;
    background: #fff;
    color: #475569;
    cursor: pointer;
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    transition: background .12s, color .12s, border-color .12s;
  }
  .clear-btn:hover { background: #f8fafc; color: #0d9488; border-color: #0d9488; }
  .clear-btn:active { transform: scale(.97); }

  /* ── Category tabs ───────────────────── */
  .category-tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    padding-bottom: 12px;
    border-bottom: 1px solid #e2e8f0;
    margin-bottom: 12px;
    flex-shrink: 0;
  }
  .cat-tab {
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 600;
    border: 1.5px solid transparent;
    border-radius: 999px;
    background: #f1f5f9;
    color: #475569;
    cursor: pointer;
    transition: background .15s, color .15s, border-color .15s;
    white-space: nowrap;
    font-family: inherit;
  }
  .cat-tab:hover { background: #e2e8f0; color: #1e293b; }
  .cat-tab .count {
    opacity: .65;
    margin-left: 4px;
    font-size: 11px;
    font-weight: 700;
  }

  /* ── Scrollable content ──────────────── */
  .content-scroll {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding-right: 4px;
    scrollbar-width: thin;
    scrollbar-color: #cbd5e1 transparent;
  }
  .content-scroll::-webkit-scrollbar { width: 8px; }
  .content-scroll::-webkit-scrollbar-track { background: transparent; }
  .content-scroll::-webkit-scrollbar-thumb {
    background: #cbd5e1;
    border-radius: 4px;
  }
  .content-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

  /* ── Category sections ───────────────── */
  .category {
    margin-bottom: 18px;
    border-radius: 12px;
    overflow: hidden;
    border: 1.5px solid #e2e8f0;
    background: rgba(255,255,255,.85);
    scroll-margin-top: 8px;
  }
  .category-header {
    padding: 10px 16px;
    font-size: 14px;
    font-weight: 700;
    color: #1e293b;
    border-bottom: 1.5px solid #e2e8f0;
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg, #f8fafc);
  }
  .category-header .accent {
    display: inline-block;
    width: 4px;
    height: 18px;
    background: var(--accent, #94a3b8);
    border-radius: 2px;
  }
  .category-header .count-badge {
    margin-left: auto;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 999px;
    background: rgba(255,255,255,.85);
    color: var(--accent, #475569);
    border: 1px solid rgba(0,0,0,.06);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 6px;
    padding: 12px;
  }
  .entry {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
    padding: 8px 10px;
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 7px;
    transition: border-color .12s, box-shadow .12s, transform .08s;
  }
  .entry:hover {
    border-color: var(--accent, #0d9488);
    box-shadow: 0 2px 6px rgba(0,0,0,.06);
    transform: translateY(-1px);
  }
  .entry .ch {
    font-size: 17px;
    font-weight: 700;
    color: #1e293b;
    line-height: 1;
  }
  .entry .code-wrap {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
  }
  .entry .code {
    font-family: ui-monospace, 'SF Mono', Consolas, monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent, #0d9488);
    letter-spacing: .04em;
  }
  .entry .note {
    font-size: 10px;
    color: #94a3b8;
    font-weight: 500;
    line-height: 1;
  }

  /* Search states */
  .entry.hit {
    border-color: #f59e0b;
    background: #fffbeb;
    box-shadow: 0 0 0 2px rgba(245,158,11,.2);
  }
  .category.hidden-cat { display: none; }
  .entry.hidden-entry { display: none; }

  .empty-result {
    text-align: center;
    padding: 40px 20px;
    color: #94a3b8;
    font-size: 14px;
  }

  .footer-note {
    margin-top: 6px;
    margin-bottom: 4px;
    padding: 14px 18px;
    background: rgba(255,255,255,.85);
    border: 1.5px solid #e2e8f0;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.75;
    color: #475569;
    text-indent: 2em;
  }

  @media (max-width: 640px) {
    .app-header { padding: 10px 14px; }
    .page-content { padding: 8px 12px 12px; }
    .glass { padding: 14px; }
    .grid {
      grid-template-columns: repeat(auto-fill, minmax(108px, 1fr));
      gap: 5px;
      padding: 10px;
    }
    .entry { padding: 7px 8px; }
    .entry .ch { font-size: 15px; }
    .entry .code { font-size: 12px; }
    .cat-tab { padding: 5px 10px; font-size: 11px; }
  }
</style>
</head>

        <button class="clear-btn" id="clear-btn" type="button">清除</button>
      </div>

      <div class="category-tabs" id="cat-tabs"></div>

      <div class="content-scroll" id="scroll">
        <div id="sections"></div>
        <div class="empty-result" id="empty-result" hidden>沒有符合的字</div>
        <div class="footer-note">當你常常接觸到兩碼字後，看多了也看熟了，久而久之一看到中文字，就能立即判斷出它是否為兩碼字，所謂熟能生巧，同樣的一個兩碼字，第一次打可能不太熟練，打它個三遍、五遍，甚至十遍，到後來，定能很快的以兩碼字的方式將它快速打出。要成為嘸蝦米輸入法的高手，一定要會用到兩碼字且用的非常非常的多。</div>
      </div>
    </div>
  </div>

const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ── Render ───────────────────────────────────
const tabsEl     = document.getElementById('cat-tabs');
const sectionsEl = document.getElementById('sections');
const scrollEl   = document.getElementById('scroll');
const emptyEl    = document.getElementById('empty-result');
const totalEl    = document.getElementById('total-count');
const searchEl   = document.getElementById('search');
const clearBtn   = document.getElementById('clear-btn');

let totalCount = 0;
CATEGORIES.forEach(cat => totalCount += cat.entries.length);
totalEl.textContent = `共 ${totalCount} 字`;

CATEGORIES.forEach(cat => {
  // tab
  const tab = document.createElement('button');
  tab.type = 'button';
  tab.className = 'cat-tab';
  tab.style.setProperty('--accent', cat.accent);
  const shortTitle = cat.title.replace(/^[一二三四五六七八]、/, m => m[0] + '. ');
  tab.innerHTML = `<span style="color:${esc(cat.accent)}">●</span> ${esc(shortTitle.slice(0, 22))}<span class="count">${cat.entries.length}</span>`;
  tab.addEventListener('click', () => {
    const target = document.getElementById(cat.id);
    if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });
  tabsEl.appendChild(tab);

  // section
  const section = document.createElement('section');
  section.className = 'category';
  section.id = cat.id;
  section.style.setProperty('--accent', cat.accent);
  section.style.setProperty('--bg', cat.bg);

  const header = document.createElement('div');
  header.className = 'category-header';
  header.innerHTML = `
    <span class="accent"></span>
    <span>${esc(cat.title)}</span>
    <span class="count-badge">共 ${cat.entries.length} 字</span>`;
  section.appendChild(header);

  const grid = document.createElement('div');
  grid.className = 'grid';
  cat.entries.forEach(([ch, code, note]) => {
    const e = document.createElement('div');
    e.className = 'entry';
    e.dataset.ch = ch;
    e.dataset.code = code.toUpperCase();
    e.innerHTML = `
      <span class="ch">${esc(ch)}</span>
      <span class="code-wrap">
        <span class="code">${esc(code)}</span>
        ${note ? `<span class="note">${esc(note)}</span>` : ''}
      </span>`;
    grid.appendChild(e);
  });
  section.appendChild(grid);
  sectionsEl.appendChild(section);
});

// ── Search ───────────────────────────────────
function runSearch() {
  const q = searchEl.value.trim();
  const qUpper = q.toUpperCase();
  let anyHit = false;

  document.querySelectorAll('.category').forEach(section => {
    let sectionHit = false;
    section.querySelectorAll('.entry').forEach(entry => {
      if (!q) {
        entry.classList.remove('hidden-entry', 'hit');
        sectionHit = true;
        return;
      }
      const match = entry.dataset.ch.includes(q) || entry.dataset.code.includes(qUpper);
      entry.classList.toggle('hidden-entry', !match);
      entry.classList.toggle('hit', match);
      if (match) sectionHit = true;
    });
    section.classList.toggle('hidden-cat', !sectionHit);
    if (sectionHit) anyHit = true;
  });

  emptyEl.hidden = !q || anyHit;
}

searchEl.addEventListener('input', runSearch);
clearBtn.addEventListener('click', () => {
  searchEl.value = '';
  runSearch();
  searchEl.focus();
});
searchEl.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    searchEl.value = '';
    runSearch();
  }
});
