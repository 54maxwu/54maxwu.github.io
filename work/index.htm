<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>電話號碼處理工具</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', sans-serif;
            background: #f1f5f9;
            color: #1e293b;
        }

        /* ── LAYOUT SKELETON ── */
        body { display: flex; flex-direction: column; }

        .app-header {
            background: #fff;
            border-bottom: 1px solid #e2e8f0;
            padding: 11px 20px;
            /* 統一全站工具 header 高度為 60px,工具切換時頂部 bar 不會跳動 */
            min-height: 60px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 1px 3px rgba(0,0,0,.06);
            flex-shrink: 0;
        }
        .app-header h1 { font-size: 15px; font-weight: 600; color: #1e293b; letter-spacing: .02em; }

        .page-content {
            flex: 1;
            min-height: 0;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow: hidden;
        }

        /* ── THREE-COLUMN MAIN AREA ── */
        .main-grid {
            flex: 1;
            min-height: 0;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }

        /* ── GLASS CARD ── */
        .card {
            border-radius: 12px;
            background: rgba(255,255,255,0.6);
            box-shadow: rgba(0,0,0,0.08) 1px 4px 14px;
            border: 1.5px solid rgba(255,255,255,0.7);
            border-bottom: 1.5px solid rgba(40,40,40,0.10);
            border-right: 1.5px solid rgba(40,40,40,0.10);
            padding: 14px;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        /* ── FIELD LABEL ── */
        .field-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.74rem;
            font-weight: 700;
            color: #4a6070;
            margin-bottom: 6px;
            flex-shrink: 0;
        }

        /* ── TEXTAREAS ── */
        textarea {
            flex: 1;
            min-height: 0;
            width: 100%;
            border: 1.5px solid rgba(200,220,240,0.8);
            border-radius: 8px;
            padding: 9px 11px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 0.8rem;
            background: rgba(255,255,255,0.8);
            resize: none;
            line-height: 1.55;
            color: #1e293b;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        textarea:focus { outline: none; border-color: rgba(0,160,220,0.5); box-shadow: 0 0 0 3px rgba(0,160,220,0.1); }
        textarea[readonly] { background: rgba(248,250,252,0.9); cursor: default; }
        .input-ta  { border-left: 4px solid #2980b9 !important; }
        .globe-ta  { border-left: 4px solid #27ae60 !important; }
        .none-ta   { border-left: 4px solid #e74c3c !important; }

        /* ── BUTTON ── */
        .process-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 10px;
            padding: 8px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.84rem;
            font-weight: 700;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: #fff;
            transition: all 0.18s;
            box-shadow: 0 2px 8px rgba(59,130,246,0.3);
            flex-shrink: 0;
            align-self: flex-start;
        }
        .process-btn:hover { transform: scale(1.03); box-shadow: 0 4px 16px rgba(59,130,246,0.45); }
        .process-btn:active { transform: scale(0.97); }
        .process-btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

        /* ── COPY INLINE BTN ── */
        .copy-btn {
            padding: 3px 9px;
            border: 1px solid rgba(0,0,0,0.12);
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.67rem;
            font-weight: 600;
            background: rgba(255,255,255,0.6);
            color: #555;
            transition: all 0.15s;
        }
        .copy-btn:hover { background: #fff; }
        .copy-btn.copied { color: #22c55e; border-color: #22c55e; }

        /* ── LOG ── */
        .log-card {
            flex-shrink: 0;
            border-radius: 10px;
            background: #1e293b;
            border: 1px solid #334155;
            padding: 10px 14px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .log-label {
            font-size: 0.7rem;
            font-weight: 700;
            color: #64748b;
            margin-bottom: 4px;
        }
        .log-box {
            font-family: 'Consolas', monospace;
            font-size: 0.76rem;
            max-height: 72px;
            overflow-y: auto;
            line-height: 1.55;
            color: #94a3b8;
        }
        .log-box::-webkit-scrollbar { width: 4px; }
        .log-box::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
        .log-finish  { color: #60a5fa; font-weight: 700; }
        .log-summary { color: #f87171; font-weight: 700; }
        .log-exclude { color: #fbbf24; }

        /* ── RESPONSIVE ── */
        @media (max-width: 800px) {
            html, body { overflow: auto; }
            .main-grid { grid-template-columns: 1fr; }
            textarea { min-height: 120px; flex: none; }
        }
    </style>
</head>
<body>
    <div class="app-header">
        <h1>電話號碼處理工具</h1>
    </div>

    <div class="page-content">

        <!-- THREE-COLUMN: Input | Globe | None Globe -->
        <div class="main-grid">

            <!-- INPUT -->
            <div class="card">
                <div class="field-label"><span>&#9632; 輸入資料（每行一筆）</span></div>
                <textarea id="mydb" class="input-ta" placeholder="每行貼上一筆電話號碼資料..."></textarea>
                <button class="process-btn" id="process-btn" onclick="startWorker()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    開始處理
                </button>
            </div>

            <!-- GLOBE -->
            <div class="card">
                <div class="field-label">
                    <span style="color:#1a7a40">&#9632; Globe</span>
                    <button class="copy-btn" onclick="copyTA('global', this)">複製</button>
                </div>
                <textarea id="global" class="globe-ta" readonly></textarea>
            </div>

            <!-- NONE GLOBE -->
            <div class="card">
                <div class="field-label">
                    <span style="color:#b03020">&#9632; None Globe</span>
                    <button class="copy-btn" onclick="copyTA('noneglobal', this)">複製</button>
                </div>
                <textarea id="noneglobal" class="none-ta" readonly></textarea>
            </div>

        </div>

        <!-- LOG -->
        <div class="log-card">
            <div class="log-label">&#128221; 處理記錄</div>
            <div class="log-box" id="log"></div>
        </div>

    </div>

    <script>
    var w;

    function startWorker() {
        document.getElementById('global').value     = '';
        document.getElementById('noneglobal').value = '';
        document.getElementById('log').innerHTML    = '';

        const btn = document.getElementById('process-btn');
        btn.disabled = true;
        btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> 處理中...';

        if (typeof Worker === 'undefined') {
            alert('您的瀏覽器不支援 Web Worker');
            resetBtn(btn); return;
        }

        w = new Worker('demo_workers.js');
        const obj = document.getElementById('mydb').value.split('\n');
        w.postMessage(obj);

        w.onmessage = function(event) {
            const log = document.getElementById('log');
            switch (event.data.type) {
                case 'global':
                    document.getElementById('global').value += event.data.data + '\n';
                    break;
                case 'noneglobal':
                    document.getElementById('noneglobal').value += event.data.data + '\n';
                    break;
                case 'finished':
                    log.innerHTML += '<div class="log-finish">&#10003; 處理完成</div>';
                    log.scrollTop = log.scrollHeight;
                    w.terminate();
                    resetBtn(btn);
                    break;
                case 'summary':
                    log.innerHTML += '<div class="log-summary">' + escHtml(event.data.data) + '</div>';
                    log.scrollTop = log.scrollHeight;
                    break;
                case 'excluded':
                    log.innerHTML += event.data.data.map(d =>
                        '<div class="log-exclude">排除: ' + escHtml(d) + '</div>'
                    ).join('');
                    log.scrollTop = log.scrollHeight;
                    break;
            }
        };

        w.onerror = function(e) {
            document.getElementById('log').innerHTML +=
                '<div class="log-summary">Worker 錯誤: ' + escHtml(e.message) + '</div>';
            resetBtn(btn);
        };
    }

    function resetBtn(btn) {
        btn.disabled = false;
        btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg> 開始處理';
    }

    function copyTA(id, btn) {
        const val = document.getElementById(id).value;
        if (!val.trim()) return;
        navigator.clipboard.writeText(val).then(() => {
            btn.textContent = '✓ 已複製'; btn.classList.add('copied');
            setTimeout(() => { btn.textContent = '複製'; btn.classList.remove('copied'); }, 1500);
        });
    }

    function escHtml(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    </script>
</body>
</html>
