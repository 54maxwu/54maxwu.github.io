<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>台中交通即時影像</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        [hidden] { display: none !important; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', sans-serif;
            background: #f1f5f9;
            color: #2c3e50;
            min-height: 100vh;
        }

        .app-header {
            background: #fff;
            border-bottom: 1px solid #e2e8f0;
            padding: 14px 24px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 1px 3px rgba(0,0,0,.06);
            position: sticky;
            top: 0;
            z-index: 10;
            gap: 14px;
            flex-wrap: wrap;
        }
        .app-header h1 {
            font-size: 16px;
            font-weight: 600;
            color: #1e293b;
            letter-spacing: .02em;
            margin: 0;
        }
        .header-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            color: #64748b;
        }
        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 999px;
            background: #f1f5f9;
            color: #64748b;
            font-weight: 600;
        }
        .status-pill .dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #94a3b8;
        }
        .status-pill.ok      { background: #ecfdf5; color: #047857; }
        .status-pill.ok .dot { background: #10b981; }
        .status-pill.err     { background: #fef2f2; color: #b91c1c; }
        .status-pill.err .dot{ background: #ef4444; }

        .search-wrap {
            position: relative;
            flex: 1 1 240px;
            min-width: 200px;
            max-width: 360px;
        }
        .search-input {
            width: 100%;
            font-size: 13px;
            padding: 8px 32px 8px 32px;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            background: #f8fafc;
            color: #1e293b;
            outline: none;
            font-family: inherit;
            transition: border-color .15s, background .15s;
        }
        .search-input:focus {
            border-color: #0d9488;
            background: #fff;
        }
        .search-icon {
            position: absolute;
            left: 10px; top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 13px;
            pointer-events: none;
        }
        .search-clear {
            position: absolute;
            right: 6px; top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 16px;
            line-height: 1;
            padding: 4px 6px;
            border-radius: 4px;
        }
        .search-clear:hover { color: #ef4444; background: rgba(239,68,68,.08); }

        .page-content {
            padding: 12px 20px 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 14px;
        }

        .cam-card {
            background: #fff;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform .12s, box-shadow .15s, border-color .15s;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .cam-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(13,148,136,.18);
            border-color: #14b8a6;
        }
        .cam-thumb-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: linear-gradient(135deg, #1e293b, #334155);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cam-thumb {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .cam-thumb.broken { display: none; }
        .cam-thumb-fallback {
            color: #64748b;
            font-size: 24px;
            font-weight: 700;
        }
        .cam-play {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.0);
            transition: background .15s;
            pointer-events: none;
        }
        .cam-card:hover .cam-play { background: rgba(0,0,0,.3); }
        .cam-play svg {
            width: 44px; height: 44px;
            opacity: 0;
            transition: opacity .15s, transform .15s;
            transform: scale(.85);
            filter: drop-shadow(0 2px 6px rgba(0,0,0,.4));
        }
        .cam-card:hover .cam-play svg { opacity: 1; transform: scale(1); }

        .cam-status {
            position: absolute;
            top: 8px; left: 8px;
            font-size: 10px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 999px;
            letter-spacing: .04em;
            background: rgba(239,68,68,.9);
            color: #fff;
            text-transform: uppercase;
        }
        .cam-status.online { background: rgba(16,185,129,.92); }
        .cam-status.pending { background: rgba(100,116,139,.85); }

        .cam-src {
            position: absolute;
            top: 8px; right: 8px;
            font-size: 9px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 999px;
            background: rgba(15,23,42,.7);
            color: #cbd5e1;
            letter-spacing: .03em;
        }
        .cam-src.foreign { background: rgba(37,99,235,.85); color: #fff; }

        .cam-body {
            padding: 10px 12px 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .cam-name {
            font-size: 13px;
            font-weight: 600;
            color: #1e293b;
            line-height: 1.35;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 36px;
        }

        .empty-state, .loading-state {
            grid-column: 1 / -1;
            padding: 60px 20px;
            text-align: center;
            color: #94a3b8;
            font-size: 13px;
        }
        .loading-state .spinner {
            width: 28px; height: 28px;
            border: 3px solid #e2e8f0;
            border-top-color: #0d9488;
            border-radius: 50%;
            animation: spin .8s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Modal video ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15,23,42,.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            position: relative;
            background: #0f172a;
            border-radius: 14px;
            overflow: hidden;
            max-width: 1024px;
            width: 100%;
            box-shadow: 0 20px 50px rgba(0,0,0,.5);
            display: flex;
            flex-direction: column;
        }
        .modal-header {
            padding: 11px 16px;
            background: #1e293b;
            color: #f1f5f9;
            font-size: 13.5px;
            font-weight: 600;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: 46px;
        }
        .modal-header .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #ef4444;
            box-shadow: 0 0 8px rgba(239,68,68,.6);
            animation: pulse 1.4s ease-in-out infinite;
            flex-shrink: 0;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%      { opacity: .35; }
        }
        .modal-title {
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .modal-actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }
        .tool-btn {
            width: 32px; height: 32px;
            border-radius: 7px;
            background: rgba(255,255,255,.06);
            border: 1px solid rgba(255,255,255,.12);
            color: #cbd5e1;
            font-size: 15px;
            line-height: 1;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: background .12s, color .12s, border-color .12s;
            padding: 0;
        }
        .tool-btn:hover {
            background: rgba(20,184,166,.18);
            border-color: rgba(20,184,166,.4);
            color: #5eead4;
        }
        .tool-btn.danger:hover {
            background: rgba(239,68,68,.18);
            border-color: rgba(239,68,68,.4);
            color: #fca5a5;
        }
        .tool-btn:disabled {
            opacity: .4;
            cursor: not-allowed;
        }
        .tool-btn svg { width: 16px; height: 16px; display: block; }

        .video-wrap {
            position: relative;
            background: #000;
            aspect-ratio: 16 / 9;
            overflow: hidden;
        }
        .modal-video {
            position: absolute;
            inset: 0;
            display: block;
            width: 100%;
            height: 100%;
            background: #000;
            object-fit: contain;
        }

        .video-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            background: rgba(0,0,0,.55);
            color: #f1f5f9;
            font-size: 13px;
            text-align: center;
            padding: 20px;
            z-index: 2;
            pointer-events: none;
        }
        .video-overlay.error { pointer-events: auto; }
        .video-overlay[hidden] { display: none; }
        .video-overlay .spinner {
            width: 38px; height: 38px;
            border: 3px solid rgba(255,255,255,.18);
            border-top-color: #5eead4;
            border-radius: 50%;
            animation: spin .8s linear infinite;
        }
        .video-overlay .icon-big {
            font-size: 36px;
            opacity: .85;
        }
        .video-overlay .ov-msg {
            max-width: 380px;
            line-height: 1.5;
            color: #cbd5e1;
        }
        .video-overlay .ov-sub {
            font-size: 11px;
            color: #94a3b8;
            font-family: ui-monospace, 'SF Mono', Consolas, monospace;
            max-width: 90%;
            word-break: break-all;
        }

        /* Paused / handed-off to external player */
        .video-overlay.paused {
            background: linear-gradient(135deg, #0b1220 0%, #1e293b 100%);
            cursor: pointer;
            pointer-events: auto;
            gap: 18px;
        }
        .video-overlay.paused:hover .play-circle {
            transform: scale(1.08);
            background: #14b8a6;
            box-shadow: 0 8px 28px rgba(20,184,166,.55);
        }
        .play-circle {
            width: 76px; height: 76px;
            border-radius: 50%;
            background: rgba(20,184,166,.85);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 22px rgba(20,184,166,.4);
            transition: transform .15s, background .15s, box-shadow .15s;
        }
        .play-circle svg { width: 32px; height: 32px; margin-left: 4px; }
        .video-overlay.paused .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            padding: 4px 10px;
            background: rgba(20,184,166,.15);
            border: 1px solid rgba(20,184,166,.35);
            color: #5eead4;
            border-radius: 999px;
            font-weight: 600;
            letter-spacing: .04em;
        }
        .video-overlay.paused .ov-msg { font-weight: 600; color: #e2e8f0; }
        .retry-btn {
            padding: 8px 18px;
            background: linear-gradient(145deg, #14b8a6, #0d9488);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 2px 6px rgba(13,148,136,.4);
            transition: transform .08s, box-shadow .15s;
        }
        .retry-btn:hover { box-shadow: 0 4px 12px rgba(13,148,136,.5); }
        .retry-btn:active { transform: scale(.97); }

        .ext-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 4px;
        }
        .ext-btn {
            padding: 7px 14px;
            background: rgba(255,255,255,.08);
            border: 1px solid rgba(255,255,255,.15);
            color: #cbd5e1;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: background .12s, color .12s, border-color .12s;
        }
        .ext-btn:hover {
            background: rgba(20,184,166,.18);
            border-color: rgba(20,184,166,.4);
            color: #5eead4;
        }

        /* ── Share popover ── */
        .share-pop {
            position: absolute;
            top: 50px;
            right: 12px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            box-shadow: 0 10px 28px rgba(0,0,0,.55);
            padding: 10px;
            min-width: 320px;
            max-width: calc(100% - 24px);
            z-index: 20;
            display: none;
        }
        .share-pop.show { display: block; }
        .share-pop .pop-title {
            font-size: 11px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: .06em;
            padding: 2px 4px 6px;
        }
        .share-pop .url-row {
            display: flex;
            gap: 6px;
            margin-bottom: 6px;
        }
        .share-pop input {
            flex: 1;
            min-width: 0;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            color: #cbd5e1;
            padding: 7px 10px;
            font-size: 11px;
            font-family: ui-monospace, 'SF Mono', Consolas, monospace;
            outline: none;
        }
        .share-pop input:focus { border-color: #14b8a6; }
        .pop-divider {
            height: 1px;
            background: #334155;
            margin: 6px 0;
        }
        .pop-row {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 9px 10px;
            background: transparent;
            border: none;
            color: #cbd5e1;
            font-size: 13px;
            cursor: pointer;
            border-radius: 6px;
            text-align: left;
            font-family: inherit;
            transition: background .12s, color .12s;
        }
        .pop-row:hover {
            background: rgba(20,184,166,.15);
            color: #5eead4;
        }
        .pop-row .ico {
            width: 20px;
            text-align: center;
            font-size: 14px;
            flex-shrink: 0;
        }
        .pop-row .hint {
            margin-left: auto;
            font-size: 10px;
            color: #64748b;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #1e293b;
            color: #f1f5f9;
            padding: 9px 18px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            box-shadow: 0 6px 20px rgba(0,0,0,.4);
            opacity: 0;
            transition: opacity .2s, transform .2s;
            z-index: 200;
            pointer-events: none;
            border: 1px solid #334155;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ── Source filter + gear ── */
        .src-filter {
            font-size: 12px;
            padding: 7px 26px 7px 10px;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            background: #f8fafc;
            color: #1e293b;
            font-family: inherit;
            outline: none;
            cursor: pointer;
        }
        .src-filter:focus { border-color: #0d9488; background: #fff; }
        .gear-btn {
            width: 34px; height: 34px;
            border-radius: 8px;
            border: 1.5px solid #e2e8f0;
            background: #f8fafc;
            color: #64748b;
            font-size: 15px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: background .12s, color .12s, border-color .12s;
        }
        .gear-btn:hover { background: #ecfdf5; color: #0d9488; border-color: #14b8a6; }
        .ver-toggle {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            font-weight: 600;
            padding: 7px 12px;
            border-radius: 8px;
            border: 1.5px solid #e2e8f0;
            background: #f8fafc;
            color: #64748b;
            text-decoration: none;
            white-space: nowrap;
            transition: background .12s, color .12s, border-color .12s;
        }
        .ver-toggle:hover { background: #fff7ed; color: #c2410c; border-color: #fdba74; }

        /* ── Proxy modal (light) ── */
        .proxy-card {
            background: #fff;
            border-radius: 14px;
            max-width: 540px;
            width: 100%;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,.4);
            display: flex;
            flex-direction: column;
            max-height: 90vh;
        }
        .proxy-card .ph {
            padding: 14px 18px;
            background: #0f172a;
            color: #f1f5f9;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .proxy-card .ph button {
            background: transparent; border: none; color: #94a3b8;
            font-size: 22px; cursor: pointer; line-height: 1; padding: 0 4px;
        }
        .proxy-card .pb { padding: 18px; overflow-y: auto; }
        .proxy-card .pn { font-size: 12.5px; color: #475569; line-height: 1.6; margin-bottom: 12px; }
        .proxy-card .pn code { background: #f1f5f9; padding: 1px 6px; border-radius: 5px; font-family: ui-monospace, Consolas, monospace; font-size: 11.5px; color: #be123c; }
        .proxy-card .prow { display: flex; gap: 8px; flex-wrap: wrap; }
        .proxy-card input.ptxt {
            flex: 1 1 240px;
            font-family: ui-monospace, Consolas, monospace;
            font-size: 12px;
            padding: 9px 11px;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            outline: none;
        }
        .proxy-card input.ptxt:focus { border-color: #0d9488; }
        .proxy-card .pbtn {
            padding: 9px 16px; border: none; border-radius: 8px;
            font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
        }
        .proxy-card .pbtn.save { background: linear-gradient(145deg,#14b8a6,#0d9488); color: #fff; }
        .proxy-card .pbtn.clear { background: #f1f5f9; color: #475569; }
        .proxy-card .pstatus { font-size: 12px; margin-top: 10px; font-weight: 600; min-height: 16px; }
        .proxy-card .pstatus.set { color: #15803d; }
        .proxy-card .pstatus.unset { color: #b45309; }
        .proxy-card pre.pcode {
            background: #0f172a; color: #e2e8f0; border-radius: 8px;
            padding: 12px; font-size: 11px; overflow: auto; max-height: 240px;
            margin-top: 10px; font-family: ui-monospace, Consolas, monospace; white-space: pre;
        }

        @media (max-width: 640px) {
            .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
            .cam-name { font-size: 12px; min-height: 32px; }
            .app-header { padding: 10px 14px; }
            .modal-overlay { padding: 0; }
            .modal-box { border-radius: 0; max-height: 100vh; }
            .tool-btn { width: 30px; height: 30px; }
        }
    </style>
</head>
<body>
    <div class="app-header">
        <h1>台中交通即時影像</h1>
        <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" id="searchInput" placeholder="搜尋路口名稱…" autocomplete="off" spellcheck="false">
            <button type="button" class="search-clear" id="searchClear" hidden>&times;</button>
        </div>
        <div class="header-meta">
            <select class="src-filter" id="sourceFilter" title="來源篩選">
                <option value="all">全部來源</option>
                <option value="local">台中自有</option>
                <option value="foreign">外部代管</option>
            </select>
            <button class="gear-btn" id="gearBtn" type="button" title="代理設定" hidden>⚙</button>
            <a class="ver-toggle" href="traffic-legacy.htm" title="切到舊版 (tcnvr2 系統) 看是否恢復">🕹 舊版</a>
            <span class="status-pill" id="statusPill"><span class="dot"></span><span id="statusText">準備中</span></span>
        </div>
    </div>

    <div class="page-content">
        <div class="grid" id="grid">
            <div class="loading-state">
                <div class="spinner"></div>
                正在連線取得攝影機列表…
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-box">
            <div class="modal-header">
                <span class="dot"></span>
                <span class="modal-title" id="modalTitle">即時影像</span>
                <div class="modal-actions">
                    <button class="tool-btn" id="reloadBtn" type="button" title="重新整理串流">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></svg>
                    </button>
                    <button class="tool-btn" id="snapBtn" type="button" title="畫面截圖 (PNG)">

                    <span class="hint">vlc://</span>

                <button class="pop-row" data-ext="copy" type="button">
                    <span class="ico">📋</span>
                    <span>複製串流網址</span>
                </button>
                <button class="pop-row" data-ext="download" type="button">
                    <span class="ico">💾</span>

    <div class="modal-overlay" id="proxyModal" style="z-index:150;">
        <div class="proxy-card">
            <div class="ph"><span>⚙ 代理設定</span><button id="proxyClose" type="button">&times;</button></div>
            <div class="pb">
                <p class="pn">台中交通站的攝影機清單與影像位址端點<strong>沒有開放跨網域</strong>（CORS），瀏覽器需要一個代理來讀取。要「全載」近千支攝影機時，公用代理很容易被限流，強烈建議部署你自己的 Cloudflare Worker（免費、穩定）。留空則改用公用代理。（影像串流本身有開 CORS，不經代理。）</p>
                <div class="prow">
                    <input type="text" class="ptxt" id="proxyInput" placeholder="https://tc.你的帳號.workers.dev" autocomplete="off" spellcheck="false">
                    <button class="pbtn save" id="proxySave" type="button">儲存</button>
                    <button class="pbtn clear" id="proxyClear" type="button">清除</button>
                </div>
                <div class="pstatus" id="proxyStatus"></div>
                <div class="prow" style="margin-top:14px; align-items:center; justify-content:space-between;">
                    <span class="pn" style="margin:0; font-weight:600;">Worker 程式碼（貼到 Cloudflare）：</span>
                    <button class="pbtn clear" id="proxyCopy" type="button" style="padding:6px 12px;">⧉ 複製</button>
                </div>
                <pre class="pcode" id="proxyCode"></pre>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
    // ══════════════════════════════════════════════════════
    //  台中交通即時影像 — 新版 (ATIS_TCC) 資料流
    //  清單:  other/map/device_local.json  +  device_foreign.json
    //  解位址: Device/Showcctv?id=<ID>  →  <img src="https://tcnvrN…/<hash>">
    //  影像:  tcnvrN 的 MJPEG 串流 (multipart/x-mixed-replace，ACAO:*)
    //  ATIS 端點無 CORS → 需經代理；影像本身有 CORS → 直連。
    // ══════════════════════════════════════════════════════
    const ATIS         = 'https://e-traffic.taichung.gov.tw/ATIS_TCC/';
    const LOCAL_JSON   = ATIS + 'other/map/device_local.json';
    const FOREIGN_JSON = ATIS + 'other/map/device_foreign.json';
    const SHOWCCTV     = ATIS + 'Device/Showcctv?id=';

    // ── Proxy setup (direct first, then user worker, then public) ──
    const PROXY_KEY     = 'tc_traffic_proxy';
    // 沿用既有的通用 ?url= 代理 worker；有預設 → 隱藏 ⚙ 代理 UI
    const DEFAULT_PROXY = 'https://missing.54maxwu.workers.dev/';
    const getProxy = () => { try { return (localStorage.getItem(PROXY_KEY) ?? DEFAULT_PROXY).trim(); } catch { return DEFAULT_PROXY; } };
    const WORKER_CODE =
`export default {
  async fetch(request) {
    const CORS = {
      'Access-Control-Allow-Origin': '*',
      'Access-Control-Allow-Methods': 'GET, OPTIONS',
      'Access-Control-Allow-Headers': 'Content-Type',
    };
    if (request.method === 'OPTIONS') return new Response(null, { headers: CORS });
    const target = new URL(request.url).searchParams.get('url');
    if (!target) return new Response('missing ?url=', { status: 400, headers: CORS });
    try {
      const upstream = await fetch(target, {
        headers: { 'User-Agent': 'Mozilla/5.0 (compatible; TrafficViewer/1.0)' },
        redirect: 'follow',
      });
      const body = await upstream.text();
      return new Response(body, {
        status: upstream.status,
        headers: { ...CORS, 'Content-Type': upstream.headers.get('content-type') || 'text/html; charset=utf-8' },
      });
    } catch (e) {
      return new Response('proxy error: ' + e.message, { status: 502, headers: CORS });
    }
  }
};`;

    function proxyList() {
        const list = [];
        const p = getProxy();
        if (p) list.push(u => p + (p.includes('?') ? '&' : (p.endsWith('/') ? '' : '/')) + '?url=' + encodeURIComponent(u));
        list.push(
            u => 'https://api.codetabs.com/v1/proxy/?quest=' + encodeURIComponent(u),
            u => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u),
            u => 'https://corsproxy.io/?url=' + encodeURIComponent(u),
        );
        return list;
    }
    // Fetch text: try DIRECT first (works if CORS ever opens / same-origin),
    // then fall back through the proxy chain.
    async function fetchText(u) {
        try {
            const r = await fetch(u, { cache: 'no-store' });
            if (r.ok) { const t = await r.text(); if (t && t.length > 20) return t; }
        } catch (e) { /* CORS-blocked → proxies */ }
        let last;
        for (const make of proxyList()) {
            try {
                const r = await fetch(make(u), { cache: 'no-store' });
                if (!r.ok) throw new Error('HTTP ' + r.status);
                const t = await r.text();
                if (t && t.length > 20) return t;
                throw new Error('空白回應');
            } catch (e) { last = e; }
        }
        throw last || new Error('無法取得內容');
    }
    async function fetchJson(u) { return JSON.parse(await fetchText(u)); }

    // ── State ─────────────────────────────────────────────
    let cameras = [];                    // [{ id, name, source, x, y }]
    let currentCam = null;               // { id, name, url }
    const streamCache = new Map();       // id → url | null  (session)

    function urlKey(id) { return 'tcs_' + id; }
    function cachedUrl(id) { try { return localStorage.getItem(urlKey(id)); } catch { return null; } }
    function saveUrl(id, url) { try { localStorage.setItem(urlKey(id), url); } catch {} }

    // ── DOM ───────────────────────────────────────────────
    const $grid       = document.getElementById('grid');
    const $search     = document.getElementById('searchInput');
    const $searchClr  = document.getElementById('searchClear');
    const $sourceSel  = document.getElementById('sourceFilter');
    const $gearBtn    = document.getElementById('gearBtn');
    const $modal      = document.getElementById('modal');
    const $video      = document.getElementById('video');
    const $closeBtn   = document.getElementById('closeBtn');
    const $reloadBtn  = document.getElementById('reloadBtn');
    const $snapBtn    = document.getElementById('snapBtn');
    const $shareBtn   = document.getElementById('shareBtn');
    const $sharePop   = document.getElementById('sharePop');
    const $shareUrl   = document.getElementById('shareUrl');
    const $fsBtn      = document.getElementById('fsBtn');
    const $modalTitle = document.getElementById('modalTitle');
    const $statusPill = document.getElementById('statusPill');
    const $statusText = document.getElementById('statusText');
    const $videoWrap  = document.querySelector('.video-wrap');
    const $loadingOv  = document.getElementById('loadingOverlay');
    const $errorOv    = document.getElementById('errorOverlay');
    const $pausedOv   = document.getElementById('pausedOverlay');
    const $errorMsg   = document.getElementById('errorMsg');
    const $errorSub   = document.getElementById('errorSub');
    const $retryBtn   = document.getElementById('retryBtn');
    const $toast      = document.getElementById('toast');

    let toastTimer = null;
    function toast(msg) {
        $toast.textContent = msg;
        $toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => $toast.classList.remove('show'), 1800);
    }

    function setStatus(text, kind) {
        $statusText.textContent = text;
        $statusPill.classList.remove('ok', 'err');
        if (kind === 'ok')  $statusPill.classList.add('ok');
        if (kind === 'err') $statusPill.classList.add('err');
    }

    function esc(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Position 欄位形如 "[07067]中清路/環中路(…),Zhongqing Rd…" 或 "02012文心南路…,Wenxin…"
    // 取中文段、去掉開頭代碼。
    function displayName(raw) {
        let s = String(raw || '').trim();
        s = s.replace(/^\[[^\]]*\]/, '').replace(/^\d{4,6}/, '').trim();
        const zh = s.split(/,(?=[A-Za-z])/)[0].trim();  // 在「,英文」處切開
        return zh || s || '(未命名)';
    }

    // ── Resolve a camera's live MJPEG URL via Showcctv ────
    async function resolveStream(id) {
        if (streamCache.has(id)) return streamCache.get(id);
        const saved = cachedUrl(id);
        if (saved) { streamCache.set(id, saved); return saved; }
        let url = null;
        try {
            const html = await fetchText(SHOWCCTV + encodeURIComponent(id));
            const m = html.match(/src="(https?:\/\/tcnvr[^"]+)"/i);
            if (m) url = m[1];
        } catch (e) { /* leave null */ }
        streamCache.set(id, url);
        if (url) saveUrl(id, url);   // hash 是固定的，永久快取
        return url;
    }

    // ── Load camera lists ─────────────────────────────────
    async function loadCameras() {
        const out = [];
        const stamp = Date.now();
        // 台中自有
        try {
            const loc = await fetchJson(LOCAL_JSON + '?_=' + stamp);
            if (Array.isArray(loc)) loc.forEach(c => {
                if ((c.Type || '').toLowerCase() === 'cctv' && c.Visible !== false)
                    out.push({ id: c.ID, name: c.Position || c.ID, source: 'local', x: c.X, y: c.Y });
            });
        } catch (e) { console.warn('device_local 載入失敗', e); }
        // 外部代管（公路局等）
        try {
            const frn = await fetchJson(FOREIGN_JSON + '?_=' + stamp);
            if (Array.isArray(frn)) frn.forEach(c => {
                if ((c.DeviceType || '').toLowerCase() === 'cctv')
                    out.push({ id: c.ID, name: c.Position || c.ID, source: 'foreign', x: c.X, y: c.Y });
            });
        } catch (e) { console.warn('device_foreign 載入失敗', e); }
        return out;
    }

    // ══ Thumbnail engine ══════════════════════════════════
    // MJPEG-only 系統沒有單張快照端點：對每張卡片開串流→抓第一幀→
    // 存成靜態 JPEG→立刻關連線（snapshot-and-release），並發受限，
    // 由 IntersectionObserver 依進入畫面順序排入佇列。
    const SNAP_CONCURRENCY = 6;
    let active = 0;
    const queue = [];
    function pump() {
        while (active < SNAP_CONCURRENCY && queue.length) {
            const task = queue.shift();
            active++;
            Promise.resolve().then(task).finally(() => { active--; pump(); });
        }
    }
    function enqueue(task) { queue.push(task); pump(); }

    // 開一條 MJPEG，抓到第一幀就畫進 canvas、回傳 dataURL，然後斷線
    function grabFrame(streamUrl) {
        return new Promise(resolve => {
            const im = new Image();
            im.crossOrigin = 'anonymous';
            let done = false;
            const finish = (v) => {
                if (done) return;
                done = true;
                clearTimeout(timer);
                try { im.src = ''; } catch {}   // 關閉持久連線，釋放頻寬
                resolve(v);
            };
            im.onload = () => {
                try {
                    const w = im.naturalWidth || 352, h = im.naturalHeight || 288;
                    const c = document.createElement('canvas');
                    c.width = w; c.height = h;
                    c.getContext('2d').drawImage(im, 0, 0, w, h);
                    finish(c.toDataURL('image/jpeg', 0.62));
                } catch (e) { finish(null); }
            };
            im.onerror = () => finish(null);
            const timer = setTimeout(() => finish(null), 12000);
            im.src = streamUrl;
        });
    }

    async function snapCard(card) {
        if (!card.isConnected || card.dataset.snap) return;
        card.dataset.snap = '1';
        const id     = card.dataset.id;
        const imgEl  = card.querySelector('.cam-thumb');
        const fbEl   = card.querySelector('.cam-thumb-fallback');
        const badge  = card.querySelector('.cam-status');

        const url = await resolveStream(id);
        if (!card.isConnected) return;
        if (!url) { markOffline(badge, fbEl, imgEl); return; }
        card.dataset.url = url;

        const frame = await grabFrame(url);
        if (!card.isConnected) return;
        if (frame) {
            imgEl.src = frame;
            imgEl.classList.remove('broken');
            fbEl.style.display = 'none';
            badge.textContent = '● LIVE';
            badge.className = 'cam-status online';
        } else {
            markOffline(badge, fbEl, imgEl);
        }
    }
    function markOffline(badge, fbEl, imgEl) {
        badge.textContent = 'OFFLINE';
        badge.className = 'cam-status';
        imgEl.classList.add('broken');
        fbEl.style.display = 'block';
    }

    // 卡片進入視窗才排入抓圖佇列
    const io = ('IntersectionObserver' in window)
        ? new IntersectionObserver((entries, obs) => {
            entries.forEach(en => {
                if (en.isIntersecting) {
                    obs.unobserve(en.target);
                    enqueue(() => snapCard(en.target));
                }
            });
        }, { rootMargin: '300px' })
        : null;

    // ── Render grid ───────────────────────────────────────
    function renderGrid() {
        // 換清單前先清空待抓佇列（避免抓到已被過濾掉的卡）
        queue.length = 0;
        const q   = $search.value.trim().toLowerCase();
        const src = $sourceSel.value;
        const list = cameras.filter(c =>
            (src === 'all' || c.source === src) &&
            (!q || displayName(c.name).toLowerCase().includes(q) || c.id.toLowerCase().includes(q))
        );

        if (!list.length) {
            $grid.innerHTML = '<div class="empty-state">沒有符合條件的攝影機</div>';
            return;
        }

        $grid.innerHTML = list.map(c => {
            const nm = displayName(c.name);
            return `
                <div class="cam-card" data-id="${esc(c.id)}" data-name="${esc(nm)}">
                    <div class="cam-thumb-wrap">
                        <img class="cam-thumb broken" alt="${esc(nm)}">
                        <div class="cam-thumb-fallback">📹</div>
                        <div class="cam-play">
                            <svg viewBox="0 0 24 24" fill="#fff">
                                <circle cx="12" cy="12" r="11" fill="rgba(0,0,0,.55)"/>
                                <path d="M9.5 7.5v9l7-4.5z" fill="#fff"/>
                            </svg>
                        </div>
                        <span class="cam-status pending">載入中</span>
                        <span class="cam-src ${c.source === 'foreign' ? 'foreign' : ''}">${c.source === 'foreign' ? '外部' : '台中'}</span>
                    </div>
                    <div class="cam-body">
                        <div class="cam-name">${esc(nm)}</div>
                    </div>
                </div>
            `;
        }).join('');

        $grid.querySelectorAll('.cam-card').forEach(el => {
            el.addEventListener('click', () => openVideo(el.dataset.id, el.dataset.name));
            if (io) io.observe(el);
            else enqueue(() => snapCard(el));   // 無 IO 支援 → 直接排入
        });
    }

    // ── Video modal ───────────────────────────────────────
    function showLoading() { $loadingOv.hidden = false; $errorOv.hidden = true; $pausedOv.hidden = true; }
    function showError(msg, sub) {
        $loadingOv.hidden = true; $errorOv.hidden = false; $pausedOv.hidden = true;
        $errorMsg.textContent = msg || '無法載入串流';
        $errorSub.textContent = sub || '';
    }
    function showPaused()   { $loadingOv.hidden = true; $errorOv.hidden = true; $pausedOv.hidden = false; }
    function hideOverlays() { $loadingOv.hidden = true; $errorOv.hidden = true; $pausedOv.hidden = true; }

    function loadStream() {
        if (!currentCam || !currentCam.url) return;
        showLoading();
        $video.removeAttribute('src');
        requestAnimationFrame(() => { $video.src = currentCam.url; });
    }

    async function openVideo(id, name) {
        currentCam = { id, name, url: null };
        $modalTitle.textContent = displayName(name) || id;
        $modal.classList.add('show');
        showLoading();
        // 先用卡片可能已抓到的 URL，否則現解
        let url = streamCache.get(id) || cachedUrl(id);
        if (!url) {
            try { url = await resolveStream(id); }
            catch { url = null; }
        }
        if (!currentCam || currentCam.id !== id) return;  // 中途關閉/切換
        if (!url) { showError('設備維護中或離線', '此攝影機目前沒有可用影像'); return; }
        currentCam.url = url;
        loadStream();
    }

    function closeModal() {
        $video.removeAttribute('src');
        $modal.classList.remove('show');
        $sharePop.classList.remove('show');
        hideOverlays();
        currentCam = null;
        if (document.fullscreenElement) document.exitFullscreen().catch(() => {});
    }

    // ── <img> stream state → overlay handling ─────────────
    $video.addEventListener('load',  hideOverlays);
    $video.addEventListener('error', () => {
        if (!currentCam) return;
        if (!$pausedOv.hidden) return;   // src 是為了外部播放而清掉的
        showError('串流連線失敗', '請檢查網路或改用外部播放器');
    });

    $pausedOv.addEventListener('click', () => {
        if (!currentCam) return;
        loadStream();
    });

    // ── Toolbar buttons ───────────────────────────────────
    $reloadBtn.addEventListener('click', () => { toast('重新整理串流'); loadStream(); });
    $retryBtn.addEventListener('click', loadStream);

    $fsBtn.addEventListener('click', () => {
        const fsEl = document.fullscreenElement || document.webkitFullscreenElement;
        if (fsEl) { (document.exitFullscreen || document.webkitExitFullscreen).call(document); return; }
        if ($videoWrap.requestFullscreen)            $videoWrap.requestFullscreen();
        else if ($videoWrap.webkitRequestFullscreen) $videoWrap.webkitRequestFullscreen();
        else                                         toast('此瀏覽器不支援全螢幕');
    });

    // ── External player ───────────────────────────────────
    function safeFilename(s) {
        return String(s || 'stream').replace(/[\\/:*?"<>|]/g, '_').slice(0, 60);
    }
    function stopInPageStream() { $video.removeAttribute('src'); }

    async function ensureUrl() {
        if (currentCam && currentCam.url) return currentCam.url;
        if (!currentCam) return null;
        const u = await resolveStream(currentCam.id);
        if (currentCam) currentCam.url = u;
        return u;
    }

    async function externalAction(kind) {
        if (!currentCam) return;
        const name = displayName(currentCam.name) || 'Stream';
        $sharePop.classList.remove('show');
        const url = await ensureUrl();
        if (!url) { toast('無可用串流網址'); return; }

        switch (kind) {
            case 'potplayer':
                stopInPageStream(); showPaused();
                location.href = 'potplayer://' + url;
                toast('已交給 PotPlayer');
                break;
            case 'vlc':
                stopInPageStream(); showPaused();
                location.href = 'vlc://' + url;
                toast('已交給 VLC');
                break;
            case 'copy':
                try { await navigator.clipboard.writeText(url); toast('已複製串流網址'); }
                catch { $shareUrl.value = url; $shareUrl.select(); document.execCommand('copy'); toast('已複製串流網址'); }
                break;
            case 'download': {
                const content = `#EXTM3U\n#EXTINF:-1,${name}\n${url}\n`;
                const blob = new Blob([content], { type: 'audio/x-mpegurl' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = safeFilename(name) + '.m3u';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                setTimeout(() => URL.revokeObjectURL(a.href), 1000);
                toast('已下載 .m3u');
                break;
            }
        }
    }

    async function openSharePop() {
        if (!currentCam) return;
        $sharePop.classList.add('show');
        $shareUrl.value = '解析串流網址…';
        const url = await ensureUrl();
        if (!currentCam) return;
        $shareUrl.value = url || '（無可用網址）';
        $shareUrl.focus(); $shareUrl.select();
    }

    $shareBtn.addEventListener('click', e => {
        e.stopPropagation();
        if ($sharePop.classList.contains('show')) $sharePop.classList.remove('show');
        else openSharePop();
    });
    document.addEventListener('click', e => {
        if (!$sharePop.classList.contains('show')) return;
        if ($sharePop.contains(e.target) || $shareBtn.contains(e.target)) return;
        $sharePop.classList.remove('show');
    });
    document.querySelectorAll('[data-ext]').forEach(el => {
        el.addEventListener('click', e => { e.stopPropagation(); externalAction(el.dataset.ext); });
    });

    // ── Snapshot (screenshot) ─────────────────────────────
    $snapBtn.addEventListener('click', () => {
        if (!$video.naturalWidth) { toast('影像尚未載入'); return; }
        try {
            const c = document.createElement('canvas');
            c.width  = $video.naturalWidth;
            c.height = $video.naturalHeight;
            const g = c.getContext('2d');
            g.drawImage($video, 0, 0, c.width, c.height);

            const ts = new Date().toLocaleString('zh-TW', { hour12: false });
            const cap = `${displayName(currentCam?.name) || ''}  ${ts}`;
            g.font = 'bold 18px -apple-system, "Segoe UI", "Noto Sans TC", sans-serif';
            const padX = 14;
            const w = g.measureText(cap).width + padX * 2;
            g.fillStyle = 'rgba(0,0,0,.55)';
            g.fillRect(0, c.height - 36, w, 36);
            g.fillStyle = '#fff';
            g.textBaseline = 'middle';
            g.fillText(cap, padX, c.height - 18);

            const safeName = (displayName(currentCam?.name) || 'snapshot').replace(/[\\/:*?"<>|]/g, '_').slice(0, 40);
            const stamp = ts.replace(/[\/: ]/g, '-');
            const link = document.createElement('a');
            link.download = `${safeName}_${stamp}.png`;
            link.href = c.toDataURL('image/png');
            link.click();
            toast('已下載截圖');
        } catch (err) {
            console.error(err);
            toast('截圖失敗（CORS 限制）');
        }
    });

    // ── Modal events ──────────────────────────────────────
    $closeBtn.addEventListener('click', closeModal);
    $modal.addEventListener('click', e => { if (e.target === $modal) closeModal(); });
    document.addEventListener('keydown', e => {
        if (proxyModal.classList.contains('show') && e.key === 'Escape') { proxyModal.classList.remove('show'); return; }
        if (!$modal.classList.contains('show')) return;
        if (document.activeElement === $shareUrl) return;
        if (e.key === 'Escape') {
            if ($sharePop.classList.contains('show')) $sharePop.classList.remove('show');
            else closeModal();
        }
        else if (e.key === 'f' || e.key === 'F') $fsBtn.click();
        else if (e.key === 'r' || e.key === 'R') $reloadBtn.click();
        else if (e.key === 's' || e.key === 'S') $snapBtn.click();
        else if (e.key === 'o' || e.key === 'O') $shareBtn.click();
    });

    // ── Search + filter ───────────────────────────────────
    $search.addEventListener('input', () => { $searchClr.hidden = !$search.value; renderGrid(); });
    $searchClr.addEventListener('click', () => { $search.value = ''; $searchClr.hidden = true; renderGrid(); $search.focus(); });
    $sourceSel.addEventListener('change', renderGrid);

    // ── Proxy modal ───────────────────────────────────────
    const proxyModal  = document.getElementById('proxyModal');
    const proxyInput  = document.getElementById('proxyInput');
    const proxyStatus = document.getElementById('proxyStatus');
    const proxyCode   = document.getElementById('proxyCode');
    proxyCode.textContent = WORKER_CODE;
    if (!DEFAULT_PROXY) $gearBtn.hidden = false;   // 無預設代理時才露出 ⚙

    function refreshProxyStatus() {
        const p = getProxy();
        if (p) { proxyStatus.textContent = '目前使用：' + p; proxyStatus.className = 'pstatus set'; }
        else   { proxyStatus.textContent = '目前使用公用代理（可能被限流）'; proxyStatus.className = 'pstatus unset'; }
    }
    $gearBtn.addEventListener('click', () => {
        proxyInput.value = getProxy();
        refreshProxyStatus();
        proxyModal.classList.add('show');
    });
    document.getElementById('proxyClose').addEventListener('click', () => proxyModal.classList.remove('show'));
    proxyModal.addEventListener('click', e => { if (e.target === proxyModal) proxyModal.classList.remove('show'); });
    document.getElementById('proxySave').addEventListener('click', () => {
        try { localStorage.setItem(PROXY_KEY, proxyInput.value.trim()); } catch {}
        refreshProxyStatus(); toast('已儲存代理設定');
    });
    document.getElementById('proxyClear').addEventListener('click', () => {
        try { localStorage.removeItem(PROXY_KEY); } catch {}
        proxyInput.value = ''; refreshProxyStatus(); toast('已清除，改用公用代理');
    });
    document.getElementById('proxyCopy').addEventListener('click', async () => {
        try { await navigator.clipboard.writeText(WORKER_CODE); toast('已複製 Worker 程式碼'); }
        catch { toast('複製失敗，請手動選取'); }
    });

    // ── Boot ──────────────────────────────────────────────
    (async () => {
        try {
            setStatus('載入攝影機清單…');
            cameras = await loadCameras();
            if (!cameras.length) throw new Error('清單為空（可能被代理限流，試試設定自己的 Worker）');
            const nLocal = cameras.filter(c => c.source === 'local').length;
            const nForeign = cameras.length - nLocal;
            setStatus(`共 ${cameras.length} 支（台中 ${nLocal}／外部 ${nForeign}）`, 'ok');
            renderGrid();
        } catch (err) {
            console.error(err);
            setStatus('連線失敗', 'err');
            $grid.innerHTML = `<div class="empty-state">⚠ 無法取得攝影機清單<br><span style="font-size:11px;color:#94a3b8;">${esc(err.message || err)}</span><br><br>可點右上角 ⚙ 設定自己的代理 Worker 後重新整理。</div>`;
        }
    })();
    </script>
</body>
</html>
