<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>附近公車站牌</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        [hidden] { display: none !important; }
        html, body { height: 100%; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', sans-serif;
            background: #f1f5f9;
            color: #2c3e50;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .app-header {
            background: #fff;
            border-bottom: 1px solid #e2e8f0;
            padding: 12px 20px;
            min-height: 58px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 1px 3px rgba(0,0,0,.06);
            z-index: 20;
            gap: 12px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }
        .app-header h1 {
            font-size: 16px;
            font-weight: 600;
            color: #1e293b;
            letter-spacing: .02em;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .header-meta { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #64748b; flex-wrap: wrap; }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            padding: 5px 11px;
            border-radius: 999px;
            background: #f1f5f9;
            color: #64748b;
            font-weight: 600;
        }
        .status-pill .dot { width: 7px; height: 7px; border-radius: 50%; background: #94a3b8; }
        .status-pill.ok  { background: #ecfdf5; color: #047857; }
        .status-pill.ok .dot { background: #10b981; }
        .status-pill.err { background: #fef2f2; color: #b91c1c; }
        .status-pill.err .dot { background: #ef4444; }
        .status-pill.load { background: #eff6ff; color: #1d4ed8; }
        .status-pill.load .dot { background: #3b82f6; animation: bpulse 1s ease-in-out infinite; }
        @keyframes bpulse { 0%,100%{opacity:1} 50%{opacity:.3} }

        .ctl {
            font-size: 12px;
            padding: 7px 10px;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            background: #f8fafc;
            color: #1e293b;
            font-family: inherit;
            outline: none;
            cursor: pointer;
            transition: border-color .15s, background .15s, color .15s;
        }
        .ctl:hover { border-color: #14b8a6; }
        select.ctl { padding-right: 24px; }
        .icon-btn {
            width: 34px; height: 34px; padding: 0;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 15px;
        }
        .icon-btn.spin svg, .icon-btn.spinning { animation: spin .8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Address search ── */
        .addr-wrap { position: relative; flex: 1 1 240px; min-width: 160px; max-width: 400px; display: flex; align-items: center; }
        .addr-icon { position: absolute; left: 11px; color: #94a3b8; font-size: 13px; pointer-events: none; }
        .addr-input { width: 100%; font-size: 13px; padding: 9px 58px 9px 31px; border: 1.5px solid #e2e8f0; border-radius: 9px; background: #f8fafc; color: #1e293b; outline: none; font-family: inherit; transition: border-color .15s, background .15s; }
        .addr-input:focus { border-color: #0d9488; background: #fff; }
        .addr-go { position: absolute; right: 5px; border: none; background: #0d9488; color: #fff; font-size: 12px; font-weight: 700; font-family: inherit; padding: 6px 12px; border-radius: 7px; cursor: pointer; transition: background .15s; }
        .addr-go:hover { background: #0f766e; }
        .addr-go:disabled { opacity: .6; cursor: default; }

        /* ── Layout ── */
        .layout { flex: 1; display: flex; min-height: 0; }
        #map { flex: 1; min-width: 0; background: #dbe4ea; z-index: 1; }

        .list-panel {
            width: 380px;
            flex-shrink: 0;
            background: #fff;
            border-left: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .list-head {
            padding: 12px 16px;
            font-size: 13px;
            font-weight: 700;
            color: #1e293b;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .list-head .count { font-size: 11px; font-weight: 600; color: #64748b; }
        .list-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            scrollbar-width: thin;
            scrollbar-color: #cbd5e1 transparent;
        }
        .list-scroll::-webkit-scrollbar { width: 8px; }
        .list-scroll::-webkit-scrollbar-track { background: transparent; }
        .list-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 999px; }
        .list-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .empty {
            padding: 50px 20px;
            text-align: center;
            color: #94a3b8;
            font-size: 13px;
            line-height: 1.7;
        }
        .empty .spinner {
            width: 26px; height: 26px;
            border: 3px solid #e2e8f0;
            border-top-color: #0d9488;
            border-radius: 50%;
            animation: spin .8s linear infinite;
            margin: 0 auto 12px;
        }

        /* ── Station card ── */
        .stn {
            border: 1.5px solid #e2e8f0;
            border-radius: 11px;
            margin-bottom: 8px;
            overflow: hidden;
            transition: border-color .15s, box-shadow .15s;
        }
        .stn.active { border-color: #14b8a6; box-shadow: 0 4px 14px rgba(13,148,136,.16); }
        .stn-head {
            padding: 11px 13px;
            cursor: pointer;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            background: #fff;
            transition: background .12s;
        }
        .stn-head:hover { background: #f8fafc; }
        .stn.active .stn-head { background: #f0fdfa; }
        .stn-pin {
            width: 26px; height: 26px;
            border-radius: 50%;
            background: #0d9488;
            color: #fff;
            font-size: 13px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            margin-top: 1px;
        }
        .stn-main { flex: 1; min-width: 0; }
        .stn-name {
            font-size: 14px;
            font-weight: 600;
            color: #1e293b;
            line-height: 1.3;
        }
        .stn-sub {
            display: flex; align-items: center; gap: 8px;
            margin-top: 3px;
            font-size: 11px;
            color: #64748b;
        }
        .stn-bearing {
            display: inline-flex; align-items: center;
            padding: 1px 6px; border-radius: 999px;
            background: #f1f5f9; font-weight: 600;
        }
        .stn-routes {
            display: flex; flex-wrap: wrap; gap: 4px;
            margin-top: 7px;
        }
        .route-chip {
            font-size: 10.5px;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 6px;
            background: #ecfdf5;
            color: #0f766e;
            border: 1px solid #99f6e4;
        }
        .route-chip.more { background: #f1f5f9; color: #64748b; border-color: #e2e8f0; }
        .stn-chevron { color: #94a3b8; font-size: 13px; margin-top: 3px; transition: transform .2s; }
        .stn.active .stn-chevron { transform: rotate(180deg); color: #0d9488; }

        /* ── Arrivals table ── */
        .stn-body { border-top: 1px solid #e2e8f0; background: #fafcfd; display: none; }
        .stn.active .stn-body { display: block; }
        .arr-loading { padding: 16px; text-align: center; color: #94a3b8; font-size: 12px; }
        .arr-hd {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 13px 7px;
            font-size: 10.5px; font-weight: 700; color: #94a3b8;
            letter-spacing: .02em;
            background: #f4f7f9;
            border-bottom: 1px solid #e6edf2;
        }
        .arr-hd .h-route { min-width: 52px; }
        .arr-hd .h-mid { flex: 1; }
        .arr-row {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 13px;
            border-bottom: 1px solid #eef2f6;
        }
        .arr-row:last-child { border-bottom: none; }
        .arr-route {
            font-size: 15px; font-weight: 800; color: #0f766e;
            min-width: 52px;
        }
        .arr-mid { flex: 1; min-width: 0; display: flex; align-items: center; gap: 7px; }
        .arr-dir { font-size: 11px; color: #94a3b8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .arr-badge {
            font-size: 11.5px; font-weight: 700;
            padding: 3px 9px; border-radius: 999px;
            white-space: nowrap;
            background: #f1f5f9; color: #64748b;
        }
        .arr-badge.now  { background: #fee2e2; color: #b91c1c; }
        .arr-badge.soon { background: #ffedd5; color: #c2410c; }
        .arr-badge.ok   { background: #dcfce7; color: #15803d; }
        .arr-badge.sched{ background: #e0e7ff; color: #4338ca; }
        .arr-plate {
            font-size: 10.5px; font-weight: 600;
            padding: 2px 7px; border-radius: 5px;
            background: #f1f5f9; color: #64748b;
            font-family: ui-monospace, Consolas, monospace;
            white-space: nowrap;
        }
        .arr-foot {
            padding: 7px 13px; font-size: 10.5px; color: #94a3b8;
            display: flex; align-items: center; justify-content: space-between;
        }

        /* ── Map overlays ── */
        .map-btn-search {
            position: absolute;
            left: 50%; bottom: 18px;
            transform: translateX(-50%);
            z-index: 500;
            background: #0d9488;
            color: #fff;
            border: none;
            padding: 9px 18px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(13,148,136,.45);
            display: inline-flex; align-items: center; gap: 7px;
            transition: transform .1s, box-shadow .15s, opacity .2s;
        }
        .map-btn-search:hover { box-shadow: 0 6px 20px rgba(13,148,136,.55); }
        .map-btn-search:active { transform: translateX(-50%) scale(.96); }

        .me-dot {
            width: 18px; height: 18px;
            background: #2563eb;
            border: 3px solid #fff;
            border-radius: 50%;
            box-shadow: 0 0 0 4px rgba(37,99,235,.3), 0 1px 5px rgba(0,0,0,.45);
        }
        .stn-marker {
            width: 38px; height: 38px;
            background: #0d9488;
            border: 3px solid #fff;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            box-shadow: 0 4px 10px rgba(0,0,0,.45);
            display: flex; align-items: center; justify-content: center;
            transition: background .12s;
        }
        .stn-marker span { transform: rotate(45deg); color: #fff; font-size: 18px; line-height: 1; }
        .stn-marker:hover { background: #0f766e; }
        .stn-marker.active {
            background: #f59e0b; width: 48px; height: 48px; z-index: 700;
            box-shadow: 0 6px 18px rgba(245,158,11,.6);
        }
        .stn-marker.active span { font-size: 24px; }

        .leaflet-popup-content { margin: 10px 12px; font-family: inherit; }
        .leaflet-popup-content b { color: #0f766e; }

        .toast {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #1e293b;
            color: #f1f5f9;
            padding: 9px 18px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            box-shadow: 0 6px 20px rgba(0,0,0,.4);
            opacity: 0;
            transition: opacity .2s, transform .2s;
            z-index: 1000;
            pointer-events: none;
            max-width: 88vw;
            text-align: center;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        @media (max-width: 820px) {
            .app-header { padding: 9px 12px; gap: 8px 10px; }
            .app-header h1 { font-size: 15px; }
            .header-meta { margin-left: auto; }
            .addr-wrap { order: 5; flex-basis: 100%; max-width: none; min-width: 0; }
            .layout { flex-direction: column; }
            #map { height: 42vh; min-height: 240px; flex: none; }
            .list-panel { width: auto; flex: 1; border-left: none; border-top: 1px solid #e2e8f0; }
        }
        @media (max-width: 480px) {
            .app-header h1 { font-size: 14px; gap: 5px; }
            .ctl { padding: 8px 9px; }
            .icon-btn { width: 38px; height: 38px; font-size: 16px; }
            select.ctl { padding: 8px 22px 8px 9px; }
            #map { height: 38vh; min-height: 200px; }
            .stn-head { padding: 12px 12px; }
            .stn-name { font-size: 15px; }
            .arr-row { padding: 12px 13px; }
            .arr-route { font-size: 16px; }
            .status-pill { padding: 5px 9px; }
        }
    </style>
</head>
<body>
    <div class="app-header">
        <h1>🚌 附近公車站牌</h1>
        <div class="addr-wrap">
            <span class="addr-icon">🔎</span>
            <input type="text" class="addr-input" id="addrInput" placeholder="輸入地址或地標快速前往…" autocomplete="off" spellcheck="false">
            <button class="addr-go" id="addrGo" type="button" title="前往">前往</button>
        </div>
        <div class="header-meta">
            <select class="ctl" id="radiusSel" title="搜尋範圍">
                <option value="300">300 公尺</option>
                <option value="500" selected>500 公尺</option>
                <option value="800">800 公尺</option>
                <option value="1200">1.2 公里</option>
            </select>
            <button class="ctl icon-btn" id="locateBtn" type="button" title="定位到我的位置">📍</button>
            <button class="ctl icon-btn" id="refreshBtn" type="button" title="重新整理">🔄</button>
            <span class="status-pill" id="statusPill"><span class="dot"></span><span id="statusText">準備中</span></span>
        </div>
    </div>

    <div class="layout">
        <div id="map">
            <button class="map-btn-search" id="searchHereBtn" type="button" hidden>🔍 搜尋此區域</button>
        </div>
        <aside class="list-panel">
            <div class="list-head">
                <span>附近站牌</span>
                <span class="count" id="listCount"></span>
            </div>
            <div class="list-scroll" id="list">
                <div class="empty">
                    <div class="spinner"></div>
                    正在定位…
                </div>
            </div>
        </aside>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
    // ══════════════════════════════════════════════════════
    //  附近公車站牌 — 台中 ATIS TDX 代理 (client 免 auth)
    //  站位:  api/TDXAPI/BusStationNearBy/{lon}/{lat}/{radius}
    //  到站:  api/TDXAPI/BusEstimatedTime/{StationID}
    //  ATIS 端點無 CORS → 走通用 ?url= 代理 worker
    //  地圖:  Leaflet + OSM (免金鑰)；定位: navigator.geolocation
    // ══════════════════════════════════════════════════════
    const ATIS = 'https://e-traffic.taichung.gov.tw/ATIS_TCC/api/TDXAPI/';
    const NEARBY = (lon, lat, r) => ATIS + `BusStationNearBy/${lon}/${lat}/${r}`;
    const ETA    = (stationId)   => ATIS + `BusEstimatedTime/${stationId}`;

    const PROXY_KEY     = 'tc_traffic_proxy';   // 與 traffic.htm 共用同一支 worker
    const DEFAULT_PROXY = 'https://missing.54maxwu.workers.dev/';
    const getProxy = () => { try { return (localStorage.getItem(PROXY_KEY) ?? DEFAULT_PROXY).trim(); } catch { return DEFAULT_PROXY; } };
    function proxyList() {
        const list = []; const p = getProxy();
        if (p) list.push(u => p + (p.includes('?') ? '&' : (p.endsWith('/') ? '' : '/')) + '?url=' + encodeURIComponent(u));
        list.push(
            u => 'https://api.codetabs.com/v1/proxy/?quest=' + encodeURIComponent(u),
            u => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u),
        );
        return list;
    }
    async function fetchJson(u) {
        try {
            const r = await fetch(u, { cache: 'no-store' });
            if (r.ok) { const t = await r.text(); if (t) return JSON.parse(t); }
        } catch (e) { /* CORS → proxy */ }
        let last;
        for (const make of proxyList()) {
            try {
                const r = await fetch(make(u), { cache: 'no-store' });
                if (!r.ok) throw new Error('HTTP ' + r.status);
                const t = await r.text();
                if (t) return JSON.parse(t);
                throw new Error('空白');
            } catch (e) { last = e; }
        }
        throw last || new Error('無法取得資料');
    }

    // ── DOM ──
    const $status  = document.getElementById('statusText');
    const $pill    = document.getElementById('statusPill');
    const $list    = document.getElementById('list');
    const $count   = document.getElementById('listCount');
    const $radius  = document.getElementById('radiusSel');
    const $locate  = document.getElementById('locateBtn');
    const $refresh = document.getElementById('refreshBtn');
    const $searchHere = document.getElementById('searchHereBtn');
    const $toast   = document.getElementById('toast');

    let toastT = null;
    function toast(msg) {
        $toast.textContent = msg; $toast.classList.add('show');
        clearTimeout(toastT); toastT = setTimeout(() => $toast.classList.remove('show'), 2200);
    }
    function setStatus(text, kind) {
        $status.textContent = text;
        $pill.className = 'status-pill' + (kind ? ' ' + kind : '');
    }
    const TXT = s => (s == null ? '' : String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'));

    // ── Map ──
    const TC_CENTER = [24.1477, 120.6736];
    const map = L.map('map', { zoomControl: true, attributionControl: true }).setView(TC_CENTER, 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    let meMarker = null, meCircle = null;
    let stnMarkers = new Map();     // StationUID → marker
    let stations = [];              // 目前清單
    let queryCenter = null;         // {lat, lon} 上次查詢中心
    let activeUID = null;
    let etaTimer = null;

    function haversine(lat1, lon1, lat2, lon2) {
        const R = 6371000, toR = Math.PI / 180;
        const dLat = (lat2 - lat1) * toR, dLon = (lon2 - lon1) * toR;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*toR)*Math.cos(lat2*toR)*Math.sin(dLon/2)**2;
        return 2 * R * Math.asin(Math.sqrt(a));
    }
    const fmtDist = m => m < 1000 ? Math.round(m) + ' m' : (m/1000).toFixed(1) + ' km';

    function setMe(lat, lon, acc) {
        if (meMarker) map.removeLayer(meMarker);
        if (meCircle) map.removeLayer(meCircle);
        meMarker = L.marker([lat, lon], {
            icon: L.divIcon({ className: '', html: '<div class="me-dot"></div>', iconSize: [16,16], iconAnchor: [8,8] }),
            zIndexOffset: 1000, interactive: false
        }).addTo(map);
        if (acc && acc < 300) {
            meCircle = L.circle([lat, lon], { radius: acc, color: '#2563eb', weight: 1, fillColor: '#3b82f6', fillOpacity: .12 }).addTo(map);
        }
    }

    // ── Query nearby ──
    async function queryArea(lat, lon, opts = {}) {
        queryCenter = { lat, lon };
        const r = +$radius.value;
        setStatus('搜尋站牌中…', 'load');
        $searchHere.hidden = true;
        if (opts.fresh) $list.innerHTML = '<div class="empty"><div class="spinner"></div>搜尋附近站牌…</div>';
        let data;
        try {
            data = await fetchJson(NEARBY(lon, lat, r));
        } catch (e) {
            console.error(e);
            setStatus('查詢失敗', 'err');
            $list.innerHTML = `<div class="empty">⚠ 無法取得站牌資料<br><span style="font-size:11px">${TXT(e.message||e)}</span></div>`;
            return;
        }
        if (!Array.isArray(data)) data = [];
        stations = data.map(s => {
            const p = s.StationPosition || {};
            const routes = [...new Set((s.Stops || []).map(x => x.StopName && x.RouteName && x.RouteName.Zh_tw).filter(Boolean))];
            return {
                uid: s.StationUID,
                id: s.StationID,
                name: (s.StationName && s.StationName.Zh_tw) || s.StationUID,
                lat: p.PositionLat, lon: p.PositionLon,
                bearing: s.Bearing || '',
                routes,
                dist: haversine(lat, lon, p.PositionLat, p.PositionLon)
            };
        }).filter(s => s.lat && s.lon)
          .sort((a, b) => a.dist - b.dist);

        renderStations();
        drawMarkers();
        setStatus(`找到 ${stations.length} 個站牌`, 'ok');
    }

    // ── Render list ──
    function renderStations() {
        $count.textContent = stations.length ? `${stations.length} 站` : '';
        if (!stations.length) {
            $list.innerHTML = '<div class="empty">此範圍內找不到公車站牌<br>試著放大搜尋範圍或移動地圖後「搜尋此區域」</div>';
            return;
        }
        $list.innerHTML = stations.map(s => {
            const shown = s.routes.slice(0, 8);
            const extra = s.routes.length - shown.length;
            const chips = shown.map(r => `<span class="route-chip">${TXT(r)}</span>`).join('')
                + (extra > 0 ? `<span class="route-chip more">+${extra}</span>` : '');
            return `
            <div class="stn" data-uid="${TXT(s.uid)}" data-id="${TXT(s.id)}">
                <div class="stn-head">
                    <div class="stn-pin">🚏</div>
                    <div class="stn-main">
                        <div class="stn-name">${TXT(s.name)}</div>
                        <div class="stn-sub">
                            <span>📍 ${fmtDist(s.dist)}</span>
                            ${s.bearing ? `<span class="stn-bearing">${TXT(s.bearing)}</span>` : ''}
                            <span>${s.routes.length} 條路線</span>
                        </div>
                        <div class="stn-routes">${chips}</div>
                    </div>
                    <div class="stn-chevron">▾</div>
                </div>
                <div class="stn-body" id="body-${TXT(s.uid)}"></div>
            </div>`;
        }).join('');

        $list.querySelectorAll('.stn').forEach(el => {
            el.querySelector('.stn-head').addEventListener('click', () => toggleStation(el.dataset.uid));
        });
    }

    // ── Markers ──
    function drawMarkers() {
        stnMarkers.forEach(m => map.removeLayer(m));
        stnMarkers.clear();
        stations.forEach(s => {
            const m = L.marker([s.lat, s.lon], {
                icon: L.divIcon({ className: '', html: `<div class="stn-marker" data-uid="${s.uid}"><span>🚌</span></div>`, iconSize: [38,38], iconAnchor: [19,36], popupAnchor: [0,-32] }),
                title: s.name
            }).addTo(map);
            m.on('click', () => { toggleStation(s.uid, true); });
            stnMarkers.set(s.uid, m);
        });
    }
    function markMarkerActive(uid) {
        stnMarkers.forEach((m, k) => {
            const el = m.getElement() && m.getElement().querySelector('.stn-marker');
            if (el) el.classList.toggle('active', k === uid);
        });
    }

    // ── Expand / collapse a station → load arrivals ──
    function toggleStation(uid, fromMap) {
        const el = $list.querySelector(`.stn[data-uid="${cssEsc(uid)}"]`);
        if (!el) return;
        const already = uid === activeUID;
        // collapse previous
        $list.querySelectorAll('.stn.active').forEach(e => e.classList.remove('active'));
        clearInterval(etaTimer); etaTimer = null;

        if (already) { activeUID = null; markMarkerActive(null); return; }

        activeUID = uid;
        el.classList.add('active');
        markMarkerActive(uid);
        el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

        const s = stations.find(x => x.uid === uid);
        if (fromMap && s) map.panTo([s.lat, s.lon], { animate: true });
        if (s) {
            const pop = stnMarkers.get(uid);
            if (pop) pop.bindPopup(`<b>${TXT(s.name)}</b><br>${s.routes.length} 條路線 · ${fmtDist(s.dist)}`).openPopup();
        }

        loadArrivals(uid, el.dataset.id);
    }

    async function loadArrivals(uid, stationId) {
        const body = document.getElementById('body-' + uid);
        if (!body) return;
        if (!body.dataset.loaded) body.innerHTML = '<div class="arr-loading">查詢到站時間…</div>';
        let data;
        try {
            data = await fetchJson(ETA(stationId));
        } catch (e) {
            body.innerHTML = '<div class="arr-loading">⚠ 無法取得到站時間</div>';
            return;
        }
        if (uid !== activeUID) return;      // 使用者已切換
        renderArrivals(body, Array.isArray(data) ? data : []);
        body.dataset.loaded = '1';

        clearInterval(etaTimer);
        etaTimer = setInterval(() => { if (uid === activeUID) loadArrivals(uid, stationId); }, 20000);
    }

    // 回傳 [顯示文字, 顏色class, 排序用秒數]
    function badge(rec) {
        const st = rec.StopStatus;
        if (st === 2) return ['交管不停靠', '', Infinity];
        if (st === 3) return ['末班已過', '', Infinity];
        if (st === 4) return ['今日未營運', '', Infinity];
        const et = rec.EstimateTime;
        if (et !== undefined && et !== null) {
            if (et < 60) return ['進站中', 'now', et];
            const m = Math.floor(et / 60);
            return [m + ' 分', m <= 3 ? 'soon' : 'ok', et];
        }
        // 沒有即時估時 → 用時刻表推估的下一班
        if (rec.NextBusTime) {
            const t = Date.parse(String(rec.NextBusTime).replace(/\//g, '-'));
            if (!isNaN(t)) {
                const m = Math.round((t - Date.now()) / 60000);
                if (m > 0 && m <= 120) return ['約 ' + m + ' 分', 'sched', t / 1000];
            }
            return ['預估 ' + hhmm(rec.NextBusTime), 'sched', Infinity];
        }
        return ['尚未發車', '', Infinity];
    }
    function hhmm(s) {
        const m = String(s).match(/(\d{2}):(\d{2})/);
        return m ? m[1] + ':' + m[2] : s;
    }

    function renderArrivals(body, recs) {
        if (!recs.length) { body.innerHTML = '<div class="arr-loading">此站目前沒有路線動態資訊</div>'; return; }
        const items = recs.map(r => {
            const [label, cls, sortKey] = badge(r);
            return { label, cls, sortKey,
                route: (r.RouteName && r.RouteName.Zh_tw) || r.RouteID || '',
                plate: r.PlateNumb || '' };
        }).sort((a, b) => a.sortKey - b.sortKey);   // 快到的排前面

        const rows = items.map(it => {
            const mid = it.plate
                ? `<span class="arr-plate" title="這台公車的車牌">🚍 ${TXT(it.plate)}</span>`
                : `<span class="arr-dir">尚無車輛在路上</span>`;
            return `<div class="arr-row">
                <span class="arr-route">${TXT(it.route)}</span>
                <div class="arr-mid">${mid}</div>
                <span class="arr-badge ${it.cls}">${TXT(it.label)}</span>
            </div>`;
        }).join('');

        const now = new Date().toLocaleTimeString('zh-TW', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
        body.innerHTML =
            `<div class="arr-hd"><span class="h-route">路線</span><span class="h-mid">車輛狀態</span><span>還有多久到</span></div>`
            + rows
            + `<div class="arr-foot"><span>🔄 每 20 秒自動更新</span><span>更新 ${now}</span></div>`;
    }

    function cssEsc(s) { return String(s).replace(/["\\]/g, '\\$&'); }

    // ── Geolocation ──
    function locate(initial) {
        if (!navigator.geolocation) { toast('此裝置不支援定位，請拖曳地圖後「搜尋此區域」'); fallbackNoGps(); return; }
        setStatus('定位中…', 'load');
        $locate.classList.add('spinning');
        navigator.geolocation.getCurrentPosition(
            pos => {
                $locate.classList.remove('spinning');
                const { latitude: lat, longitude: lon, accuracy } = pos.coords;
                setMe(lat, lon, accuracy);
                map.setView([lat, lon], 16);
                queryArea(lat, lon, { fresh: true });
            },
            err => {
                $locate.classList.remove('spinning');
                console.warn(err);
                const msg = err.code === 1 ? '定位權限被拒' : err.code === 3 ? '定位逾時' : '定位失敗';
                setStatus(msg, 'err');
                toast(msg + '：可拖曳地圖後按「搜尋此區域」');
                if (initial) fallbackNoGps();
                else $searchHere.hidden = false;
            },
            { enableHighAccuracy: true, timeout: 10000, maximumAge: 30000 }
        );
    }
    function fallbackNoGps() {
        // 沒有定位 → 以台中市中心查一次，並開放「搜尋此區域」
        queryArea(TC_CENTER[0], TC_CENTER[1], { fresh: true });
        $searchHere.hidden = false;
    }

    // ── Events ──
    $locate.addEventListener('click', () => locate(false));
    $refresh.addEventListener('click', () => {
        if (queryCenter) queryArea(queryCenter.lat, queryCenter.lon, { fresh: false });
        else locate(false);
    });
    $radius.addEventListener('change', () => {
        if (queryCenter) queryArea(queryCenter.lat, queryCenter.lon, { fresh: true });
    });
    $searchHere.addEventListener('click', () => {
        const c = map.getCenter();
        queryArea(c.lat, c.lng, { fresh: true });
    });
    // 地圖移動後，若離上次查詢中心夠遠就顯示「搜尋此區域」
    map.on('moveend', () => {
        if (!queryCenter) return;
        const c = map.getCenter();
        const moved = haversine(queryCenter.lat, queryCenter.lon, c.lat, c.lng);
        if (moved > 200) $searchHere.hidden = false;
    });

    // ── Address search (OpenStreetMap Nominatim, 免金鑰) ──
    const $addr   = document.getElementById('addrInput');
    const $addrGo = document.getElementById('addrGo');
    async function gotoAddress() {
        const q = $addr.value.trim();
        if (!q) { $addr.focus(); return; }
        $addrGo.disabled = true;
        setStatus('搜尋地址中…', 'load');
        try {
            const url = 'https://nominatim.openstreetmap.org/search?format=jsonv2&limit=1'
                      + '&countrycodes=tw&accept-language=zh-TW&q=' + encodeURIComponent(q);
            const r = await fetch(url, { headers: { Accept: 'application/json' } });
            const j = await r.json();
            if (!Array.isArray(j) || !j.length) { toast('找不到「' + q + '」，換個關鍵字試試'); setStatus('查無此地址', 'err'); return; }
            const lat = +j[0].lat, lon = +j[0].lon;
            map.setView([lat, lon], 16);
            queryArea(lat, lon, { fresh: true });
            const label = String(j[0].display_name || q).split(',').slice(0, 2).join('，');
            toast('📍 已前往：' + label);
        } catch (e) {
            console.error(e);
            toast('地址搜尋失敗，請稍後再試');
            setStatus('地址搜尋失敗', 'err');
        } finally {
            $addrGo.disabled = false;
        }
    }
    $addrGo.addEventListener('click', gotoAddress);
    $addr.addEventListener('keydown', e => { if (e.key === 'Enter') gotoAddress(); });

    // ── Boot ──
    locate(true);
    </script>
</body>
</html>
