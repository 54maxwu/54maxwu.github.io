<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>附近公車站牌</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        [hidden] { display: none !important; }
        html, body { height: 100%; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', sans-serif;
            background: #f1f5f9;
            color: #2c3e50;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .app-header {
            background: #fff;
            border-bottom: 1px solid #e2e8f0;
            padding: 12px 20px;
            min-height: 58px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 1px 3px rgba(0,0,0,.06);
            z-index: 20;
            gap: 12px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }
        .app-header h1 {
            font-size: 16px;
            font-weight: 600;
            color: #1e293b;
            letter-spacing: .02em;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .header-meta { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #64748b; flex-wrap: wrap; }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            padding: 5px 11px;
            border-radius: 999px;
            background: #f1f5f9;
            color: #64748b;
            font-weight: 600;
        }
        .status-pill .dot { width: 7px; height: 7px; border-radius: 50%; background: #94a3b8; }
        .status-pill.ok  { background: #ecfdf5; color: #047857; }
        .status-pill.ok .dot { background: #10b981; }
        .status-pill.err { background: #fef2f2; color: #b91c1c; }
        .status-pill.err .dot { background: #ef4444; }
        .status-pill.load { background: #eff6ff; color: #1d4ed8; }
        .status-pill.load .dot { background: #3b82f6; animation: bpulse 1s ease-in-out infinite; }
        @keyframes bpulse { 0%,100%{opacity:1} 50%{opacity:.3} }

        .ctl {
            font-size: 12px;
            padding: 7px 10px;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            background: #f8fafc;
            color: #1e293b;
            font-family: inherit;
            outline: none;
            cursor: pointer;
            transition: border-color .15s, background .15s, color .15s;
        }
        .ctl:hover { border-color: #14b8a6; }
        select.ctl { padding-right: 24px; }
        .icon-btn {
            width: 34px; height: 34px; padding: 0;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 15px;
        }
        .icon-btn.spin svg, .icon-btn.spinning { animation: spin .8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Address search ── */
        .addr-wrap { position: relative; flex: 1 1 240px; min-width: 160px; max-width: 400px; display: flex; align-items: center; }
        .addr-icon { position: absolute; left: 11px; color: #94a3b8; font-size: 13px; pointer-events: none; }
        .addr-input { width: 100%; font-size: 13px; padding: 9px 58px 9px 31px; border: 1.5px solid #e2e8f0; border-radius: 9px; background: #f8fafc; color: #1e293b; outline: none; font-family: inherit; transition: border-color .15s, background .15s; }
        .addr-input:focus { border-color: #0d9488; background: #fff; }
        .addr-go { position: absolute; right: 5px; border: none; background: #0d9488; color: #fff; font-size: 12px; font-weight: 700; font-family: inherit; padding: 6px 12px; border-radius: 7px; cursor: pointer; transition: background .15s; }
        .addr-go:hover { background: #0f766e; }
        .addr-go:disabled { opacity: .6; cursor: default; }

        /* ── Layout ── */
        .layout { flex: 1; display: flex; min-height: 0; }
        #map { flex: 1; min-width: 0; background: #dbe4ea; z-index: 1; }

        .list-panel {
            width: 380px;
            flex-shrink: 0;
            background: #fff;
            border-left: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .list-head {
            padding: 12px 16px;
            font-size: 13px;
            font-weight: 700;
            color: #1e293b;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .list-head .count { font-size: 11px; font-weight: 600; color: #64748b; }
        .list-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            scrollbar-width: thin;
            scrollbar-color: #cbd5e1 transparent;
        }
        .list-scroll::-webkit-scrollbar { width: 8px; }
        .list-scroll::-webkit-scrollbar-track { background: transparent; }
        .list-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 999px; }
        .list-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .empty {
            padding: 50px 20px;
            text-align: center;
            color: #94a3b8;
            font-size: 13px;
            line-height: 1.7;
        }
        .empty .spinner {
            width: 26px; height: 26px;
            border: 3px solid #e2e8f0;
            border-top-color: #0d9488;
            border-radius: 50%;
            animation: spin .8s linear infinite;
            margin: 0 auto 12px;
        }

        /* ── Station card ── */
        .stn {
            border: 1.5px solid #e2e8f0;
            border-radius: 11px;
            margin-bottom: 8px;
            overflow: hidden;
            transition: border-color .15s, box-shadow .15s;
        }
        .stn.active { border-color: #14b8a6; box-shadow: 0 4px 14px rgba(13,148,136,.16); }
        .stn-head {
            padding: 11px 13px;
            cursor: pointer;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            background: #fff;
            transition: background .12s;
        }
        .stn-head:hover { background: #f8fafc; }
        .stn.active .stn-head { background: #f0fdfa; }
        .stn-pin {
            width: 26px; height: 26px;
            border-radius: 50%;
            background: #0d9488;
            color: #fff;
            font-size: 13px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            margin-top: 1px;
        }
        .stn-main { flex: 1; min-width: 0; }
        .stn-name {
            font-size: 14px;
            font-weight: 600;
            color: #1e293b;
            line-height: 1.3;
        }
        .stn-sub {
            display: flex; align-items: center; gap: 8px;
            margin-top: 3px;
            font-size: 11px;
            color: #64748b;
        }
        .stn-bearing {
            display: inline-flex; align-items: center;
            padding: 1px 6px; border-radius: 999px;
            background: #f1f5f9; font-weight: 600;
        }
        .stn-routes {
            display: flex; flex-wrap: wrap; gap: 4px;
            margin-top: 7px;
        }
        .route-chip {
            font-size: 10.5px;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 6px;
            background: #ecfdf5;
            color: #0f766e;
            border: 1px solid #99f6e4;
        }
        .route-chip.more { background: #f1f5f9; color: #64748b; border-color: #e2e8f0; }
        .stn-chevron { color: #94a3b8; font-size: 13px; margin-top: 3px; transition: transform .2s; }
        .stn.active .stn-chevron { transform: rotate(180deg); color: #0d9488; }

        /* ── Arrivals table ── */
        .stn-body { border-top: 1px solid #e2e8f0; background: #fafcfd; display: none; }
        .stn.active .stn-body { display: block; }
        .arr-loading { padding: 16px; text-align: center; color: #94a3b8; font-size: 12px; }
        .arr-hd {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 13px 7px;
            font-size: 10.5px; font-weight: 700; color: #94a3b8;
            letter-spacing: .02em;
            background: #f4f7f9;
            border-bottom: 1px solid #e6edf2;
        }
        .arr-hd .h-route { min-width: 52px; }
        .arr-hd .h-mid { flex: 1; }
        .arr-row {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 13px;
            border-bottom: 1px solid #eef2f6;
        }
        .arr-row:last-child { border-bottom: none; }
        .arr-route {
            font-size: 15px; font-weight: 800; color: #0f766e;
            min-width: 52px;
        }
        .arr-mid { flex: 1; min-width: 0; display: flex; align-items: center; gap: 7px; }
        .arr-dir { font-size: 11px; color: #94a3b8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .arr-badge {
            font-size: 11.5px; font-weight: 700;
            padding: 3px 9px; border-radius: 999px;
            white-space: nowrap;
            background: #f1f5f9; color: #64748b;
        }
        .arr-badge.now  { background: #fee2e2; color: #b91c1c; }
        .arr-badge.soon { background: #ffedd5; color: #c2410c; }
        .arr-badge.ok   { background: #dcfce7; color: #15803d; }
        .arr-badge.sched{ background: #e0e7ff; color: #4338ca; }
        .arr-plate {
            font-size: 10.5px; font-weight: 600;
            padding: 2px 7px; border-radius: 5px;
            background: #f1f5f9; color: #64748b;
            font-family: ui-monospace, Consolas, monospace;
            white-space: nowrap;
        }
        .arr-foot {
            padding: 7px 13px; font-size: 10.5px; color: #94a3b8;
            display: flex; align-items: center; justify-content: space-between;
        }

        /* ── Map overlays ── */
        .map-btn-search {
            position: absolute;
            left: 50%; bottom: 18px;
            transform: translateX(-50%);
            z-index: 500;
            background: #0d9488;
            color: #fff;
            border: none;
            padding: 9px 18px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(13,148,136,.45);
            display: inline-flex; align-items: center; gap: 7px;
            transition: transform .1s, box-shadow .15s, opacity .2s;
        }
        .map-btn-search:hover { box-shadow: 0 6px 20px rgba(13,148,136,.55); }
        .map-btn-search:active { transform: translateX(-50%) scale(.96); }

        .me-dot {
            width: 18px; height: 18px;
            background: #2563eb;
            border: 3px solid #fff;
            border-radius: 50%;
            box-shadow: 0 0 0 4px rgba(37,99,235,.3), 0 1px 5px rgba(0,0,0,.45);
        }
        .stn-marker {
            width: 38px; height: 38px;
            background: #0d9488;
            border: 3px solid #fff;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            box-shadow: 0 4px 10px rgba(0,0,0,.45);
            display: flex; align-items: center; justify-content: center;
            transition: background .12s;
        }
        .stn-marker span { transform: rotate(45deg); color: #fff; font-size: 18px; line-height: 1; }
        .stn-marker:hover { background: #0f766e; }
        .stn-marker.active {
            background: #f59e0b; width: 48px; height: 48px; z-index: 700;
            box-shadow: 0 6px 18px rgba(245,158,11,.6);
        }
        .stn-marker.active span { font-size: 24px; }

        /* ── Pretty map card (Leaflet popup) ── */
        .bus-pop .leaflet-popup-content-wrapper {
            padding: 0; border-radius: 15px; overflow: hidden;
            box-shadow: 0 14px 38px rgba(15,23,42,.32);
            border: 1px solid rgba(15,23,42,.06);
        }
        .bus-pop .leaflet-popup-content { margin: 0; width: 300px !important; font-family: inherit; }
        .bus-pop .leaflet-popup-tip { box-shadow: 0 6px 16px rgba(15,23,42,.18); }
        .bus-pop a.leaflet-popup-close-button { color: rgba(255,255,255,.85); top: 9px; right: 9px; font-size: 20px; }
        .bus-pop a.leaflet-popup-close-button:hover { color: #fff; }

        .bpop { font-family: inherit; }
        .bpop-hd {
            padding: 12px 34px 12px 15px;
            background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%);
            color: #fff;
        }
        .bpop-name { font-size: 15.5px; font-weight: 700; line-height: 1.3; }
        .bpop-meta { font-size: 11px; opacity: .92; margin-top: 4px; display: flex; flex-wrap: wrap; gap: 8px; }
        .bpop-body {
            max-height: 244px; overflow-y: auto; background: #fff;
            scrollbar-width: thin; scrollbar-color: #cbd5e1 transparent;
        }
        .bpop-body::-webkit-scrollbar { width: 7px; }
        .bpop-body::-webkit-scrollbar-track { background: transparent; }
        .bpop-body::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 999px; }
        .bpop-foot {
            padding: 8px 14px; font-size: 10.5px; color: #94a3b8;
            background: #f8fafc; border-top: 1px solid #eef2f6;
            display: flex; align-items: center; justify-content: space-between;
        }

        /* ── Route draw ── */
        .arr-route { cursor: pointer; }
        .arr-route:hover { text-decoration: underline; }
        .stn-marker.onroute { background: #7c3aed; box-shadow: 0 4px 12px rgba(124,58,237,.5); }
        .route-bar {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            z-index: 800; max-width: min(92%, 520px);
            display: flex; align-items: center; gap: 10px;
            background: #0f172a; color: #f1f5f9;
            padding: 7px 8px 7px 13px; border-radius: 999px;
            box-shadow: 0 6px 22px rgba(0,0,0,.4);
            font-size: 12.5px;
        }
        .route-bar .rb-badge { font-weight: 800; color: #5eead4; font-size: 15px; white-space: nowrap; }
        .route-bar .rb-info { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #cbd5e1; }
        .route-bar .rb-close {
            flex-shrink: 0; width: 26px; height: 26px; border-radius: 50%;
            border: none; background: rgba(255,255,255,.14); color: #fff; cursor: pointer; font-size: 12px;
        }
        .route-bar .rb-close:hover { background: #ef4444; }

        /* ── Route detail panel (台中公車 App 式) ── */
        body.route-mode .list-head { display: none; }
        body.route-mode #list { padding: 0; }
        .rhead {
            position: sticky; top: 0; z-index: 3;
            display: flex; align-items: center; gap: 10px;
            padding: 12px 14px;
            background: linear-gradient(135deg, #0d9488, #0f766e); color: #fff;
        }
        .rback {
            flex-shrink: 0; width: 30px; height: 30px; border-radius: 8px; border: none;
            background: rgba(255,255,255,.18); color: #fff; font-size: 20px; line-height: 1; cursor: pointer;
        }
        .rback:hover { background: rgba(255,255,255,.32); }
        .rhead-main { min-width: 0; }
        .rhead-name { font-size: 18px; font-weight: 800; line-height: 1.1; }
        .rdir {
            position: sticky; top: 54px; z-index: 2;
            display: flex; background: #fff; border-bottom: 1px solid #e2e8f0;
        }
        .rdir-btn {
            flex: 1; padding: 13px 8px; border: none; background: transparent;
            font-size: 14.5px; font-weight: 700; color: #94a3b8; cursor: pointer;
            position: relative; font-family: inherit;
            display: flex; align-items: center; justify-content: center; gap: 6px; min-width: 0;
        }
        .rdir-txt { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
        .rdir-live {
            flex-shrink: 0; background: #0d9488; color: #fff;
            font-size: 10.5px; font-weight: 800; line-height: 1;
            padding: 3px 6px; border-radius: 9px;
        }
        .rdir-btn.on { color: #0f766e; }
        .rdir-btn.on::after { content: ''; position: absolute; left: 12px; right: 12px; bottom: 0; height: 3px; background: #0d9488; border-radius: 3px 3px 0 0; }
        .rdir-btn:disabled { opacity: .4; cursor: default; }
        .rstops { padding: 0; }
        .rstop { display: flex; align-items: stretch; gap: 10px; padding: 0 12px; border-bottom: 1px solid #f1f5f9; }
        .rtime {
            flex-shrink: 0; width: 72px; align-self: center; text-align: center;
            padding: 9px 4px; border-radius: 9px; font-size: 14.5px; font-weight: 800;
            color: #fff; line-height: 1.15;
        }
        .rtime.t-clock { background: #0d8a80; }
        .rtime.t-soon  { background: #ef4444; }
        .rtime.t-min   { background: #f59e0b; }
        .rtime.t-none  { background: #e5eaf0; color: #64748b; }
        .rseq { position: relative; width: 24px; flex-shrink: 0; display: flex; justify-content: center; }
        .rseq::before { content: ''; position: absolute; top: 0; bottom: 0; width: 2px; background: #dce3ea; }
        .rstop:first-child .rseq::before { top: 50%; }
        .rstop:last-child .rseq::before { bottom: 50%; }
        .rseq-num {
            position: relative; z-index: 1; align-self: center;
            min-width: 22px; height: 22px; padding: 0 4px; border-radius: 11px;
            background: #fff; border: 2px solid #cbd5e1; color: #64748b;
            font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center;
        }
        .rstop.here .rseq-num { background: #ef4444; border-color: #ef4444; color: #fff; }
        .rstop.active { background: #ecfdf5; box-shadow: inset 3px 0 0 #0d9488; }
        .rstop.active .rstop-name { color: #0f766e; font-weight: 800; }
        .rstop.active .rseq-num { border-color: #0d9488; color: #0d9488; }
        .rstop.active.here .rseq-num { background: #ef4444; border-color: #ef4444; color: #fff; }
        .rstop-body { flex: 1; min-width: 0; align-self: center; display: flex; align-items: center; gap: 8px; padding: 11px 0; }
        .rstop-name { font-size: 14px; color: #1e293b; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .rbus {
            flex-shrink: 0; display: inline-flex; align-items: center; gap: 4px;
            font-size: 11px; font-weight: 700; font-family: ui-monospace, Consolas, monospace;
            background: #fff; border: 1.5px solid #cbd5e1; border-radius: 6px; padding: 2px 7px;
            color: #334155; box-shadow: 0 1px 3px rgba(0,0,0,.12);
        }
        .rsignal { align-self: center; flex-shrink: 0; width: 8px; height: 8px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 0 3px rgba(34,197,94,.18); }

        /* 地圖上：序號站點 + 即時公車 */
        .stopnum {
            width: 24px; height: 24px; border-radius: 50%;
            background: #db2777; color: #fff; border: 2px solid #fff;
            font-size: 11px; font-weight: 800;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 1px 5px rgba(0,0,0,.45);
        }
        .stopnum.near { background: #ef4444; box-shadow: 0 0 0 3px rgba(239,68,68,.3), 0 1px 5px rgba(0,0,0,.45); }
        .busmark { display: flex; flex-direction: column; align-items: center; line-height: 1; filter: drop-shadow(0 2px 3px rgba(0,0,0,.45)); }
        .busmark b {
            font-size: 8.5px; font-weight: 700; margin-top: -3px; white-space: nowrap;
            background: #0f172a; color: #5eead4; padding: 1px 3px; border-radius: 3px;
            font-family: ui-monospace, Consolas, monospace;
        }

        .toast {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #1e293b;
            color: #f1f5f9;
            padding: 9px 18px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            box-shadow: 0 6px 20px rgba(0,0,0,.4);
            opacity: 0;
            transition: opacity .2s, transform .2s;
            z-index: 1000;
            pointer-events: none;
            max-width: 88vw;
            text-align: center;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ── Fullscreen / immersive big-map mode ── */
        .fs-bar { position: fixed; top: 10px; right: 10px; z-index: 1500; display: flex; gap: 8px; }
        .fs-btn {
            width: 42px; height: 42px; border-radius: 11px; border: none;
            background: rgba(15,23,42,.85); color: #fff; font-size: 17px; cursor: pointer;
            box-shadow: 0 3px 12px rgba(0,0,0,.35);
            display: flex; align-items: center; justify-content: center;
            transition: background .12s;
        }
        .fs-btn:hover { background: #0d9488; }
        body.immersive .app-header { display: none; }
        body.immersive .layout { height: 100vh; height: 100dvh; flex-direction: column; }
        body.immersive #map { height: 100% !important; min-height: 0 !important; flex: 1; }
        body.immersive .list-panel {
            position: fixed; left: 0; right: 0; bottom: 0; top: auto;
            width: auto; height: 52%; z-index: 1400;
            border: none; border-top: 1px solid #e2e8f0;
            border-radius: 16px 16px 0 0;
            box-shadow: 0 -8px 26px rgba(0,0,0,.28);
            transform: translateY(calc(100% - 46px));
            transition: transform .28s ease;
        }
        body.immersive.show-list .list-panel { transform: translateY(0); }
        body.immersive .list-head { cursor: pointer; }
        body.immersive .list-head::after { content: '▲'; font-size: 10px; color: #94a3b8; transition: transform .28s; }
        body.immersive.show-list .list-head::after { transform: rotate(180deg); }

        @media (max-width: 820px) {
            .app-header { padding: 9px 12px; gap: 8px 10px; }
            .app-header h1 { font-size: 15px; }
            .header-meta { margin-left: auto; }
            .addr-wrap { order: 5; flex-basis: 100%; max-width: none; min-width: 0; }
            .layout { flex-direction: column; }
            #map { height: 54vh; min-height: 260px; flex: none; }
            .list-panel { width: auto; flex: 1; border-left: none; border-top: 1px solid #e2e8f0; }
            .bus-pop .leaflet-popup-content { width: 82vw !important; max-width: 320px; }
            .bpop-body { max-height: 34vh; }
            /* 手機版路線模式：面板滿版，藏頂部工具列與地圖，只留路線面板(左上角 ‹ 返回) */
            body.route-mode .app-header,
            body.route-mode #map { display: none; }
            body.route-mode .list-panel { flex: 1; border-top: none; }
        }
        @media (max-width: 480px) {
            .app-header h1 { font-size: 14px; gap: 5px; }
            .ctl { padding: 8px 9px; }
            .icon-btn { width: 38px; height: 38px; font-size: 16px; }
            select.ctl { padding: 8px 22px 8px 9px; }
            #map { height: 50vh; min-height: 240px; }
            .stn-head { padding: 12px 12px; }
            .stn-name { font-size: 15px; }
            .arr-row { padding: 12px 13px; }
            .arr-route { font-size: 16px; }
            .status-pill { padding: 5px 9px; }
        }
    </style>
</head>
<body>
    <div class="app-header">
        <h1>🚌 附近公車站牌</h1>
        <div class="addr-wrap">
            <span class="addr-icon">🔎</span>
            <input type="text" class="addr-input" id="addrInput" placeholder="輸入地址或地標快速前往…" autocomplete="off" spellcheck="false">
            <button class="addr-go" id="addrGo" type="button" title="前往">前往</button>
        </div>
        <div class="header-meta">
            <select class="ctl" id="radiusSel" title="搜尋範圍">
                <option value="300">300 公尺</option>
                <option value="500" selected>500 公尺</option>
                <option value="800">800 公尺</option>
                <option value="1200">1.2 公里</option>
            </select>
            <button class="ctl icon-btn" id="locateBtn" type="button" title="定位到我的位置">📍</button>
            <button class="ctl icon-btn" id="refreshBtn" type="button" title="重新整理">🔄</button>
            <button class="ctl icon-btn" id="fsBtn" type="button" title="全螢幕大地圖">⛶</button>
            <span class="status-pill" id="statusPill"><span class="dot"></span><span id="statusText">準備中</span></span>
        </div>
    </div>

    <div class="layout">
        <div id="map">
            <div class="route-bar" id="routeBar" hidden>
                <span class="rb-badge" id="routeBarName"></span>
                <span class="rb-info" id="routeBarInfo"></span>
                <button class="rb-close" id="routeBarClose" type="button" title="清除路線">✕</button>
            </div>
            <button class="map-btn-search" id="searchHereBtn" type="button" hidden>🔍 搜尋此區域</button>
        </div>
        <aside class="list-panel">
            <div class="list-head">
                <span>附近站牌</span>
                <span class="count" id="listCount"></span>
            </div>
            <div class="list-scroll" id="list">
                <div class="empty">
                    <div class="spinner"></div>
                    正在定位…
                </div>
            </div>
        </aside>
    </div>

    <div class="fs-bar" id="fsBar" hidden>
        <button class="fs-btn" id="fsLocate2" type="button" title="定位">📍</button>
        <button class="fs-btn" id="fsListToggle" type="button" title="站牌清單">☰</button>
        <button class="fs-btn" id="fsExit" type="button" title="離開全螢幕">✕</button>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
    // ══════════════════════════════════════════════════════
    //  附近公車站牌 — 台中 ATIS TDX 代理 (client 免 auth)
    //  站位:  api/TDXAPI/BusStationNearBy/{lon}/{lat}/{radius}
    //  到站:  api/TDXAPI/BusEstimatedTime/{StationID}
    //  ATIS 端點無 CORS → 走通用 ?url= 代理 worker
    //  地圖:  Leaflet + OSM (免金鑰)；定位: navigator.geolocation
    // ══════════════════════════════════════════════════════
    const ATIS = 'https://e-traffic.taichung.gov.tw/ATIS_TCC/api/TDXAPI/';
    const NEARBY = (lon, lat, r) => ATIS + `BusStationNearBy/${lon}/${lat}/${r}`;
    const ETA    = (stationId)   => ATIS + `BusEstimatedTime/${stationId}`;

    const PROXY_KEY     = 'tc_traffic_proxy';   // 與 traffic.htm 共用同一支 worker
    const DEFAULT_PROXY = 'https://missing.54maxwu.workers.dev/';
    // 畫公車路線需要 TDX 的 Shape/StopOfRoute（需金鑰）。金鑰放在這支 worker（不進 repo）。
    // 尚未部署時會自動退回「無金鑰備援」（標出附近站點 + 官方路線圖連結）。
    const TDX_PROXY = 'https://tdx.54maxwu.workers.dev/';
    const getProxy = () => { try { return (localStorage.getItem(PROXY_KEY) ?? DEFAULT_PROXY).trim(); } catch { return DEFAULT_PROXY; } };
    function proxyList() {
        const list = []; const p = getProxy();
        if (p) list.push(u => p + (p.includes('?') ? '&' : (p.endsWith('/') ? '' : '/')) + '?url=' + encodeURIComponent(u));
        list.push(
            u => 'https://api.codetabs.com/v1/proxy/?quest=' + encodeURIComponent(u),
            u => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u),
        );
        return list;
    }
    async function fetchJson(u) {
        try {
            const r = await fetch(u, { cache: 'no-store' });
            if (r.ok) { const t = await r.text(); if (t) return JSON.parse(t); }
        } catch (e) { /* CORS → proxy */ }
        let last;
        for (const make of proxyList()) {
            try {
                const r = await fetch(make(u), { cache: 'no-store' });
                if (!r.ok) throw new Error('HTTP ' + r.status);
                const t = await r.text();
                if (t) return JSON.parse(t);
                throw new Error('空白');
            } catch (e) { last = e; }
        }
        throw last || new Error('無法取得資料');
    }

    // ── DOM ──
    const $status  = document.getElementById('statusText');
    const $pill    = document.getElementById('statusPill');
    const $list    = document.getElementById('list');
    const $count   = document.getElementById('listCount');
    const $radius  = document.getElementById('radiusSel');
    const $locate  = document.getElementById('locateBtn');
    const $refresh = document.getElementById('refreshBtn');
    const $searchHere = document.getElementById('searchHereBtn');
    const $toast   = document.getElementById('toast');

    let toastT = null;
    function toast(msg) {
        $toast.textContent = msg; $toast.classList.add('show');
        clearTimeout(toastT); toastT = setTimeout(() => $toast.classList.remove('show'), 2200);
    }
    function setStatus(text, kind) {
        $status.textContent = text;
        $pill.className = 'status-pill' + (kind ? ' ' + kind : '');
    }
    const TXT = s => (s == null ? '' : String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'));

    // ── Map ──
    const TC_CENTER = [24.1477, 120.6736];
    const map = L.map('map', { zoomControl: true, attributionControl: true }).setView(TC_CENTER, 15);
    // Carto Voyager：比預設 OSM 乾淨、店家標記較少（背景 POI 仍為 OSM 社群資料）
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        maxZoom: 20,
        subdomains: 'abcd',
        attribution: '&copy; OpenStreetMap &copy; CARTO'
    }).addTo(map);

    let meMarker = null, meCircle = null;
    let stnMarkers = new Map();     // StationUID → marker
    let stations = [];              // 目前清單
    let queryCenter = null;         // {lat, lon} 上次查詢中心
    let activeUID = null;
    let popupUID = null;            // 目前開著的地圖卡片對應站
    let etaTimer = null;
    let routeLayer = null;          // 目前畫在地圖上的路線圖層
    let curRoute = null;            // 目前選定的路線名
    let routeTimer = null;          // 路線到站輪詢
    let routeDir = 0;               // 目前顯示方向：0 去程 / 1 返程
    let routeData = null;           // { name, byDir: {0:[...],1:[...]} }
    let activeRouteSeq = null;      // 路線模式：目前選定的站序（右側清單高亮用）
    let routeOrigin = null;         // 從某站 popup 點路線時的來源站 {lat,lon,name}，用來自動選方向+定位

    function haversine(lat1, lon1, lat2, lon2) {
        const R = 6371000, toR = Math.PI / 180;
        const dLat = (lat2 - lat1) * toR, dLon = (lon2 - lon1) * toR;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*toR)*Math.cos(lat2*toR)*Math.sin(dLon/2)**2;
        return 2 * R * Math.asin(Math.sqrt(a));
    }
    const fmtDist = m => m < 1000 ? Math.round(m) + ' m' : (m/1000).toFixed(1) + ' km';

    function setMe(lat, lon, acc) {
        if (meMarker) map.removeLayer(meMarker);
        if (meCircle) map.removeLayer(meCircle);
        meMarker = L.marker([lat, lon], {
            icon: L.divIcon({ className: '', html: '<div class="me-dot"></div>', iconSize: [16,16], iconAnchor: [8,8] }),
            zIndexOffset: 1000, interactive: false
        }).addTo(map);
        if (acc && acc < 300) {
            meCircle = L.circle([lat, lon], { radius: acc, color: '#2563eb', weight: 1, fillColor: '#3b82f6', fillOpacity: .12 }).addTo(map);
        }
    }

    // ── Query nearby ──
    async function queryArea(lat, lon, opts = {}) {
        queryCenter = { lat, lon };
        const r = +$radius.value;
        setStatus('搜尋站牌中…', 'load');
        $searchHere.hidden = true;
        if (opts.fresh) $list.innerHTML = '<div class="empty"><div class="spinner"></div>搜尋附近站牌…</div>';
        let data;
        try {
            data = await fetchJson(NEARBY(lon, lat, r));
        } catch (e) {
            console.error(e);
            setStatus('查詢失敗', 'err');
            $list.innerHTML = `<div class="empty">⚠ 無法取得站牌資料<br><span style="font-size:11px">${TXT(e.message||e)}</span></div>`;
            return;
        }
        if (!Array.isArray(data)) data = [];
        stations = data.map(s => {
            const p = s.StationPosition || {};
            const routes = [...new Set((s.Stops || []).map(x => x.StopName && x.RouteName && x.RouteName.Zh_tw).filter(Boolean))];
            return {
                uid: s.StationUID,
                id: s.StationID,
                name: (s.StationName && s.StationName.Zh_tw) || s.StationUID,
                lat: p.PositionLat, lon: p.PositionLon,
                bearing: s.Bearing || '',
                routes,
                dist: haversine(lat, lon, p.PositionLat, p.PositionLon)
            };
        }).filter(s => s.lat && s.lon)
          .sort((a, b) => a.dist - b.dist);

        renderStations();
        drawMarkers();
        setStatus(`找到 ${stations.length} 個站牌`, 'ok');
    }

    // ── Render list ──
    function renderStations() {
        $count.textContent = stations.length ? `${stations.length} 站` : '';
        if (!stations.length) {
            $list.innerHTML = '<div class="empty">此範圍內找不到公車站牌<br>試著放大搜尋範圍或移動地圖後「搜尋此區域」</div>';
            return;
        }
        $list.innerHTML = stations.map(s => {
            const shown = s.routes.slice(0, 8);
            const extra = s.routes.length - shown.length;
            const chips = shown.map(r => `<span class="route-chip">${TXT(r)}</span>`).join('')
                + (extra > 0 ? `<span class="route-chip more">+${extra}</span>` : '');
            return `
            <div class="stn" data-uid="${TXT(s.uid)}" data-id="${TXT(s.id)}">
                <div class="stn-head">
                    <div class="stn-pin">🚏</div>
                    <div class="stn-main">
                        <div class="stn-name">${TXT(s.name)}</div>
                        <div class="stn-sub">
                            <span>📍 ${fmtDist(s.dist)}</span>
                            ${s.bearing ? `<span class="stn-bearing">${TXT(s.bearing)}</span>` : ''}
                            <span>${s.routes.length} 條路線</span>
                        </div>
                        <div class="stn-routes">${chips}</div>
                    </div>
                    <div class="stn-chevron">▾</div>
                </div>
                <div class="stn-body" id="body-${TXT(s.uid)}"></div>
            </div>`;
        }).join('');

        $list.querySelectorAll('.stn').forEach(el => {
            el.querySelector('.stn-head').addEventListener('click', () => selectStation(el.dataset.uid));
        });
    }

    // ── Markers ──
    function drawMarkers() {
        stnMarkers.forEach(m => map.removeLayer(m));
        stnMarkers.clear();
        stations.forEach(s => {
            const m = L.marker([s.lat, s.lon], {
                icon: L.divIcon({ className: '', html: `<div class="stn-marker" data-uid="${s.uid}"><span>🚌</span></div>`, iconSize: [38,38], iconAnchor: [19,36], popupAnchor: [0,-30] }),
                title: s.name
            }).addTo(map);
            const pop = L.popup({ className: 'bus-pop', maxWidth: 320, minWidth: 300, autoPan: false, closeButton: true });
            pop._stnUID = s.uid;
            m.bindPopup(pop);
            m.on('click', () => focusStation(s));   // 置中；Leaflet 會開 popup → popupopen 接手其餘
            stnMarkers.set(s.uid, m);
        });
    }
    function markMarkerActive(uid) {
        stnMarkers.forEach((m, k) => {
            const el = m.getElement() && m.getElement().querySelector('.stn-marker');
            if (el) el.classList.toggle('active', k === uid);
        });
    }

    // 把某站置中在地圖（標記略低於中心，上方留給資訊卡）
    function focusStation(s) {
        const z = Math.max(map.getZoom(), 16);
        const pt = map.project([s.lat, s.lon], z);
        pt.y -= 96;
        map.setView(map.unproject(pt, z), z, { animate: true });
    }

    // 從右側清單點選 → 置中並開地圖卡片
    function selectStation(uid) {
        const mk = stnMarkers.get(uid);
        const s = stations.find(x => x.uid === uid);
        if (!mk || !s) return;
        if (uid === activeUID) { mk.closePopup(); return; }   // 再點一次收合
        focusStation(s);
        mk.openPopup();
    }

    // popup 開啟 = 選定該站（清單／地圖點選共用此流程）
    map.on('popupopen', e => {
        const uid = e.popup._stnUID;
        if (!uid) return;
        popupUID = uid;
        activeUID = uid;
        $list.querySelectorAll('.stn.active').forEach(x => x.classList.remove('active'));
        const el = $list.querySelector(`.stn[data-uid="${cssEsc(uid)}"]`);
        if (el) { el.classList.add('active'); el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
        markMarkerActive(uid);
        const s = stations.find(x => x.uid === uid);
        e.popup.setContent(cardFull(s, '<div class="arr-loading">查詢到站時間…</div>', nowStr()));
        clearInterval(etaTimer); etaTimer = null;
        if (s) loadArrivals(uid, s.id);
    });
    map.on('popupclose', e => {
        const uid = e.popup._stnUID;
        if (!uid) return;
        setTimeout(() => {
            if (popupUID !== uid) return;        // 期間已開了別站
            popupUID = null;
            if (activeUID === uid) {
                activeUID = null;
                const el = $list.querySelector(`.stn[data-uid="${cssEsc(uid)}"]`);
                if (el) el.classList.remove('active');
                markMarkerActive(null);
                clearInterval(etaTimer); etaTimer = null;
            }
        }, 0);
    });

    async function loadArrivals(uid, stationId) {
        const s = stations.find(x => x.uid === uid);
        const mk = stnMarkers.get(uid);
        const body = document.getElementById('body-' + uid);
        if (body && !body.dataset.loaded) body.innerHTML = '<div class="arr-loading">查詢到站時間…</div>';
        let data;
        try {
            data = await fetchJson(ETA(stationId));
        } catch (e) {
            const fail = '<div class="arr-loading">⚠ 無法取得到站時間</div>';
            if (body) body.innerHTML = fail;
            if (mk && s && mk.isPopupOpen()) mk.setPopupContent(cardFull(s, fail, nowStr()));
            return;
        }
        if (uid !== activeUID) return;
        const recs = Array.isArray(data) ? data : [];
        const inner = arrivalsInner(recs);
        const now = nowStr();
        if (body) {
            body.innerHTML = inner + `<div class="arr-foot"><span>🔄 每 20 秒自動更新</span><span>更新 ${now}</span></div>`;
            body.dataset.loaded = '1';
        }
        if (mk && s && mk.isPopupOpen()) mk.setPopupContent(cardFull(s, inner, now));
        clearInterval(etaTimer);
        etaTimer = setInterval(() => { if (uid === activeUID) loadArrivals(uid, stationId); }, 20000);
    }

    // ══ 路線繪製 ══════════════════════════════════════════
    const $routeBar   = document.getElementById('routeBar');
    const $rbName     = document.getElementById('routeBarName');
    const $rbInfo     = document.getElementById('routeBarInfo');

    async function tdxFetch(path) {
        if (!TDX_PROXY) throw new Error('未設定 TDX proxy');
        const u = TDX_PROXY + (TDX_PROXY.includes('?') ? '&' : (TDX_PROXY.endsWith('/') ? '' : '/')) + '?tdx=' + encodeURIComponent(path);
        const r = await fetch(u, { cache: 'no-store' });
        if (!r.ok) throw new Error('TDX HTTP ' + r.status);
        return r.json();
    }

    // 解析 WKT（MULTILINESTRING / LINESTRING）→ [[ [lat,lon], … ], …]
    function parseWKT(wkt) {
        const segs = [];
        const body = String(wkt).replace(/^\s*(MULTILINESTRING|LINESTRING)\s*/i, '');
        let m; const re = /\(([^()]+)\)/g;
        while ((m = re.exec(body))) {
            const pts = m[1].split(',').map(p => {
                const [lon, lat] = p.trim().split(/\s+/).map(Number);
                return [lat, lon];
            }).filter(p => !isNaN(p[0]) && !isNaN(p[1]));
            if (pts.length > 1) segs.push(pts);
        }
        return segs;
    }

    function clearRoute(restore) {
        if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
        clearInterval(routeTimer); routeTimer = null;
        const had = !!curRoute;
        curRoute = null; routeData = null; activeRouteSeq = null; routeOrigin = null;
        $routeBar.hidden = true;
        document.body.classList.remove('route-mode');
        // 手機版路線模式會藏地圖(display:none)，退出後 Leaflet 需重新量尺寸才不會灰掉
        requestAnimationFrame(() => map.invalidateSize());
        stnMarkers.forEach(m => {
            const el = m.getElement() && m.getElement().querySelector('.stn-marker');
            if (el) el.classList.remove('onroute');
        });
        if (restore && had) renderStations();   // 還原右側「附近站牌」清單
    }

    async function selectRoute(name) {
        if (curRoute === name) { clearRoute(true); return; }   // 再點一次收起
        // 記住是從哪一站點進來的（activeUID＝目前開著卡片的站）→ 之後自動選方向+定位
        const org = stations.find(x => x.uid === activeUID);
        clearRoute(false);
        routeOrigin = (org && org.lat != null) ? { lat: org.lat, lon: org.lon, name: org.name } : null;
        curRoute = name;
        routeDir = 0;
        routeLayer = L.layerGroup().addTo(map);
        $routeBar.hidden = false;
        $rbName.textContent = name;
        $rbInfo.textContent = '載入路線…';
        if (!TDX_PROXY) { drawRouteFallback(name); return; }
        try { await loadRoute(name); }
        catch (e) { console.warn('TDX 路線載入失敗，改用備援', e); drawRouteFallback(name); }
    }

    // 一次抓齊：線形 Shape / 站牌順序 StopOfRoute / 各站預估 ETA / 公車即時位置 RealTime
    async function loadRoute(name) {
        const enc = encodeURIComponent(name);
        const [shapesR, sorsR, etasR, rtR] = await Promise.all([
            tdxFetch('Bus/Shape/City/Taichung/' + enc).catch(() => []),
            tdxFetch('Bus/StopOfRoute/City/Taichung/' + enc).catch(() => []),
            tdxFetch('Bus/EstimatedTimeOfArrival/City/Taichung/' + enc).catch(() => []),
            tdxFetch('Bus/RealTimeByFrequency/City/Taichung/' + enc).catch(() => []),
        ]);
        if (curRoute !== name) return;
        const exact = x => x.RouteName && x.RouteName.Zh_tw === name;   // 避免 99 夾帶 699/99延
        const shapes = (shapesR || []).filter(exact);
        const sors   = (sorsR   || []).filter(exact);
        const etas   = (etasR   || []).filter(exact);
        const buses  = (rtR     || []).filter(exact).filter(v => v.BusPosition && v.BusPosition.PositionLat != null);

        const byDir = {};
        [0, 1].forEach(d => {
            const so = sors.find(x => x.Direction === d);
            const stops = ((so && so.Stops) || []).slice()
                .sort((a, b) => a.StopSequence - b.StopSequence)
                .map(st => ({
                    seq: st.StopSequence, name: (st.StopName && st.StopName.Zh_tw) || '', id: st.StopID,
                    lat: st.StopPosition && st.StopPosition.PositionLat,
                    lon: st.StopPosition && st.StopPosition.PositionLon,
                }));
            const etaByStop = {};
            etas.filter(x => x.Direction === d).forEach(x => { etaByStop[x.StopID] = x; });
            byDir[d] = { stops, etaByStop, dest: stops.length ? stops[stops.length - 1].name : '' };
        });
        routeData = { name, shapes, byDir, buses };
        if (!(byDir[routeDir] && byDir[routeDir].stops.length)) routeDir = (byDir[0].stops.length ? 0 : 1);
        activeRouteSeq = null;
        // 從某站 popup 進來 → 自動切到「有車正開往該站」的方向，並記住該站
        if (routeOrigin) {
            const pick = pickDirForOrigin(byDir, routeOrigin);
            if (pick) { routeDir = pick.dir; activeRouteSeq = pick.seq; }
        }
        document.body.classList.add('route-mode');
        renderRoute(true);
        // 首次載入把來源站捲進視野（只做一次，之後 20 秒刷新不搶捲軸）
        if (routeOrigin) {
            if (activeRouteSeq != null) {
                const row = $list.querySelector(`.rstop[data-seq="${activeRouteSeq}"]`);
                if (row) row.scrollIntoView({ block: 'center' });
            }
            routeOrigin = null;
        }
        clearInterval(routeTimer);
        routeTimer = setInterval(() => { if (curRoute === name) refreshRoute(name); }, 20000);
    }

    // 找出「哪個方向有車正開往來源站」→ 回傳 { dir, seq }；找不到回 null
    function pickDirForOrigin(byDir, origin) {
        const cand = [];
        [0, 1].forEach(d => {
            const bd = byDir[d];
            if (!bd || !bd.stops.length) return;
            let near = null, nd = Infinity;
            bd.stops.forEach(st => {
                if (st.lat == null) return;
                const dist = haversine(origin.lat, origin.lon, st.lat, st.lon);
                if (dist < nd) { nd = dist; near = st; }
            });
            if (!near || nd > 150) return;   // 這方向 150m 內沒有來源站 → 不算
            const eta = bd.etaByStop[near.id];
            const et = (eta && eta.EstimateTime != null) ? eta.EstimateTime : Infinity;
            cand.push({ dir: d, seq: near.seq, et, dist: nd });
        });
        if (!cand.length) return null;
        // 有車正開往來源站的方向優先(et 最小)；都沒車 → 取離來源站最近的方向
        cand.sort((a, b) => (a.et - b.et) || (a.dist - b.dist));
        return { dir: cand[0].dir, seq: cand[0].seq };
    }

    // 每 20 秒只更新「到站時間 + 公車位置」，不重抓線形、不重新縮放
    async function refreshRoute(name) {
        const enc = encodeURIComponent(name);
        const [etasR, rtR] = await Promise.all([
            tdxFetch('Bus/EstimatedTimeOfArrival/City/Taichung/' + enc).catch(() => null),
            tdxFetch('Bus/RealTimeByFrequency/City/Taichung/' + enc).catch(() => null),
        ]);
        if (curRoute !== name || !routeData) return;
        const exact = x => x.RouteName && x.RouteName.Zh_tw === name;
        if (etasR) [0, 1].forEach(d => {
            if (!routeData.byDir[d]) return;
            const m = {}; etasR.filter(exact).filter(x => x.Direction === d).forEach(x => { m[x.StopID] = x; });
            routeData.byDir[d].etaByStop = m;
        });
        if (rtR) routeData.buses = rtR.filter(exact).filter(v => v.BusPosition && v.BusPosition.PositionLat != null);
        renderRoute(false);
    }

    function hhmmISO(s) { const m = String(s).match(/T(\d{2}):(\d{2})/); return m ? m[1] + ':' + m[2] : ''; }
    // 回傳 [大時間塊文字, 顏色class]
    function timePill(s) {
        const st = s.StopStatus;
        if (st === 2) return ['交管不停', 't-none'];
        if (st === 3) return ['末班已過', 't-none'];
        if (st === 4) return ['未營運', 't-none'];
        const et = s.EstimateTime;
        if (et != null) {
            if (et < 60) return ['即將到站', 't-soon'];
            return [Math.floor(et / 60) + ' 分', 't-min'];
        }
        if (s.NextBusTime) { const t = hhmmISO(s.NextBusTime); if (t) return [t, 't-clock']; }
        return ['未發車', 't-none'];
    }

    // ── 畫地圖(線形 + 序號站點 + 即時公車) 與 右側清單 ──
    function renderRoute(fit) {
        if (!routeData || !routeLayer) return;
        const { shapes, byDir, buses } = routeData;
        const dir = byDir[routeDir] || { stops: [], etaByStop: {} };
        const stops = dir.stops;
        routeLayer.clearLayers();
        let bounds = [];

        // 線形（優先該方向，沒有就用全部）
        const dShapes = shapes.filter(s => s.Direction === routeDir);
        (dShapes.length ? dShapes : shapes).forEach(sh => {
            if (!sh.Geometry) return;
            parseWKT(sh.Geometry).forEach(seg => {
                L.polyline(seg, { color: '#2563eb', weight: 5, opacity: .85 }).addTo(routeLayer);
                bounds = bounds.concat(seg);
            });
        });
        if (!dShapes.length && !shapes.length && stops.length > 1) {   // 沒線形 → 站點連線
            L.polyline(stops.filter(s => s.lat != null).map(s => [s.lat, s.lon]), { color: '#2563eb', weight: 4, opacity: .8, dashArray: '6 6' }).addTo(routeLayer);
        }
        // 序號站點
        stops.forEach(st => {
            if (st.lat == null) return;
            const eta = dir.etaByStop[st.id];
            const near = eta && eta.EstimateTime != null && eta.EstimateTime < 180;
            L.marker([st.lat, st.lon], {
                icon: L.divIcon({ className: '', html: `<div class="stopnum${near ? ' near' : ''}">${st.seq}</div>`, iconSize: [24, 24], iconAnchor: [12, 12] })
            }).addTo(routeLayer).on('click', () => focusRouteStop(st.seq));
            bounds.push([st.lat, st.lon]);
        });
        // 公車即時位置（該方向）
        (buses || []).filter(v => v.Direction === routeDir).forEach(v => {
            const p = v.BusPosition;
            L.marker([p.PositionLat, p.PositionLon], {
                zIndexOffset: 1000,
                icon: L.divIcon({ className: '', html: `<div class="busmark">🚌<b>${TXT(v.PlateNumb || '')}</b></div>`, iconSize: [34, 30], iconAnchor: [17, 26] })
            }).addTo(routeLayer);
        });

        if (fit && bounds.length) map.fitBounds(bounds, { padding: [40, 40] });
        $rbInfo.textContent = stops.length ? `${stops[0].name} → ${stops[stops.length - 1].name}` : (routeData.name + ' 路線');
        renderRoutePanel(!fit);   // 刷新(fit=false)時保留捲動位置；切方向/首載(fit=true)則歸零
    }

    // 點某站 → 高亮該列 + 地圖置中並標示
    function focusRouteStop(seq) {
        if (!routeData) return;
        const st = ((routeData.byDir[routeDir] || {}).stops || []).find(s => s.seq === seq);
        if (!st) return;
        // 高亮右側清單（先移除其他列，再標示這一列並捲入視野）
        activeRouteSeq = seq;
        $list.querySelectorAll('.rstop.active').forEach(x => x.classList.remove('active'));
        const row = $list.querySelector(`.rstop[data-seq="${seq}"]`);
        if (row) { row.classList.add('active'); row.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
        if (st.lat == null) { toast('此站沒有座標，無法在地圖定位'); return; }
        // 地圖置中（標記略低於中心，上方留給資訊卡；autoPan:false 讓 setView 說了算）
        const z = Math.max(map.getZoom(), 16);
        const pt = map.project([st.lat, st.lon], z); pt.y -= 96;
        map.setView(map.unproject(pt, z), z, { animate: true });
        L.popup({ className: 'bus-pop', autoPan: false })
            .setLatLng([st.lat, st.lon])
            .setContent(`<div class="bpop"><div class="bpop-hd"><div class="bpop-name">${TXT(st.name)}</div><div class="bpop-meta"><span>站序 ${st.seq}</span></div></div></div>`)
            .openOn(map);
    }

    function renderRoutePanel(keepScroll) {
        if (!routeData) return;
        const prevScroll = keepScroll ? $list.scrollTop : 0;
        const { name, byDir } = routeData;
        const dir = byDir[routeDir] || { stops: [], etaByStop: {} };
        const stops = dir.stops;
        const has0 = byDir[0] && byDir[0].stops.length, has1 = byDir[1] && byDir[1].stops.length;
        const dest0 = byDir[0] ? byDir[0].dest : '', dest1 = byDir[1] ? byDir[1].dest : '';
        // 各方向目前在路上的即時公車數（不同車牌）— 讓使用者知道哪一向有車
        const liveBuses = d => {
            const eb = (byDir[d] && byDir[d].etaByStop) || {};
            const set = new Set();
            Object.values(eb).forEach(s => { if (s.PlateNumb && s.EstimateTime != null) set.add(s.PlateNumb); });
            return set.size;
        };
        const nBus0 = liveBuses(0), nBus1 = liveBuses(1);

        // 公車目前所在站：該車牌 ETA 最小的站
        const byPlate = {};
        Object.values(dir.etaByStop).forEach(s => {
            if (s.PlateNumb && s.EstimateTime != null) {
                const p = s.PlateNumb;
                if (!byPlate[p] || s.EstimateTime < byPlate[p].EstimateTime) byPlate[p] = s;
            }
        });
        const busAt = {};
        Object.values(byPlate).forEach(r => { busAt[r.StopID] = r.PlateNumb; });

        const rows = stops.map(st => {
            const eta = dir.etaByStop[st.id] || {};
            const [label, cls] = timePill(eta);
            const plate = busAt[st.id];
            return `<div class="rstop${plate ? ' here' : ''}${st.seq === activeRouteSeq ? ' active' : ''}" data-seq="${st.seq}" onclick="focusRouteStop(${st.seq})">
                <div class="rtime ${cls}">${TXT(label)}</div>
                <div class="rseq"><span class="rseq-num">${st.seq}</span></div>
                <div class="rstop-body">
                    <span class="rstop-name">${TXT(st.name)}</span>
                    ${plate ? `<span class="rbus">🚌 ${TXT(plate)}</span>` : ''}
                </div>
                <span class="rsignal" title="即時動態"></span>
            </div>`;
        }).join('');

        $list.innerHTML =
            `<div class="rhead">
                <button class="rback" onclick="clearRoute(true)" title="返回附近站牌">‹</button>
                <div class="rhead-main"><div class="rhead-name">${TXT(name)}</div></div>
            </div>
            <div class="rdir">
                <button class="rdir-btn ${routeDir === 0 ? 'on' : ''}" onclick="setRouteDir(0)" ${has0 ? '' : 'disabled'}><span class="rdir-txt">往 ${TXT(dest0 || '去程')}</span>${nBus0 ? `<span class="rdir-live" title="此方向有 ${nBus0} 台即時公車">🚌 ${nBus0}</span>` : ''}</button>
                <button class="rdir-btn ${routeDir === 1 ? 'on' : ''}" onclick="setRouteDir(1)" ${has1 ? '' : 'disabled'}><span class="rdir-txt">往 ${TXT(dest1 || '返程')}</span>${nBus1 ? `<span class="rdir-live" title="此方向有 ${nBus1} 台即時公車">🚌 ${nBus1}</span>` : ''}</button>
            </div>
            <div class="rstops">${rows || '<div class="arr-loading">此方向目前無資料</div>'}</div>
            <div class="arr-foot"><span>🔄 每 20 秒自動更新</span><span>更新 ${nowStr()}</span></div>`;
        if (keepScroll) $list.scrollTop = prevScroll;   // 刷新後還原捲動位置，避免彈回頂端
    }
    function setRouteDir(d) { routeDir = d; activeRouteSeq = null; renderRoute(true); }

    function drawRouteFallback(name) {
        const pts = [];
        stations.forEach(s => {
            if (s.routes.includes(name)) {
                const mk = stnMarkers.get(s.uid);
                const el = mk && mk.getElement() && mk.getElement().querySelector('.stn-marker');
                if (el) el.classList.add('onroute');
                pts.push([s.lat, s.lon]);
            }
        });
        const link = 'https://citybus.taichung.gov.tw/ebus/route-map/' + encodeURIComponent(name);
        $rbInfo.innerHTML = `附近經過 ${pts.length} 站 · <a href="${link}" target="_blank" rel="noopener" style="color:#5eead4;text-decoration:underline;">官方路線圖</a>`;
        if (pts.length) map.fitBounds(pts, { padding: [60, 60], maxZoom: 16 });
        else toast('附近沒有此路線的站點');
    }

    // 點「路線號」→ selectRoute（arr-route 用 inline onclick，卡片/清單皆可）
    document.getElementById('routeBarClose').addEventListener('click', () => clearRoute(true));

    // 回傳 [顯示文字, 顏色class, 排序用秒數]
    function badge(rec) {
        const st = rec.StopStatus;
        if (st === 2) return ['交管不停靠', '', Infinity];
        if (st === 3) return ['末班已過', '', Infinity];
        if (st === 4) return ['今日未營運', '', Infinity];
        const et = rec.EstimateTime;
        if (et !== undefined && et !== null) {
            if (et < 60) return ['進站中', 'now', et];
            const m = Math.floor(et / 60);
            return [m + ' 分', m <= 3 ? 'soon' : 'ok', et];
        }
        // 沒有即時估時 → 用時刻表推估的下一班
        if (rec.NextBusTime) {
            const t = Date.parse(String(rec.NextBusTime).replace(/\//g, '-'));
            if (!isNaN(t)) {
                const m = Math.round((t - Date.now()) / 60000);
                if (m > 0 && m <= 120) return ['約 ' + m + ' 分', 'sched', t / 1000];
            }
            return ['預估 ' + hhmm(rec.NextBusTime), 'sched', Infinity];
        }
        return ['尚未發車', '', Infinity];
    }
    function hhmm(s) {
        const m = String(s).match(/(\d{2}):(\d{2})/);
        return m ? m[1] + ':' + m[2] : s;
    }

    function nowStr() {
        return new Date().toLocaleTimeString('zh-TW', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }
    // 到站列表內容（表頭 + 各路線），清單與地圖卡片共用
    function arrivalsInner(recs) {
        if (!recs.length) return '<div class="arr-loading">此站目前沒有路線動態資訊</div>';
        const items = recs.map(r => {
            const [label, cls, sortKey] = badge(r);
            return { label, cls, sortKey,
                route: (r.RouteName && r.RouteName.Zh_tw) || r.RouteID || '',
                plate: r.PlateNumb || '' };
        }).sort((a, b) => a.sortKey - b.sortKey);   // 快到的排前面
        const rows = items.map(it => {
            const mid = it.plate
                ? `<span class="arr-plate" title="這台公車的車牌">🚍 ${TXT(it.plate)}</span>`
                : `<span class="arr-dir">尚無車輛在路上</span>`;
            return `<div class="arr-row">
                <span class="arr-route" data-route="${TXT(it.route)}" onclick="selectRoute(this.dataset.route)" title="點我在地圖畫出這條路線">${TXT(it.route)}</span>
                <div class="arr-mid">${mid}</div>
                <span class="arr-badge ${it.cls}">${TXT(it.label)}</span>
            </div>`;
        }).join('');
        return `<div class="arr-hd"><span class="h-route">路線</span><span class="h-mid">車輛狀態</span><span>還有多久到</span></div>` + rows;
    }
    // 地圖上的漂亮資訊卡
    function cardFull(s, inner, now) {
        return `<div class="bpop">
            <div class="bpop-hd">
                <div class="bpop-name">${TXT(s.name)}</div>
                <div class="bpop-meta"><span>📍 ${fmtDist(s.dist)}</span><span>${s.routes.length} 條路線</span>${s.bearing ? `<span>${TXT(s.bearing)}</span>` : ''}</div>
            </div>
            <div class="bpop-body">${inner}</div>
            <div class="bpop-foot"><span>🔄 每 20 秒自動更新</span><span>更新 ${now}</span></div>
        </div>`;
    }

    function cssEsc(s) { return String(s).replace(/["\\]/g, '\\$&'); }

    // ── Geolocation ──
    function locate(initial) {
        if (!navigator.geolocation) { toast('此裝置不支援定位，請拖曳地圖後「搜尋此區域」'); fallbackNoGps(); return; }
        setStatus('定位中…', 'load');
        $locate.classList.add('spinning');
        navigator.geolocation.getCurrentPosition(
            pos => {
                $locate.classList.remove('spinning');
                const { latitude: lat, longitude: lon, accuracy } = pos.coords;
                setMe(lat, lon, accuracy);
                map.setView([lat, lon], 16);
                queryArea(lat, lon, { fresh: true });
            },
            err => {
                $locate.classList.remove('spinning');
                console.warn(err);
                const msg = err.code === 1 ? '定位權限被拒' : err.code === 3 ? '定位逾時' : '定位失敗';
                setStatus(msg, 'err');
                if (err.code === 1) toast('定位被拒：請允許定位權限，或用上方「地址搜尋」／拖曳地圖後「搜尋此區域」');
                else toast(msg + '：可用地址搜尋或拖曳地圖後「搜尋此區域」');
                if (initial) fallbackNoGps();
                else $searchHere.hidden = false;
            },
            { enableHighAccuracy: true, timeout: 10000, maximumAge: 30000 }
        );
    }
    function fallbackNoGps() {
        // 沒有定位 → 以台中市中心查一次，並開放「搜尋此區域」
        queryArea(TC_CENTER[0], TC_CENTER[1], { fresh: true });
        $searchHere.hidden = false;
    }

    // ── Events ──
    $locate.addEventListener('click', () => locate(false));
    $refresh.addEventListener('click', () => {
        if (queryCenter) queryArea(queryCenter.lat, queryCenter.lon, { fresh: false });
        else locate(false);
    });
    $radius.addEventListener('change', () => {
        if (queryCenter) queryArea(queryCenter.lat, queryCenter.lon, { fresh: true });
    });
    $searchHere.addEventListener('click', () => {
        const c = map.getCenter();
        queryArea(c.lat, c.lng, { fresh: true });
    });
    // 地圖移動後，若離上次查詢中心夠遠就顯示「搜尋此區域」
    map.on('moveend', () => {
        if (!queryCenter) return;
        const c = map.getCenter();
        const moved = haversine(queryCenter.lat, queryCenter.lon, c.lat, c.lng);
        if (moved > 200) $searchHere.hidden = false;
    });

    // ── 全螢幕大地圖（純 CSS 沉浸模式，iOS 也可用；並嘗試真正 Fullscreen） ──
    const $fsBtn = document.getElementById('fsBtn');
    const $fsBar = document.getElementById('fsBar');
    function setImmersive(on) {
        document.body.classList.toggle('immersive', on);
        $fsBar.hidden = !on;
        if (!on) document.body.classList.remove('show-list');
        // Leaflet 需在容器改變大小後重算
        setTimeout(() => map.invalidateSize(), 280);
    }
    $fsBtn.addEventListener('click', () => {
        const on = !document.body.classList.contains('immersive');
        setImmersive(on);
        try {
            if (on) {
                const el = document.documentElement;
                (el.requestFullscreen || el.webkitRequestFullscreen || function(){}).call(el);
            } else if (document.fullscreenElement || document.webkitFullscreenElement) {
                (document.exitFullscreen || document.webkitExitFullscreen).call(document);
            }
        } catch (e) { /* iframe 或 iOS 不支援 → CSS 沉浸模式仍生效 */ }
    });
    document.getElementById('fsExit').addEventListener('click', () => {
        setImmersive(false);
        try { if (document.fullscreenElement) document.exitFullscreen(); } catch (e) {}
    });
    document.getElementById('fsListToggle').addEventListener('click', () => document.body.classList.toggle('show-list'));
    document.getElementById('fsLocate2').addEventListener('click', () => locate(false));
    // 沉浸模式下點清單標題列 = 拉起／收合抽屜
    document.querySelector('.list-head').addEventListener('click', () => {
        if (document.body.classList.contains('immersive')) document.body.classList.toggle('show-list');
    });
    document.addEventListener('fullscreenchange', () => setTimeout(() => map.invalidateSize(), 200));

    // ── Address search (OpenStreetMap Nominatim, 免金鑰) ──
    const $addr   = document.getElementById('addrInput');
    const $addrGo = document.getElementById('addrGo');
    async function gotoAddress() {
        const q = $addr.value.trim();
        if (!q) { $addr.focus(); return; }
        $addrGo.disabled = true;
        setStatus('搜尋地址中…', 'load');
        try {
            const url = 'https://nominatim.openstreetmap.org/search?format=jsonv2&limit=1'
                      + '&countrycodes=tw&accept-language=zh-TW&q=' + encodeURIComponent(q);
            const r = await fetch(url, { headers: { Accept: 'application/json' } });
            const j = await r.json();
            if (!Array.isArray(j) || !j.length) { toast('找不到「' + q + '」，換個關鍵字試試'); setStatus('查無此地址', 'err'); return; }
            const lat = +j[0].lat, lon = +j[0].lon;
            map.setView([lat, lon], 16);
            queryArea(lat, lon, { fresh: true });
            const label = String(j[0].display_name || q).split(',').slice(0, 2).join('，');
            toast('📍 已前往：' + label);
        } catch (e) {
            console.error(e);
            toast('地址搜尋失敗，請稍後再試');
            setStatus('地址搜尋失敗', 'err');
        } finally {
            $addrGo.disabled = false;
        }
    }
    $addrGo.addEventListener('click', gotoAddress);
    $addr.addEventListener('keydown', e => { if (e.key === 'Enter') gotoAddress(); });

    // ── Boot ──
    locate(true);
    </script>
</body>
</html>
