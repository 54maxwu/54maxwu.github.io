<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>附近公車站牌</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        [hidden] { display: none !important; }
        html, body { height: 100%; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', sans-serif;
            background: #f1f5f9;
            color: #2c3e50;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;   /* iOS：用動態視窗高度，避免底部被 Safari 網址列裁掉 */
            overflow: hidden;
        }

        .app-header {
            background: #fff;
            border-bottom: 1px solid #e2e8f0;
            padding: 12px 20px;
            min-height: 58px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 1px 3px rgba(0,0,0,.06);
            z-index: 20;
            gap: 12px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }
        .app-header h1 {
            font-size: 16px;
            font-weight: 600;
            color: #1e293b;
            letter-spacing: .02em;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .header-meta { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #64748b; flex-wrap: wrap; }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            padding: 5px 11px;
            border-radius: 999px;
            background: #f1f5f9;
            color: #64748b;
            font-weight: 600;
        }
        .status-pill .dot { width: 7px; height: 7px; border-radius: 50%; background: #94a3b8; }
        .status-pill.ok  { background: #ecfdf5; color: #047857; }
        .status-pill.ok .dot { background: #10b981; }
        .status-pill.err { background: #fef2f2; color: #b91c1c; }
        .status-pill.err .dot { background: #ef4444; }
        .status-pill.load { background: #eff6ff; color: #1d4ed8; }
        .status-pill.load .dot { background: #3b82f6; animation: bpulse 1s ease-in-out infinite; }
        @keyframes bpulse { 0%,100%{opacity:1} 50%{opacity:.3} }

        .ctl {
            font-size: 12px;
            padding: 7px 10px;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            background: #f8fafc;
            color: #1e293b;
            font-family: inherit;
            outline: none;
            cursor: pointer;
            transition: border-color .15s, background .15s, color .15s;
        }
        .ctl:hover { border-color: #14b8a6; }
        select.ctl { padding-right: 24px; }
        .icon-btn {
            width: 34px; height: 34px; padding: 0;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 15px;
        }
        .icon-btn.spin svg, .icon-btn.spinning { animation: spin .8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Address search ── */
        .addr-wrap { position: relative; flex: 1 1 240px; min-width: 160px; max-width: 400px; display: flex; align-items: center; }
        .addr-icon { position: absolute; left: 11px; color: #94a3b8; font-size: 13px; pointer-events: none; }
        .addr-input { width: 100%; font-size: 13px; padding: 9px 58px 9px 31px; border: 1.5px solid #e2e8f0; border-radius: 9px; background: #f8fafc; color: #1e293b; outline: none; font-family: inherit; transition: border-color .15s, background .15s; }
        .addr-input:focus { border-color: #0d9488; background: #fff; }
        .addr-go { position: absolute; right: 5px; border: none; background: #0d9488; color: #fff; font-size: 12px; font-weight: 700; font-family: inherit; padding: 6px 12px; border-radius: 7px; cursor: pointer; transition: background .15s; }
        .addr-go:hover { background: #0f766e; }
        .addr-go:disabled { opacity: .6; cursor: default; }

        /* ── Layout ── */
        .layout { flex: 1; display: flex; min-height: 0; }
        #map { flex: 1; min-width: 0; background: #dbe4ea; z-index: 1; }

        .list-panel {
            width: 380px;
            flex-shrink: 0;
            background: #fff;
            border-left: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .list-head {
            padding: 12px 16px;
            font-size: 13px;
            font-weight: 700;
            color: #1e293b;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .list-head .count { font-size: 11px; font-weight: 600; color: #64748b; }
        .sheet-grip { display: none; justify-content: center; padding: 9px 0 5px; flex-shrink: 0; cursor: pointer; touch-action: none; }
        .sheet-grip span { width: 42px; height: 5px; border-radius: 999px; background: #cbd5e1; transition: background .15s; }
        .sheet-grip:active span { background: #94a3b8; }
        /* 頂部自動更新進度條：跑滿 20 秒 = 下次刷新 */
        .refresh-bar { height: 3px; background: #e5eaf0; overflow: hidden; flex-shrink: 0; }
        .refresh-bar::after {
            content: ''; display: block; height: 100%; width: 100%;
            background: linear-gradient(90deg, #0d9488, #22c55e);
            transform: scaleX(0); transform-origin: left;
        }
        .refresh-bar.run::after { animation: rbfill 20s linear; }
        @keyframes rbfill { from { transform: scaleX(0); } to { transform: scaleX(1); } }
        .list-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            scrollbar-width: thin;
            scrollbar-color: #cbd5e1 transparent;
        }
        .list-scroll::-webkit-scrollbar { width: 8px; }
        .list-scroll::-webkit-scrollbar-track { background: transparent; }
        .list-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 999px; }
        .list-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .empty {
            padding: 50px 20px;
            text-align: center;
            color: #94a3b8;
            font-size: 13px;
            line-height: 1.7;
        }
        .empty .spinner {
            width: 26px; height: 26px;
            border: 3px solid #e2e8f0;
            border-top-color: #0d9488;
            border-radius: 50%;
            animation: spin .8s linear infinite;
            margin: 0 auto 12px;
        }

        /* ── Station card ── */
        .stn {
            border: 1px solid rgba(226,232,240,.9);
            border-radius: 13px;
            margin-bottom: 9px;
            overflow: hidden;
            background: linear-gradient(180deg, rgba(255,255,255,.85), rgba(248,250,252,.7));
            box-shadow: 0 1px 2px rgba(15,23,42,.04), 0 2px 8px rgba(15,23,42,.04);
            transition: border-color .18s, box-shadow .25s, transform .18s;
        }
        .stn:hover { transform: translateY(-1px); box-shadow: 0 2px 4px rgba(15,23,42,.05), 0 8px 20px rgba(15,23,42,.08); }
        .stn.active {
            border-color: rgba(20,184,166,.55);
            box-shadow: 0 4px 16px rgba(13,148,136,.2), 0 1px 3px rgba(15,23,42,.06);
        }
        .stn-head {
            padding: 11px 13px;
            cursor: pointer;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            background: transparent;
            transition: background .12s;
        }
        .stn-head:hover { background: #f8fafc; }
        .stn.active .stn-head { background: #f0fdfa; }
        .stn-pin {
            width: 26px; height: 26px;
            border-radius: 50%;
            background: linear-gradient(150deg, #14b8a6, #0d9488 60%, #0f766e);
            color: #fff;
            font-size: 13px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            margin-top: 1px;
            box-shadow: 0 2px 5px rgba(13,148,136,.4), inset 0 1px 2px rgba(255,255,255,.35);
        }
        .stn-main { flex: 1; min-width: 0; }
        .stn-name {
            font-size: 14px;
            font-weight: 600;
            color: #1e293b;
            line-height: 1.3;
        }
        .stn-sub {
            display: flex; align-items: center; gap: 8px;
            margin-top: 3px;
            font-size: 11px;
            color: #64748b;
        }
        .stn-bearing {
            display: inline-flex; align-items: center;
            padding: 1px 6px; border-radius: 999px;
            background: #f1f5f9; font-weight: 600;
        }
        .stn-fastest {
            display: flex; align-items: center; gap: 6px; flex-wrap: nowrap;
            margin-top: 6px; font-size: 12px; min-height: 20px; overflow: hidden;
        }
        .stn-fastest .sf-lead { font-size: 10.5px; color: #94a3b8; flex-shrink: 0; }
        .stn-fastest .sf-route { font-weight: 800; color: #0f766e; flex-shrink: 0; }
        .stn-fastest .sf-time {
            font-weight: 800; color: #c2410c; background: #ffedd5;
            padding: 1px 8px; border-radius: 999px; flex-shrink: 0;
        }
        .stn-fastest .sf-to { color: #64748b; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .stn-fastest .sf-none, .stn-fastest .sf-loading { font-size: 11px; color: #cbd5e1; }
        .stn-routes {
            display: flex; flex-wrap: wrap; gap: 4px;
            margin-top: 7px;
        }
        .route-chip {
            font-size: 10.5px;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 6px;
            background: #ecfdf5;
            color: #0f766e;
            border: 1px solid #99f6e4;
        }
        .route-chip.more { background: #f1f5f9; color: #64748b; border-color: #e2e8f0; }
        .stn-chevron { color: #94a3b8; font-size: 13px; margin-top: 3px; transition: transform .2s; }
        .stn.active .stn-chevron { transform: rotate(180deg); color: #0d9488; }

        /* ── Arrivals table ── */
        .stn-body { border-top: 1px solid #e2e8f0; background: #fafcfd; display: none; }
        .stn.active .stn-body { display: block; }
        .arr-loading { padding: 16px; text-align: center; color: #94a3b8; font-size: 12px; }
        .arr-hd {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 13px 7px;
            font-size: 10.5px; font-weight: 700; color: #94a3b8;
            letter-spacing: .02em;
            background: #f4f7f9;
            border-bottom: 1px solid #e6edf2;
        }
        .arr-hd .h-route { min-width: 52px; }
        .arr-hd .h-mid { flex: 1; }
        .arr-row {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 13px;
            border-bottom: 1px solid #eef2f6;
        }
        .arr-row:last-child { border-bottom: none; }
        .arr-route {
            font-size: 15px; font-weight: 800; color: #0f766e;
            min-width: 52px;
        }
        .arr-mid { flex: 1; min-width: 0; display: flex; flex-direction: column; align-items: flex-start; gap: 3px; }
        .arr-to { font-size: 12.5px; font-weight: 700; color: #334155; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
        .arr-dir { font-size: 11px; color: #94a3b8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .arr-badge {
            font-size: 11.5px; font-weight: 700;
            padding: 3px 9px; border-radius: 999px;
            white-space: nowrap;
            background: #f1f5f9; color: #64748b;
        }
        .arr-badge.now  { background: #fee2e2; color: #b91c1c; animation: arrNow 1.3s ease-in-out infinite; }
        @keyframes arrNow {
            0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,.4); }
            50%     { box-shadow: 0 0 0 5px rgba(239,68,68,0); }
        }
        .arr-badge.soon { background: #ffedd5; color: #c2410c; }
        .arr-badge.ok   { background: #dcfce7; color: #15803d; }
        .arr-badge.sched{ background: #e0e7ff; color: #4338ca; }
        .arr-plate {
            font-size: 10.5px; font-weight: 600;
            padding: 2px 7px; border-radius: 5px;
            background: #f1f5f9; color: #64748b;
            font-family: ui-monospace, Consolas, monospace;
            white-space: nowrap;
        }
        .arr-foot {
            padding: 7px 13px; font-size: 10.5px; color: #94a3b8;
            display: flex; align-items: center; justify-content: space-between;
        }

        /* ── YouBike ── */
        .icon-btn.on { background: #0d9488; color: #fff; border-color: #0d9488; }
        .bike-legend {
            display: flex; gap: 16px; padding: 8px 14px; font-size: 11px; color: #64748b;
            border-bottom: 1px solid #e6edf2; background: #f8fafc; position: sticky; top: 0; z-index: 1;
        }
        .bk-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
        .bk-dot.rent { background: #22c55e; } .bk-dot.ret { background: #f59e0b; }
        .bike-card { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-bottom: 1px solid #eef2f6; cursor: pointer; }
        .bike-card:active { background: #f8fafc; }
        .bike-card.active { background: #ecfdf5; box-shadow: inset 3px 0 0 #0d9488; }
        .bike-card.active .bike-name { color: #0f766e; }
        .bikemark.sel { transform: scale(1.45); border-color: #0d9488; box-shadow: 0 0 0 4px rgba(13,148,136,.35), 0 2px 8px rgba(0,0,0,.45); animation: bikePulse 1.6s ease-in-out infinite; }
        @keyframes bikePulse {
            0%,100% { box-shadow: 0 0 0 4px rgba(13,148,136,.35), 0 0 0 4px rgba(13,148,136,.4), 0 2px 8px rgba(0,0,0,.45); }
            50%     { box-shadow: 0 0 0 4px rgba(13,148,136,.35), 0 0 0 11px rgba(13,148,136,0), 0 2px 8px rgba(0,0,0,.45); }
        }
        .bike-main { flex: 1; min-width: 0; }
        .bike-name { font-size: 15px; font-weight: 700; color: #1e293b; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .bike-sub { font-size: 11px; color: #64748b; margin-top: 3px; }
        .bike-nums { display: flex; gap: 8px; flex-shrink: 0; }
        .bk-num {
            width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 17px; font-weight: 800; border: 2px solid;
        }
        .bk-num.rent { color: #15803d; border-color: #22c55e; background: #f0fdf4; }
        .bk-num.ret  { color: #c2410c; border-color: #f59e0b; background: #fff7ed; }
        .bk-num.zero { opacity: .38; }
        .bikemark {
            /* 剛性尺寸(block+line-height 置中)，避免 iOS 在 Leaflet 標記內把 flex 撐成橢圓 */
            box-sizing: border-box;
            width: 26px; height: 26px; min-height: 0; max-width: 26px; max-height: 26px;
            display: block; line-height: 22px; text-align: center; overflow: hidden;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 28%, #22c55e, #16a34a 72%);
            color: #fff;
            border: 2px solid #fff; font-size: 12px; font-weight: 800;
            box-shadow: 0 2px 6px rgba(22,163,74,.5), 0 1px 2px rgba(15,23,42,.35), inset 0 1px 2px rgba(255,255,255,.4);
            transition: transform .18s cubic-bezier(.34,1.56,.64,1), box-shadow .18s;
        }
        .bikemark.bm-none { background: radial-gradient(circle at 35% 28%, #b4bcc7, #94a3b8 72%); }   /* 注意:不可叫 .empty,會吃到清單空狀態的 padding */

        /* ── Map overlays ── */
        .map-btn-search {
            position: absolute;
            left: 50%; bottom: 18px;
            transform: translateX(-50%);
            z-index: 500;
            background: #0d9488;
            color: #fff;
            border: none;
            padding: 9px 18px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(13,148,136,.45);
            display: inline-flex; align-items: center; gap: 7px;
            transition: transform .1s, box-shadow .15s, opacity .2s;
        }
        .map-btn-search:hover { box-shadow: 0 6px 20px rgba(13,148,136,.55); }
        .map-btn-search:active { transform: translateX(-50%) scale(.96); }

        .me-dot {
            position: relative;
            width: 18px; height: 18px;
            background: radial-gradient(circle at 35% 30%, #60a5fa, #2563eb 70%);
            border: 3px solid #fff;
            border-radius: 50%;
            box-shadow: 0 0 0 4px rgba(37,99,235,.28), 0 1px 6px rgba(15,23,42,.5);
        }
        /* 定位點雷達波 */
        .me-dot::before {
            content: ''; position: absolute; inset: -3px;
            border-radius: 50%;
            background: rgba(37,99,235,.4);
            animation: meRadar 2s ease-out infinite;
            z-index: -1;
        }
        @keyframes meRadar {
            0%   { transform: scale(1); opacity: .55; }
            100% { transform: scale(3.4); opacity: 0; }
        }
        .stn-marker {
            width: 38px; height: 38px;
            background: linear-gradient(155deg, #14b8a6 0%, #0d9488 55%, #0f766e 100%);
            border: 3px solid #fff;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            box-shadow: 0 5px 12px rgba(13,148,136,.45), 0 2px 4px rgba(15,23,42,.28), inset 0 2px 3px rgba(255,255,255,.35);
            display: flex; align-items: center; justify-content: center;
            transition: background .15s, box-shadow .2s, filter .15s;
        }
        /* 進場：淡入放大（頻繁重繪也不吵，取代會抖動的掉落動畫） */
        @keyframes stnDrop {
            0%   { transform: rotate(-45deg) scale(.6); opacity: 0; }
            100% { transform: rotate(-45deg) scale(1); opacity: 1; }
        }
        .stn-marker { animation: stnDrop .28s ease-out both; }
        .stn-marker span { transform: rotate(45deg); color: #fff; font-size: 18px; line-height: 1; filter: drop-shadow(0 1px 1px rgba(15,23,42,.3)); }
        .stn-marker:hover { filter: brightness(1.08); box-shadow: 0 7px 16px rgba(13,148,136,.55), 0 2px 5px rgba(15,23,42,.3), inset 0 2px 3px rgba(255,255,255,.4); }
        .stn-marker.active {
            background: linear-gradient(155deg, #fbbf24 0%, #f59e0b 55%, #d97706 100%);
            width: 48px; height: 48px; z-index: 700;
            box-shadow: 0 8px 22px rgba(245,158,11,.6), 0 2px 6px rgba(15,23,42,.3), inset 0 2px 4px rgba(255,255,255,.4);
            animation: stnPulse 1.8s ease-in-out infinite;
        }
        /* 選中：呼吸光暈 */
        @keyframes stnPulse {
            0%,100% { box-shadow: 0 8px 22px rgba(245,158,11,.6), 0 0 0 0 rgba(245,158,11,.5), inset 0 2px 4px rgba(255,255,255,.4); }
            50%     { box-shadow: 0 8px 22px rgba(245,158,11,.6), 0 0 0 9px rgba(245,158,11,0), inset 0 2px 4px rgba(255,255,255,.4); }
        }
        .stn-marker.active span { font-size: 24px; }

        /* ── MapLibre popup 玻璃擬態(對應 Leaflet .bus-pop) ── */
        .lmgl-pop.bus-pop .maplibregl-popup-content {
            padding: 0; border-radius: 16px; overflow: hidden;
            box-shadow: 0 18px 44px rgba(15,23,42,.34), 0 3px 10px rgba(15,23,42,.14);
            border: 1px solid rgba(255,255,255,.5);
            background: rgba(255,255,255,.82);
            -webkit-backdrop-filter: blur(14px) saturate(1.3);
            backdrop-filter: blur(14px) saturate(1.3);
            animation: popIn .22s cubic-bezier(.34,1.4,.64,1) both;
            font-family: inherit;
        }
        .lmgl-pop .lmgl-pop-inner { min-width: 200px; max-width: 300px; }
        .lmgl-pop.bus-pop .maplibregl-popup-tip { display: none; }
        .lmgl-pop .maplibregl-popup-close-button {
            color: rgba(255,255,255,.9); font-size: 20px; padding: 0 8px;
            top: 6px; right: 4px; background: transparent; border: none; z-index: 3;
        }
        .lmgl-pop .maplibregl-popup-close-button:hover { color: #fff; background: transparent; }
        /* MapLibre 標籤/logo 精簡 */
        .maplibregl-ctrl-attrib.maplibregl-compact { font-size: 10px; }

        /* ── (原 Leaflet popup 樣式，保留無害) ── */
        .bus-pop .leaflet-popup-content-wrapper {
            padding: 0; border-radius: 16px; overflow: hidden;
            box-shadow: 0 18px 44px rgba(15,23,42,.34), 0 3px 10px rgba(15,23,42,.14);
            border: 1px solid rgba(255,255,255,.5);
            background: rgba(255,255,255,.82);
            -webkit-backdrop-filter: blur(14px) saturate(1.3);
            backdrop-filter: blur(14px) saturate(1.3);
            animation: popIn .22s cubic-bezier(.34,1.4,.64,1) both;
        }
        @keyframes popIn {
            0%   { transform: scale(.9) translateY(6px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }
        .bus-pop .leaflet-popup-content { margin: 0; width: auto !important; min-width: 200px; max-width: 300px; font-family: inherit; }
        .bus-pop .leaflet-popup-tip { box-shadow: 0 6px 16px rgba(15,23,42,.18); }
        .bus-pop a.leaflet-popup-close-button { color: rgba(255,255,255,.85); top: 9px; right: 9px; font-size: 20px; }
        .bus-pop a.leaflet-popup-close-button:hover { color: #fff; }

        .bpop { font-family: inherit; }
        .bpop-hd {
            padding: 12px 34px 12px 15px;
            background: linear-gradient(135deg, #14b8a6 0%, #0d9488 50%, #0f766e 100%);
            color: #fff;
            box-shadow: inset 0 -1px 0 rgba(255,255,255,.12);
        }
        .bpop-name { font-size: 15.5px; font-weight: 700; line-height: 1.3; }

<body>
    <div class="app-header">
        <h1>🚌 附近公車站牌</h1>
        <div class="addr-wrap">

    </div>

    <div class="layout">
        <div id="map">
            <div class="route-bar" id="routeBar" hidden>
                <span class="rb-badge" id="routeBarName"></span>
                <span class="rb-info" id="routeBarInfo"></span>
                <button class="rb-close" id="routeBarClose" type="button" title="清除路線">✕</button>
            </div>
            <button class="map-btn-search" id="searchHereBtn" type="button" hidden>🔍 搜尋此區域</button>
        </div>
        <aside class="list-panel">
            <div class="sheet-grip" id="sheetGrip"><span></span></div>

    <div class="toast" id="toast"></div>

    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <script>
    /* ═══════════════════════════════════════════════════════════════════
       Leaflet→MapLibre 相容層 (LMGL shim)
       只實作 bus 頁用到的 Leaflet API,讓原本的地圖邏輯不必重寫。
       重點:Leaflet 用 [lat, lon];MapLibre 用 [lng, lat] → 這層負責轉換。
       ═══════════════════════════════════════════════════════════════════ */
    (function () {
      const ml = window.maplibregl;
      const toLngLat = (a) => Array.isArray(a) ? [a[1], a[0]] : (a.lng != null ? [a.lng, a.lat] : [a.lon, a.lat]);
      const fromLngLat = (ll) => ({ lat: ll.lat, lng: ll.lng });

      // 事件轉發器(給 marker/popup 用)
      function Emitter() { this._h = {}; }
      Emitter.prototype.on = function (ev, fn) { (this._h[ev] = this._h[ev] || []).push(fn); return this; };
      Emitter.prototype.off = function (ev, fn) { if (this._h[ev]) this._h[ev] = this._h[ev].filter(f => f !== fn); return this; };
      Emitter.prototype.fire = function (ev, data) { (this._h[ev] || []).forEach(fn => fn(data)); return this; };

      // ── L.Map ──
      function LMap(el, opts) {
        Emitter.call(this);
        const o = opts || {};
        this._layers = new Set();
        this._popups = new Set();     // 目前開著的 popup(供 popupopen/close 派發)
        this.map = new ml.Map({
          container: el,
          style: o._style,
          center: [120.6736, 24.1477],
          zoom: 14,
          pitch: o._pitch != null ? o._pitch : 0,
          bearing: 0,
          attributionControl: o.attributionControl !== false,
          antialias: true,
          maxZoom: 19,
          dragRotate: true,
          pitchWithRotate: true,
        });
        if (o.zoomControl !== false) this.map.addControl(new ml.NavigationControl({ visualizePitch: true }), 'topleft'.replace('left','-left'));
        const self = this;
        this.map.on('moveend', () => self.fire('moveend'));
        this.map.on('load', () => { self._loaded = true; self.fire('load'); });
      }
      LMap.prototype = Object.create(Emitter.prototype);
      LMap.prototype.setView = function (ll, zoom, opts) {
        const c = toLngLat(ll);
        const o = { center: c };
        if (zoom != null) o.zoom = zoom;
        if (opts && opts.animate === false) { this.map.jumpTo(o); }
        else this.map.easeTo(Object.assign(o, { duration: 500 }));
        return this;
      };
      LMap.prototype.getZoom = function () { return this.map.getZoom(); };
      LMap.prototype.getCenter = function () { const c = this.map.getCenter(); return { lat: c.lat, lng: c.lng }; };
      LMap.prototype.getBounds = function () {
        const b = this.map.getBounds();
        return {
          getNorthEast: () => ({ lat: b.getNorth(), lng: b.getEast() }),
          getSouthWest: () => ({ lat: b.getSouth(), lng: b.getWest() }),
        };
      };
      LMap.prototype.getSize = function () { const c = this.map.getContainer(); return { x: c.clientWidth, y: c.clientHeight }; };
      // project/unproject:回傳/接受「螢幕像素」。Leaflet 帶 zoom 參數,MapLibre 用當前視圖即可
      LMap.prototype.project = function (ll) { const p = this.map.project(toLngLat(ll)); return { x: p.x, y: p.y }; };
      LMap.prototype.unproject = function (pt) { const ll = this.map.unproject([pt.x, pt.y]); return { lat: ll.lat, lng: ll.lng }; };
      LMap.prototype.fitBounds = function (arr, opts) {
        const b = new ml.LngLatBounds();
        arr.forEach(ll => b.extend(toLngLat(ll)));
        const pad = (opts && opts.padding) ? (Array.isArray(opts.padding) ? opts.padding[0] : opts.padding) : 40;
        const o = { padding: pad, duration: 500 };
        if (opts && opts.maxZoom) o.maxZoom = opts.maxZoom;
        try { this.map.fitBounds(b, o); } catch (e) {}
        return this;
      };
      LMap.prototype.invalidateSize = function () { this.map.resize(); return this; };
      LMap.prototype.removeLayer = function (layer) {
        if (!layer) return this;
        if (layer._isGroup) { layer.clearLayers(); this._layers.delete(layer); return this; }
        if (layer.remove) layer.remove();
        this._layers.delete(layer);
        return this;
      };
      LMap.prototype.addLayerObj = function (l) { this._layers.add(l); return this; };
      // popup 事件派發(marker.openPopup / popup.addTo 時呼叫)
      LMap.prototype._firePopupOpen = function (popup) { this._popups.add(popup); this.fire('popupopen', { popup }); };
      LMap.prototype._firePopupClose = function (popup) { this._popups.delete(popup); this.fire('popupclose', { popup }); };

      // ── L.Marker(用 HTML DIV,對應原本的 divIcon）──
      function LMarker(ll, opts) {
        Emitter.call(this);
        this._ll = ll; this.options = opts || {};
        const icon = this.options.icon || {};
        this._el = document.createElement('div');
        this._el.style.lineHeight = '0';
        if (icon._html != null) this._el.innerHTML = icon._html;
        // anchor:Leaflet iconAnchor 以「左上為原點指向錨點」;MapLibre 用 offset(相對中心)
        const size = icon._size || [0, 0];
        const anchor = icon._anchor || [size[0] / 2, size[1] / 2];
        const offset = [size[0] / 2 - anchor[0], size[1] / 2 - anchor[1]];
        this._marker = new ml.Marker({ element: this._el, offset, anchor: 'center' });
        this._marker.setLngLat(toLngLat(ll));
        const self = this;

    function fastestSummary(recs) {
        let best = null;
        (recs || []).forEach(r => {
            if (r.EstimateTime == null || r.StopStatus !== 0) return;
            if (!best || r.EstimateTime < best.EstimateTime) best = r;
        });
        if (!best) return '<span class="sf-none">目前無進站班次</span>';
        const [label] = badge(best);
        const route = (best.RouteName && best.RouteName.Zh_tw) || best.RouteID || '';
        return `<span class="sf-lead">最快</span><span class="sf-route">${TXT(route)}</span>`
             + `<span class="sf-time">${TXT(label)}</span><span class="sf-to">${TXT(dirLabel(route, best.Direction))}</span>`;
    }
    async function loadStnFastest(uid, force) {
        const s = stations.find(x => x.uid === uid);
        if (!s) return;
        const c = stnFastest[uid];
        if (!force && c && (Date.now() - c.ts < 18000)) { paintStnFastest(uid); return; }
        if (stnFetching[uid]) return;
        stnFetching[uid] = true;
        try {
            await ensureRouteDests();
            const data = await fetchJson(ETA(s.id));
            stnFastest[uid] = { html: fastestSummary(Array.isArray(data) ? data : []), ts: Date.now() };
            paintStnFastest(uid);
        } catch (e) { /* 靜默，下輪再試 */ }
        finally { stnFetching[uid] = false; }
    }
    function paintStnFastest(uid) {
        const c = stnFastest[uid]; if (!c) return;
        const el = $list.querySelector(`.stn[data-uid="${cssEsc(uid)}"] .stn-fastest`);
        if (el) el.innerHTML = c.html;
    }
    function observeStnCards() {
        if (stnObserver) stnObserver.disconnect();
        visibleStn.clear();
        const cards = $list.querySelectorAll('.stn');
        if (!('IntersectionObserver' in window)) {   // 退化：載入前幾張
            [...cards].slice(0, 6).forEach(el => loadStnFastest(el.dataset.uid));
            return;
        }
        stnObserver = new IntersectionObserver(ens => {
            ens.forEach(en => {
                const uid = en.target.dataset.uid;
                if (en.isIntersecting) { visibleStn.add(uid); loadStnFastest(uid); }
                else visibleStn.delete(uid);
            });
        }, { root: null, rootMargin: '120px 0px', threshold: 0.01 });
        cards.forEach(el => { paintStnFastest(el.dataset.uid); stnObserver.observe(el); });
    }
    // 每 20 秒只刷新「畫面上看得到」的卡片摘要
    setInterval(() => {
        if (document.body.classList.contains('route-mode') || bikeMode) return;
        visibleStn.forEach(uid => loadStnFastest(uid, true));
        if (typeof pulseRefreshBar === 'function') pulseRefreshBar();
    }, 20000);

    // ── YouBike：附近可借/可還 ──
    let bikeBase = null, bikeTimer = null, bikeLayer = null;
    let bikeList = [], bikeMarkers = [], activeBikeIdx = -1;
    async function ensureBikeBase() {
        if (bikeBase) return bikeBase;
        const arr = await tdxFetch('Bike/Station/City/Taichung');
        const m = {};
        (arr || []).forEach(s => {
            const p = s.StationPosition || {};
            m[s.StationUID] = {
                name: ((s.StationName && s.StationName.Zh_tw) || '').replace(/^YouBike\d?\.?\d?_?/, ''),
                lat: p.PositionLat, lon: p.PositionLon,
            };
        });
        bikeBase = m; return m;
    }
    function bikeCenter() {
        if (queryCenter) return queryCenter;
        const c = map.getCenter(); return { lat: c.lat, lon: c.lng };
    }
    let bikeAvail = null, bikeAvailTs = 0;
    async function getBikeAvail() {   // 全市即時資料快取 25 秒，避免頻繁重抓被限流
        if (bikeAvail && Date.now() - bikeAvailTs < 25000) return bikeAvail;
        bikeAvail = await tdxFetch('Bike/Availability/City/Taichung');
        bikeAvailTs = Date.now();
        return bikeAvail;
    }
    async function loadBikes() {
        if (!bikeMode) return;
        try {
            const [base, avail] = await Promise.all([ensureBikeBase(), getBikeAvail()]);
            if (!bikeMode) return;
            const c = bikeCenter(), R = (+$radius.value || 500) + 100, list = [];   // 跟著「範圍」選單，稍放寬
            (avail || []).forEach(a => {
                const st = base[a.StationUID];
                if (!st || st.lat == null) return;
                const dist = haversine(c.lat, c.lon, st.lat, st.lon);
                if (dist > R) return;
                list.push({ name: st.name, lat: st.lat, lon: st.lon, dist,
                    rent: a.AvailableRentBikes || 0, ret: a.AvailableReturnBikes || 0, ok: a.ServiceStatus === 1 });
            });
            list.sort((a, b) => a.dist - b.dist);
            bikeList = list.slice(0, 50);
            renderBikes(bikeList); drawBikeMarkers(bikeList); pulseRefreshBar();
            clearInterval(bikeTimer); bikeTimer = setInterval(loadBikes, 30000);   // 30 秒更新，減輕 TDX 負擔
        } catch (e) {
            $list.innerHTML = '<div class="empty">⚠ 無法取得 YouBike 資料<br><span style="font-size:11px">' + TXT(e.message || e) + '</span><br><button class="addr-go" style="margin-top:12px;position:static" onclick="retryBikes()">重試</button></div>';
        }
    }
    window.retryBikes = () => { if (bikeMode) { bikeAvail = null; loadBikes(); } };
    function renderBikes(list) {
        $count.textContent = list.length ? list.length + ' 站' : '';
        if (!list.length) { $list.innerHTML = '<div class="empty">附近 800m 內沒有 YouBike 站點<br>移動地圖或改用定位</div>'; return; }
        $list.innerHTML = `<div class="bike-legend"><span><i class="bk-dot rent"></i>可借</span><span><i class="bk-dot ret"></i>可還</span></div>`
            + list.map((b, i) => `<div class="bike-card" data-i="${i}">
                <div class="bike-main">
                    <div class="bike-name">${TXT(b.name)}</div>
                    <div class="bike-sub">📍 ${fmtDist(b.dist)} · 步行 ${walkMin(b.dist)} 分</div>
                </div>
                <div class="bike-nums">
                    <span class="bk-num rent${b.ok && b.rent === 0 ? ' zero' : ''}">${b.ok ? b.rent : '—'}</span>
                    <span class="bk-num ret${b.ok && b.ret === 0 ? ' zero' : ''}">${b.ok ? b.ret : '—'}</span>
                </div>
            </div>`).join('');
        $list.querySelectorAll('.bike-card').forEach(el => {
            el.addEventListener('click', () => focusBike(+el.dataset.i, true));
        });
        if (activeBikeIdx >= 0) {   // 刷新後保留清單高亮
            const el = $list.querySelector(`.bike-card[data-i="${activeBikeIdx}"]`);
            if (el) el.classList.add('active');
        }
    }
    function bikePopup(b) {
        return `<div class="bpop"><div class="bpop-hd">
            <div class="bpop-name">🚲 ${TXT(b.name)}</div>
            <div class="bpop-meta"><span>📍 ${fmtDist(b.dist)} · 🚶 ${walkMin(b.dist)} 分</span><span>可借 ${b.ok ? b.rent : '—'}</span><span>可還 ${b.ok ? b.ret : '—'}</span></div>
        </div></div>`;
    }
    function drawBikeMarkers(list) {
        if (!bikeLayer) bikeLayer = L.layerGroup().addTo(map);
        bikeLayer.clearLayers();
        bikeMarkers = list.map((b, i) => {
            const sel = i === activeBikeIdx;
            const m = L.marker([b.lat, b.lon], {
                zIndexOffset: sel ? 1000 : 0,
                icon: L.divIcon({ className: '', html: `<div class="bikemark${b.ok && b.rent === 0 ? ' bm-none' : ''}${sel ? ' sel' : ''}">${b.ok ? b.rent : '—'}</div>`, iconSize: [26, 26], iconAnchor: [13, 13] })
            });
            m.bindTooltip(TXT(b.name), { direction: 'top' });
            m.bindPopup(bikePopup(b), { className: 'bus-pop', autoPan: false });
            m.on('click', () => focusBike(i, true));
            m.addTo(bikeLayer);
            return m;
        });
    }
    // 選中某 YouBike 站：地圖高亮該 marker + 開資訊卡，清單卡片同步高亮並捲入視野
    function focusBike(i, openPop) {
        const b = bikeList[i]; if (!b) return;
        activeBikeIdx = i;
        panTo(b.lat, b.lon); raiseSheet('half');
        bikeMarkers.forEach((m, idx) => {
            const el = m.getElement() && m.getElement().querySelector('.bikemark');
            if (el) el.classList.toggle('sel', idx === i);
            m.setZIndexOffset(idx === i ? 1000 : 0);
        });
        $list.querySelectorAll('.bike-card').forEach(el => el.classList.toggle('active', +el.dataset.i === i));
        const card = $list.querySelector(`.bike-card[data-i="${i}"]`);
        if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        if (openPop && bikeMarkers[i]) bikeMarkers[i].openPopup();
    }
    function setBikeMode(on) {
        bikeMode = on;
        document.body.classList.toggle('bike-mode', on);
        document.getElementById('bikeBtn').classList.toggle('on', on);
        document.querySelector('.list-head span').textContent = on ? '🚲 附近 YouBike' : '附近站牌';
        if (on) {
            if (curRoute || stnPage) clearRoute(true);
            if (activeUID) { const mk = stnMarkers.get(activeUID); if (mk) mk.closePopup(); }
            stnMarkers.forEach(m => map.removeLayer(m));   // 藏公車站牌
            activeBikeIdx = -1;
            $list.innerHTML = '<div class="empty"><div class="spinner"></div>載入附近 YouBike…</div>';
            raiseSheet('half');
            loadBikes();
        } else {
            clearInterval(bikeTimer); bikeTimer = null;
            if (bikeLayer) { map.removeLayer(bikeLayer); bikeLayer = null; }
            drawMarkers(); renderStations();   // 還原公車站牌
        }
    }
    document.getElementById('bikeBtn').addEventListener('click', () => setBikeMode(!bikeMode));

    // ── Markers ──
    function drawMarkers() {
        if (bikeMode) return;   // YouBike 模式時不畫公車站牌 marker
        stnMarkers.forEach(m => map.removeLayer(m));
        stnMarkers.clear();
        stations.forEach(s => {
            const m = L.marker([s.lat, s.lon], {
                icon: L.divIcon({ className: '', html: `<div class="stn-marker" data-uid="${s.uid}"><span>🚌</span></div>`, iconSize: [38,38], iconAnchor: [19,36], popupAnchor: [0,-30] }),
                title: s.name
            }).addTo(map);
            const pop = L.popup({ className: 'bus-pop', maxWidth: 280, minWidth: 200, autoPan: false, closeButton: true });
            pop._stnUID = s.uid;
            m.bindPopup(pop);
            m.on('click', () => focusStation(s));   // 置中；Leaflet 會開 popup → popupopen 接手其餘
            stnMarkers.set(s.uid, m);
        });
    }
    function markMarkerActive(uid) {
        stnMarkers.forEach((m, k) => {
            const el = m.getElement() && m.getElement().querySelector('.stn-marker');
            if (el) el.classList.toggle('active', k === uid);
        });
    }

    // 置中到座標。手機版底部面板會蓋住下半 → 把標記推到可見上半區；桌機沿用小幅上移
    function panTo(lat, lon, animate) {
        const z = Math.max(map.getZoom(), 16);
        const pt = map.project([lat, lon], z);
        const mobile = window.matchMedia('(max-width: 820px)').matches;
        pt.y += mobile ? map.getSize().y * 0.24 : -96;
        map.setView(map.unproject(pt, z), z, { animate: animate !== false });
    }
    function focusStation(s) { panTo(s.lat, s.lon); }

    // 從右側清單點選 → 置中並開地圖卡片
    function selectStation(uid) {
        const mk = stnMarkers.get(uid);
        const s = stations.find(x => x.uid === uid);
        if (!mk || !s) return;
        if (uid === activeUID) { mk.closePopup(); return; }   // 再點一次收合
        focusStation(s);
        mk.openPopup();
    }

    // popup 開啟 = 選定該站（清單／地圖點選共用此流程）
    map.on('popupopen', e => {
        const uid = e.popup._stnUID;
        if (!uid) return;
        popupUID = uid;
        activeUID = uid;
        raiseSheet('half');   // 手機版：選站 → 底部面板至少拉到半屏
        $list.querySelectorAll('.stn.active').forEach(x => x.classList.remove('active'));
        const el = $list.querySelector(`.stn[data-uid="${cssEsc(uid)}"]`);
        if (el) { el.classList.add('active'); el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
        markMarkerActive(uid);
        const s = stations.find(x => x.uid === uid);
        e.popup.setContent(cardCompact(s));   // 地圖上只留小名牌，到站資訊在右側清單卡(避免重複)
        clearInterval(etaTimer); etaTimer = null;
        if (s) loadArrivals(uid, s.id);
    });
    map.on('popupclose', e => {
        const uid = e.popup._stnUID;
        if (!uid) return;
        setTimeout(() => {
            if (popupUID !== uid) return;        // 期間已開了別站
            popupUID = null;
            if (activeUID === uid) {
                activeUID = null;
                const el = $list.querySelector(`.stn[data-uid="${cssEsc(uid)}"]`);
                if (el) el.classList.remove('active');
                markMarkerActive(null);
                clearInterval(etaTimer); etaTimer = null;
            }
        }, 0);
    });

    async function loadArrivals(uid, stationId) {
        const body = document.getElementById('body-' + uid);
        if (body && !body.dataset.loaded) body.innerHTML = '<div class="arr-loading">查詢到站時間…</div>';
        let data;
        try {
            // 方向終點名與到站時間並行載入 → 首次就能標對「往 ○○」，且不增加延遲
            const [, d] = await Promise.all([ensureRouteDests(), fetchJson(ETA(stationId))]);
            data = d;
        } catch (e) {
            if (body) body.innerHTML = '<div class="arr-loading">⚠ 無法取得到站時間</div>';
            return;
        }
        if (uid !== activeUID) return;
        const recs = Array.isArray(data) ? data : [];
        const now = nowStr();
        if (body) {
            body.innerHTML = arrivalsInner(recs) + `<div class="arr-foot"><span>🔄 每 20 秒自動更新</span><span>更新 ${now}</span></div>`;
            body.dataset.loaded = '1';
        }
        pulseRefreshBar();   // 重跑 20 秒進度條
        clearInterval(etaTimer);
        etaTimer = setInterval(() => { if (uid === activeUID) loadArrivals(uid, stationId); }, 20000);
    }

    // ══ 路線繪製 ══════════════════════════════════════════
    const $routeBar   = document.getElementById('routeBar');
    const $rbName     = document.getElementById('routeBarName');
    const $rbInfo     = document.getElementById('routeBarInfo');

    // 可放多支 TDX worker（不同帳號）做備援；429 時自動換下一支 + 退避重試
    const TDX_PROXIES = [TDX_PROXY].filter(Boolean);
    let tdxIdx = 0;
    const sleep = ms => new Promise(r => setTimeout(r, ms));
    async function tdxFetch(path, tries) {
        if (!TDX_PROXIES.length) throw new Error('未設定 TDX proxy');
        tries = tries || Math.max(3, TDX_PROXIES.length + 1);
        let last;
        for (let i = 0; i < tries; i++) {
            const base = TDX_PROXIES[(tdxIdx + i) % TDX_PROXIES.length];
            const u = base + (base.includes('?') ? '&' : (base.endsWith('/') ? '' : '/')) + '?tdx=' + encodeURIComponent(path);
            try {
                const r = await fetch(u, { cache: 'no-store' });
                if (r.status === 429) { tdxIdx++; throw new Error('TDX HTTP 429'); }   // 限流 → 換下一支帳號
                if (!r.ok) throw new Error('TDX HTTP ' + r.status);
                return await r.json();
            } catch (e) {
                last = e;
                if (i < tries - 1) await sleep(500 * (i + 1));   // 退避後重試
            }
        }
        throw last;
    }

    // 解析 WKT（MULTILINESTRING / LINESTRING）→ [[ [lat,lon], … ], …]
    function parseWKT(wkt) {
        const segs = [];
        const body = String(wkt).replace(/^\s*(MULTILINESTRING|LINESTRING)\s*/i, '');
        let m; const re = /\(([^()]+)\)/g;
        while ((m = re.exec(body))) {
            const pts = m[1].split(',').map(p => {
                const [lon, lat] = p.trim().split(/\s+/).map(Number);
                return [lat, lon];
            }).filter(p => !isNaN(p[0]) && !isNaN(p[1]));
            if (pts.length > 1) segs.push(pts);
        }
        return segs;
    }

    function clearRoute(restore) {
        if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
        clearInterval(routeTimer); routeTimer = null;
        clearInterval(stnPageTimer); stnPageTimer = null; stnPage = null;
        document.body.classList.remove('stn-page');
        const had = !!curRoute;
        curRoute = null; routeData = null; activeRouteSeq = null; routeOrigin = null;
        $routeBar.hidden = true;
        document.body.classList.remove('route-mode', 'route-map');
        stnMarkers.forEach(m => {
            const el = m.getElement() && m.getElement().querySelector('.stn-marker');
            if (el) el.classList.remove('onroute');
        });
        if (restore && had) { renderStations(); setSheet('half'); }   // 還原附近站牌 + 手機面板回半屏
        requestAnimationFrame(() => map.invalidateSize());   // 頂欄/地圖尺寸變動後重算
    }
    // 路線詳情 ↔ 地圖檢視 切換（滿版清單 vs 露出地圖看路線）
    function toggleRouteMap() {
        const on = document.body.classList.toggle('route-map');
        setSheet(on ? 'half' : 'full');
        requestAnimationFrame(() => map.invalidateSize());
    }

    async function selectRoute(name) {
        if (curRoute === name) { clearRoute(true); return; }   // 再點一次收起
        // 記住是從哪一站點進來的（activeUID＝目前開著卡片的站）→ 之後自動選方向+定位
        const org = stations.find(x => x.uid === activeUID);
        clearRoute(false);
        routeOrigin = (org && org.lat != null) ? { lat: org.lat, lon: org.lon, name: org.name } : null;
        curRoute = name;
        routeDir = 0;
        routeLayer = L.layerGroup().addTo(map);
        $routeBar.hidden = false;
        $rbName.textContent = name;
        $rbInfo.textContent = '載入路線…';
        if (!TDX_PROXY) { drawRouteFallback(name); return; }
        try { await loadRoute(name); }
        catch (e) { console.warn('TDX 路線載入失敗，改用備援', e); drawRouteFallback(name); }
    }

    // 一次抓齊：線形 Shape / 站牌順序 StopOfRoute / 各站預估 ETA / 公車即時位置 RealTime
    async function loadRoute(name) {
        const enc = encodeURIComponent(name);
        const [shapesR, sorsR, etasR, rtR] = await Promise.all([
            tdxFetch('Bus/Shape/City/Taichung/' + enc).catch(() => []),
            tdxFetch('Bus/StopOfRoute/City/Taichung/' + enc).catch(() => []),
            tdxFetch('Bus/EstimatedTimeOfArrival/City/Taichung/' + enc).catch(() => []),
            tdxFetch('Bus/RealTimeByFrequency/City/Taichung/' + enc).catch(() => []),
        ]);
        if (curRoute !== name) return;
        const exact = x => x.RouteName && x.RouteName.Zh_tw === name;   // 避免 99 夾帶 699/99延
        const shapes = (shapesR || []).filter(exact);
        const sors   = (sorsR   || []).filter(exact);
        const etas   = (etasR   || []).filter(exact);
        const buses  = (rtR     || []).filter(exact).filter(v => v.BusPosition && v.BusPosition.PositionLat != null);

        const byDir = {};
        [0, 1].forEach(d => {
            const so = sors.find(x => x.Direction === d);
            const stops = ((so && so.Stops) || []).slice()
                .sort((a, b) => a.StopSequence - b.StopSequence)
                .map(st => ({
                    seq: st.StopSequence, name: (st.StopName && st.StopName.Zh_tw) || '', id: st.StopID,
                    lat: st.StopPosition && st.StopPosition.PositionLat,
                    lon: st.StopPosition && st.StopPosition.PositionLon,
                }));
            const etaByStop = {};
            etas.filter(x => x.Direction === d).forEach(x => { etaByStop[x.StopID] = x; });
            byDir[d] = { stops, etaByStop, dest: stops.length ? stops[stops.length - 1].name : '' };
        });
        routeData = { name, shapes, byDir, buses };
        if (!(byDir[routeDir] && byDir[routeDir].stops.length)) routeDir = (byDir[0].stops.length ? 0 : 1);
        activeRouteSeq = null;
        // 從某站 popup 進來 → 自動切到「有車正開往該站」的方向，並記住該站
        if (routeOrigin) {
            const pick = pickDirForOrigin(byDir, routeOrigin);
            if (pick) { routeDir = pick.dir; activeRouteSeq = pick.seq; }
        }
        document.body.classList.add('route-mode');
        setSheet('full');   // 手機版：進路線 → 底部面板全屏看完整站序
        // 從站點進入(routeOrigin)→ 地圖維持原樣只畫路線，不縮到全路線
        renderRoute(!routeOrigin);
        // 首次載入把來源站捲進視野（只做一次，之後 20 秒刷新不搶捲軸）
        if (routeOrigin) {
            const row = activeRouteSeq != null && $list.querySelector(`.rstop[data-seq="${activeRouteSeq}"]`);
            if (row) row.scrollIntoView({ block: 'center' });
            else $list.scrollTop = 0;
            routeOrigin = null;
        }
        clearInterval(routeTimer);
        routeTimer = setInterval(() => { if (curRoute === name) refreshRoute(name); }, 20000);
    }

    // 找出「哪個方向有車正開往來源站」→ 回傳 { dir, seq }；找不到回 null
    function pickDirForOrigin(byDir, origin) {
        const cand = [];
        [0, 1].forEach(d => {
            const bd = byDir[d];
            if (!bd || !bd.stops.length) return;
            let near = null, nd = Infinity;
            bd.stops.forEach(st => {
                if (st.lat == null) return;
                const dist = haversine(origin.lat, origin.lon, st.lat, st.lon);
                if (dist < nd) { nd = dist; near = st; }
            });
            if (!near || nd > 150) return;   // 這方向 150m 內沒有來源站 → 不算
            const eta = bd.etaByStop[near.id];
            const et = (eta && eta.EstimateTime != null) ? eta.EstimateTime : Infinity;
            cand.push({ dir: d, seq: near.seq, et, dist: nd });
        });
        if (!cand.length) return null;
        // 有車正開往來源站的方向優先(et 最小)；都沒車 → 取離來源站最近的方向
        cand.sort((a, b) => (a.et - b.et) || (a.dist - b.dist));
        return { dir: cand[0].dir, seq: cand[0].seq };
    }

    // 每 20 秒只更新「到站時間 + 公車位置」，不重抓線形、不重新縮放
    async function refreshRoute(name) {
        const enc = encodeURIComponent(name);
        const [etasR, rtR] = await Promise.all([
            tdxFetch('Bus/EstimatedTimeOfArrival/City/Taichung/' + enc).catch(() => null),
            tdxFetch('Bus/RealTimeByFrequency/City/Taichung/' + enc).catch(() => null),
        ]);
        if (curRoute !== name || !routeData) return;
        const exact = x => x.RouteName && x.RouteName.Zh_tw === name;
        if (etasR) [0, 1].forEach(d => {
            if (!routeData.byDir[d]) return;
            const m = {}; etasR.filter(exact).filter(x => x.Direction === d).forEach(x => { m[x.StopID] = x; });
            routeData.byDir[d].etaByStop = m;
        });
        if (rtR) routeData.buses = rtR.filter(exact).filter(v => v.BusPosition && v.BusPosition.PositionLat != null);
        renderRoute(false);
    }

    function hhmmISO(s) { const m = String(s).match(/T(\d{2}):(\d{2})/); return m ? m[1] + ':' + m[2] : ''; }
    // 回傳 [大時間塊文字, 顏色class]
    function timePill(s) {
        const st = s.StopStatus;
        if (st === 2) return ['交管不停', 't-none'];
        if (st === 3) return ['末班已過', 't-none'];
        if (st === 4) return ['未營運', 't-none'];
        const et = s.EstimateTime;
        if (et != null) {
            if (et < 60) return ['即將到站', 't-soon'];
            return [Math.floor(et / 60) + ' 分', 't-min'];
        }
        if (s.NextBusTime) { const t = hhmmISO(s.NextBusTime); if (t) return [t, 't-clock']; }
        return ['未發車', 't-none'];
    }

    // ── 畫地圖(線形 + 序號站點 + 即時公車) 與 右側清單 ──
    function renderRoute(fit) {
        if (!routeData || !routeLayer) return;
        if (stnPage) return;   // 站牌詳情頁蓋在路線上時，路線刷新只更新資料不重繪清單
        const { shapes, byDir, buses } = routeData;
        const dir = byDir[routeDir] || { stops: [], etaByStop: {} };
        const stops = dir.stops;
        routeLayer.clearLayers();
        let bounds = [];

        // 線形（優先該方向，沒有就用全部）
        const dShapes = shapes.filter(s => s.Direction === routeDir);
        (dShapes.length ? dShapes : shapes).forEach(sh => {
            if (!sh.Geometry) return;
            parseWKT(sh.Geometry).forEach(seg => {
                L.polyline(seg, { color: '#2563eb', weight: 5, opacity: .85 }).addTo(routeLayer);
                bounds = bounds.concat(seg);
            });
        });
        if (!dShapes.length && !shapes.length && stops.length > 1) {   // 沒線形 → 站點連線
            L.polyline(stops.filter(s => s.lat != null).map(s => [s.lat, s.lon]), { color: '#2563eb', weight: 4, opacity: .8, dashArray: '6 6' }).addTo(routeLayer);
        }
        // 序號站點
        stops.forEach(st => {
            if (st.lat == null) return;
            const eta = dir.etaByStop[st.id];
            const near = eta && eta.EstimateTime != null && eta.EstimateTime < 180;
            L.marker([st.lat, st.lon], {
                icon: L.divIcon({ className: '', html: `<div class="stopnum${near ? ' near' : ''}">${st.seq}</div>`, iconSize: [24, 24], iconAnchor: [12, 12] })
            }).addTo(routeLayer).on('click', () => focusRouteStop(st.seq));
            bounds.push([st.lat, st.lon]);
        });
        // 公車即時位置（該方向）＋ 車頭朝向箭頭(Azimuth)
        (buses || []).filter(v => v.Direction === routeDir).forEach(v => {
            const p = v.BusPosition;
            const az = (v.Azimuth != null && !isNaN(v.Azimuth)) ? v.Azimuth : null;
            const arrow = az != null ? `<i class="bus-arrow" style="transform:rotate(${az}deg)"></i>` : '';
            L.marker([p.PositionLat, p.PositionLon], {
                zIndexOffset: 1000,
                icon: L.divIcon({ className: '', html: `<div class="busmark">${arrow}🚌<b>${TXT(v.PlateNumb || '')}</b></div>`, iconSize: [34, 40], iconAnchor: [17, 30] })
            }).addTo(routeLayer);
        });

        if (fit && bounds.length) map.fitBounds(bounds, { padding: [40, 40] });
        $rbInfo.textContent = stops.length ? `${stops[0].name} → ${stops[stops.length - 1].name}` : (routeData.name + ' 路線');
        renderRoutePanel(!fit);   // 刷新(fit=false)時保留捲動位置；切方向/首載(fit=true)則歸零
        pulseRefreshBar();        // 重跑 20 秒進度條
    }

    // 點某站 → 高亮該列 + 地圖置中並標示
    function focusRouteStop(seq) {
        if (!routeData) return;
        const st = ((routeData.byDir[routeDir] || {}).stops || []).find(s => s.seq === seq);
        if (!st) return;
        // 高亮右側清單（先移除其他列，再標示這一列並捲入視野）
        activeRouteSeq = seq;
        $list.querySelectorAll('.rstop.active').forEach(x => x.classList.remove('active'));
        const row = $list.querySelector(`.rstop[data-seq="${seq}"]`);
        if (row) { row.classList.add('active'); row.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
        if (st.lat == null) { toast('此站沒有座標，無法在地圖定位'); return; }
        panTo(st.lat, st.lon);   // 手機/桌機各自的偏移，讓標記落在可見區
        L.popup({ className: 'bus-pop', autoPan: false })
            .setLatLng([st.lat, st.lon])
            .setContent(`<div class="bpop"><div class="bpop-hd"><div class="bpop-name">${TXT(st.name)}</div><div class="bpop-meta"><span>站序 ${st.seq}</span></div></div></div>`)
            .openOn(map);
    }

    // 點「序號」→ 地圖移到並放大到該站（手機若在滿版清單，先切出地圖再定位）
    function tapRouteSeq(seq) {
        const mobile = window.matchMedia('(max-width: 820px)').matches;
        if (mobile && !document.body.classList.contains('route-map')) {
            document.body.classList.add('route-map'); setSheet('half');
            requestAnimationFrame(() => { map.invalidateSize(); focusRouteStop(seq); });
        } else {
            focusRouteStop(seq);
        }
    }

    // ── 站牌詳情頁（滿版，仿台中公車 App：該站各路線到站）──
    function stopPageShell(name, inner) {
        return `<div class="rhead">
                <button class="rback" onclick="closeStopPage()" title="返回">‹</button>
                <div class="rhead-main"><div class="rhead-name">${TXT(name)}</div></div>
            </div>
            <div class="stnpage-body">${inner}</div>`;
    }
    function openStopPage(seq) {
        if (!routeData) return;
        const st = ((routeData.byDir[routeDir] || {}).stops || []).find(s => s.seq === seq);
        if (!st || st.lat == null) { toast('此站沒有座標'); return; }
        stnPage = { name: st.name, lat: st.lat, lon: st.lon, stationId: null,
            fromRoute: { name: curRoute, dir: routeDir, seq, scroll: $list.scrollTop } };   // 記住返回時要還原的位置
        document.body.classList.add('stn-page');
        setSheet('full');
        $list.innerHTML = stopPageShell(st.name, '<div class="arr-loading">查詢到站時間…</div>');
        $list.scrollTop = 0;
        loadStopPage();
    }
    async function loadStopPage() {
        const page = stnPage;
        if (!page) return;
        try {
            await ensureRouteDests();
            if (!page.stationId) {   // 用座標解析出這站的 StationID
                const near = await fetchJson(NEARBY(page.lon, page.lat, 100));
                const arr = Array.isArray(near) ? near : [];
                const pick = arr.find(x => (x.StationName && x.StationName.Zh_tw) === page.name) || arr[0];
                if (!pick) throw new Error('查無站台');
                page.stationId = pick.StationID;
            }
            const eta = await fetchJson(ETA(page.stationId));
            if (stnPage !== page) return;   // 期間已離開
            const recs = Array.isArray(eta) ? eta : [];
            $list.innerHTML = stopPageShell(page.name, arrivalsInner(recs)
                + `<div class="arr-foot"><span>🔄 每 20 秒自動更新</span><span>更新 ${nowStr()}</span></div>`);
            pulseRefreshBar();
            clearInterval(stnPageTimer);
            stnPageTimer = setInterval(loadStopPage, 20000);
        } catch (e) {
            if (stnPage === page) $list.innerHTML = stopPageShell(page.name, '<div class="arr-loading">⚠ 無法取得到站時間</div>');
        }
    }
    function closeStopPage() {
        clearInterval(stnPageTimer); stnPageTimer = null;
        const from = stnPage && stnPage.fromRoute;
        stnPage = null;
        document.body.classList.remove('stn-page');
        if (from && curRoute === from.name && routeData) {
            routeDir = from.dir;
            activeRouteSeq = from.seq;      // 回來時高亮剛才那站
            renderRoute(false);             // 回到路線詳情
            $list.scrollTop = from.scroll;  // 還原剛才的捲動位置
        } else {
            clearRoute(true);     // 保險：回附近站牌
        }
    }

    function renderRoutePanel(keepScroll) {
        if (!routeData) return;
        const prevScroll = keepScroll ? $list.scrollTop : 0;
        const { name, byDir } = routeData;
        const dir = byDir[routeDir] || { stops: [], etaByStop: {} };
        const stops = dir.stops;
        const has0 = byDir[0] && byDir[0].stops.length, has1 = byDir[1] && byDir[1].stops.length;
        const dest0 = byDir[0] ? byDir[0].dest : '', dest1 = byDir[1] ? byDir[1].dest : '';
        // 各方向目前在路上的即時公車數（不同車牌）— 讓使用者知道哪一向有車
        const liveBuses = d => {
            const eb = (byDir[d] && byDir[d].etaByStop) || {};
            const set = new Set();
            Object.values(eb).forEach(s => { if (s.PlateNumb && s.EstimateTime != null) set.add(s.PlateNumb); });
            return set.size;
        };
        const nBus0 = liveBuses(0), nBus1 = liveBuses(1);

        // 公車目前所在站：該車牌 ETA 最小的站
        const byPlate = {};
        Object.values(dir.etaByStop).forEach(s => {
            if (s.PlateNumb && s.EstimateTime != null) {
                const p = s.PlateNumb;
                if (!byPlate[p] || s.EstimateTime < byPlate[p].EstimateTime) byPlate[p] = s;
            }
        });
        const busAt = {};
        Object.values(byPlate).forEach(r => { busAt[r.StopID] = r.PlateNumb; });

        const rows = stops.map(st => {
            const eta = dir.etaByStop[st.id] || {};
            const [label, cls] = timePill(eta);
            const plate = busAt[st.id];
            return `<div class="rstop${plate ? ' here' : ''}${st.seq === activeRouteSeq ? ' active' : ''}" data-seq="${st.seq}" onclick="openStopPage(${st.seq})" title="看此站各路線到站">
                <div class="rtime ${cls}">${TXT(label)}</div>
                <div class="rseq" onclick="event.stopPropagation(); tapRouteSeq(${st.seq})" title="在地圖上定位此站"><span class="rseq-num">${st.seq}</span></div>
                <div class="rstop-body">
                    <span class="rstop-name">${TXT(st.name)}</span>
                    ${plate ? `<span class="rbus">🚌 ${TXT(plate)}</span>` : ''}
                </div>
                <span class="rsignal" title="即時動態"></span>
            </div>`;
        }).join('');

        $list.innerHTML =
            `<div class="rhead">
                <button class="rback" onclick="clearRoute(true)" title="返回附近站牌">‹</button>
                <div class="rhead-main"><div class="rhead-name">${TXT(name)}</div></div>
                <button class="rhead-map" onclick="toggleRouteMap()" title="地圖／清單切換">🗺️</button>
            </div>
            <div class="rdir">
                <button class="rdir-btn ${routeDir === 0 ? 'on' : ''}" onclick="setRouteDir(0)" ${has0 ? '' : 'disabled'}><span class="rdir-txt">往 ${TXT(dest0 || '去程')}</span>${nBus0 ? `<span class="rdir-live" title="此方向有 ${nBus0} 台即時公車">🚌 ${nBus0}</span>` : ''}</button>
                <button class="rdir-btn ${routeDir === 1 ? 'on' : ''}" onclick="setRouteDir(1)" ${has1 ? '' : 'disabled'}><span class="rdir-txt">往 ${TXT(dest1 || '返程')}</span>${nBus1 ? `<span class="rdir-live" title="此方向有 ${nBus1} 台即時公車">🚌 ${nBus1}</span>` : ''}</button>
            </div>
            <div class="rstops">${rows || '<div class="arr-loading">此方向目前無資料</div>'}</div>
            <div class="arr-foot"><span>🔄 每 20 秒自動更新</span><span>更新 ${nowStr()}</span></div>`;
        if (keepScroll) $list.scrollTop = prevScroll;   // 刷新後還原捲動位置，避免彈回頂端
    }
    function setRouteDir(d) { routeDir = d; activeRouteSeq = null; renderRoute(true); }

    function drawRouteFallback(name) {
        const pts = [];
        stations.forEach(s => {
            if (s.routes.includes(name)) {
                const mk = stnMarkers.get(s.uid);
                const el = mk && mk.getElement() && mk.getElement().querySelector('.stn-marker');
                if (el) el.classList.add('onroute');
                pts.push([s.lat, s.lon]);
            }
        });
        const link = 'https://citybus.taichung.gov.tw/ebus/route-map/' + encodeURIComponent(name);
        $rbInfo.innerHTML = `附近經過 ${pts.length} 站 · <a href="${link}" target="_blank" rel="noopener" style="color:#5eead4;text-decoration:underline;">官方路線圖</a>`;
        if (pts.length) map.fitBounds(pts, { padding: [60, 60], maxZoom: 16 });
        else toast('附近沒有此路線的站點');
    }

    // 點「路線號」→ selectRoute（arr-route 用 inline onclick，卡片/清單皆可）
    document.getElementById('routeBarClose').addEventListener('click', () => clearRoute(true));

    // 回傳 [顯示文字, 顏色class, 排序用秒數]
    function badge(rec) {
        const st = rec.StopStatus;
        if (st === 2) return ['交管不停靠', '', Infinity];
        if (st === 3) return ['末班已過', '', Infinity];
        if (st === 4) return ['今日未營運', '', Infinity];
        const et = rec.EstimateTime;
        if (et !== undefined && et !== null) {
            if (et < 60) return ['進站中', 'now', et];
            const m = Math.floor(et / 60);
            return [m + ' 分', m <= 3 ? 'soon' : 'ok', et];
        }
        // 沒有即時估時 → 用時刻表推估的下一班
        if (rec.NextBusTime) {
            const t = Date.parse(String(rec.NextBusTime).replace(/\//g, '-'));
            if (!isNaN(t)) {
                const m = Math.round((t - Date.now()) / 60000);
                if (m > 0 && m <= 120) return ['約 ' + m + ' 分', 'sched', t / 1000];
            }
            return ['預估 ' + hhmm(rec.NextBusTime), 'sched', Infinity];
        }
        return ['尚未發車', '', Infinity];
    }
    function hhmm(s) {
        const m = String(s).match(/(\d{2}):(\d{2})/);
        return m ? m[1] + ':' + m[2] : s;
    }

    function nowStr() {
        return new Date().toLocaleTimeString('zh-TW', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }
    // 全市路線 → 各方向終點名（打一次快取；用來標「往 ○○」方向）
    let routeDestMap = null, routeDestPromise = null;
    function ensureRouteDests() {
        if (routeDestMap) return Promise.resolve(routeDestMap);
        if (routeDestPromise) return routeDestPromise;
        routeDestPromise = (async () => {
            const map = {};
            try {
                const arr = await tdxFetch('Bus/Route/City/Taichung');
                (arr || []).forEach(r => {
                    const n = r.RouteName && r.RouteName.Zh_tw;
                    if (n && !map[n]) map[n] = { dest: r.DestinationStopNameZh || '', dep: r.DepartureStopNameZh || '' };
                });
            } catch (e) { /* 拿不到就退化成 去/返程 */ }
            routeDestMap = map;
            return map;
        })();
        return routeDestPromise;
    }
    // TDX：Direction 0=去程(往 終點)、1=返程(往 起點)
    function dirLabel(routeName, direction) {
        const m = routeDestMap && routeDestMap[routeName];
        if (!m) return direction === 1 ? '返程' : '去程';
        const to = direction === 1 ? m.dep : m.dest;
        return to ? '往 ' + to : (direction === 1 ? '返程' : '去程');
    }

    // 到站列表內容（表頭 + 各路線），清單與地圖卡片共用
    function arrivalsInner(recs) {
        if (!recs.length) return '<div class="arr-loading">此站目前沒有路線動態資訊</div>';
        const items = recs.map(r => {
            const [label, cls, sortKey] = badge(r);
            return { label, cls, sortKey,
                route: (r.RouteName && r.RouteName.Zh_tw) || r.RouteID || '',
                plate: r.PlateNumb || '', dir: r.Direction };
        }).sort((a, b) => a.sortKey - b.sortKey);   // 快到的排前面
        const rows = items.map(it => {
            const veh = it.plate
                ? `<span class="arr-plate" title="這台公車的車牌">🚍 ${TXT(it.plate)}</span>`
                : `<span class="arr-dir">尚無車輛</span>`;
            return `<div class="arr-row">
                <span class="arr-route" data-route="${TXT(it.route)}" onclick="selectRoute(this.dataset.route)" title="點我在地圖畫出這條路線">${TXT(it.route)}</span>
                <div class="arr-mid">
                    <span class="arr-to" title="行駛方向">${TXT(dirLabel(it.route, it.dir))}</span>
                    ${veh}
                </div>
                <span class="arr-badge ${it.cls}">${TXT(it.label)}</span>
            </div>`;
        }).join('');
        return `<div class="arr-hd"><span class="h-route">路線</span><span class="h-mid">往哪 · 車輛</span><span>還有多久到</span></div>` + rows;
    }
    // 地圖上的小名牌(只標示點到哪一站；到站資訊在右側清單卡，避免重複)
    function cardCompact(s) {
        return `<div class="bpop">
            <div class="bpop-hd">
                <div class="bpop-name">${TXT(s.name)}</div>
                <div class="bpop-meta"><span>📍 ${fmtDist(s.dist)} · 🚶 ${walkMin(s.dist)} 分</span>${s.bearing ? `<span>${TXT(bearingZh(s.bearing))}方</span>` : ''}<span>${s.routes.length} 條路線</span></div>
            </div>
        </div>`;
    }

    function cssEsc(s) { return String(s).replace(/["\\]/g, '\\$&'); }

    // ── Geolocation ──
    function locate(initial) {
        if (!navigator.geolocation) { toast('此裝置不支援定位，請拖曳地圖後「搜尋此區域」'); fallbackNoGps(); return; }
        setStatus('定位中…', 'load');
        $locate.classList.add('spinning');
        navigator.geolocation.getCurrentPosition(
            pos => {
                $locate.classList.remove('spinning');
                const { latitude: lat, longitude: lon, accuracy } = pos.coords;
                setMe(lat, lon, accuracy);
                map.setView([lat, lon], 16);
                queryArea(lat, lon, { fresh: true });
            },
            err => {
                $locate.classList.remove('spinning');
                console.warn(err);
                const msg = err.code === 1 ? '定位權限被拒' : err.code === 3 ? '定位逾時' : '定位失敗';
                setStatus(msg, 'err');
                if (err.code === 1) toast('定位被拒：請允許定位權限，或用上方「地址搜尋」／拖曳地圖後「搜尋此區域」');
                else toast(msg + '：可用地址搜尋或拖曳地圖後「搜尋此區域」');
                if (initial) fallbackNoGps();
                else $searchHere.hidden = false;
            },
            { enableHighAccuracy: true, timeout: 10000, maximumAge: 30000 }
        );
    }
    function fallbackNoGps() {
        // 沒有定位 → 以台中市中心查一次，並開放「搜尋此區域」
        queryArea(TC_CENTER[0], TC_CENTER[1], { fresh: true });
        $searchHere.hidden = false;
    }

    // ── Events ──
    $locate.addEventListener('click', () => locate(false));
    $refresh.addEventListener('click', () => {
        if (bikeMode) { bikeAvail = null; loadBikes(); return; }
        if (queryCenter) queryArea(queryCenter.lat, queryCenter.lon, { fresh: false });
        else locate(false);
    });
    $radius.addEventListener('change', () => {
        if (bikeMode) { loadBikes(); return; }
        if (queryCenter) queryArea(queryCenter.lat, queryCenter.lon, { fresh: true });
    });
    $searchHere.addEventListener('click', () => {
        const c = map.getCenter();
        if (bikeMode) { queryCenter = { lat: c.lat, lon: c.lng }; bikeAvail = null; activeBikeIdx = -1; loadBikes(); $searchHere.hidden = true; return; }
        queryArea(c.lat, c.lng, { fresh: true });
    });
    // 依目前地圖視野推算查詢半徑(取畫面短邊的一半，300~1500m)
    function viewportRadius() {
        const c = map.getCenter(), ne = map.getBounds().getNorthEast();
        const halfH = haversine(c.lat, c.lng, ne.lat, c.lng);
        const halfW = haversine(c.lat, c.lng, c.lat, ne.lng);
        return Math.round(Math.min(1500, Math.max(300, Math.min(halfH, halfW))));
    }
    // 移動/縮放地圖 → 自動抓取畫面內的站牌(取代手動「搜尋此區域」)
    let autoFetchTimer = null;
    map.on('moveend', () => {
        clearTimeout(autoFetchTimer);
        autoFetchTimer = setTimeout(() => {
            if (document.body.classList.contains('route-mode') || stnPage) return;   // 路線/站牌詳情中不打擾
            const c = map.getCenter();
            if (bikeMode) { queryCenter = { lat: c.lat, lon: c.lng }; activeBikeIdx = -1; loadBikes(); return; }
            if (!queryCenter) return;
            const moved = haversine(queryCenter.lat, queryCenter.lon, c.lat, c.lng);
            const vr = viewportRadius();
            if (moved < queryRadius * 0.4 && Math.abs(vr - queryRadius) < queryRadius * 0.5) return;   // 視野沒明顯變 → 不重抓
            if (activeUID) { $searchHere.hidden = false; return; }   // 正在看某站卡片 → 不打斷，留手動鈕
            queryArea(c.lat, c.lng, { fresh: false, radius: vr });
        }, 650);
    });

    // ── 全螢幕大地圖（純 CSS 沉浸模式，iOS 也可用；並嘗試真正 Fullscreen） ──
    const $fsBtn = document.getElementById('fsBtn');
    const $fsBar = document.getElementById('fsBar');
    function setImmersive(on) {
        document.body.classList.toggle('immersive', on);
        $fsBar.hidden = !on;
        if (!on) document.body.classList.remove('show-list');
        // Leaflet 需在容器改變大小後重算
        setTimeout(() => map.invalidateSize(), 280);
    }
    $fsBtn.addEventListener('click', () => {
        const on = !document.body.classList.contains('immersive');
        setImmersive(on);
        try {
            if (on) {
                const el = document.documentElement;
                (el.requestFullscreen || el.webkitRequestFullscreen || function(){}).call(el);
            } else if (document.fullscreenElement || document.webkitFullscreenElement) {
                (document.exitFullscreen || document.webkitExitFullscreen).call(document);
            }
        } catch (e) { /* iframe 或 iOS 不支援 → CSS 沉浸模式仍生效 */ }
    });
    document.getElementById('fsExit').addEventListener('click', () => {
        setImmersive(false);
        try { if (document.fullscreenElement) document.exitFullscreen(); } catch (e) {}
    });
    document.getElementById('fsListToggle').addEventListener('click', () => document.body.classList.toggle('show-list'));
    document.getElementById('fsLocate2').addEventListener('click', () => locate(false));
    // 沉浸模式下點清單標題列 = 拉起／收合抽屜
    document.querySelector('.list-head').addEventListener('click', () => {
        if (document.body.classList.contains('immersive')) document.body.classList.toggle('show-list');
    });
    document.addEventListener('fullscreenchange', () => setTimeout(() => map.invalidateSize(), 200));

    // ── 手機版底部面板：三段式(收合/半屏/全屏)。桌機這些 class 不生效 ──
    const SHEET_ORDER = { peek: 0, half: 1, full: 2 };
    function setSheet(state) {
        document.body.classList.remove('m-peek', 'm-half', 'm-full');
        document.body.classList.add('m-' + state);
    }
    function sheetState() {
        return document.body.classList.contains('m-full') ? 'full'
             : document.body.classList.contains('m-peek') ? 'peek' : 'half';
    }
    function raiseSheet(min) {   // 只往上拉、不會把已展開的收下去
        if (SHEET_ORDER[sheetState()] < SHEET_ORDER[min]) setSheet(min);
    }
    setSheet('half');   // 預設半屏
    // 點把手：收合 → 半屏 → 全屏 → 收合
    document.getElementById('sheetGrip').addEventListener('click', () => {
        const s = sheetState();
        setSheet(s === 'peek' ? 'half' : s === 'half' ? 'full' : 'peek');
    });
    // 頂部進度條：每次資料刷新後重跑 20 秒 → 跑滿＝下次刷新
    function pulseRefreshBar() {
        const b = document.getElementById('refreshBar');
        if (!b) return;
        b.classList.remove('run'); void b.offsetWidth; b.classList.add('run');
    }
    window.pulseRefreshBar = pulseRefreshBar;
    pulseRefreshBar();

    // ── Address search (OpenStreetMap Nominatim, 免金鑰) ──
    const $addr   = document.getElementById('addrInput');
    const $addrGo = document.getElementById('addrGo');
    async function gotoAddress() {
        const q = $addr.value.trim();
        if (!q) { $addr.focus(); return; }
        $addrGo.disabled = true;
        setStatus('搜尋地址中…', 'load');
        try {
            const url = 'https://nominatim.openstreetmap.org/search?format=jsonv2&limit=1'
                      + '&countrycodes=tw&accept-language=zh-TW&q=' + encodeURIComponent(q);
            const r = await fetch(url, { headers: { Accept: 'application/json' } });
            const j = await r.json();
            if (!Array.isArray(j) || !j.length) { toast('找不到「' + q + '」，換個關鍵字試試'); setStatus('查無此地址', 'err'); return; }
            const lat = +j[0].lat, lon = +j[0].lon;
            map.setView([lat, lon], 16);
            queryArea(lat, lon, { fresh: true });
            const label = String(j[0].display_name || q).split(',').slice(0, 2).join('，');
            toast('📍 已前往：' + label);
        } catch (e) {
            console.error(e);
            toast('地址搜尋失敗，請稍後再試');
            setStatus('地址搜尋失敗', 'err');
        } finally {
            $addrGo.disabled = false;
        }
    }
    $addrGo.addEventListener('click', gotoAddress);
    $addr.addEventListener('keydown', e => { if (e.key === 'Enter') gotoAddress(); });

    // ── Boot ──
    locate(true);
    </script>
</body>
</html>
