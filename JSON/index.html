<!DOCTYPE html>
<html lang="en" ng-app="jsonSql">
  <head>
    <title>JSON SQL Online</title>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Latest compiled and minified CSS -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/bootstrap-overrides.css">
    <link rel="stylesheet" href="css/bootstrap-treeview.min.css">
    <link rel="stylesheet" href="css/json-formatter.min.css">
  </head>
  <body ng-controller="NavCtrl">
    <nav class="navbar navbar-default navbar-fixed-top">
      <div class="container-fluid">
        <!-- Brand and toggle get grouped for better mobile display -->
        <div class="navbar-header">
          <button type="button" class="navbar-toggle collapsed" data-toggle="collapse" 
                  data-target="#bs-example-navbar-collapse-1" aria-expanded="false">
            <span class="sr-only">Toggle navigation</span>
            <span class="icon-bar"></span>
            <span class="icon-bar"></span>
            <span class="icon-bar"></span>
          </button>
          <a class="navbar-brand" href="" ng-click="loadIndex()">JSON SQL Online</a>
        </div>

        <!-- Collect the nav links, forms, and other content for toggling -->
        <div class="collapse navbar-collapse" id="bs-example-navbar-collapse-1">
          <ul class="nav navbar-nav">
            <li>
              <a href="" ng-click="loadDocs()">
                Docs <span class="sr-only">(current)</span>
              </a>
            </li>
          </ul>
        </div><!-- /.navbar-collapse -->
      </div><!-- /.container-fluid -->
    </nav>
    <br/>
    <div class="container" ng-view></div>  
    </br> 
    <!-- jQuery (necessary for Bootstrap's JavaScript plugins) -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.1/jquery.min.js"></script>
    <!-- Latest compiled and minified JavaScript -->
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.0/js/bootstrap.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.3.2/angular.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.3.2/angular-route.min.js"></script>
    <script src="lib/uscore.js"></script>
    <script src="lib/esprima.js"></script>
    <script src="lib/controllers.js"></script>
    <script src="lib/app.js"></script>
    <script src="lib/jsonsql.js"></script>
    <script src="lib/sampleJSON.js"></script>
    <script src="lib/bootstrap-treeview.min.js"></script>
    <script src="lib/json-formatter.min.js"></script>
    <script src="lib/xlsx.full.min.js"></script>

    <!-- Inline templates to avoid CORS errors when opened via file:// -->
    <script type="text/ng-template" id="partials/createDB.html">
<div class="jumbotron">
  <h2>JSON SQL Online</h2>
  <p>Query JSON Objects using sql like syntax</p>
</div>
<div class="row" ng-controller="CreateDBCtrl">
  <div class="col-md-12">
    <br/>
    <form name="jsonForm" ng-submit="createDB()" class="css-form" novalidate>
      <textarea rows="20" class="txt-area" placeholder="Paste JSON" ng-model="jsonData" name="jsonData" jsonvalidate>
        {{jsonData}}
      </textarea>
      <br/>
      <span ng-show="jsonForm.jsonData.$error.json">Please enter a valid JSON String</span>
      <br/>
      <button type="submit" class="btn btn-default" ng-disabled="form.$invalid || emptyInput()">
        Query JSON
      </button>
      <a class="btn btn-default" ng-click="loadSample()">
        Load example
      </a>
    </form>
  </div>
</div>
    </script>

    <script type="text/ng-template" id="partials/queryDB.html">
<div ng-controller="QueryDBCtrl">
  <div class="row" >
    <div class="col-md-3">
        <div class="jsonTree"></div>
    </div>
    <div class="col-md-9">
      <div class = "row">
        <div class = "col-md-12">
          <form name="queryForm" ng-submit="queryDB()" class="css-form form-horizontal" role="form" novalidate>
            <div class="form-group">
              <label for="columns" class="col-md-2 control-label">SELECT &nbsp;<a href="#" data-toggle="tooltip" title="SELECT clause states the columns of the tables"><span class="glyphicon glyphicon-question-sign"></span></a></label>
              <div class="col-md-10">
                <input class="form-control" id="columns" ng-model="columns"/>
              </div>
            </div>
            <div class="form-group">
              <label for="table" class="col-md-2 control-label">FROM &nbsp; <a href="#" data-toggle="tooltip" title="Specify which object to query from"><span class="glyphicon glyphicon-question-sign"></span></a></label>
              <div class="col-md-10">
                <input class="form-control" id="table" placeholder="Enter.valid.json.path" ng-model="table"/>
              </div>
            </div>
            <div class="form-group">
              <label for="table" class="col-md-2 control-label">WHERE &nbsp;<a href="#" data-toggle="tooltip" title="WHERE clause serves to filter results in a table"><span class="glyphicon glyphicon-question-sign"></span></a></label>
              <div class="col-md-10">
                <textarea class="form-control" id="whereClause" placeholder="Javascript conditions"
                ng-model="whereClause" rows="8"></textarea>
              </div>
            </div>
            <div class="form-group">
              <div class="col-md-offset-2 col-md-2">
                <button type="submit" class="btn btn-default">Run Query</button>
              </div>
              <div class="col-md-3">
                <a class="btn btn-default" ng-click="populateFrom()">Use Selected Node in From</a>
              </div>
              <div class="col-md-3">
                <a class="btn btn-default" ng-click="populateSelect()">Use Selected Node in Select</a>
              </div>
            </div>
          </form>
        </div>
      </div>
      <div class="row" >
        <div class="col-md-6">
          <label class="control-label">QUERY RESULTS:</label>
          </br><label class="control-label">Number of Rows: {{queryResult.length}}</label></br>
          <div class="alert alert-danger" ng-show="!checkValidTable() || !checkValidColumns()|| !checkValidWhereClause()">
            <span ng-show="!checkValidTable()">JSON path for table is invalid</span>
            <span ng-show="!checkValidColumns()">Column names are invalid</span>
            <span ng-show="!checkValidWhereClause()">Javascript in where clause is invalid</span>
            <br/>
          </div>
        </div>
        <div class="col-md-2">
          <button ng-click="excelFile()" class="btn btn-default" ng-if="queryResult"><span class="glyphicon glyphicon-save"></span> Download XLSX</button>
        </div>
        <div class="col-md-2">
          <button ng-click="csvFile()" class="btn btn-default" ng-if="queryResult"><span class="glyphicon glyphicon-save"></span> Download CSV</button>
        </div>
        <div class="col-md-2">
          <button ng-click="jsonFile()" class="btn btn-default" ng-if="queryResult"><span class="glyphicon glyphicon-save"></span> Download JSON</button>
        </div>
      </div>
      <div class="row">
        <div class="col-md-12">
          <table class="table table-bordered" ng-if="queryResult" id="mytab">
            <thead>
              <tr>
                <th ng-repeat="header in columnNames">
                  {{header}}
                  <span ng-class="reverse ? 'glyphicon glyphicon-chevron-up' : 'glyphicon glyphicon-chevron-down'" ng-click="reverse=!reverse;order(header, reverse)"></span>
                </th>
              </tr>
            </thead>
            <tr ng-repeat="row in queryResult | orderBy:predicate:reverse">
              <td ng-repeat="key in columnNames">{{row[key]}}</td>
            </tr>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
    </script>

    <script type="text/ng-template" id="partials/docs.html">
<div ng-controller="DocsCtrl">
  <div class="row">
    <div>
      <div class="col-md-3">
        <ul class="nav nav-pills nav-stacked" role="tablist" id="docsTab">
          <li role="presentation" class="active">
            <a show-tab href="#intro" aria-controls="intro" role="tab" data-toggle="tab">Introduction</a>
          </li>
          <li role="presentation">
            <a show-tab href="#simplequery" aria-controls="simplequery" role="tab" data-toggle="tab">Simple query</a>
          </li>
          <li role="presentation">
            <a show-tab href="#querynested" aria-controls="querynested" role="tab" data-toggle="tab">Query nested objects</a>
          </li>
          <li role="presentation">
            <a show-tab href="#selectnested" aria-controls="selectnested" role="tab" data-toggle="tab">Select nested keys</a>
          </li>
          <li role="presentation">
            <a show-tab href="#whereclause" aria-controls="whereclause" role="tab" data-toggle="tab">The where clause</a>
          </li>
          <li role="presentation">
            <a show-tab href="#treeview" aria-controls="treeview" role="tab" data-toggle="tab">Using the tree view</a>
          </li>
        </ul>
      </div>
      <div class="tab-content col-md-9">
        <div role="tabpanel" class="tab-pane active well" id="intro">
          <h3>Example JSON</h3>
          <p>Users can experiment with the sample json object that can be accessed by clicking the <code>Load Example</code> button on the home page.</p>
          <json-formatter json='sampleJSON' open="8" ></json-formatter>
          <h3>Introduction</h3>
          <p>This tool treats a javascript objects as table and provides features to query it using a sql-like syntax.</p>
          <h3>FROM Clause</h3>
          <p>By convention the FROM clause states the table to be queried. <br/>Specify which object to query from. If we wanted to query FROM the sample JSON, we could specify '<code>country</code>' in the FROM clause.</p>
          <h3>SELECT Clause</h3>
          <p>If a javascript object is your table, the various keys in the object serve as its columns. Entering '<code>*</code>' will select all the keys.</p>
          <h3>WHERE Clause</h3>
          <p>WHERE clause serves to filter results. A user is expected to provide a javascript expression that evaluates to a boolean.</p>
        </div>
        <div role="tabpanel" class="tab-pane" id="simplequery">
          <div class="well">
            <json-formatter json='sampleJSON' open="8" ></json-formatter>
            <h3>Select all columns</h3>
            <p><code>select * <br/> from country</code></p>
            <h3>Select specific columns</h3>
            <p><code>select name, capital <br/> from country</code></p>
          </div>
          <p class="bg-warning">All the values in the SELECT and FROM clauses are case sensitive</p>
        </div>
        <div role="tabpanel" class="tab-pane" id="querynested">
          <div class="well">
            <json-formatter json='sampleJSON' open="8" ></json-formatter>
            <h3>Query only the first object in the array</h3>
            <p><code>select * <br/> from country.0</code></p>
            <h3>Querying using valid json paths</h3>
            <p><code>select * <br/> from country.0.dignitaries</code></p>
          </div>
          <p class="bg-warning">All the values in the SELECT and FROM clauses are case sensitive</p>
        </div>
        <div role="tabpanel" class="tab-pane" id="selectnested">
          <div class="well">
            <json-formatter json='sampleJSON' open="8" ></json-formatter>
            <h3>Selecting nested properties</h3>
            <p><code>select dignitaries.president <br/> from country</code></p>
          </div>
          <p class="bg-warning">All the values in the SELECT and FROM clauses are case sensitive</p>
        </div>
        <div role="tabpanel" class="tab-pane" id="whereclause">
          <div class="well">
            <json-formatter json='sampleJSON' open="8" ></json-formatter>
            <h3>WHERE clause to filter</h3>
            <p><code>select * <br/> from country <br/> where this.name === 'India'</code></p>
          </div>
          <p class="bg-warning">All the values in the SELECT and FROM clauses are case sensitive</p>
        </div>
        <div role="tabpanel" class="tab-pane" id="treeview">
          <div class="well">
            <h3>Using the tree view to fetch JSON paths.</h3>
            <p>Users can select a node by clicking on it, then use the <code>Use Selected Node in From</code> or <code>Use Selected Node in Select</code> buttons.</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
    </script>
  </body>
</html>
