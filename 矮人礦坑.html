/* ============================================================
   連線層：沿用 bomb-signal Cloudflare Worker（WebSocket 房間中轉，
   每房 4 人）。房號加 sab- 前綴避免與炸彈人房間互撞。
   主機權威：所有規則在房主端跑，client 只送出手、收快照。
   ============================================================ */
const NET = (() => {
'use strict';
const WORKER_URL = 'wss://bomb-signal.54maxwu.workers.dev';
const ROOM_PREFIX = 'sab-';

let ws=null, active=false, isHost=false, started=false;
let roomCode=null, myCid=null, seq=0, lastSeq=-1, lastPrivSeq=-1;
let cidSeat={}, seatInfo={};        // seatInfo[seat]={cid,name,lastSeen,keyP}
let hbTimer=null, watchTimer=null, reconTimer=null, hostSeen=0;
let needResync=false, hostKeyP=null, lostShown=false, myPubB64=null;

function openSignal(id){
  return new WebSocket(WORKER_URL.replace(/\/$/,'')+'/room/'+id);
}
function randomCode(){ const b=new Uint32Array(1); crypto.getRandomValues(b); return (100000+(b[0]%900000)).toString(); }
function send(o){ if(ws && ws.readyState===1){ o.g='sab'; try{ ws.send(JSON.stringify(o)); }catch(e){} } }
// 同一分頁固定 cid：重新整理／斷線重連時房主認得你，能把座位接回來
function persistentCid(){
  try{
    let c=sessionStorage.getItem('sab_cid');
    if(!c){ c='c'+Math.random().toString(36).slice(2,10); sessionStorage.setItem('sab_cid',c); }
    return c;
  }catch(e){ return 'c'+Math.random().toString(36).slice(2,10); }
}

/* ── 端對端加密（ECDH → AES-GCM）：priv（手牌/身分/地圖結果）經房間中轉
   是廣播給整房的，加密後其他玩家開 devtools 也讀不到；不支援時退回明文。── */
const CRY={
  supported: !!(window.crypto && crypto.subtle),
  keysP:null,
  init(){
    if(!this.supported) return Promise.resolve(null);
    if(!this.keysP) this.keysP=crypto.subtle.generateKey({name:'ECDH',namedCurve:'P-256'},false,['deriveKey'])
      .catch(()=>{ CRY.supported=false; return null; });
    return this.keysP;
  },
  async pubB64(){
    const ks=await this.init(); if(!ks) return undefined;
    return b64(await crypto.subtle.exportKey('raw', ks.publicKey));
  },
  async derive(peerB64){
    const ks=await this.init(); if(!ks) return null;
    const peer=await crypto.subtle.importKey('raw', unb64(peerB64), {name:'ECDH',namedCurve:'P-256'}, false, []);
    return crypto.subtle.deriveKey({name:'ECDH',public:peer}, ks.privateKey, {name:'AES-GCM',length:128}, false, ['encrypt','decrypt']);
  },
  async enc(key,obj){
    const iv=crypto.getRandomValues(new Uint8Array(12));
    const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv}, key, new TextEncoder().encode(JSON.stringify(obj)));
    return { iv:b64(iv), ct:b64(ct) };
  },
  async dec(key,e){
    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:unb64(e.iv)}, key, unb64(e.ct));
    return JSON.parse(new TextDecoder().decode(pt));
  },
};
function b64(buf){ let s=''; const u=new Uint8Array(buf); for(let i=0;i<u.length;i++) s+=String.fromCharCode(u[i]); return btoa(s); }
function unb64(str){ const s=atob(str); const u=new Uint8Array(s.length); for(let i=0;i<s.length;i++) u[i]=s.charCodeAt(i); return u; }

function teardown(){
  active=false; started=false;
  clearInterval(hbTimer); clearInterval(watchTimer); clearTimeout(reconTimer); reconTimer=null;
  if(ws){ try{ ws.onopen=ws.onmessage=ws.onerror=ws.onclose=null; ws.close(); }catch(e){} }
  ws=null; cidSeat={}; seatInfo={}; seq=0; lastSeq=-1; lastPrivSeq=-1;
  needResync=false; hostKeyP=null; lostShown=false;
}

function connect(code, host){
  teardown();
  active=true; isHost=host; roomCode=code;
  if(!host) myCid=persistentCid();
  CRY.pubB64().then(p=>{ myPubB64=p; });
  hostSeen=Date.now();
  openWs();
  hbTimer=setInterval(()=>{
    if(!active || !ws || ws.readyState!==1) return;
    if(isHost) send({t:'hb'});
    else if(APP.my!=null) send({t:'hbc', cid:myCid});   // 開局前也送：大廳才能偵測默默離開的人
  },4000);
  watchTimer=setInterval(()=>{
    if(!active) return;
    if(isHost){ if(started) checkClients(); else pruneLobby(); }
    else checkHost();
  },5000);
}
function openWs(){
  if(ws){ try{ ws.onopen=ws.onmessage=ws.onerror=ws.onclose=null; ws.close(); }catch(e){} }
  ws=openSignal(ROOM_PREFIX+roomCode);
  ws.onopen=()=>{
    if(started){ setStatus(isHost?'重新連上訊號伺服器':'重新連上，同步中…','ok'); if(!isHost) needResync=true; }
    else setStatus(isHost?'房間已開，等待礦工…':'連線中…','busy');
    hail();
  };
  ws.onmessage=ev=>{
    let m; try{ m=JSON.parse(ev.data); }catch(e){ return; }
    if(m.type==='room-full'){ setStatus('房間已滿','err'); banner('房間已滿'); return; }
    if(m.type==='room-state'){ if(m.peerCount>0) hail(); return; }
    if(m.type==='peer-joined'){ hail(); return; }
    if(m.type==='peer-left'){ return; }   // 不帶身分，斷線靠心跳偵測
    if(m.g!=='sab') return;
    handleMsg(m);
  };
  ws.onerror=()=>{ if(active) setStatus('連線錯誤','err'); };
  ws.onclose=()=>{ if(!active) return; setStatus('連線中斷，重連中…','err'); scheduleReconnect(); };
}
function scheduleReconnect(){
  if(!active || reconTimer) return;
  reconTimer=setTimeout(()=>{ reconTimer=null; if(active && (!ws || ws.readyState>1)) openWs(); },1500);
}
// 回到前景：計時器被節流／頁面被凍結後，立即補心跳或重連
function onVisible(){
  if(!active) return;
  hostSeen=Date.now();                                  // 緩衝一下，別一回前景就判房主失聯
  if(!ws || ws.readyState>1){ clearTimeout(reconTimer); reconTimer=null; openWs(); return; }
  if(ws.readyState===1){
    if(!isHost && started) needResync=true;
    hail();
    if(isHost && started){ send({t:'hb'}); broadcast(); }
  }
}
function checkHost(){
  if(!started || lostShown) return;
  if(Date.now()-hostSeen>20000){
    lostShown=true;
    showModal({ title:'房主失聯', body:'超過 20 秒沒收到房主訊號。房主若只是暫時切出去，可以再等等看。',
      buttons:[{label:'再等 20 秒', primary:true, cb:()=>{ hostSeen=Date.now(); lostShown=false; }},
               {label:'返回大廳', warn:true, cb:leaveToLobby}] });
  }
}
function hail(){
  if(isHost) send({t:'host-here'});
  else if(APP.my==null || !started || needResync) send({t:'hello', cid:myCid, name:myName(), pub:myPubB64});
}

/* ── 房主端 ───────────────────────────────────────────────── */
function humanCap(){ return Math.min(3, npChoice()-1); }   // worker 每房 4 連線：房主+3 真人
function humanN(){ return Object.keys(seatInfo).length; }
function pruneLobby(){                                     // 開局前：默默離開的人釋出座位
  let changed=false;
  for(const s of Object.keys(seatInfo)){
    if(Date.now()-seatInfo[s].lastSeen>12000){
      delete cidSeat[seatInfo[s].cid]; delete seatInfo[s]; changed=true;
    }
  }
  if(changed){
    updateHostLobby();
    setStatus(humanN()?`已加入 ${humanN()}/${humanCap()} 位真人`:'房間已開，等待礦工…', humanN()?'ok':'busy');
  }
}
function welcome(cid, seat){ send({t:'welcome', cid, seat, pub:myPubB64}); }
// 開局後收到 hello＝重連：同 cid 直接接回；新 cid（換了分頁）比對名字認領已被電腦接手的座位
function reclaimSeat(m){
  if(!APP.G){ send({t:'roomfull', cid:m.cid}); return; }
  let seat=cidSeat[m.cid];
  if(seat==null){
    const nm=String(m.name||'').slice(0,10);
    for(let s=1;s<APP.G.nP;s++){
      const si=seatInfo[s];
      if(APP.G.players[s].ai && si && si.name===nm && Date.now()-si.lastSeen>8000){
        delete cidSeat[si.cid]; cidSeat[m.cid]=seat=s; si.cid=m.cid; break;
      }
    }
  }
  if(seat==null || !APP.G.players[seat]){ send({t:'roomfull', cid:m.cid}); return; }
  const si=seatInfo[seat] || (seatInfo[seat]={cid:m.cid, name:APP.G.players[seat].name, lastSeen:0});
  si.cid=m.cid; si.lastSeen=Date.now();
  if(m.pub && CRY.supported && myPubB64) si.keyP=CRY.derive(m.pub).catch(()=>null);
  const wasAI=APP.G.players[seat].ai;
  APP.G.players[seat].ai=false;
  welcome(m.cid, seat);
  send({t:'begin'});
  broadcast();          // 補上斷線期間錯過的狀態
  if(wasAI){
    scheduleAI();       // 取消可能已排定要幫這個座位出手的 AI 計時器
    addLog(`<span class="good">${esc(APP.G.players[seat].name)} 重新連線，接回座位</span>`);
    banner(APP.G.players[seat].name+' 重新連線');
    renderAll();
  }
}
function updateHostLobby(){
  const names=[myName()+'（你）'];
  for(let s=1;s<npChoice();s++) names.push(seatInfo[s]?seatInfo[s].name:(s<=humanCap()?'（等真人／電腦候補）':'（電腦）'));
  $('hostJoined').innerHTML=`目前座位（${npChoice()} 人局）：`+names.map((n,i)=>`<b>${i+1}.</b> ${esc(n)}`).join('　');
}
function checkClients(){
  if(!isHost || !started || !APP.G) return;
  let changed=false;
  for(let s=1;s<APP.G.nP;s++){
    const si=seatInfo[s];
    if(si && !APP.G.players[s].ai && Date.now()-si.lastSeen>15000){
      APP.G.players[s].ai=true; changed=true;
      addLog(`<span class="warn">${esc(APP.G.players[s].name)} 斷線，改由電腦接手</span>`);
      banner(APP.G.players[s].name+' 斷線，由電腦接手');
    }
  }
  if(changed){ broadcast(); scheduleAI(); renderAll(); }
}
function handleMsg(m){
  if(isHost){
    if(m.t==='hello'){
      if(started){ reclaimSeat(m); return; }
      let seat=cidSeat[m.cid];
      if(seat==null){
        for(let s=1;s<=humanCap();s++) if(!seatInfo[s]){ seat=s; break; }   // 用第一個空位（可回收）
        if(seat==null){ send({t:'roomfull', cid:m.cid}); return; }
        cidSeat[m.cid]=seat;
        seatInfo[seat]={cid:m.cid, name:(m.name||'礦工'+seat).slice(0,10), lastSeen:Date.now()};
      } else if(seatInfo[seat]){
        seatInfo[seat].lastSeen=Date.now();
        if(m.name) seatInfo[seat].name=String(m.name).slice(0,10);
      }
      if(m.pub && CRY.supported && myPubB64) seatInfo[seat].keyP=CRY.derive(m.pub).catch(()=>null);
      welcome(m.cid, seat);
      updateHostLobby();
      setStatus(`已加入 ${humanN()}/${humanCap()} 位真人`,'ok');
      if(humanN()>=humanCap()) startOnline();
      return;
    }
    if(m.t==='hbc'){ const s=cidSeat[m.cid]; if(s!=null&&seatInfo[s]) seatInfo[s].lastSeen=Date.now(); return; }
    if(m.t==='act'){
      const s=cidSeat[m.cid];
      if(s==null || !APP.G || APP.G.phase!=='play' || APP.G.turn!==s) return;
      const mv=m.move||{};
      if(mv.uid!=null && mv.hi!=null){
        const hand=APP.G.players[s].hand;
        if(!hand[mv.hi] || hand[mv.hi].uid!==mv.uid){
          const fix=hand.findIndex(c=>c.uid===mv.uid);
          if(fix<0) return;
          mv.hi=fix;
        }
      }
      seatInfo[s] && (seatInfo[s].lastSeen=Date.now());
      doMove(s, mv);
      return;
    }
    if(m.t==='req-restart'){
      if(APP.G && APP.G.phase==='end'){ rebuildGame(); }
      return;
    }
  } else {
    if(m.t==='hb'){ hostSeen=Date.now(); return; }
    if(m.t==='welcome'){
      if(m.cid!==myCid) return;
      APP.my=m.seat; APP.mode='client';
      hostSeen=Date.now();
      if(m.pub && CRY.supported) hostKeyP=CRY.derive(m.pub).catch(()=>null);
      if(started) setStatus('已接回座位 '+(m.seat+1),'ok');
      else{
        setStatus('已入座 · 座位 '+(m.seat+1)+' · 等待開局…','ok');
        $('joinState').innerHTML=`✅ 已加入房間 <b>${esc(roomCode)}</b>，你是 <b>${m.seat+1} 號礦工</b>，等房主開始…`;
      }
      return;
    }
    if(m.t==='roomfull'){ if(m.cid===myCid){ setStatus('房間已滿','err'); $('joinState').textContent='❌ 房間已滿或已開局'; } return; }
    if(m.t==='begin'){
      started=true; hostSeen=Date.now();
      if($('game').hidden) enterGame();
      setStatus('連線對戰中','ok');
      return;
    }
    if(m.t==='pub'){
      hostSeen=Date.now(); lostShown=false; needResync=false;
      if(m.seq<=lastSeq) return;
      lastSeq=m.seq;
      started=true;
      if($('game').hidden) enterGame();
      if(m.evs && m.evs.length) narrate(m.evs, -1);
      applyPub(m.pub);
      return;
    }
    if(m.t==='priv'){
      if(m.cid!==myCid) return;
      hostSeen=Date.now();
      const apply=p=>{                       // 解密是非同步的，pseq 防止舊快照蓋掉新的
        if(m.pseq!=null){ if(m.pseq<=lastPrivSeq) return; lastPrivSeq=m.pseq; }
        applyPriv(p, m.round);
      };
      if(m.enc){ if(hostKeyP) hostKeyP.then(k=>k?CRY.dec(k,m.enc):null).then(p=>{ if(p) apply(p); }).catch(()=>{}); }
      else if(m.priv) apply(m.priv);
      return;
    }
  }
}

function startOnline(){
  if(started || !isHost) return;
  started=true;
  APP.mode='host'; APP.my=0;
  const n=npChoice();
  const names=[myName()], ai=[false];
  for(let s=1;s<n;s++){
    names.push(seatInfo[s] ? seatInfo[s].name : AI_NAMES[(s-1)%AI_NAMES.length]);
    ai.push(!seatInfo[s]);
  }
  APP.G=SAB.newGame(names, ai, (Math.random()*0xffffffff)>>>0);
  send({t:'begin'});
  enterGame();
  startRound();
  setStatus('連線對戰中（你是房主）','ok');
}

/* ── 廣播（房主）─────────────────────────────────────────── */
function sanitizeEvents(events){
  return (events||[]).map(e=>{
    if(e.ev==='map') return { ev:'map', seat:e.seat, goal:e.goal };  // 不外洩偷看結果
    if(e.ev==='roundEnd') return { ev:'roundEnd' };
    return e;
  });
}
function broadcast(events){
  if(!isHost || !ws || !APP.G) return;
  seq++;
  const pub=SAB.pubState(APP.G);
  send({t:'pub', seq, pub, evs:sanitizeEvents(events)});
  const pseq=seq, rnd=APP.G.round;
  for(let s=1;s<APP.G.nP;s++){
    const si=seatInfo[s];
    if(!si || APP.G.players[s].ai) continue;
    const priv=SAB.privState(APP.G, s);
    if(si.keyP){
      si.keyP.then(k=> k ? CRY.enc(k, priv).then(enc=>send({t:'priv', cid:si.cid, round:rnd, pseq, enc}))
                         : send({t:'priv', cid:si.cid, round:rnd, pseq, priv})).catch(()=>{});
    } else send({t:'priv', cid:si.cid, round:rnd, pseq, priv});
  }
}
function sendAct(move){ send({t:'act', cid:myCid, move}); }

/* ── 大廳按鈕 ─────────────────────────────────────────────── */
$('hostBtn').addEventListener('click',()=>{
  const code=randomCode();
  $('hostCode').value=code;
  $('copyBtn').hidden=false;
  $('hostWait').hidden=false;
  APP.mode='host'; APP.my=0;
  connect(code, true);
  updateHostLobby();
});
$('copyBtn').addEventListener('click',()=>{
  const code=$('hostCode').value;
  const done=()=>banner('已複製房號 '+code);
  if(navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(code).then(done,()=>{});
  else { $('hostCode').select(); try{ document.execCommand('copy'); done(); }catch(e){} }
});
$('hostStart').addEventListener('click',()=>{
  if(!active){ banner('請先建立房間'); return; }
  startOnline();
});
$('joinBtn').addEventListener('click',()=>{
  const code=($('joinCode').value||'').trim();
  if(!/^\d{6}$/.test(code)){ banner('請輸入 6 位數房號'); return; }
  $('joinState').textContent='連線中…';
  APP.mode='client'; APP.my=null;
  connect(code, false);
});

return { connect, teardown, broadcast, sendAct, onVisible,
         get isHost(){return isHost;}, get started(){return started;},
         reqRestart(){ send({t:'req-restart'}); }, refreshLobby(){ if(isHost && !started) updateHostLobby(); } };
})();

/* 回前景：計時器被節流／頁面被凍結後補心跳或重連，並重新取得螢幕常亮 */
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState!=='visible') return;
  if(!$('game').hidden) keepAwake(true);
  NET.onVisible();
});

/* 測試便利：?auto=1 自動開單機局、?auto=g 開圖鑑（截圖/煙霧測試用） */
(function(){
  const a=new URLSearchParams(location.search).get('auto');
  if(a==='1'){
    setTimeout(()=>{ $('startLocal').click(); },150);
    setTimeout(()=>{ const b=document.querySelector('#mbtns .abtn'); if(b) b.click(); },900);
  } else if(a==='g'){
    setTimeout(()=>{ $('btnGallery').click(); },200);
  }
})();
