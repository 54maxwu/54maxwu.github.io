<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>本地修圖工具</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    [hidden] { display: none !important; }

    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', sans-serif;
        background: #f1f5f9;
        color: #2c3e50;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    .app-header {
        background: #fff;
        border-bottom: 1px solid #e2e8f0;
        padding: 14px 24px;
        min-height: 60px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-shadow: 0 1px 3px rgba(0,0,0,.06);
        z-index: 10;
        gap: 14px;
        flex-wrap: wrap;
    }
    .app-header h1 { font-size: 16px; font-weight: 600; color: #1e293b; letter-spacing: .02em; }
    .header-meta { display: flex; align-items: center; gap: 10px; }
    .header-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

    .status-pill {
        display: inline-flex; align-items: center; gap: 6px;
        font-size: 11px; padding: 4px 10px; border-radius: 999px;
        border: 1px solid #e2e8f0; background: #f8fafc; color: #64748b;
        font-weight: 600; white-space: nowrap;
        transition: background-color .2s, color .2s, border-color .2s;
    }
    .status-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    .status-pill.idle { color: #64748b; }
    .status-pill.busy { color: #b45309; background: #fffbeb; border-color: #fde68a; }
    .status-pill.busy .dot { animation: pulse 1s infinite ease-in-out; }
    .status-pill.ok   { color: #15803d; background: #ecfdf5; border-color: #bbf7d0; }
    .status-pill.err  { color: #b91c1c; background: #fef2f2; border-color: #fecaca; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }

    .page-content { padding: 12px 20px 20px; max-width: 1400px; margin: 0 auto; width: 100%; flex: 1; min-height: 0; display: flex; }

    .glass {
        position: relative; border-radius: 14px;
        backdrop-filter: blur(8px);
        background-color: rgba(255,255,255,0.55);
        box-shadow: rgba(0,0,0,0.10) 2px 8px 20px;
        border: 1.5px solid rgba(255,255,255,0.7);
        border-bottom: 1.5px solid rgba(40,40,40,0.15);
        border-right: 1.5px solid rgba(40,40,40,0.15);
        padding: 16px;
        flex: 1; min-height: 0;
        display: flex; gap: 16px;
    }

    /* ── Editor split ── */
    .stage {
        flex: 1; min-width: 0; min-height: 0;
        background:
            repeating-conic-gradient(#e9eef5 0% 25%, #f6f8fb 0% 50%) 50% / 22px 22px;
        border: 1.5px solid #e2e8f0; border-radius: 12px;
        position: relative; overflow: hidden;
        display: flex; align-items: center; justify-content: center;
    }
    #glcanvas { max-width: 100%; max-height: 100%; display: none; box-shadow: 0 4px 18px rgba(0,0,0,.18); }
    #glcanvas.ready { display: block; }
    .stage.picking #glcanvas { cursor: crosshair; }

    .dropzone {
        position: absolute; inset: 0;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 14px; text-align: center; color: #64748b; padding: 24px;
    }
    .dropzone.hide { display: none; }
    .dropzone .big { font-size: 44px; }
    .dropzone h2 { font-size: 15px; color: #334155; font-weight: 700; }
    .dropzone p { font-size: 12.5px; line-height: 1.6; }
    .stage.dragover { outline: 3px dashed #14b8a6; outline-offset: -8px; background-color: rgba(20,184,166,.05); }

    /* crop overlay */
    #cropLayer { position: absolute; inset: 0; display: none; }
    #cropLayer.on { display: block; }
    .crop-rect {
        position: absolute; border: 1px solid #fff;
        box-shadow: 0 0 0 1px rgba(0,0,0,.5), 0 0 0 9999px rgba(0,0,0,.45);
        cursor: move;
    }
    .crop-rect::before, .crop-rect::after,
    .crop-rect .gv::before, .crop-rect .gv::after {
        content: ''; position: absolute; background: rgba(255,255,255,.55);
    }
    .crop-rect::before { left: 33.33%; top: 0; bottom: 0; width: 1px; }
    .crop-rect::after  { left: 66.66%; top: 0; bottom: 0; width: 1px; }
    .crop-rect .gv::before { top: 33.33%; left: 0; right: 0; height: 1px; }
    .crop-rect .gv::after  { top: 66.66%; left: 0; right: 0; height: 1px; }
    .crop-h {
        position: absolute; width: 14px; height: 14px; background: #fff;
        border: 1px solid #0f172a; border-radius: 50%; transform: translate(-50%,-50%);
    }

    /* ── Control panel ── */
    .panel {
        width: 320px; flex: 0 0 320px; min-height: 0;
        display: flex; flex-direction: column;
        background: rgba(255,255,255,0.85);
        border: 1.5px solid #e2e8f0; border-radius: 12px; overflow: hidden;
    }
    .panel-scroll { flex: 1; min-height: 0; overflow-y: auto; padding: 4px 0 12px; }
    .panel-scroll { scrollbar-width: thin; scrollbar-color: #cbd5e1 transparent; }
    .panel-scroll::-webkit-scrollbar { width: 9px; }
    .panel-scroll::-webkit-scrollbar-track { background: transparent; }
    .panel-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 999px; border: 2px solid #fff; }
    .panel-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    .group { border-bottom: 1px solid #eef2f7; }
    .group-head {
        display: flex; align-items: center; justify-content: space-between;
        padding: 11px 14px; cursor: pointer; user-select: none;
    }
    .group-head h3 {
        font-size: 11px; font-weight: 800; color: #0d9488;
        letter-spacing: .07em; text-transform: uppercase;
    }
    .group-head .chev { color: #94a3b8; font-size: 11px; transition: transform .18s; }
    .group.collapsed .chev { transform: rotate(-90deg); }
    .group-body { padding: 2px 14px 14px; }
    .group.collapsed .group-body { display: none; }

    .slider-row { margin: 12px 0; }
    .slider-row:first-child { margin-top: 4px; }
    .slider-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
    .slider-top label { font-size: 12px; font-weight: 600; color: #475569; cursor: pointer; }
    .slider-top .val {
        font-size: 11px; color: #0f172a; font-family: ui-monospace, Consolas, monospace;
        background: #f1f5f9; padding: 1px 7px; border-radius: 5px; min-width: 42px; text-align: right;
    }
    input[type=range] {
        -webkit-appearance: none; appearance: none; width: 100%; height: 4px;
        background: #e2e8f0; border-radius: 999px; outline: none; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
        -webkit-appearance: none; appearance: none; width: 15px; height: 15px;
        border-radius: 50%; background: #0d9488; border: 2px solid #fff;
        box-shadow: 0 1px 4px rgba(0,0,0,.3); cursor: pointer;
    }
    input[type=range]::-moz-range-thumb {
        width: 15px; height: 15px; border-radius: 50%; background: #0d9488;
        border: 2px solid #fff; box-shadow: 0 1px 4px rgba(0,0,0,.3); cursor: pointer;
    }

    .btn {
        padding: 8px 14px; font-size: 12px; font-weight: 700; border-radius: 8px;
        border: none; cursor: pointer; letter-spacing: .02em; font-family: inherit;
        transition: background .15s, box-shadow .15s, transform .08s, color .15s, border-color .15s;
    }
    .btn-primary { background: linear-gradient(145deg, #14b8a6, #0d9488); color: #fff; box-shadow: 0 2px 8px rgba(13,148,136,0.35); }
    .btn-primary:hover { box-shadow: 0 4px 14px rgba(13,148,136,0.45); }
    .btn-primary:active { transform: scale(.97); }
    .btn-secondary { background: #fff; color: #475569; border: 1px solid #cbd5e1; }
    .btn-secondary:hover { background: #f8fafc; color: #0d9488; border-color: #0d9488; }
    .btn-secondary:active { transform: scale(.97); }
    .btn-ghost { background: transparent; color: #64748b; border: 1px solid #e2e8f0; padding: 6px 10px; font-size: 11px; }
    .btn-ghost:hover { background: #f8fafc; color: #0d9488; border-color: #0d9488; }
    .btn-ghost.active { background: #0d9488; color: #fff; border-color: #0d9488; }
    .btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }

    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .btn-row .btn { flex: 1 1 auto; }

    /* histogram */
    .hist-wrap { padding: 10px 14px 4px; }
    #histCanvas { width: 100%; height: 90px; display: block; background: #0f172a; border-radius: 8px; }
    .hist-ch { display: flex; gap: 6px; margin-top: 8px; }
    .hist-ch button {
        flex: 1; font-size: 10.5px; padding: 4px 0; border-radius: 6px;
        border: 1px solid #e2e8f0; background: #fff; color: #64748b; cursor: pointer; font-family: inherit; font-weight: 700;
    }
    .hist-ch button.on { background: #f1f5f9; color: #0f172a; border-color: #cbd5e1; }

    /* curves */
    #curveCanvas { width: 100%; height: 190px; display: block; background: #0f172a; border-radius: 8px; cursor: crosshair; touch-action: none; }
    .hint { font-size: 11px; color: #94a3b8; line-height: 1.5; margin-top: 7px; }
    .auto-readout {
        margin-top: 10px; padding: 9px 11px; border-radius: 8px;
        background: #f0fdfa; border: 1px solid #99f6e4; color: #134e4a;
        font-size: 11px; line-height: 1.6; font-family: ui-monospace, Consolas, monospace;
    }
    .auto-readout b { color: #0f766e; }

    /* progress bar (AI 放大 / 長時間運算) */
    .progress { height: 8px; background: #e2e8f0; border-radius: 999px; overflow: hidden; margin-top: 10px; }
    .progress-bar {
        height: 100%; width: 0%;
        background: linear-gradient(90deg, #14b8a6, #0d9488);
        border-radius: 999px; transition: width .25s ease;
    }
    .progress-bar.indeterminate {
        width: 35% !important; border-radius: 999px;
        animation: indet 1.1s infinite ease-in-out;
    }
    @keyframes indet { 0% { margin-left: -35%; } 100% { margin-left: 100%; } }

    .geo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    /* resize */
    .size-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
    .size-cell { display: flex; flex-direction: column; gap: 4px; }
    .size-cell label { font-size: 11px; font-weight: 600; color: #475569; }
    .size-cell input {
        width: 100%; padding: 7px 9px; font-size: 12px;
        font-family: ui-monospace, Consolas, monospace; color: #0f172a;
        background: #fff; border: 1px solid #cbd5e1; border-radius: 7px; outline: none;
    }
    .size-cell input:focus { border-color: #0d9488; box-shadow: 0 0 0 2px rgba(13,148,136,.15); }
    .size-lock {
        display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600;
        color: #475569; cursor: pointer; user-select: none; margin: 2px 0 4px;
    }
    .size-lock input { width: 15px; height: 15px; accent-color: #0d9488; cursor: pointer; }

    /* toast */
    .toast {
        position: fixed; bottom: 24px; left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: #1e293b; color: #f1f5f9; padding: 9px 18px;
        border-radius: 8px; font-size: 13px; font-weight: 600;
        box-shadow: 0 6px 20px rgba(0,0,0,.4); opacity: 0;
        transition: opacity .2s, transform .2s; z-index: 200; pointer-events: none;
        border: 1px solid #334155;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 880px) {
        .glass { flex-direction: column; }
        .panel { width: auto; flex: 0 0 auto; max-height: 46vh; }
        .stage { min-height: 240px; }
    }
</style>
</head>
<body>
    <div class="app-header">
        <h1>本地修圖工具</h1>
        <div class="header-actions">
            <button class="btn btn-secondary" id="openBtn">開啟圖片</button>
            <button class="btn btn-secondary" id="resetAllBtn" disabled>重置全部</button>
            <button class="btn btn-secondary" id="dlPngBtn" disabled>下載 PNG</button>
            <button class="btn btn-primary" id="dlJpgBtn" disabled>下載 JPG</button>
        </div>
        <div class="header-meta">
            <span class="status-pill idle" id="statusPill"><span class="dot"></span><span id="statusText">準備就緒 · 所有處理在本機完成</span></span>
        </div>
        <input type="file" id="fileInput" accept="image/*" hidden>
    </div>

    <div class="page-content">
        <div class="glass">
            <div class="stage" id="stage">
                <canvas id="glcanvas"></canvas>
                <div id="cropLayer"></div>
                <div class="dropzone" id="dropzone">
                    <div class="big">🖼️</div>
                    <h2>拖放、貼上或點「開啟圖片」</h2>
                    <p>圖片只會載入到你的瀏覽器記憶體，<strong>不會上傳到任何伺服器</strong>。<br>所有調整由 WebGL 在本機 GPU 即時運算。</p>
                    <button class="btn btn-primary" id="dzOpenBtn">選擇圖片</button>
                </div>
            </div>

            <div class="panel">
                <div class="hist-wrap">
                    <canvas id="histCanvas" width="600" height="180"></canvas>
                    <div class="hist-ch" id="histCh">
                        <button data-ch="rgb" class="on">RGB</button>
                        <button data-ch="lum">亮度</button>
                        <button data-ch="r">R</button>
                        <button data-ch="g">G</button>
                        <button data-ch="b">B</button>
                    </div>
                </div>

                <div class="panel-scroll" id="panelScroll">
                    <!-- groups injected by JS -->
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

<script>
// ───────────────────────── helpers ─────────────────────────
const $ = id => document.getElementById(id);
const stage = $('stage'), gl_canvas = $('glcanvas'), dropzone = $('dropzone');
const statusPill = $('statusPill'), statusText = $('statusText');
let toastTimer;
function toast(msg){
    const t = $('toast'); t.textContent = msg; t.classList.add('show');
    clearTimeout(toastTimer); toastTimer = setTimeout(()=>t.classList.remove('show'), 1900);
}
function setStatus(text, kind){
    statusText.textContent = text;
    statusPill.classList.remove('idle','busy','ok','err');
    statusPill.classList.add(kind||'idle');
}

// ───────────────────────── state ─────────────────────────
// All color params (uniform name → value). Defaults are no-ops.
const P = {
    temp:0, tint:0,                 // white balance sliders
    exposure:0, contrast:0,
    highlights:0, shadows:0,
    saturation:0, vibrance:0,
    sharpen:0,
    inBlack:0, inWhite:255, gamma:1.0, outBlack:0, outWhite:255,
    hdr:0, hdrShadow:1.2, hdrHighlight:1.2,   // single-image exposure fusion
};
const DEFAULTS = JSON.parse(JSON.stringify(P));
let wbGain = [1,1,1];               // from eyedropper / auto white balance
let autoBlk = [0,0,0];              // per-channel black point from smart-auto
let autoWht = [1,1,1];              // per-channel white point from smart-auto

// geometry (non-destructive)
const geo = { rot:0, flipH:false, flipV:false, crop:[0,0,1,1] }; // crop = [sx0,sy0,sw,sh] in source uv

// 調整大小（輸出尺寸；非破壞性 — 只改輸出畫布解析度，圖會縮放/拉伸去填滿）
const resize = { w:0, h:0, lock:true, custom:false };

// source image
let img = { w:0, h:0, data:null, tex:null, loaded:false };

// curves: master RGB, piecewise-linear LUT
let curvePts = [{x:0,y:0},{x:1,y:1}];

// AI 去背遮罩狀態（maskTex 於 WebGL 區塊建立）
let maskTex = null, hasMask = false, useMask = false, maskFeather = 0, maskShift = 0;

// ───────────────────────── WebGL ─────────────────────────
const gl = gl_canvas.getContext('webgl', { preserveDrawingBuffer:true, premultipliedAlpha:false });
if(!gl){ setStatus('此瀏覽器不支援 WebGL','err'); }

const VERT = `
attribute vec2 aPos; attribute vec2 aUV; varying vec2 vUV;
void main(){ vUV = aUV; gl_Position = vec4(aPos, 0.0, 1.0); }`;

const FRAG = `
precision highp float;
varying vec2 vUV;
uniform sampler2D uTex;
uniform sampler2D uCurve;
uniform mat3 uXform;
uniform vec2 uTexel;
uniform vec3 uWB;          // eyedropper/auto gain
uniform vec3 uTT;          // temp/tint gain
uniform float uExp;        // stops
uniform float uContrast;   // -1..1
uniform float uHi, uSh;    // -1..1
uniform float uSat, uVib;  // -1..1
uniform float uSharp;      // 0..2
uniform float uInB, uInW, uGamma, uOutB, uOutW; // levels 0..1
uniform float uUseCurve;
uniform float uHDR;        // exposure-fusion amount 0..1
uniform float uHdrSh;      // EV used for the brightened (shadow-recovery) virtual exposure
uniform float uHdrHi;      // EV used for the darkened (highlight-recovery) virtual exposure
uniform vec3 uAutoBlk;     // per-channel black point (smart-auto), default 0
uniform vec3 uAutoWht;     // per-channel white point (smart-auto), default 1
uniform sampler2D uMask;   // AI 去背遮罩（來源解析度，r 通道＝前景 alpha）
uniform float uUseMask;    // 0/1 是否套用遮罩
uniform float uMaskFeather;// 邊緣羽化（texel 半徑）
uniform float uMaskShift;  // 邊緣收縮(-)/擴張(+)，-0.5..0.5

const vec3 LUM = vec3(0.2126, 0.7152, 0.0722);

// well-exposedness: favour tones near mid-grey, fall off toward pure black / white
float wexp(float l){ float d = l - 0.5; return exp(-(d*d) / (2.0 * 0.2 * 0.2)); }

vec2 srcUV(vec2 o){ vec3 p = uXform * vec3(o, 1.0); return p.xy; }

void main(){
    vec2 uv = srcUV(vUV);
    vec3 c = texture2D(uTex, uv).rgb;

    // unsharp mask
    if(uSharp > 0.001){
        vec3 b =
            texture2D(uTex, srcUV(vUV + vec2(uTexel.x,0.0))).rgb +
            texture2D(uTex, srcUV(vUV - vec2(uTexel.x,0.0))).rgb +
            texture2D(uTex, srcUV(vUV + vec2(0.0,uTexel.y))).rgb +
            texture2D(uTex, srcUV(vUV - vec2(0.0,uTexel.y))).rgb;
        b *= 0.25;
        c += uSharp * (c - b);
    }

    // per-channel auto stretch (smart-auto): aligns each channel's black/white points
    // → removes colour cast at both ends and maximises contrast in one step
    c = clamp((c - uAutoBlk) / max(uAutoWht - uAutoBlk, vec3(1e-4)), 0.0, 1.0);

    // white balance
    c *= uWB * uTT;

    // exposure
    c *= exp2(uExp);

    // HDR exposure fusion (single-image): blend a brightened + darkened virtual copy,
    // each weighted by how well-exposed it is per pixel → shadows borrow from the bright
    // copy, highlights from the dark copy. Mimics "duplicate layer, push exposure, blend".
    if(uHDR > 0.001){
        vec3 base  = c;
        vec3 over  = clamp(base * exp2(uHdrSh),  0.0, 1.0);  // recover shadow detail
        vec3 under = clamp(base * exp2(-uHdrHi), 0.0, 1.0);  // recover highlight detail
        float lb = dot(base, LUM), lo = dot(over, LUM), lu = dot(under, LUM);
        float wb = wexp(lb), wo = wexp(lo), wu = wexp(lu);
        // don't pull from the darkened copy where the original is already clipped white
        // (there's no detail to recover — it would just turn blown areas flat grey)
        wu *= 1.0 - smoothstep(0.92, 1.0, lb);
        float sum = wb + wo + wu + 1e-4;
        vec3 fused = (base*wb + over*wo + under*wu) / sum;
        c = mix(base, fused, uHDR);
    }

    // levels: input black/white, gamma, output black/white
    c = clamp((c - uInB) / max(uInW - uInB, 1e-4), 0.0, 1.0);
    c = pow(c, vec3(1.0 / uGamma));
    c = uOutB + c * (uOutW - uOutB);

    // shadows / highlights (luma-weighted lift)
    float l = dot(c, LUM);
    c += uSh * 0.5 * (1.0 - l) * (1.0 - l);
    c += uHi * 0.5 * l * l;

    // contrast around mid
    c = (c - 0.5) * (1.0 + uContrast) + 0.5;

    c = clamp(c, 0.0, 1.0);

    // saturation
    float lum = dot(c, LUM);
    c = mix(vec3(lum), c, 1.0 + uSat);

    // vibrance (boost the unsaturated more)
    float mx = max(c.r, max(c.g, c.b));
    float mn = min(c.r, min(c.g, c.b));
    float sat = mx - mn;
    float lum2 = dot(c, LUM);
    c = mix(vec3(lum2), c, 1.0 + uVib * (1.0 - sat));

    c = clamp(c, 0.0, 1.0);

    // curves (master)
    if(uUseCurve > 0.5){
        c.r = texture2D(uCurve, vec2(c.r, 0.5)).r;
        c.g = texture2D(uCurve, vec2(c.g, 0.5)).r;
        c.b = texture2D(uCurve, vec2(c.b, 0.5)).r;
    }

    // AI 去背：用來源 uv 取遮罩當 alpha（裁切/旋轉/翻轉會自動跟著走，因 uv 已是來源座標）
    float alpha = 1.0;
    if(uUseMask > 0.5){
        float m;
        if(uMaskFeather > 0.5){
            vec2 tt = uTexel * uMaskFeather;
            m  = texture2D(uMask, uv).r * 0.4;
            m += texture2D(uMask, uv + vec2(tt.x,0.0)).r * 0.15;
            m += texture2D(uMask, uv - vec2(tt.x,0.0)).r * 0.15;
            m += texture2D(uMask, uv + vec2(0.0,tt.y)).r * 0.15;
            m += texture2D(uMask, uv - vec2(0.0,tt.y)).r * 0.15;
        } else {
            m = texture2D(uMask, uv).r;
        }
        m = clamp(m + uMaskShift, 0.0, 1.0);          // 收縮 / 擴張

function compile(type, src){

}

// ───────────────────────── mat3 (column-major for GL) ─────────────────────────
function mul3(a, b){ // a*b, both column-major
    const r = new Array(9);
    for(let c=0;c<3;c++) for(let rI=0;rI<3;rI++){
        r[c*3+rI] = a[0*3+rI]*b[c*3+0] + a[1*3+rI]*b[c*3+1] + a[2*3+rI]*b[c*3+2];
    }
    return r;
}
function apply3(m, x, y){ // m * [x,y,1]
    return [ m[0]*x + m[3]*y + m[6], m[1]*x + m[4]*y + m[7] ];
}
// oriented(display) → cropped-unoriented, for rotation step (inverse of content rotation)
function rotInvMat(rot){
    switch(((rot%360)+360)%360){
        case 0:   return [1,0,0, 0,1,0, 0,0,1];
        case 90:  return [0,-1,0, 1,0,0, 0,1,1];   // sx=ov, sy=1-ou
        case 180: return [-1,0,0, 0,-1,0, 1,1,1];
        case 270: return [0,1,0, -1,0,0, 1,0,1];   // sx=1-ov, sy=ou
    }
}
function flipMat(){ // display-uv flip (its own inverse)
    const fx = geo.flipH ? -1 : 1, fy = geo.flipV ? -1 : 1;
    return [fx,0,0, 0,fy,0, geo.flipH?1:0, geo.flipV?1:0, 1];
}
function cropMat(){ // cropped[0,1] → source uv
    const [x,y,w,h] = geo.crop;
    return [w,0,0, 0,h,0, x,y,1];
}
// full output-uv → source-uv :  Csrc · Rinv · F
function buildXform(){ return mul3(cropMat(), mul3(rotInvMat(geo.rot), flipMat())); }

function orientedDims(){ // dims of cropped+rotated image (pixels), before fit
    const cw = Math.max(1, Math.round(img.w * geo.crop[2]));
    const ch = Math.max(1, Math.round(img.h * geo.crop[3]));
    return (geo.rot===90 || geo.rot===270) ? [ch, cw] : [cw, ch];
}

// ───────────────────────── resize (output size) ─────────────────────────
const MAX_OUT = 8192;
function naturalAspect(){ const [w,h]=orientedDims(); return h>0 ? w/h : 1; }
// 實際輸出尺寸：有自訂就用自訂，否則用幾何後的原始尺寸
function outputDims(){
    if(resize.custom && resize.w>=1 && resize.h>=1) return [resize.w, resize.h];
    return orientedDims();
}
function updateResizeInputs(){

}
// 把輸入框同步成幾何後的原始尺寸（未自訂時）

}
// 幾何（裁切/旋轉/翻轉）變動後，重新對齊尺寸欄位
function geoChanged(){
    if(!resize.custom){ syncResizeFromNatural(); }
    else if(resize.lock){ resize.h=Math.max(1, Math.round(resize.w/Math.max(naturalAspect(),1e-6))); updateResizeInputs(); }

function tempTintGain(){

function render(){

    gl.uniform1f(U.uGamma, P.gamma);
    gl.uniform1f(U.uOutB, P.outBlack/255);

// ───────────────────────── histogram ─────────────────────────
// Read back the rendered canvas (downscaled implicitly via sampling stride) for live histogram.
let histPixBuf = null;
const histCanvas = $('histCanvas'), hctx = histCanvas.getContext('2d');
let histChannel = 'rgb';
function computeHistogram(){
    const w = gl_canvas.width, h = gl_canvas.height;
    if(!w || !h) return;
    // sample at most ~360px wide for speed
    const stride = Math.max(1, Math.floor(Math.max(w,h)/360));
    const rw = Math.ceil(w/stride);
    const need = w*h*4;
    if(!histPixBuf || histPixBuf.length < need) histPixBuf = new Uint8Array(need);
    gl.readPixels(0,0,w,h, gl.RGBA, gl.UNSIGNED_BYTE, histPixBuf);
    const R=new Float32Array(256),G=new Float32Array(256),B=new Float32Array(256),L=new Float32Array(256);
    for(let y=0;y<h;y+=stride){
        let row = y*w*4;
        for(let x=0;x<w;x+=stride){
            const i = row + x*4;
            const r=histPixBuf[i], g=histPixBuf[i+1], b=histPixBuf[i+2];
            R[r]++; G[g]++; B[b]++;
            L[(r*0.2126+g*0.7152+b*0.0722)|0]++;
        }
    }
    drawHistogram(R,G,B,L);
}
function drawHistogram(R,G,B,L){
    const W=histCanvas.width, H=histCanvas.height;
    hctx.clearRect(0,0,W,H);
    hctx.fillStyle='#0f172a'; hctx.fillRect(0,0,W,H);
    hctx.strokeStyle='rgba(255,255,255,.06)';
    for(let i=1;i<4;i++){ const x=W*i/4; hctx.beginPath(); hctx.moveTo(x,0); hctx.lineTo(x,H); hctx.stroke(); }
    const sets = [];
    if(histChannel==='rgb'){ sets.push([R,'rgba(239,68,68,.75)'],[G,'rgba(34,197,94,.75)'],[B,'rgba(59,130,246,.75)']); }
    else if(histChannel==='lum'){ sets.push([L,'rgba(226,232,240,.85)']); }
    else if(histChannel==='r'){ sets.push([R,'rgba(239,68,68,.85)']); }
    else if(histChannel==='g'){ sets.push([G,'rgba(34,197,94,.85)']); }
    else if(histChannel==='b'){ sets.push([B,'rgba(59,130,246,.85)']); }
    let max=0; for(const [a] of sets) for(let i=0;i<256;i++) if(a[i]>max) max=a[i];
    if(max<=0) max=1;
    hctx.globalCompositeOperation = histChannel==='rgb' ? 'lighter' : 'source-over';
    for(const [a,col] of sets){
        hctx.fillStyle=col; hctx.beginPath(); hctx.moveTo(0,H);
        for(let i=0;i<256;i++){
            const x=i/255*W, y=H - Math.pow(a[i]/max,0.5)*H;
            hctx.lineTo(x,y);
        }
        hctx.lineTo(W,H); hctx.closePath(); hctx.fill();
    }
    hctx.globalCompositeOperation='source-over';
}

const curveCanvas = document.createElement('canvas');

function curveIsIdentity(){
    return curvePts.length===2 && curvePts[0].x===0 && curvePts[0].y===0 && curvePts[1].x===1 && curvePts[1].y===1;
}
function buildCurveLUT(){
    const pts = [...curvePts].sort((a,b)=>a.x-b.x);
    const lut = new Uint8Array(256*4);
    for(let i=0;i<256;i++){
        const x=i/255;
        let y;
        if(x<=pts[0].x) y=pts[0].y;
        else if(x>=pts[pts.length-1].x) y=pts[pts.length-1].y;
        else { for(let k=0;k<pts.length-1;k++){ if(x>=pts[k].x && x<=pts[k+1].x){ const t=(x-pts[k].x)/Math.max(pts[k+1].x-pts[k].x,1e-6); y=pts[k].y+(pts[k+1].y-pts[k].y)*t; break; } } }
        const v=Math.round(Math.min(1,Math.max(0,y))*255);
        lut[i*4]=v; lut[i*4+1]=v; lut[i*4+2]=v; lut[i*4+3]=255;

function drawCurveEditor(){

    cctx.fillStyle='#0f172a'; cctx.fillRect(0,0,W,H);
    cctx.strokeStyle='rgba(255,255,255,.08)';
    for(let i=1;i<4;i++){ const g=i/4; cctx.beginPath(); cctx.moveTo(W*g,0); cctx.lineTo(W*g,H); cctx.moveTo(0,H*g); cctx.lineTo(W,H*g); cctx.stroke(); }

    // curve
    const pts=[...curvePts].sort((a,b)=>a.x-b.x);
    cctx.strokeStyle='#2dd4bf'; cctx.lineWidth=2; cctx.beginPath();
    for(let i=0;i<=W;i+=2){
        const x=i/W; let y;
        if(x<=pts[0].x) y=pts[0].y; else if(x>=pts[pts.length-1].x) y=pts[pts.length-1].y;
        else { for(let k=0;k<pts.length-1;k++){ if(x>=pts[k].x && x<=pts[k+1].x){ const t=(x-pts[k].x)/Math.max(pts[k+1].x-pts[k].x,1e-6); y=pts[k].y+(pts[k+1].y-pts[k].y)*t; break; } } }
        const px=i, py=H-y*H;

    }

    for(const p of curvePts){
        cctx.fillStyle='#fff'; cctx.strokeStyle='#0d9488'; cctx.lineWidth=2;

let dragPt=null;
function curveEvtPos(e){
    const r=curveCanvas.getBoundingClientRect();
    const cx=(e.touches?e.touches[0].clientX:e.clientX), cy=(e.touches?e.touches[0].clientY:e.clientY);
    return { x: Math.min(1,Math.max(0,(cx-r.left)/r.width)), y: Math.min(1,Math.max(0,1-(cy-r.top)/r.height)) };
}
function curveDown(e){
    e.preventDefault();
    const p=curveEvtPos(e);
    let near=null,nd=1;
    for(const q of curvePts){ const d=Math.hypot(q.x-p.x,q.y-p.y); if(d<nd){nd=d;near=q;} }
    if(near && nd<0.05){ dragPt=near; }
    else { dragPt={x:p.x,y:p.y}; curvePts.push(dragPt); }
    onCurveChange();
    window.addEventListener('mousemove',curveMove); window.addEventListener('mouseup',curveUp);
    window.addEventListener('touchmove',curveMove,{passive:false}); window.addEventListener('touchend',curveUp);
}
function curveMove(e){
    if(!dragPt) return; e.preventDefault();
    const p=curveEvtPos(e);
    const isEnd = (dragPt===curvePts[0]||dragPt===curvePts[curvePts.length-1]);
    // endpoints keep their x fixed at 0 / 1
    const sorted=[...curvePts].sort((a,b)=>a.x-b.x);
    if(dragPt===sorted[0]) dragPt.x=0; else if(dragPt===sorted[sorted.length-1]) dragPt.x=1; else dragPt.x=p.x;
    dragPt.y=p.y;
    onCurveChange();
}
function curveUp(){
    dragPt=null;
    window.removeEventListener('mousemove',curveMove); window.removeEventListener('mouseup',curveUp);
    window.removeEventListener('touchmove',curveMove); window.removeEventListener('touchend',curveUp);
}
function curveDbl(e){
    const p=curveEvtPos(e);
    const sorted=[...curvePts].sort((a,b)=>a.x-b.x);
    for(const q of curvePts){
        if(q===sorted[0]||q===sorted[sorted.length-1]) continue;
        if(Math.hypot(q.x-p.x,q.y-p.y)<0.05){ curvePts.splice(curvePts.indexOf(q),1); onCurveChange(); return; }
    }
}
function onCurveChange(){ buildCurveLUT(); drawCurveEditor(); if(img.loaded) requestRender(); }

// ───────────────────────── white balance / levels analysis ─────────────────────────
function srcPixel(sx, sy){ // source uv → [r,g,b] 0..1
    const px=Math.min(img.w-1,Math.max(0,Math.floor(sx*img.w)));
    const py=Math.min(img.h-1,Math.max(0,Math.floor(sy*img.h)));
    const i=(py*img.w+px)*4;
    return [img.data[i]/255, img.data[i+1]/255, img.data[i+2]/255];
}
function autoWhiteBalance(){
    if(!img.loaded) return;
    let r=0,g=0,b=0,n=0;
    const step=Math.max(1, Math.floor(Math.max(img.w,img.h)/400));
    for(let y=0;y<img.h;y+=step) for(let x=0;x<img.w;x+=step){
        const i=(y*img.w+x)*4; r+=img.data[i]; g+=img.data[i+1]; b+=img.data[i+2]; n++;
    }
    r/=n; g/=n; b/=n; const gray=(r+g+b)/3;
    wbGain=[ gray/Math.max(r,1), gray/Math.max(g,1), gray/Math.max(b,1) ];
    requestRender(); toast('已套用灰世界自動白平衡');
}
function autoLevels(){
    if(!img.loaded) return;
    const hist=new Float32Array(256); let total=0;
    const step=Math.max(1, Math.floor(Math.max(img.w,img.h)/500));
    for(let y=0;y<img.h;y+=step) for(let x=0;x<img.w;x+=step){
        const i=(y*img.w+x)*4;
        const l=(img.data[i]*0.2126+img.data[i+1]*0.7152+img.data[i+2]*0.0722)|0;
        hist[l]++; total++;
    }
    const clip=total*0.0025;
    let lo=0,hi=255,acc=0;
    for(let i=0;i<256;i++){ acc+=hist[i]; if(acc>clip){ lo=i; break; } }
    acc=0; for(let i=255;i>=0;i--){ acc+=hist[i]; if(acc>clip){ hi=i; break; } }
    if(hi-lo<8){ lo=0; hi=255; }
    setSlider('inBlack', lo); setSlider('inWhite', hi);
    setSlider('outBlack',0); setSlider('outWhite',255);
    requestRender(); toast(`自動色階：黑場 ${lo} · 白場 ${hi}`);
}

// ── Smart auto: derive a colour-preserving edit from the histogram ──
// Deliberately NOT per-channel min/max stretch (Photoshop "Auto Color"), which often
// introduces a new cast and breaks intentional colour. Instead:
//   • contrast = clip black/white on the LUMA histogram only (no hue shift)
//   • white balance = "white-patch" estimate (brightest pixels should be neutral),
//     applied as a damped per-channel gain so we never over-correct
//   • exposure = midtone gamma toward a 50% target
//   • vibrance = gentle, only when the image is genuinely dull
const clamp01 = v => v<0?0:(v>1?1:v);
function lumaPoints(hist, n, lowPct, highPct){
    let lo=0, hi=255, acc=0;
    const lc=n*lowPct, hc=n*highPct;
    for(let i=0;i<256;i++){ acc+=hist[i]; if(acc>lc){ lo=i; break; } }
    acc=0; for(let i=255;i>=0;i--){ acc+=hist[i]; if(acc>hc){ hi=i; break; } }
    if(hi-lo<24){ lo=0; hi=255; }   // already-flat / low-contrast → don't force a stretch
    return [lo, hi];
}
function smartAuto(){
    if(!img.loaded) return;
    autoBlk=[0,0,0]; autoWht=[1,1,1];          // never use the destructive per-channel stretch
    const W=img.w, H=img.h, d=img.data;
    const step=Math.max(1, Math.floor(Math.max(W,H)/600));

    // pass 1: luma histogram + global channel means + bright-pixel channel means (white patch)
    const hl=new Float32Array(256);
    let n=0, sumR=0, sumG=0, sumB=0;
    let bN=0, bR=0, bG=0, bB=0;                  // accumulate the brightest pixels
    const BRIGHT=200;                            // luma threshold for "highlight" sampling
    for(let y=0;y<H;y+=step) for(let x=0;x<W;x+=step){
        const i=(y*W+x)*4, r=d[i], g=d[i+1], b=d[i+2];
        const l=(r*0.2126+g*0.7152+b*0.0722)|0;
        hl[l]++; sumR+=r; sumG+=g; sumB+=b; n++;
        if(l>=BRIGHT){ bR+=r; bG+=g; bB+=b; bN++; }
    }
    const meanR=sumR/n, meanG=sumG/n, meanB=sumB/n;
    const castSpread=Math.max(meanR,meanG,meanB)-Math.min(meanR,meanG,meanB);

    // — white balance: only act on a clear cast, and damp it —
    // (a small spread is usually intentional warmth/coolness — leave it alone)
    let aR, aG, aB;
    if(bN > n*0.01){ aR=bR/bN; aG=bG/bN; aB=bB/bN; }   // neutral target from highlights
    else { aR=meanR; aG=meanG; aB=meanB; }
    const tgt=(aR+aG+aB)/3;
    const DAMP=0.5;
    const clampGain=v=>Math.min(1.4, Math.max(0.78, v));
    if(castSpread < 8){ wbGain=[1,1,1]; }              // negligible cast → don't touch colour
    else {
        wbGain=[
            clampGain(1 + (tgt/Math.max(aR,1)-1)*DAMP),
            clampGain(1 + (tgt/Math.max(aG,1)-1)*DAMP),
            clampGain(1 + (tgt/Math.max(aB,1)-1)*DAMP),
        ];
    }

    // — contrast: luma black/white clip (0.2%) → scalar levels, no hue shift —
    const [lo,hi]=lumaPoints(hl, n, 0.002, 0.002);
    setSlider('inBlack', lo); setSlider('inWhite', hi);
    setSlider('outBlack', 0); setSlider('outWhite', 255);

    // — exposure: only correct genuinely mis-exposed images, and only pull the midtone
    //   toward the NEAREST edge of an acceptable band (never to a hard 50% — bright or
    //   low-key scenes are usually correct). Then damp the correction. —
    let acc=0, med=128; for(let i=0;i<256;i++){ acc+=hl[i]; if(acc>=n/2){ med=i; break; } }
    const M=Math.min(0.98, Math.max(0.02, clamp01((med-lo)/Math.max(hi-lo,1))));
    let gamma=1; const LOWOK=0.40, HIGHOK=0.62;
    if(M < LOWOK || M > HIGHOK){
        const aim = M<LOWOK ? LOWOK : HIGHOK;
        let g = Math.log(M)/Math.log(aim);             // pow(M,1/g)=aim
        g = 1 + (g-1)*0.55;                            // damp toward no-op
        gamma = Math.min(1.5, Math.max(0.7, g));
        if(Math.abs(gamma-1) < 0.04) gamma=1;
    }
    setSlider('gamma', +gamma.toFixed(2));

    // — vibrance: gentle, only when dull —
    let sat=0, m2=0;
    for(let y=0;y<H;y+=step*2) for(let x=0;x<W;x+=step*2){
        const i=(y*W+x)*4, r=d[i], g=d[i+1], b=d[i+2];
        const mx=Math.max(r,g,b), mn=Math.min(r,g,b);
        if(mx>12){ sat+=(mx-mn)/mx; m2++; }
    }
    const meanSat=m2?sat/m2:0;
    const vib = meanSat<0.30 ? Math.round(Math.min(25,(0.30-meanSat)*90)) : 0;
    setSlider('vibrance', vib);

    requestRender();

    // — transparent readout —
    const means={R:meanR,G:meanG,B:meanB};
    const strongest=Object.keys(means).reduce((a,b)=>means[a]>means[b]?a:b);
    const castName={R:'偏紅',G:'偏綠',B:'偏藍'}[strongest];
    const wbWord = (castSpread<8) ? '中性／刻意色調，未調整' : `${castName}，已校正`;
    const lvlWord = (lo>0||hi<255) ? `黑場 ${lo} / 白場 ${hi}` : '對比充足，未調整';
    const expWord = gamma>1.02?'提亮' : gamma<0.98?'壓暗' : '正常，未調整';
    $('autoReadout').innerHTML =
        `<b>依直方圖分析（保色彩）：</b><br>`+
        `· 白平衡：${wbWord}<br>`+
        `· 對比（亮度）：${lvlWord}<br>`+
        `· 曝光：中位亮度 ${(M*100|0)}% → ${expWord}${gamma!==1?` (gamma ${gamma.toFixed(2)})`:''}<br>`+
        `· 飽和度：平均 ${(meanSat*100|0)}% → ${vib?`自然飽和度 +${vib}`:'足夠，不調整'}`;
    toast('已依直方圖自動修圖（保色彩）');
}

// eyedropper white-point pick
let picking=false;
function togglePick(){
    picking=!picking;
    $('pickWB').classList.toggle('active', picking);
    stage.classList.toggle('picking', picking);
    if(picking) toast('點圖片上「應該是白/中性灰」的地方');

function canvasUVFromEvent(e){
    const r=gl_canvas.getBoundingClientRect();
    let u=(e.clientX-r.left)/r.width, v=(e.clientY-r.top)/r.height;
    return [Math.min(1,Math.max(0,u)), Math.min(1,Math.max(0,v))];
}
gl_canvas.addEventListener('click', e=>{
    if(!picking || !img.loaded) return;
    const [u,v]=canvasUVFromEvent(e);
    const M=buildXform();
    const [sx,sy]=apply3(M,u,v);
    const [r,g,b]=srcPixel(sx,sy);
    const target=(r+g+b)/3;
    if(target<0.02){ toast('該點太暗，請選亮一點的中性處'); return; }
    wbGain=[ target/Math.max(r,1e-3), target/Math.max(g,1e-3), target/Math.max(b,1e-3) ];
    togglePick();
    requestRender(); toast('白平衡已校正');
});

    const sr=stage.getBoundingClientRect(), cr=gl_canvas.getBoundingClientRect();

function exitCrop(){ if(cropMode){ cropMode=false; $('cropToggle').classList.remove('active'); $('cropApply').disabled=true; cropLayer.classList.remove('on'); cropLayer.innerHTML=''; } }
function renderCropUI(){

function positionCropUI(box){
    const ir=imgRectInStage();
    const [x,y,w,h]=cropRectUV;
    const L=ir.left+x*ir.width, T=ir.top+y*ir.height, W=w*ir.width, H=h*ir.height;
    box.style.left=L+'px'; box.style.top=T+'px'; box.style.width=W+'px'; box.style.height=H+'px';
    const hs=box.querySelectorAll('.crop-h');
    const pos={nw:[0,0],n:[.5,0],ne:[1,0],e:[1,.5],se:[1,1],s:[.5,1],sw:[0,1],w:[0,.5]};
    hs.forEach(el=>{ const [hx,hy]=pos[el.dataset.h]; el.style.left=(hx*100)+'%'; el.style.top=(hy*100)+'%'; });
}
function syncCropLayer(){ if(cropMode){ const box=cropLayer.querySelector('.crop-rect'); if(box) positionCropUI(box); } }
function enableCropDrag(box){
    let mode=null, start=null, startRect=null;
    function down(e){
        const ir=imgRectInStage();
        const isHandle=e.target.classList.contains('crop-h');
        mode=isHandle? e.target.dataset.h : 'move';
        start=[e.clientX, e.clientY]; startRect=[...cropRectUV];
        e.preventDefault(); e.stopPropagation();
        window.addEventListener('mousemove',move); window.addEventListener('mouseup',up);
    }
    function move(e){
        const ir=imgRectInStage();
        let dx=(e.clientX-start[0])/ir.width, dy=(e.clientY-start[1])/ir.height;
        let [x,y,w,h]=startRect;
        const minS=0.05;
        if(mode==='move'){ x=Math.min(1-w,Math.max(0,x+dx)); y=Math.min(1-h,Math.max(0,y+dy)); }
        else {
            if(mode.includes('w')){ const nx=Math.min(x+w-minS,Math.max(0,x+dx)); w=w+(x-nx); x=nx; }
            if(mode.includes('e')){ w=Math.min(1-x,Math.max(minS,w+dx)); }
            if(mode.includes('n')){ const ny=Math.min(y+h-minS,Math.max(0,y+dy)); h=h+(y-ny); y=ny; }
            if(mode.includes('s')){ h=Math.min(1-y,Math.max(minS,h+dy)); }
        }
        cropRectUV=[x,y,w,h];
        positionCropUI(box);
    }
    function up(){ window.removeEventListener('mousemove',move); window.removeEventListener('mouseup',up); }
    box.addEventListener('mousedown',down);
}
function applyCrop(){
    if(!cropMode||!cropRectUV) return;
    const M=buildXform();
    // map the 4 corners of the selection (display uv) to source uv, take bbox
    const [x,y,w,h]=cropRectUV;
    const corners=[[x,y],[x+w,y],[x,y+h],[x+w,y+h]].map(([u,v])=>apply3(M,u,v));
    let minX=1,minY=1,maxX=0,maxY=0;
    for(const [sx,sy] of corners){ minX=Math.min(minX,sx); minY=Math.min(minY,sy); maxX=Math.max(maxX,sx); maxY=Math.max(maxY,sy); }
    minX=Math.max(0,minX); minY=Math.max(0,minY); maxX=Math.min(1,maxX); maxY=Math.min(1,maxY);
    geo.crop=[minX,minY,maxX-minX,maxY-minY];
    exitCrop();
    geoChanged();
    requestRender(); toast('已裁切');
}

// ───────────────────────── AI 去背（瀏覽器內推論，圖片不上傳）─────────────────────────
// 用 transformers.js 跑 RMBG-1.4 分割模型，算出前景遮罩。模型自 CDN/HF 下載並快取，
// 但「圖片本身」全程留在瀏覽器記憶體，不會送到任何伺服器。
const TF_URL   = 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3';
const BG_MODEL = 'briaai/RMBG-1.4';
let TF=null, bgModel=null, bgProcessor=null, bgBusy=false;

async function ensureBgModel(onProg){
    if(bgModel) return;
    if(!TF){ TF = await import(TF_URL); TF.env.allowLocalModels=false; }
    // RMBG-1.4 倉庫缺前處理設定，明確指定（與官方範例一致）
    bgProcessor = await TF.AutoProcessor.from_pretrained(BG_MODEL, { config:{
        do_normalize:true, do_pad:false, do_rescale:true, do_resize:true,
        feature_extractor_type:'ImageFeatureExtractor',
        image_mean:[0.5,0.5,0.5], image_std:[1,1,1],
        resample:2, rescale_factor:1/255, size:{ width:1024, height:1024 },
    }});
    try{ // 先試量化版（小、快），失敗再退回預設權重
        bgModel = await TF.AutoModel.from_pretrained(BG_MODEL, { config:{model_type:'custom'}, dtype:'q8', progress_callback:onProg });
    }catch(_){
        bgModel = await TF.AutoModel.from_pretrained(BG_MODEL, { config:{model_type:'custom'}, progress_callback:onProg });
    }
}

    }catch(err){

        $('bgReadout').textContent='去背失敗：'+(err && err.message || err)+'（請確認網路可連到模型 CDN）';
    }finally{

        if($('srRun2')) $('srRun2').disabled=false; if($('srRun4')) $('srRun4').disabled=false;

// 單通道遮罩 → 展成 RGBA 上傳（WebGL1 相容），對齊來源解析度
function uploadMask(maskData, w, h){
    const rgba = new Uint8Array(w*h*4);
    for(let i=0;i<w*h;i++){ const v=maskData[i]; rgba[i*4]=v; rgba[i*4+1]=v; rgba[i*4+2]=v; rgba[i*4+3]=255; }
    gl.bindTexture(gl.TEXTURE_2D, maskTex);
    gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, false);
    gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,w,h,0,gl.RGBA,gl.UNSIGNED_BYTE,rgba);
}

// ───────────────────────── AI 超解析放大（Super-Resolution，本機推論）─────────────────────────
// 用 transformers.js 的 image-to-image pipeline 跑 Swin2SR，靠神經網路「補出」高頻細節，
// 比雙線性／雙三次插值更銳利。大圖分塊（tiling）處理：每塊重疊一段、邊緣羽化後拼接，避免接縫。
const SR_MODELS = {
    x2: { id:'Xenova/swin2SR-classical-sr-x2-64',  scale:2 },  // 一般放大，品質最佳
    x4: { id:'Xenova/swin2SR-compressed-sr-x4-48', scale:4 },  // 4×，對壓縮/JPEG 痕跡友善
};
const SR_TILE = 256, SR_OVERLAP = 32;   // 來源像素：分塊大小與重疊寬度（塊較小 → 每次卡住時間較短）
let srPipe=null, srPipeKey=null, srBusy=false;

// 等瀏覽器真的重繪一次再繼續（兩個 rAF + 0ms）：推論會長時間占住主執行緒，
// 在每塊運算前先讓出，進度條才會更新、也不會被誤判「網頁無回應」。
const nextPaint = ()=> new Promise(r=> requestAnimationFrame(()=> requestAnimationFrame(()=> setTimeout(r,0))));
function srSetProgress(frac, indeterminate){
    const wrap=$('srProgress'), bar=$('srProgressBar');
    if(!wrap || !bar) return;
    wrap.hidden=false;
    if(indeterminate){ bar.classList.add('indeterminate'); }
    else { bar.classList.remove('indeterminate'); bar.style.width=Math.max(0,Math.min(100,frac*100)).toFixed(1)+'%'; }
}
function srHideProgress(){
    const wrap=$('srProgress'), bar=$('srProgressBar');
    if(bar){ bar.classList.remove('indeterminate'); bar.style.width='0%'; }
    if(wrap) wrap.hidden=true;
}

async function ensureSrModel(key, onProg){
    if(!TF){ TF = await import(TF_URL); TF.env.allowLocalModels=false; }
    if(srPipe && srPipeKey===key) return;
    srPipe = await TF.pipeline('image-to-image', SR_MODELS[key].id, { progress_callback:onProg });
    srPipeKey = key;
}

// 把來源像素的一塊區域升解析度（主執行緒備援用），回傳 RawImage（尺寸 = 區塊 × scale）
async function srUpscaleTile(rgba, w, h){
    const src = new TF.RawImage(rgba, w, h, 4).rgb();
    return await srPipe(src);
}

// ── Web Worker（背景執行緒）：推論在這裡跑，主畫面完全不卡 ──
// 用 Blob 動態建立 module worker，裡面 import transformers.js。若環境不支援（極舊瀏覽器、
// 某些 file:// 情境），會在使用時丟錯，runSuperRes 會自動退回主執行緒。
let srWorker=null, srWorkerBroken=false, srReqId=0, srOnProgress=null;
const srPending=new Map();

function srWorkerSource(){
    const MODELS = JSON.stringify({ x2:SR_MODELS.x2.id, x4:SR_MODELS.x4.id });
    return `
        const TF_URL = ${JSON.stringify(TF_URL)};
        const MODELS = ${MODELS};
        let TF=null, pipe=null, pipeKey=null;
        async function ensure(key){
            if(!TF){ TF = await import(TF_URL); TF.env.allowLocalModels=false; }
            if(pipe && pipeKey===key) return;
            pipe = await TF.pipeline('image-to-image', MODELS[key], { progress_callback: p=>self.postMessage({type:'progress', p}) });
            pipeKey=key;
        }
        self.onmessage = async (e)=>{
            const msg=e.data;
            try{
                if(msg.type==='init'){
                    await ensure(msg.key);
                    self.postMessage({type:'ready', id:msg.id});
                } else if(msg.type==='tile'){
                    await ensure(msg.key);
                    const src = new TF.RawImage(msg.rgba, msg.w, msg.h, 4).rgb();
                    const o = await pipe(src);
                    const out = new Uint8Array(o.data);   // 複製出純 ArrayBuffer 再轉移（勿轉移 wasm 記憶體）
                    self.postMessage({type:'tileResult', id:msg.id, data:out, w:o.width, h:o.height, channels:o.channels}, [out.buffer]);
                }
            }catch(err){
                self.postMessage({type:'error', id:msg.id, message:(err && err.message) || String(err)});
            }
        };
    `;
}

function ensureSrWorker(){
    if(srWorker) return srWorker;
    const blob=new Blob([srWorkerSource()], {type:'text/javascript'});
    const url=URL.createObjectURL(blob);
    const w=new Worker(url, {type:'module'});
    URL.revokeObjectURL(url);
    w.onmessage=(e)=>{
        const m=e.data;
        if(m.type==='progress'){ if(srOnProgress) srOnProgress(m.p); return; }
        const entry=srPending.get(m.id); if(!entry) return;
        srPending.delete(m.id);
        if(m.type==='error') entry.reject(new Error(m.message));
        else entry.resolve(m);
    };
    w.onerror=(ev)=>{
        srWorkerBroken=true;
        const err=new Error('worker error: '+((ev && ev.message) || ''));
        for(const [,en] of srPending) en.reject(err);
        srPending.clear();
    };
    w.onmessageerror=()=>{ srWorkerBroken=true; };
    srWorker=w;
    return w;
}

function srCall(msg, transfer){
    return new Promise((resolve,reject)=>{
        if(!srWorker || srWorkerBroken){ reject(new Error('worker 不可用')); return; }
        const id=++srReqId; srPending.set(id,{resolve,reject});
        try{ srWorker.postMessage({...msg, id}, transfer||[]); }
        catch(err){ srPending.delete(id); reject(err); }
    });
}

function srSetBusy(b){
    srBusy=b;
    const r2=$('srRun2'), r4=$('srRun4'), bg=$('bgRun');
    if(r2) r2.disabled=b; if(r4) r4.disabled=b; if(bg) bg.disabled=b;
}

async function runSuperRes(key){
    if(srBusy) return;
    if(!img.loaded){ toast('請先開啟圖片'); return; }
    const cfg=SR_MODELS[key], scale=cfg.scale;
    const outW=img.w*scale, outH=img.h*scale;
    if(Math.max(outW,outH) > MAX_OUT){
        toast(`放大後 ${outW}×${outH} 會超過 ${MAX_OUT}px 上限，請先縮小或改用較低倍率`);
        return;
    }
    srSetBusy(true);
    try{
        const onProg = p=>{
            if(p && p.status==='progress' && typeof p.progress==='number'){
                const pct=Math.round(p.progress);
                setStatus(`下載放大模型 ${pct}%`,'busy');
                srSetProgress(pct/100, false);
                $('srReadout').textContent=`下載模型中… ${pct}%（只有第一次需要，之後會快取）`;
            }
        };
        setStatus('AI 放大：準備模型…','busy');
        srSetProgress(0, true);
        $('srReadout').textContent='準備模型中…';

        // 優先用 Web Worker（背景執行緒，主畫面不卡）；不可用時退回主執行緒
        let useWorker=false;
        try{
            ensureSrWorker();
            srOnProgress=onProg;
            await srCall({type:'init', key});
            useWorker=true;
        }catch(err){
            console.warn('SR Worker 不可用，改用主執行緒：', err);
            srWorkerBroken=true;
            await ensureSrModel(key, onProg);
        }

        // 規劃分塊位置（涵蓋整張圖；最後一塊對齊邊界）
        const step=SR_TILE-SR_OVERLAP;
        const axis=len=>{ const a=[]; for(let p=0;p<len;p+=step){ a.push(p); if(p+SR_TILE>=len) break; } return a; };
        const xs=axis(img.w), ys=axis(img.h);
        const total=xs.length*ys.length;

        const outCanvas=document.createElement('canvas'); outCanvas.width=outW; outCanvas.height=outH;
        const octx=outCanvas.getContext('2d');

        let done=0;
        srSetProgress(0, false);
        for(const y0 of ys) for(const x0 of xs){
            setStatus(`AI 放大：運算中 ${done+1}/${total}`,'busy');
            srSetProgress(done/total, false);
            $('srReadout').textContent = useWorker
                ? `背景運算中… 區塊 ${done+1}/${total}（此時畫面可正常操作）`
                : `模型運算中… 區塊 ${done+1}/${total}（運算時畫面可能短暫停頓，屬正常，請稍候）`;
            await nextPaint();   // 讓瀏覽器把進度條畫出來

            const tw=Math.min(SR_TILE, img.w-x0), th=Math.min(SR_TILE, img.h-y0);
            // 從來源像素擷取這一塊（逐列複製）
            const tile=new Uint8ClampedArray(tw*th*4);
            for(let j=0;j<th;j++){
                const s=((y0+j)*img.w + x0)*4;
                tile.set(img.data.subarray(s, s+tw*4), j*tw*4);
            }

            // 放大這一塊：worker 優先；若 worker 中途失效則就地退回主執行緒
            // up = { data, w, h, channels }
            let up;
            if(useWorker && !srWorkerBroken){
                try{
                    const o=await srCall({type:'tile', key, rgba:tile, w:tw, h:th});
                    up={ data:o.data, w:o.w, h:o.h, channels:o.channels };
                }catch(e){
                    console.warn('Worker 區塊失敗，改用主執行緒：', e);
                    srWorkerBroken=true; useWorker=false;
                    await ensureSrModel(key, onProg);
                    const o=await srUpscaleTile(tile, tw, th);
                    up={ data:o.data, w:o.width, h:o.height, channels:o.channels };
                }
            } else {
                const o=await srUpscaleTile(tile, tw, th);
                up={ data:o.data, w:o.width, h:o.height, channels:o.channels };
            }
            const ow=up.w, oh=up.h, ch=up.channels;

            // 把放大塊轉成 RGBA，並對「會疊到已畫區域」的左/上重疊邊做羽化（alpha 漸層）
            const lf = x0>0 ? SR_OVERLAP*scale : 0;   // 左側羽化寬（輸出像素）
            const tf = y0>0 ? SR_OVERLAP*scale : 0;   // 上側羽化寬
            const id=octx.createImageData(ow,oh);
            for(let j=0;j<oh;j++){
                const ay = tf>0 ? Math.min(1, j/tf) : 1;
                for(let i=0;i<ow;i++){
                    const ax = lf>0 ? Math.min(1, i/lf) : 1;
                    const si=(j*ow+i)*ch, di=(j*ow+i)*4;
                    id.data[di]   = up.data[si];
                    id.data[di+1] = up.data[si + (ch>1?1:0)];
                    id.data[di+2] = up.data[si + (ch>2?2:0)];
                    id.data[di+3] = Math.round(ax*ay*255);
                }
            }
            // 透過暫存畫布 + drawImage 做 source-over 混合（putImageData 不會混色）
            const tmp=document.createElement('canvas'); tmp.width=ow; tmp.height=oh;
            tmp.getContext('2d').putImageData(id,0,0);
            octx.drawImage(tmp, x0*scale, y0*scale);
            done++;
            srSetProgress(done/total, false);
        }

        // 用放大後的結果取代來源圖：調色／曲線／裁切皆為非破壞性，會自動重新套用
        img.data = octx.getImageData(0,0,outW,outH).data;
        img.w=outW; img.h=outH;
        gl.bindTexture(gl.TEXTURE_2D, img.tex);
        gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, false);
        gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE, outCanvas);

        resetBgState();                       // 解析度已變，舊去背遮罩失效
        resize.custom=false; resize.lock=true; if($('resizeLock')) $('resizeLock').checked=true;
        syncResizeFromNatural();
        requestRender();

        setStatus(`AI 放大完成 ${outW}×${outH}`,'ok'); toast(`已放大為 ${outW}×${outH}`);
        $('srReadout').innerHTML=`<b>放大完成：${outW}×${outH}（${scale}×）。</b>已成為新的來源圖，可繼續調色／裁切，或再放大一次（不超過 ${MAX_OUT}px）。下載即為高解析度結果。`;
    }catch(err){
        console.error(err);
        setStatus('放大失敗','err'); toast('放大失敗：'+(err && err.message || err));
        $('srReadout').textContent='放大失敗：'+(err && err.message || err)+'（請確認網路可連到模型 CDN，或改用較低倍率／較小的圖）';
    }finally{
        srSetBusy(false);
        srHideProgress();
        srOnProgress=null;
    }
}

function loadImage(src){
    setStatus('載入中…','busy');
    const im=new Image();
    im.onload=()=>{
        // cap very large images to keep GPU/CPU happy
        const MAX=4096;
        let w=im.naturalWidth, h=im.naturalHeight;
        if(Math.max(w,h)>MAX){ const s=MAX/Math.max(w,h); w=Math.round(w*s); h=Math.round(h*s); }
        const c=document.createElement('canvas'); c.width=w; c.height=h;
        const cx=c.getContext('2d'); cx.drawImage(im,0,0,w,h);
        img.data=cx.getImageData(0,0,w,h).data; img.w=w; img.h=h;
        if(img.tex) gl.deleteTexture(img.tex);
        img.tex=gl.createTexture();
        gl.bindTexture(gl.TEXTURE_2D, img.tex);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
        gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE, c);
        img.loaded=true;
        // reset everything for a fresh image
        Object.assign(P, JSON.parse(JSON.stringify(DEFAULTS)));
        for(const g of GROUPS) for(const s of g.sliders) setSlider(s.k, P[s.k]);
        wbGain=[1,1,1]; autoBlk=[0,0,0]; autoWht=[1,1,1]; geo.rot=0; geo.flipH=false; geo.flipV=false; geo.crop=[0,0,1,1];
        curvePts=[{x:0,y:0},{x:1,y:1}]; buildCurveLUT(); drawCurveEditor();
        exitCrop(); resetBgState();
        resize.custom=false; resize.lock=true; if($('resizeLock')) $('resizeLock').checked=true; syncResizeFromNatural();
        gl_canvas.classList.add('ready'); dropzone.classList.add('hide');
        ['resetAllBtn','dlPngBtn','dlJpgBtn'].forEach(id=>$(id).disabled=false);
        requestRender();
        setStatus(`已載入 ${w}×${h}`,'ok');
    };
    im.onerror=()=>setStatus('圖片載入失敗','err');
    im.src=src;
}
function handleFile(file){
    if(!file || !file.type.startsWith('image/')){ toast('請選擇圖片檔'); return; }
    const r=new FileReader();

    r.readAsDataURL(file);
}

// drag & drop
['dragenter','dragover'].forEach(ev=>stage.addEventListener(ev, e=>{ e.preventDefault(); stage.classList.add('dragover'); }));
['dragleave','drop'].forEach(ev=>stage.addEventListener(ev, e=>{ e.preventDefault(); if(ev==='drop'||e.target===stage) stage.classList.remove('dragover'); }));
stage.addEventListener('drop', e=>{ const f=e.dataTransfer.files[0]; if(f) handleFile(f); });
// paste
window.addEventListener('paste', e=>{
    const items=e.clipboardData?.items||[];
    for(const it of items){ if(it.type.startsWith('image/')){ handleFile(it.getAsFile()); break; } }
});

// ───────────────────────── reset / export ─────────────────────────
$('resetAllBtn').addEventListener('click', ()=>{
    Object.assign(P, JSON.parse(JSON.stringify(DEFAULTS)));
    for(const g of GROUPS) for(const s of g.sliders) setSlider(s.k, P[s.k]);
    wbGain=[1,1,1]; geo.rot=0; geo.flipH=false; geo.flipV=false; geo.crop=[0,0,1,1];
    curvePts=[{x:0,y:0},{x:1,y:1}]; buildCurveLUT(); drawCurveEditor();
    exitCrop(); resetBgState();
    resize.custom=false; resize.lock=true; if($('resizeLock')) $('resizeLock').checked=true; syncResizeFromNatural();
    requestRender(); toast('已重置全部調整');
});

function download(type, quality, ext){
    if(!img.loaded) return;
    // ensure a fresh render is present in the (preserved) drawing buffer
    render();
    // 來源畫布；若是 JPG 且正在去背（有透明）→ 先合成到白底，否則透明區會變黑
    let srcCanvas = gl_canvas;
    if(type==='image/jpeg' && hasMask && useMask){
        const tmp=document.createElement('canvas'); tmp.width=gl_canvas.width; tmp.height=gl_canvas.height;
        const tx=tmp.getContext('2d'); tx.fillStyle='#fff'; tx.fillRect(0,0,tmp.width,tmp.height); tx.drawImage(gl_canvas,0,0);
        srcCanvas=tmp;
    }
    srcCanvas.toBlob(blob=>{
        if(!blob){ toast('匯出失敗'); return; }
        const a=document.createElement('a');
        a.href=URL.createObjectURL(blob);
        a.download=`edited-${gl_canvas.width}x${gl_canvas.height}.${ext}`;
        a.click();
        setTimeout(()=>URL.revokeObjectURL(a.href), 4000);
        toast(`已下載 ${ext.toUpperCase()}`);
    }, type, quality);
}
$('dlPngBtn').addEventListener('click', ()=>download('image/png', undefined, 'png'));
$('dlJpgBtn').addEventListener('click', ()=>download('image/jpeg', 0.92, 'jpg'));

// ───────────────────────── boot ─────────────────────────
buildPanel();
buildCurveLUT();
if(gl) setStatus('準備就緒 · 所有處理在本機完成','idle');
</script>
