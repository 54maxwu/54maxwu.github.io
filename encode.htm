<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>編碼 / 解碼工具</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', sans-serif;
  background: #f1f5f9;
  color: #2c3e50;
  min-height: 100vh;
}

.app-header {
  background: #fff;
  border-bottom: 1px solid #e2e8f0;
  padding: 14px 24px;
  min-height: 60px;
  display: flex;
  align-items: center;
  box-shadow: 0 1px 3px rgba(0,0,0,.06);
  position: sticky;
  top: 0;
  z-index: 10;
}
.app-header h1 {
  font-size: 16px;
  font-weight: 600;
  color: #1e293b;
  letter-spacing: .02em;
}

.page-content { padding: 12px 20px 20px; max-width: 1400px; margin: 0 auto; }

.card {
  background: #fff;
  border: 1px solid #e2e8f0;
  border-radius: 14px;
  box-shadow: 0 2px 6px rgba(0,0,0,.05);
  padding: 20px;
  margin-bottom: 16px;
}

.row { display: flex; gap: 20px; align-items: flex-start; }

.col-input { flex: 1; min-width: 0; }
.col-ops   { width: 400px; flex-shrink: 0; }

textarea#input {
  width: 100%;
  height: 320px;
  padding: 12px 14px;
  font-family: 'Consolas', 'Courier New', monospace;
  font-size: 14px;
  border: 1.5px solid #cbd5e1;
  border-radius: 8px;
  resize: vertical;
  outline: none;
  transition: border-color .15s, box-shadow .15s;
  background: #fafbfc;
}
textarea#input:focus {
  border-color: #0891b2;
  box-shadow: 0 0 0 3px rgba(8,145,178,.12);
  background: #fff;
}

.ops-list {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px 10px;
}
.op {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 6px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13.5px;
  color: #374151;
  user-select: none;
  transition: background .12s;
}
.op:hover { background: #f1f5f9; }
.op input[type="radio"] {
  accent-color: #0891b2;
  cursor: pointer;
}

.output-format {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid #e2e8f0;
}
.output-format label { font-size: 13px; color: #64748b; }
.output-format select {
  flex: 1;
  padding: 6px 10px;
  border: 1.5px solid #cbd5e1;
  border-radius: 6px;
  font-size: 13px;
  background: #fff;
  cursor: pointer;
  outline: none;
}
.output-format select:focus { border-color: #0891b2; }

.result-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.result-header h3 {
  font-size: 13px;
  color: #64748b;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .06em;
}
.copy-btn {
  padding: 4px 12px;
  background: #f1f5f9;
  border: 1px solid #cbd5e1;
  border-radius: 6px;
  font-size: 12px;
  color: #475569;
  cursor: pointer;
  transition: all .12s;
}
.copy-btn:hover { background: #e0f2fe; border-color: #0891b2; color: #0e7490; }
.copy-btn.copied { background: #dcfce7; border-color: #16a34a; color: #15803d; }

#output {
  font-family: 'Consolas', 'Courier New', monospace;
  font-size: 13px;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-all;
  color: #0e7490;
  min-height: 60px;
  padding: 12px 14px;
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 8px;
}
#output.error { color: #dc2626; background: #fef2f2; border-color: #fecaca; }
#output.empty { color: #94a3b8; font-style: italic; }

/* Hex / Binary dump table */
.dump {
  display: grid;
  grid-template-columns: auto 1fr auto;
  column-gap: 18px;
  row-gap: 2px;
  font-family: 'Consolas', 'Courier New', monospace;
  font-size: 13px;
}
.dump .off { color: #94a3b8; font-weight: 600; text-align: right; }
.dump .hex { color: #0e7490; letter-spacing: 1px; }
.dump .asc { color: #64748b; letter-spacing: 2px; }

@media (max-width: 720px) {
  .row { flex-direction: column; }
  .col-ops { width: 100%; }
  textarea#input { height: 200px; }
}
</style>
</head>
<body>

<div class="app-header">
  <h1>編碼 / 解碼工具</h1>
</div>

<div class="page-content">
  <div class="card">
    <div class="row">
      <div class="col-input">
        <textarea id="input" placeholder="輸入或貼上文字，會即時轉換..."></textarea>
      </div>
      <div class="col-ops">
        <div class="ops-list" id="ops-list"></div>
        <div class="output-format">
          <label for="format">輸出</label>
          <select id="format">
            <option value="plain">Plain Text</option>
            <option value="hex">Hexadecimal</option>
            <option value="binary">Binary</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="result-header">
      <h3>結果</h3>
      <button class="copy-btn" id="copy-btn">複製</button>
    </div>
    <div id="output" class="empty">（輸入內容後會即時顯示結果）</div>
  </div>
</div>

<script>
// ── Operations list ───────────────────────────────────
const OPS = [
  { id: 'b64enc',    label: 'Base64 編碼' },
  { id: 'b64dec',    label: 'Base64 解碼' },
  { id: 'b64uenc',   label: 'Base64Url 編碼' },
  { id: 'b64udec',   label: 'Base64Url 解碼' },
  { id: 'urlenc',    label: '網址編碼' },
  { id: 'urldec',    label: '網址解碼' },
  { id: 'md5',       label: 'MD5 雜湊' },
  { id: 'samlenc',   label: 'SAML 編碼' },
  { id: 'samldec',   label: 'SAML 解碼' },
  { id: 'json',      label: '有效的 JSON' },
  { id: 'qpenc',     label: 'Quoted-Printable 編碼' },
  { id: 'qpdec',     label: 'Quoted-Printable 解碼' },
  { id: 'utf16dec',  label: 'UTF16 解碼' },
  { id: 'hexdec',    label: '十六進位解碼' },
  { id: 'filetime',  label: 'pwdLastSet/FILETIME 解碼' },
];

// ── Render radio list ─────────────────────────────────
const opsList = document.getElementById('ops-list');
OPS.forEach((op, i) => {
  const lbl = document.createElement('label');
  lbl.className = 'op';
  lbl.innerHTML = `<input type="radio" name="op" value="${op.id}"${i === 0 ? ' checked' : ''}><span>${op.label}</span>`;
  opsList.appendChild(lbl);
});

// ── Byte helpers ──────────────────────────────────────
const enc = new TextEncoder();
const dec = new TextDecoder('utf-8', { fatal: false });

function strToBytes(s)   { return enc.encode(s); }
function bytesToStr(b)   { return dec.decode(b); }
function bytesToBin(b)   { let s = ''; for (let i = 0; i < b.length; i++) s += String.fromCharCode(b[i]); return s; }
function binToBytes(s)   { const o = new Uint8Array(s.length); for (let i = 0; i < s.length; i++) o[i] = s.charCodeAt(i); return o; }
function bytesToB64(b)   { return btoa(bytesToBin(b)); }
function b64ToBytes(s)   { return binToBytes(atob(s)); }
function hexToBytes(h) {
  h = h.replace(/\s+/g, '').replace(/^0x/i, '');
  if (h.length % 2) throw new Error('十六進位字串長度必須為偶數');
  if (!/^[0-9a-f]*$/i.test(h)) throw new Error('十六進位字串含非法字元');
  const out = new Uint8Array(h.length / 2);
  for (let i = 0; i < out.length; i++) out[i] = parseInt(h.substr(i * 2, 2), 16);
  return out;
}

// ── MD5 (Joseph Myers, public domain) ─────────────────
const md5 = (() => {
  function safeAdd(x, y) {
    const lsw = (x & 0xffff) + (y & 0xffff);
    return (((x >> 16) + (y >> 16) + (lsw >> 16)) << 16) | (lsw & 0xffff);
  }
  function rol(n, c) { return (n << c) | (n >>> (32 - c)); }
  function cmn(q, a, b, x, s, t) { return safeAdd(rol(safeAdd(safeAdd(a, q), safeAdd(x, t)), s), b); }
  function ff(a, b, c, d, x, s, t) { return cmn((b & c) | ((~b) & d), a, b, x, s, t); }
  function gg(a, b, c, d, x, s, t) { return cmn((b & d) | (c & (~d)), a, b, x, s, t); }
  function hh(a, b, c, d, x, s, t) { return cmn(b ^ c ^ d, a, b, x, s, t); }
  function ii(a, b, c, d, x, s, t) { return cmn(c ^ (b | (~d)), a, b, x, s, t); }

  function cycle(x, k) {
    let [a, b, c, d] = x;
    a = ff(a, b, c, d, k[0],   7, -680876936);
    d = ff(d, a, b, c, k[1],  12, -389564586);
    c = ff(c, d, a, b, k[2],  17,  606105819);
    b = ff(b, c, d, a, k[3],  22, -1044525330);
    a = ff(a, b, c, d, k[4],   7, -176418897);
    d = ff(d, a, b, c, k[5],  12,  1200080426);
    c = ff(c, d, a, b, k[6],  17, -1473231341);
    b = ff(b, c, d, a, k[7],  22, -45705983);
    a = ff(a, b, c, d, k[8],   7,  1770035416);
    d = ff(d, a, b, c, k[9],  12, -1958414417);
    c = ff(c, d, a, b, k[10], 17, -42063);
    b = ff(b, c, d, a, k[11], 22, -1990404162);
    a = ff(a, b, c, d, k[12],  7,  1804603682);
    d = ff(d, a, b, c, k[13], 12, -40341101);
    c = ff(c, d, a, b, k[14], 17, -1502002290);
    b = ff(b, c, d, a, k[15], 22,  1236535329);

    a = gg(a, b, c, d, k[1],   5, -165796510);
    d = gg(d, a, b, c, k[6],   9, -1069501632);
    c = gg(c, d, a, b, k[11], 14,  643717713);
    b = gg(b, c, d, a, k[0],  20, -373897302);
    a = gg(a, b, c, d, k[5],   5, -701558691);
    d = gg(d, a, b, c, k[10],  9,  38016083);
    c = gg(c, d, a, b, k[15], 14, -660478335);
    b = gg(b, c, d, a, k[4],  20, -405537848);
    a = gg(a, b, c, d, k[9],   5,  568446438);
    d = gg(d, a, b, c, k[14],  9, -1019803690);
    c = gg(c, d, a, b, k[3],  14, -187363961);
    b = gg(b, c, d, a, k[8],  20,  1163531501);
    a = gg(a, b, c, d, k[13],  5, -1444681467);
    d = gg(d, a, b, c, k[2],   9, -51403784);
    c = gg(c, d, a, b, k[7],  14,  1735328473);
    b = gg(b, c, d, a, k[12], 20, -1926607734);

    a = hh(a, b, c, d, k[5],   4, -378558);
    d = hh(d, a, b, c, k[8],  11, -2022574463);
    c = hh(c, d, a, b, k[11], 16,  1839030562);
    b = hh(b, c, d, a, k[14], 23, -35309556);
    a = hh(a, b, c, d, k[1],   4, -1530992060);
    d = hh(d, a, b, c, k[4],  11,  1272893353);
    c = hh(c, d, a, b, k[7],  16, -155497632);
    b = hh(b, c, d, a, k[10], 23, -1094730640);
    a = hh(a, b, c, d, k[13],  4,  681279174);
    d = hh(d, a, b, c, k[0],  11, -358537222);
    c = hh(c, d, a, b, k[3],  16, -722521979);
    b = hh(b, c, d, a, k[6],  23,  76029189);
    a = hh(a, b, c, d, k[9],   4, -640364487);
    d = hh(d, a, b, c, k[12], 11, -421815835);
    c = hh(c, d, a, b, k[15], 16,  530742520);
    b = hh(b, c, d, a, k[2],  23, -995338651);

    a = ii(a, b, c, d, k[0],   6, -198630844);
    d = ii(d, a, b, c, k[7],  10,  1126891415);
    c = ii(c, d, a, b, k[14], 15, -1416354905);
    b = ii(b, c, d, a, k[5],  21, -57434055);
    a = ii(a, b, c, d, k[12],  6,  1700485571);
    d = ii(d, a, b, c, k[3],  10, -1894986606);
    c = ii(c, d, a, b, k[10], 15, -1051523);
    b = ii(b, c, d, a, k[1],  21, -2054922799);
    a = ii(a, b, c, d, k[8],   6,  1873313359);
    d = ii(d, a, b, c, k[15], 10, -30611744);
    c = ii(c, d, a, b, k[6],  15, -1560198380);
    b = ii(b, c, d, a, k[13], 21,  1309151649);
    a = ii(a, b, c, d, k[4],   6, -145523070);
    d = ii(d, a, b, c, k[11], 10, -1120210379);
    c = ii(c, d, a, b, k[2],  15,  718787259);
    b = ii(b, c, d, a, k[9],  21, -343485551);

    x[0] = safeAdd(a, x[0]);
    x[1] = safeAdd(b, x[1]);
    x[2] = safeAdd(c, x[2]);
    x[3] = safeAdd(d, x[3]);
  }

  function blk(bytes, off) {
    const b = new Array(16);
    for (let i = 0; i < 16; i++) {
      b[i] = bytes[off + i*4]
           | (bytes[off + i*4 + 1] << 8)
           | (bytes[off + i*4 + 2] << 16)
           | (bytes[off + i*4 + 3] << 24);
    }
    return b;
  }

  return function (str) {
    const bytes = strToBytes(str);
    const n = bytes.length;
    const state = [1732584193, -271733879, -1732584194, 271733878];

    let i;
    for (i = 64; i <= n; i += 64) cycle(state, blk(bytes, i - 64));

    const tail = new Uint8Array(64);
    const rem = bytes.subarray(i - 64);
    tail.set(rem);
    tail[rem.length] = 0x80;
    if (rem.length > 55) {
      cycle(state, blk(tail, 0));
      tail.fill(0);
    }
    const bits = n * 8;
    tail[56] = bits & 0xFF;
    tail[57] = (bits >>> 8) & 0xFF;
    tail[58] = (bits >>> 16) & 0xFF;
    tail[59] = (bits >>> 24) & 0xFF;
    cycle(state, blk(tail, 0));

    const hex = '0123456789abcdef';
    let out = '';
    for (const w of state) {
      for (let j = 0; j < 4; j++) {
        const v = (w >>> (j * 8)) & 0xFF;
        out += hex[v >>> 4] + hex[v & 0xF];
      }
    }
    return out;
  };
})();

// ── SAML (deflate-raw + base64) ───────────────────────
async function samlEncode(s) {
  if (typeof CompressionStream === 'undefined')
    throw new Error('瀏覽器不支援 CompressionStream');
  const cs = new CompressionStream('deflate-raw');
  const stream = new Blob([strToBytes(s)]).stream().pipeThrough(cs);
  const buf = await new Response(stream).arrayBuffer();
  return bytesToB64(new Uint8Array(buf));
}
async function samlDecode(s) {
  if (typeof DecompressionStream === 'undefined')
    throw new Error('瀏覽器不支援 DecompressionStream');
  const ds = new DecompressionStream('deflate-raw');
  const stream = new Blob([b64ToBytes(s.trim())]).stream().pipeThrough(ds);
  const buf = await new Response(stream).arrayBuffer();
  return bytesToStr(new Uint8Array(buf));
}

// ── Quoted-Printable ──────────────────────────────────
function qpEncode(s) {
  const bytes = strToBytes(s);
  let out = '';
  for (const b of bytes) {
    if (b === 9 || b === 32 || (b >= 33 && b <= 60) || (b >= 62 && b <= 126))
      out += String.fromCharCode(b);
    else
      out += '=' + b.toString(16).toUpperCase().padStart(2, '0');
  }
  return out;
}
function qpDecode(s) {
  s = s.replace(/=\r?\n/g, '');
  const arr = [];
  for (let i = 0; i < s.length; i++) {
    if (s[i] === '=' && i + 2 < s.length) {
      const h = s.substr(i + 1, 2);
      if (!/^[0-9a-fA-F]{2}$/.test(h))
        throw new Error('無效的 Quoted-Printable 序列: =' + h);
      arr.push(parseInt(h, 16));
      i += 2;
    } else {
      arr.push(s.charCodeAt(i));
    }
  }
  return bytesToStr(new Uint8Array(arr));
}

// ── FILETIME (100ns since 1601-01-01) ─────────────────
function filetimeDecode(s) {
  s = s.trim();
  if (!s) throw new Error('請輸入 FILETIME 數值');
  let n;
  try { n = /^0x/i.test(s) ? BigInt(s) : BigInt(s); }
  catch { throw new Error('無法解析為整數'); }
  if (n === 0n) return '從未設定 (0)';
  const EPOCH_DIFF = 116444736000000000n;
  const ms = Number((n - EPOCH_DIFF) / 10000n);
  const d = new Date(ms);
  if (isNaN(d.getTime())) throw new Error('時間超出有效範圍');
  return d.toISOString() + '  (' + d.toString() + ')';
}

// ── Conversion dispatch ───────────────────────────────
async function convert(opId, text) {
  if (!text) return '';
  switch (opId) {
    case 'b64enc':   return bytesToB64(strToBytes(text));
    case 'b64dec':   return bytesToStr(b64ToBytes(text.trim()));
    case 'b64uenc': {
      const b = bytesToB64(strToBytes(text));
      return b.replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }
    case 'b64udec': {
      let t = text.trim().replace(/-/g, '+').replace(/_/g, '/');
      while (t.length % 4) t += '=';
      return bytesToStr(b64ToBytes(t));
    }
    case 'urlenc':   return encodeURIComponent(text);
    case 'urldec':   return decodeURIComponent(text);
    case 'md5':      return md5(text);
    case 'samlenc':  return await samlEncode(text);
    case 'samldec':  return await samlDecode(text);
    case 'json':     return JSON.stringify(JSON.parse(text), null, 2);
    case 'qpenc':    return qpEncode(text);
    case 'qpdec':    return qpDecode(text);
    case 'utf16dec': return new TextDecoder('utf-16le').decode(hexToBytes(text));
    case 'hexdec':   return bytesToStr(hexToBytes(text));
    case 'filetime': return filetimeDecode(text);
  }
  return '';
}

// ── Output formatting ─────────────────────────────────
function formatDump(bytes, base, padWidth) {
  if (bytes.length === 0) return { rows: [] };
  const rows = [];
  for (let i = 0; i < bytes.length; i += 16) {
    const slice = bytes.subarray(i, i + 16);
    const off = i.toString(16).padStart(2, '0').toUpperCase();
    const hex = Array.from(slice, b => b.toString(base).padStart(padWidth, '0').toUpperCase()).join(' ');
    const asc = Array.from(slice, b => {
      if (b >= 32 && b <= 126) return String.fromCharCode(b);
      return '·';
    }).join(' ');
    rows.push({ off, hex, asc });
  }
  return { rows };
}

function renderDump(bytes, base, padWidth) {
  const { rows } = formatDump(bytes, base, padWidth);
  if (!rows.length) return '';
  const el = document.createElement('div');
  el.className = 'dump';
  for (const r of rows) {
    const o = document.createElement('div'); o.className = 'off'; o.textContent = r.off;
    const h = document.createElement('div'); h.className = 'hex'; h.textContent = r.hex;
    const a = document.createElement('div'); a.className = 'asc'; a.textContent = r.asc;
    el.appendChild(o); el.appendChild(h); el.appendChild(a);
  }
  return el;
}

// ── UI ────────────────────────────────────────────────
const inputEl  = document.getElementById('input');
const formatEl = document.getElementById('format');
const outputEl = document.getElementById('output');
const copyBtn  = document.getElementById('copy-btn');
let lastResult = '';

function showEmpty() {
  outputEl.className = 'empty';
  outputEl.textContent = '（輸入內容後會即時顯示結果）';
  lastResult = '';
}
function showError(msg) {
  outputEl.className = 'error';
  outputEl.textContent = '錯誤: ' + msg;
  lastResult = '';
}
function showResult(text) {
  lastResult = text;
  const fmt = formatEl.value;
  outputEl.className = '';
  outputEl.textContent = '';
  if (fmt === 'plain') {
    outputEl.textContent = text;
  } else if (fmt === 'hex') {
    outputEl.appendChild(renderDump(strToBytes(text), 16, 2));
  } else {
    outputEl.appendChild(renderDump(strToBytes(text), 2, 8));
  }
}

let pending = 0;
async function update() {
  const text = inputEl.value;
  const opId = document.querySelector('input[name="op"]:checked').value;
  if (!text.trim()) { showEmpty(); return; }
  const seq = ++pending;
  try {
    const out = await convert(opId, text);
    if (seq !== pending) return;
    showResult(out);
  } catch (e) {
    if (seq !== pending) return;
    showError(e.message || String(e));
  }
}

inputEl.addEventListener('input', update);
formatEl.addEventListener('change', () => {
  if (lastResult) showResult(lastResult);
});
document.querySelectorAll('input[name="op"]').forEach(r =>
  r.addEventListener('change', update));

document.addEventListener('paste', (e) => {
  if (document.activeElement === inputEl) return;
  const text = e.clipboardData && e.clipboardData.getData('text');
  if (!text) return;
  e.preventDefault();
  inputEl.value = text;
  inputEl.focus();
  update();
});

copyBtn.addEventListener('click', async () => {
  const txt = lastResult || outputEl.textContent;
  if (!txt) return;
  try {
    await navigator.clipboard.writeText(txt);
    copyBtn.classList.add('copied');
    copyBtn.textContent = '已複製';
    setTimeout(() => {
      copyBtn.classList.remove('copied');
      copyBtn.textContent = '複製';
    }, 1200);
  } catch {}
});

showEmpty();
inputEl.focus();
</script>
</body>
</html>
