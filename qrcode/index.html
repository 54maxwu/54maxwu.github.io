<!DOCTYPE HTML>
<html lang="zh-TW">
<head>
    <title>二維碼生成工具</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="index.css">
    <script type="text/javascript" src="vue.js"></script>
    <script type="text/javascript" src="require.js"></script>
    <style>
        /* ── Toast (custom non-blocking notification, replaces native alert) ── */
        .toast {
            position: fixed; bottom: 24px; left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #1e293b; color: #f1f5f9;
            padding: 10px 18px; border-radius: 8px;
            font-size: 13px; font-weight: 600;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', sans-serif;
            box-shadow: 0 6px 20px rgba(0,0,0,.4);
            opacity: 0; transition: opacity .2s, transform .2s;
            z-index: 9999; pointer-events: none;
            max-width: 90vw; border: 1px solid #334155;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.err { background: #7f1d1d; border-color: #991b1b; }
    </style>
    <script>
    // Custom toast (replaces native alert)
    (function () {
        function init() {
            const el = document.createElement('div');
            el.className = 'toast';
            document.body.appendChild(el);
            let t = null;
            window.alert = function (msg) {
                el.textContent = msg;
                el.className = 'toast err show';
                clearTimeout(t);
                t = setTimeout(() => { el.className = 'toast err'; }, 2800);
            };
        }
        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
        else init();
    })();
    </script>
</head>
<body>
    <div class="app-wrapper" id="pageContainer">

        <header class="app-header">
            <span class="app-title">二維碼{{ qrEncodeMode ? '生成' : '解碼' }}器</span>
            <button class="switch-btn" ref="btnSwitch" @click="trans">
                切換為{{ qrEncodeMode ? '解碼 / 掃碼' : '二維碼生成器' }}模式
            </button>
        </header>

        <!-- 生成模式 -->
        <main class="app-body" v-show="qrEncodeMode">
            <div class="pane-grid">
                <div class="pane">
                    <textarea class="content-textarea"
                        id="codeSource"
                        ref="codeSource"
                        v-model="textContent"
                        placeholder="在這裡填寫需要生成二維碼的任意內容"></textarea>

                    <div class="byte-counter" :class="{ over: isOverLimit, warn: !isOverLimit && byteLength > QR_MAX_BYTES * 0.85 }">
                        <span v-if="isOverLimit">⚠ 已超過 QR 碼容量上限 — 將無法產生</span>
                        <span v-else-if="byteLength > QR_MAX_BYTES * 0.85">⚠ 接近容量上限</span>
                        <span v-else>容量</span>
                        <strong>{{ byteLength }}</strong> / {{ QR_MAX_BYTES }} bytes
                    </div>

                    <div class="options-bar">
                        <div class="opt-group">
                            <label>尺寸</label>
                            <input class="opt-input" type="number" id="opt_width"
                                v-model="qrSize" min="100" max="1000">
                        </div>
                        <div class="opt-group">
                            <label>顏色</label>
                            <input class="opt-input opt-color" type="text"
                                id="opt_fc" v-model="qrColor">
                        </div>
                        <div class="opt-group opt-icon">
                            <label>圖示</label>
                            <label class="radio-label">
                                <input type="radio" name="qr_icon" value="no"
                                    v-model="useIcon" @click="convert()">不要
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="qr_icon" value="default"
                                    v-model="useIcon" @click="convert()">默認
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="qr_icon" value="custom"
                                    v-model="useIcon" @click="$refs.fileBox.click()">上傳
                            </label>
                            <span class="opt-hint">（支援拖曳圖示到頁面）</span>
                        </div>
                        <button class="generate-btn" @click="convert()">生成 QR 碼</button>
                    </div>
                </div>

                <div class="pane">
                    <div class="qr-result">
                        <div class="qr-empty" v-show="!showResult">
                            <div class="qr-empty-icon">
                                <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <rect x="4" y="4" width="13" height="13" rx="2" stroke="#cbd5e1" stroke-width="1.5"/>
                                    <rect x="23" y="4" width="13" height="13" rx="2" stroke="#cbd5e1" stroke-width="1.5"/>
                                    <rect x="4" y="23" width="13" height="13" rx="2" stroke="#cbd5e1" stroke-width="1.5"/>
                                    <rect x="7" y="7" width="7" height="7" rx="1" fill="#e2e8f0"/>
                                    <rect x="26" y="7" width="7" height="7" rx="1" fill="#e2e8f0"/>
                                    <rect x="7" y="26" width="7" height="7" rx="1" fill="#e2e8f0"/>
                                    <path d="M23 23h4v4h-4zM31 23h4v4h-4zM23 31h4v4h-4zM31 31h4v4h-4z" fill="#e2e8f0"/>
                                </svg>
                            </div>
                            <p>填寫內容後點擊「生成 QR 碼」</p>
                        </div>
                        <div class="qr-canvas-wrap" v-show="showResult">
                            <div id="preview"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- 解碼模式 -->
        <main class="app-body" v-show="!qrEncodeMode">
            <div class="pane-grid">
                <div class="pane">
                    <div class="upload-zone" ref="panelBox">
                        <img id="decodePreview" alt="" :src="previewSrc" v-show="!!previewSrc.length">
                        <div class="upload-placeholder" v-show="!previewSrc.length">
                            <div class="upload-icon">
                                <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <rect x="4" y="4" width="13" height="13" rx="2" stroke="#cbd5e1" stroke-width="1.5"/>
                                    <rect x="23" y="4" width="13" height="13" rx="2" stroke="#cbd5e1" stroke-width="1.5"/>
                                    <rect x="4" y="23" width="13" height="13" rx="2" stroke="#cbd5e1" stroke-width="1.5"/>
                                    <rect x="7" y="7" width="7" height="7" rx="1" fill="#e2e8f0"/>
                                    <rect x="26" y="7" width="7" height="7" rx="1" fill="#e2e8f0"/>
                                    <rect x="7" y="26" width="7" height="7" rx="1" fill="#e2e8f0"/>
                                    <path d="M23 23h4v4h-4zM31 23h4v4h-4zM23 31h4v4h-4zM31 31h4v4h-4z" fill="#e2e8f0"/>
                                </svg>
                            </div>
                            <a href="#" class="upload-btn" ref="uploadBox" @click.prevent="$refs.fileBox.click()">選擇圖片</a>
                            <p class="upload-hint">或將含 QR 碼的圖片拖曳至此處</p>
                        </div>
                    </div>
                    <div class="upload-tips">
                        <p>支援 <strong>螢幕截圖</strong> 後直接貼上進行解碼</p>
                        <p>支援 <strong>複製圖片連結</strong> 直接貼上進行解碼</p>
                    </div>
                </div>

                <div class="pane">
                    <textarea id="decodeResult"
                        class="result-textarea"
                        title="點擊自動選擇"
                        placeholder="解碼結果會自動顯示在這裡..."
                        readonly="readonly"
                        ref="resultBox"
                        @click="select()"
                        v-model="resultContent"></textarea>
                </div>
            </div>
        </main>

        <!-- 隱藏元素 -->
        <form style="display:none">
            <input type="file" id="file" ref="fileBox"
                accept=".jpg,.jpeg,.gif,.png,.bmp" @change="fileChanged($event)">
        </form>
        <img id="img" alt="" style="display:none">
        <img ref="logoDefault" src="" alt="" style="display:none">
        <img ref="logoCustom" src="" alt="" style="display:none">

    </div>

    <script type="text/javascript" src="jquery-3.7.1.min.js"></script>
    <script type="text/javascript" src="jquery.colorpicker.js"></script>
    <script type="text/javascript" src="jquery.qrcode.min.js"></script>
    <script type="text/javascript" src="zxing.min.js"></script>
    <script type="text/javascript" src="content-script.js"></script>
    <script type="text/javascript" src="index.js"></script>
</body>
</html>
