<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天知道 · 深度命理命盤</title>
<meta name="description" content="八字四柱、十神身強弱用神、紫微斗數十二宮、大運流年、神煞格局、雙人合盤 — 一站式深度命理排盤分析">
<script src="https://cdn.jsdelivr.net/npm/iztro/dist/iztro.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#f1f5f9; --ink:#1e293b; --sub:#64748b; --line:#e2e8f0;
    --blue:#3b82f6; --blue-d:#2563eb; --blue-l:#eff6ff; --blue-sel:#dbeafe;
    --card:#fff; --soft:#f8fafc;
    --wood:#16a34a; --fire:#dc2626; --earth:#d97706; --metal:#64748b; --water:#0891b2;
    --good:#16a34a; --bad:#dc2626; --mid:#d97706;
  }
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;
    background:var(--bg);color:var(--ink);min-height:100vh;font-size:15px;line-height:1.6;
  }
  /* Header */
  .app-header{
    background:#fff;border-bottom:1px solid var(--line);padding:14px 24px;
    display:flex;align-items:center;gap:12px;min-height:60px;
    box-shadow:0 1px 3px rgba(0,0,0,.06);position:sticky;top:0;z-index:20;
  }
  .app-header .logo{width:30px;height:30px;border-radius:8px;
    background:linear-gradient(135deg,#3b82f6,#6366f1);display:flex;align-items:center;
    justify-content:center;color:#fff;font-weight:700;font-size:16px;flex-shrink:0}
  .app-header h1{font-size:16px;font-weight:600;color:var(--ink);letter-spacing:.02em;margin:0}
  .app-header .tag{font-size:12px;color:var(--sub);margin-left:auto}

  .page-content{padding:16px 24px 60px;max-width:980px;margin:0 auto;transition:max-width .2s}
  .page-content.wide{max-width:1560px}
  .sub{color:var(--sub);font-size:13px;margin-bottom:16px}

  /* Mode tabs */
  .modes{display:flex;gap:8px;margin-bottom:16px}
  .mode-btn{flex:1;padding:10px;background:#fff;border:1px solid var(--line);border-radius:8px;
    color:#475569;cursor:pointer;font-size:14px;font-weight:500;transition:.15s;text-align:center}
  .mode-btn:hover{border-color:#93c5fd;background:var(--blue-l);color:var(--blue-d)}
  .mode-btn.on{background:var(--blue-sel);color:var(--blue-d);border-color:#bfdbfe;font-weight:600}

  /* Form */
  .form-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:20px;margin-bottom:16px}
  .form-card.person2{display:none}
  .form-card .ph{font-size:13px;font-weight:600;color:var(--blue-d);margin-bottom:14px;
    display:flex;align-items:center;gap:6px}
  .row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
  .fld{flex:1;min-width:120px}
  .fld label{display:block;font-size:12px;color:var(--sub);margin-bottom:5px}
  input,select{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:7px;
    font-size:14px;color:var(--ink);background:#fff;font-family:inherit}
  input:focus,select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.12)}
  .seg{display:flex;gap:6px}
  .seg button{flex:1;padding:8px;background:#fff;border:1px solid var(--line);border-radius:7px;
    color:#475569;cursor:pointer;font-size:13px;transition:.15s}
  .seg button:hover{border-color:#93c5fd;background:var(--blue-l)}
  .seg button.on{background:var(--blue-sel);color:var(--blue-d);border-color:#bfdbfe;font-weight:600}
  .hint{font-size:11.5px;color:#94a3b8;margin-top:4px;line-height:1.5}
  .adv-toggle{font-size:12.5px;color:var(--blue-d);cursor:pointer;user-select:none;margin-bottom:6px}
  .adv-box{display:none;padding-top:6px;border-top:1px dashed var(--line);margin-top:6px}
  .adv-box.show{display:block}

  .go{width:100%;padding:13px;background:var(--blue);color:#fff;border:none;border-radius:8px;
    font-size:15px;font-weight:600;cursor:pointer;transition:.15s;font-family:inherit}
  .go:hover{background:var(--blue-d)}
  .go:disabled{opacity:.4;cursor:not-allowed}

  /* Result */
  #result{display:none}
  #result.show{display:block}
  /* tab 列＋命主摘要同一排，把右側空白填滿、省一行高度 */
  .tabbar-row{display:flex;align-items:stretch;gap:10px;margin-bottom:12px;
    position:sticky;top:8px;z-index:11}
  .result-tabs{display:flex;gap:4px;overflow-x:auto;background:#fff;border:1px solid var(--line);
    border-radius:10px;padding:4px;flex:0 1 auto}
  .rtab{flex:0 0 auto;padding:7px 13px;border-radius:7px;font-size:13.5px;color:#475569;
    cursor:pointer;white-space:nowrap;transition:.15s;border:none;background:transparent;font-family:inherit}
  .rtab:hover{background:var(--blue-l);color:var(--blue-d)}
  .rtab.on{background:var(--blue-sel);color:var(--blue-d);font-weight:600}
  /* 命主摘要常駐列（切 tab 都看得到，現移到 tab 列右側） */
  .summary-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:#fff;
    border:1px solid var(--line);border-radius:10px;padding:8px 14px;
    font-size:13px;flex:1 1 auto;min-width:0}
  @media(max-width:760px){
    .tabbar-row{flex-direction:column;gap:8px}
    .summary-bar{flex:1 1 auto}
  }
  .summary-bar .sb-name{font-weight:700;font-size:15px}
  .summary-bar .sb-sep{color:var(--sub);font-size:12.5px}
  .summary-bar .sb-pill{background:var(--soft);border:1px solid var(--line);border-radius:14px;
    padding:2px 10px;font-size:12.5px}
  .panel{display:none}
  .panel.on{display:block}

  .card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:14px}
  .card h3{font-size:15px;font-weight:600;color:var(--ink);margin-bottom:4px;display:flex;
    align-items:center;gap:8px}
  .card h3 .ic{width:22px;height:22px;border-radius:6px;background:var(--blue-l);color:var(--blue-d);
    display:inline-flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
  .card .cap{font-size:12.5px;color:var(--sub);margin-bottom:14px}

  /* Dashboard 瀑布流（內容多的總覽用，依高度填滿） */
  .dash{columns:340px;column-gap:12px}
  .dash .card{break-inside:avoid;margin:0 0 12px;padding:13px 15px;display:inline-block;width:100%}
  .dash .card h3{font-size:13.5px;margin-bottom:8px}
  .dash .card.span-all{column-span:all;display:block;width:100%}
  @media(max-width:680px){ .dash{columns:auto} }
  /* 內容較少的分頁：用會「撐滿整列」的 grid，避免右側大片空白 */
  .grid{display:grid;gap:12px}
  .grid .card{margin:0;padding:14px 16px}
  .grid.g2{grid-template-columns:1fr 1fr}
  .grid.g3{grid-template-columns:1fr 1fr 1fr}
  .grid .full{grid-column:1/-1}
  .colstack{display:flex;flex-direction:column;gap:12px}
  .colstack .card{margin:0}
  @media(max-width:900px){ .grid.g2,.grid.g3{grid-template-columns:1fr} }
  /* dashboard 內元素緊湊化 */
  .dash .kv{padding:5px 0;font-size:13px}
  .dash .wx-bars div{margin:4px 0}
  .dash .bar{height:7px}
  .dash .note{padding:8px 10px;font-size:12px;line-height:1.65}
  .dash .bazi-table{border-spacing:5px}
  .dash .bazi-table .gan,.dash .bazi-table .zhi{font-size:22px;line-height:1.1}
  .dash .bazi-table .gz-cell{padding:7px 3px}
  .dash .bazi-table .god{margin:1px 0}
  .dash .bazi-table .cangan{margin-top:3px;line-height:1.35}
  .dash .bazi-table .cs{margin-top:2px}
  .dash .bazi-table .ny{margin-top:1px}
  .dash .timeline{gap:4px}
  .dash .ty{min-width:60px;padding:7px 4px}
  .dash .ty .gz{font-size:16px}
  .dash .ln-row{padding:5px 0;font-size:13px}
  /* 清單在寬卡內自動多欄填滿 */
  .flow2{column-count:3;column-gap:24px}
  .flow2 .ln-row{break-inside:avoid;border-bottom:1px solid var(--line)}
  @media(max-width:1100px){ .flow2{column-count:2} }
  @media(max-width:680px){ .flow2{column-count:1} }
  .mini-h{font-size:12px;color:var(--blue-d);font-weight:600;margin:12px 0 6px;
    padding-top:10px;border-top:1px solid var(--line)}
  .mini-h:first-child{border-top:none;padding-top:0;margin-top:0}

  /* 表單收合 */
  #formZone.collapsed{display:none}
  /* 已收合時，Header 右側顯示重算膠囊 */
  .recap{display:none;align-items:center;gap:8px;margin-left:auto;background:var(--blue-l);
    border:1px solid #bfdbfe;border-radius:20px;padding:5px 8px 5px 14px;cursor:pointer;
    font-size:13px;color:var(--blue-d);transition:.15s;max-width:46vw}
  .recap:hover{background:var(--blue-sel)}
  .recap .rinfo{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
  .recap .redit{background:var(--blue);color:#fff;border-radius:14px;padding:3px 11px;font-size:12px;
    font-weight:600;flex-shrink:0}
  .recap.show{display:flex}
  .app-header .tag.hide{display:none}

  /* 四柱排盤表 */
  .bazi-table{width:100%;border-collapse:separate;border-spacing:6px;text-align:center}
  .bazi-table th{font-size:12px;color:var(--sub);font-weight:500;padding:4px}
  .bazi-table .gz-cell{background:var(--soft);border:1px solid var(--line);border-radius:8px;padding:10px 4px}
  .bazi-table .gan{font-size:26px;font-weight:700;line-height:1.2}
  .bazi-table .zhi{font-size:26px;font-weight:700;line-height:1.2}
  .bazi-table .god{font-size:11px;color:var(--blue-d);margin:2px 0}
  .bazi-table .cangan{font-size:11px;color:#94a3b8;margin-top:4px;line-height:1.5}
  .bazi-table .cs{font-size:10.5px;color:#a78bfa;margin-top:3px}
  .bazi-table .ny{font-size:10px;color:#94a3b8;margin-top:2px}
  .bazi-table th .th-sub{display:block;font-size:10px;color:#b6c0cf;font-weight:400;margin-top:2px;line-height:1.3}
  .bazi-table .gan .wx-tag,.bazi-table .zhi .wx-tag{font-size:10px;font-weight:400;color:#cbd5e1;margin-left:3px;vertical-align:middle}
  .bazi-table .cell-note{font-size:10.5px;color:#64748b;line-height:1.4;margin:3px 2px 0}
  .bazi-table .cell-note.sub{color:#a78bfa;margin-top:1px}
  .dash .bazi-table .cell-note{display:none}
  .dash .bazi-table th .th-sub{display:none}
  .dash .bazi-table .gan .wx-tag,.dash .bazi-table .zhi .wx-tag{display:none}

  .bz-legend{background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:13px 15px;margin-bottom:14px}
  .bz-legend .lg-title{font-size:13px;font-weight:700;color:var(--blue-d);margin-bottom:8px}
  .bz-legend .lg-list{margin:0;padding-left:18px;font-size:12px;color:#475569;line-height:1.85}
  .bz-legend .lg-list li{margin-bottom:4px}
  .bz-legend .lg-list b{color:var(--ink)}
  .wx-木{color:var(--wood)} .wx-火{color:var(--fire)} .wx-土{color:var(--earth)}
  .wx-金{color:var(--metal)} .wx-水{color:var(--water)}

  /* 五行雷達 + 條 */
  .wx-bars div{display:flex;align-items:center;gap:8px;margin:6px 0}
  .wx-bars .wxn{width:24px;font-weight:600}
  .bar{flex:1;height:8px;background:var(--line);border-radius:4px;overflow:hidden}
  .bar i{display:block;height:100%;border-radius:4px;transition:width .4s}
  .wx-bars .val{font-size:12px;color:var(--sub);width:34px;text-align:right}

  .badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:12px;font-weight:600;margin:2px}
  .badge.good{background:#dcfce7;color:#15803d} .badge.bad{background:#fee2e2;color:#b91c1c}
  .badge.mid{background:#fef3c7;color:#b45309} .badge.blue{background:var(--blue-sel);color:var(--blue-d)}
  .badge.gray{background:#f1f5f9;color:#475569}

  .kv{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);font-size:14px}
  .kv:last-child{border-bottom:none}
  .kv .k{color:var(--sub)} .kv .v{font-weight:600;text-align:right}

  .score-big{display:flex;align-items:center;gap:18px;margin-bottom:6px}
  .ring{position:relative;flex-shrink:0;line-height:0}
  .ring svg{display:block}
  .ring .num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1.1}
  .ring .num b{font-size:28px;font-weight:700;color:var(--blue-d)}
  .ring .num small{font-size:10px;color:var(--sub)}
  .ring.sm .num b{font-size:22px}
  .ring.sm .num small{font-size:9px}

  .detail-list{font-size:12.5px;color:#475569}
  .detail-list .di{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px dashed var(--line)}
  .detail-list .di .pos{color:var(--good)} .detail-list .di .neg{color:var(--bad)}

  /* 大運時間軸 */
  .timeline{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px}
  .ty{flex:0 0 auto;min-width:70px;text-align:center;padding:10px 6px;border:1px solid var(--line);
    border-radius:9px;background:var(--soft)}
  .ty.active{border-color:var(--blue);background:var(--blue-l);box-shadow:0 0 0 2px rgba(59,130,246,.15)}
  .ty .gz{font-size:18px;font-weight:700} .ty .g{font-size:11px;color:var(--blue-d);margin-top:2px}
  .ty .age{font-size:10.5px;color:var(--sub);margin-top:3px}
  .ty .tier{font-size:11px;font-weight:600;margin-top:3px}
  .tier-旺{color:var(--good)} .tier-平{color:var(--mid)} .tier-弱{color:var(--bad)}

  .ln-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:14px}
  .ln-row:last-child{border-bottom:none}
  .ln-row .yr{font-weight:600;width:88px} .ln-row .gz{width:50px} .ln-row .g{color:var(--sub);font-size:12.5px;flex:1}

  /* 紫微方格盤 */
  /* 紫微頁左右分欄：左說明、右命盤 */
  .zw-layout{display:flex;gap:18px;align-items:flex-start}
  .zw-side{flex:0 0 320px;max-width:320px}
  .ziwei-wrap{position:relative;flex:1 1 auto;min-width:0}
  @media(max-width:920px){
    .zw-layout{flex-direction:column}
    .zw-side{flex:1 1 auto;max-width:none;width:100%}
    .ziwei-wrap{width:100%}
  }
  .ziwei-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;align-items:stretch}
  .zw-cell{border:1px solid var(--line);border-radius:9px;padding:10px 9px;background:var(--soft);
    font-size:12px;display:flex;flex-direction:column;min-height:118px}
  .zw-cell.clickable{cursor:pointer;transition:.12s}
  .zw-cell.clickable:hover{border-color:#93c5fd;box-shadow:0 2px 8px rgba(59,130,246,.12)}
  .zw-cell.active{border-color:var(--blue-d);box-shadow:0 0 0 2px var(--blue-sel)}

  /* 宮位浮動框 */
  .zw-pop{position:absolute;z-index:30;width:280px;max-width:88vw;background:#fff;
    border:1px solid #cbd5e1;border-radius:12px;box-shadow:0 10px 30px rgba(15,23,42,.18);
    padding:14px 16px 15px}
  .zw-pop[hidden]{display:none}
  .zw-pop-x{position:absolute;top:8px;right:8px;width:24px;height:24px;border:none;border-radius:50%;
    background:var(--soft);color:#64748b;cursor:pointer;font-size:13px;line-height:1;
    display:flex;align-items:center;justify-content:center}
  .zw-pop-x:hover{background:#fee2e2;color:#dc2626}
  .pd-head{display:flex;align-items:baseline;gap:8px;margin-bottom:8px;padding-right:24px}
  .pd-head .pd-name{font-size:18px;font-weight:700;color:var(--blue-d)}
  .pd-head .pd-gz{font-size:12px;color:#94a3b8}
  .pd-meaning{font-size:12.5px;color:#475569;line-height:1.7;margin-bottom:8px}
  .pd-stars-line{font-size:13px;color:var(--ink);margin-bottom:8px}
  .pd-starbox{border-top:1px dashed #e2e8f0;padding-top:8px;display:flex;flex-direction:column;gap:6px}
  .pd-star{font-size:12px;color:#475569;line-height:1.6}
  .pd-star b{color:var(--ink)}
  @media(max-width:560px){ .zw-pop{width:240px} }
  .zw-cell.center{grid-column:2/4;grid-row:2/4;background:#fff;justify-content:center;align-items:center;text-align:center}
  .zw-cell.ming{background:var(--blue-l);border-color:#bfdbfe}
  .zw-cell .pn{font-size:13px;font-weight:700;color:var(--blue-d);margin-bottom:5px;line-height:1.3}
  .zw-cell .pn .pn-note{display:block;font-size:10px;font-weight:400;color:#94a3b8;margin-top:2px}
  .zw-cell .star{font-size:15px;font-weight:700;line-height:1.45;margin-top:3px}
  .zw-cell .star .sh{font-size:10px;color:#fff;padding:0 4px;border-radius:3px;margin-left:3px}
  .zw-cell .star .br{font-size:10px;color:#b08900;margin-left:3px;font-weight:600}
  .zw-cell .star-note{font-size:11px;color:#64748b;line-height:1.4;margin:2px 0 4px}
  .sh-祿{background:#16a34a}.sh-權{background:#dc2626}.sh-科{background:#2563eb}.sh-忌{background:#64748b}
  .zw-cell .mn{font-size:10.5px;color:#b6c0cf;margin-top:auto;padding-top:4px;text-align:right}

  .zw-legend{background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:14px 16px}
  .zw-legend .lg-title{font-size:13px;font-weight:700;color:var(--blue-d);margin-bottom:8px}
  .zw-legend .lg-list{margin:0;padding-left:18px;font-size:12px;color:#475569;line-height:1.85}
  .zw-legend .lg-list li{margin-bottom:4px}
  .zw-legend .lg-list b{color:var(--ink)}
  .zw-legend .lg-list .sh{font-size:10px;color:#fff;padding:1px 5px;border-radius:4px;margin:0 1px}
  .zw-legend .lg-foot{margin-top:9px;padding-top:9px;border-top:1px dashed #e2e8f0;font-size:11.5px;color:var(--sub);line-height:1.7}
  .zw-legend .lg-foot b{color:var(--blue-d)}

  .note{background:var(--soft);border:1px solid var(--line);border-radius:8px;padding:11px 13px;
    font-size:13px;color:#475569;line-height:1.8;margin-top:10px}
  .note b{color:var(--ink)}

  .palace-card{border:1px solid var(--line);border-radius:9px;padding:12px;margin-bottom:8px}
  .palace-card .ptitle{font-size:13.5px;font-weight:600;margin-bottom:3px;display:flex;justify-content:space-between}
  .palace-card .pstars{font-size:13px;margin:4px 0}
  .palace-card .pdesc{font-size:12px;color:var(--sub)}

  .cg-card .cg-body{display:flex;gap:18px;flex-wrap:wrap;margin-top:6px}
  .cg-card .cg-left{flex:1 1 220px;min-width:200px}
  .cg-card .cg-right{flex:1 1 260px;min-width:230px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:14px 16px}
  .cg-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--line);font-size:13px}
  .cg-row .cg-k{color:var(--sub);width:52px;flex:none}
  .cg-row .cg-sub{color:var(--ink);flex:1}
  .cg-row .cg-w{font-weight:600;color:var(--blue-d)}
  .cg-total{margin-top:10px;font-size:15px;color:var(--ink)}
  .cg-total b{font-size:19px;color:var(--blue-d)}
  .cg-total .cg-num{font-size:12px;color:#94a3b8;margin-left:4px}
  .cg-ptitle{font-size:13px;font-weight:700;color:var(--blue-d);margin-bottom:8px}
  .cg-poem{font-size:14px;line-height:2;color:#334155;letter-spacing:1px}
  .cg-warn{margin-top:12px;font-size:12px;color:#b45309;background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:8px 11px}

  .disclaimer{text-align:center;font-size:12px;color:#94a3b8;margin-top:24px;line-height:1.8}

  .empty-tip{text-align:center;color:var(--sub);font-size:13px;padding:30px}
  .loading{text-align:center;padding:30px;color:var(--sub)}
  @media(max-width:560px){
    .bazi-table .gan,.bazi-table .zhi{font-size:21px}

 </div><!-- /#formZone -->

<script type="module">
import { buildBazi, lunar2solar, solar2lunar, leapMonth, GAN_WX } from "./engine-calendar.js";
import { chengGu } from "./engine-chenggu.js";
import { fullBaziAnalysis, SHISHEN_DESC } from "./engine-bazi.js";
import { calcDaYun, annotateDaYun, calcLiuNian, calcLiuYue, LUCK_THEME } from "./engine-luck.js";
import { shengXiaoInfo, sunSign, risingSign, SIGN_TRAIT, nameAnalysis, luckText } from "./engine-aux.js";
import { coupleAnalysis } from "./engine-couple.js";
import { extractZiwei, PALACE_ORDER, SIHUA_DESC } from "./engine-ziwei.js";
import { GLOSSARY } from "./glossary.js";

/* 廟旺得利平不陷：星曜在該宮的「亮度／力量」，白話一句 */
const BRIGHT_NOTE={
  "廟":"廟－力量最強，發揮到極致",
  "旺":"旺－力量很強，表現亮眼",
  "得":"得地－力量不錯，穩定發揮",
  "利":"利益－尚可，有一定力量",
  "平":"平和－中規中矩，普通發揮",
  "不":"不得地－力量偏弱，較難施展",
  "陷":"落陷－力量最弱，易有缺憾"
};

const WX_COLOR={木:"var(--wood)",火:"var(--fire)",土:"var(--earth)",金:"var(--metal)",水:"var(--water)"};
const $=s=>document.querySelector(s);
const $$=s=>[...document.querySelectorAll(s)];

/* ---- 表單初始化 ---- */
function fillSelect(sel,from,to,suffix,fn){
  for(let i=from;i<=to;i++){const o=document.createElement("option");o.value=i;o.textContent=(fn?fn(i):i)+suffix;sel.appendChild(o);}
}
["m1","m2"].forEach(id=>fillSelect($("#"+id),1,12," 月"));
["d1","d2"].forEach(id=>fillSelect($("#"+id),1,31," 日"));
const SHICHEN=["子(23-01)","丑(01-03)","寅(03-05)","卯(05-07)","辰(07-09)","巳(09-11)","午(11-13)","未(13-15)","申(15-17)","酉(17-19)","戌(19-21)","亥(21-23)"];
["h1","h2"].forEach(id=>{const s=$("#"+id);for(let i=0;i<24;i++){const o=document.createElement("option");o.value=i;o.textContent=String(i).padStart(2,"0")+" 時";s.appendChild(o);}});
["min1","min2"].forEach(id=>{const s=$("#"+id);for(let i=0;i<60;i+=5){const o=document.createElement("option");o.value=i;o.textContent=String(i).padStart(2,"0")+" 分";s.appendChild(o);}});

/* seg 按鈕通用 */
const segVal={};
$$(".seg").forEach(seg=>{
  const key=seg.dataset.seg;
  segVal[key]=seg.querySelector(".on")?.dataset.v;
  seg.querySelectorAll("button").forEach(b=>b.addEventListener("click",()=>{
    seg.querySelectorAll("button").forEach(x=>x.classList.remove("on"));
    b.classList.add("on");segVal[key]=b.dataset.v;
    if(key==="hknown1") $(".hrow1").style.display=b.dataset.v==="1"?"flex":"none";
    if(key==="hknown2") $(".hrow2").style.display=b.dataset.v==="1"?"flex":"none";
  }));
});
$$(".adv-toggle").forEach(t=>t.addEventListener("click",()=>{
  const box=$("#"+t.dataset.adv);box.classList.toggle("show");
  t.textContent=t.textContent.replace(box.classList.contains("show")?"▸":"▾",box.classList.contains("show")?"▾":"▸");
}));

/* 模式切換 */
let MODE="single";
$$(".mode-btn").forEach(b=>b.addEventListener("click",()=>{
  $$(".mode-btn").forEach(x=>x.classList.remove("on"));b.classList.add("on");
  MODE=b.dataset.mode;
  $("#card2").style.display=MODE==="couple"?"block":"none";
  $("#p1label").textContent=MODE==="couple"?"本人資料":"命主資料";
  $("#result").classList.remove("show");
}));

/* ---- 讀取一個人的輸入 → bazi 分析 ---- */
function readPerson(n){
  const name=$("#name"+n).value.trim();
  const sex=segVal["sex"+n];
  let y=+$("#y"+n).value, m=+$("#m"+n).value, d=+$("#d"+n).value;
  const known=segVal["hknown"+n]==="1";
  const hour=known?+$("#h"+n).value:-1;
  const minute=known?+$("#min"+n).value:0;
  if(!y) throw "請輸入"+(n===1?"":"對方")+"出生年份";
  if(segVal["cal"+n]==="lunar"){
    if(y<1900||y>2100) throw "農曆轉換僅支援 1900–2100";
    const sol=lunar2solar(y,m,d,false);y=sol.y;m=sol.m;d=sol.d;
  }
  if(y<1900||y>2100) throw "請輸入正確年份 (1900–2100)";
  const opts={};
  if(n===1 && segVal.tst1==="1"){opts.useTrueSolar=true;opts.longitude=+$("#lon1").value||121.5;}
  if(n===1) opts.ziSchool=$("#zi1").value;
  const bz=buildBazi(y,m,d,hour,minute,opts);
  const analysis=fullBaziAnalysis(bz);
  analysis.name=name; analysis.sex=sex;
  // 命中最旺/最弱五行
  let _mx=-1,_mn=99;
  for(const k in analysis.tally){
    if(analysis.tally[k]>_mx){_mx=analysis.tally[k];analysis.strong=k;}
    if(analysis.tally[k]<_mn){_mn=analysis.tally[k];analysis.weak=k;}
  }
  analysis.sx=shengXiaoInfo(bz.yZhi);
  analysis.sign=sunSign(bz.solar.m,bz.solar.d);
  analysis.rising=known?risingSign(bz.solar.m,bz.solar.d,hour):null;
  analysis.nameInfo=name?nameAnalysis(name):null;
  // 紫微
  if(typeof iztro!=="undefined" && known){
    try{
      const g=sex==="女"?"女":"男";
      const ds=bz.solar.y+"-"+bz.solar.m+"-"+bz.solar.d;
      const hi=bz.hourIdx>=0?bz.hourIdx:0;
      const astro=iztro.astro.bySolar(ds,hi,g,true,"zh-TW");
      analysis.ziwei=extractZiwei(astro);
    }catch(e){analysis.ziwei=null;}
  }else analysis.ziwei=null;
  // 袁天罡稱骨（年干支+農曆月日+時辰，時辰依真太陽時）
  try{
    const eff=bz.effective||{y:bz.solar.y,m:bz.solar.m,d:bz.solar.d};
    const lun=solar2lunar(eff.y,eff.m,eff.d);
    analysis.chenggu=chengGu(bz,lun);
  }catch(e){analysis.chenggu=null;}
  return analysis;
}

/* ====== 渲染：四柱排盤表 ====== */
function wxSpan(ch){const wx=GAN_WX[ch]; return `<span class="wx-${wx}">${ch}</span>`;}
/* 四柱代表的人生範圍（白話） */
const PILLAR_LIFE={
  年柱:"祖上、童年（約 0–16 歲）",
  月柱:"父母、青年與事業（約 17–32 歲）",
  日柱:"自己與配偶（約 33–48 歲，日干就是你本人）",
  時柱:"子女、晚年（約 48 歲後）"
};
/* 取十神白話（GLOSSARY 第一句） */
function godPlain(g){
  if(!g||g==="日主") return "";
  const t=GLOSSARY[g]; return t?t.split("：")[0]:"";
}
function renderBaziTable(a, showLegend=false){
  const c=a.chart, bz=a.bz;
  const cols=[["年柱",c.year],["月柱",c.month],["日柱",c.day]];
  if(c.hour) cols.push(["時柱",c.hour]); else cols.push(["時柱",null]);
  const ths=cols.map(([t])=>`<th>${t}<span class="th-sub">${PILLAR_LIFE[t]||""}</span></th>`).join("");
  const ZHI_WX_MAP={子:"水",丑:"土",寅:"木",卯:"木",辰:"土",巳:"火",午:"火",未:"土",申:"金",酉:"金",戌:"土",亥:"水"};
  const cell=(p,title)=>{
    if(!p) return `<td><div class="gz-cell"><div style="color:#cbd5e1;font-size:13px;padding:20px 0">時辰不詳<br><span style="font-size:11px">（補上出生時間更準）</span></div></div></td>`;
    const ganWx=GAN_WX[p.gan], zhiWx=ZHI_WX_MAP[p.zhi];
    const cangan=p.cangan.map(cg=>`<span class="wx-${GAN_WX[cg.gan]}">${cg.gan}</span><span style="color:#cbd5e1">${cg.god||""}</span>`).join("　");
    const godNote = p.ganGod==="日主"
      ? `<div class="cell-note">這就是「你自己」，整張命盤的主角</div>`
      : (godPlain(p.ganGod)?`<div class="cell-note">${p.ganGod}＝${godPlain(p.ganGod)}</div>`:"");
    const csNote = p.changSheng&&GLOSSARY[p.changSheng]
      ? `<div class="cell-note sub">${p.changSheng}：${GLOSSARY[p.changSheng].split("：")[0].replace(/^像/,"")}</div>`:"";
    return `<td><div class="gz-cell">
      <div class="god">${p.ganGod}</div>
      <div class="gan wx-${ganWx}">${p.gan}<span class="wx-tag">${ganWx}</span></div>
      <div class="zhi wx-${zhiWx}">${p.zhi}<span class="wx-tag">${zhiWx}</span></div>
      ${godNote}
      <div class="cs">${p.changSheng||""}</div>
      ${csNote}
      <div class="cangan">${cangan}</div>
      <div class="ny">${p.nayin||""}</div>
    </div></td>`;
  };
  const legend=`<div class="bz-legend">
    <div class="lg-title">📖 看不懂？這張表一格一格這樣讀</div>
    <ul class="lg-list">
      <li><b>四個直行＝四柱</b>：年、月、日、時，分別代表人生不同階段（標題下方已寫）。<b>「日柱」的上面那個大字就是「你自己」</b>。</li>
      <li><b>最上面藍字＝十神</b>：那個字（天干）對「你」來說扮演什麼角色，例如「正印＝靠山貴人」「正官＝規矩責任」，下方已附白話。</li>
      <li><b>中間兩個大字＝天干＋地支</b>：每字旁的小灰字是它的<b>五行</b>（木火土金水）。顏色也按五行區分。</li>
      <li><b>紫色字＝十二長生</b>：這個天干在這個位置的「能量強弱階段」，像人的一生（長生＝旺、帝旺＝最強、死絕＝最弱）。</li>
      <li><b>灰色小字＝藏干＋納音</b>：地支裡暗藏的天干與其十神、以及這柱的納音五行，屬進階參考，看不懂可略過。</li>
    </ul>
  </div>`;
  return `${showLegend?legend:""}<table class="bazi-table"><tr>${ths}</tr><tr>${cols.map(([t,p])=>cell(p,t)).join("")}</tr></table>`;
}

/* ====== 五行條 ====== */
function renderWuxing(tally){
  const max=Math.max(...Object.values(tally),0.1);
  return `<div class="wx-bars">${["木","火","土","金","水"].map(k=>`
    <div><span class="wxn wx-${k}">${k}</span>
      <div class="bar"><i style="width:${Math.max(4,tally[k]/max*100)}%;background:${WX_COLOR[k]}"></i></div>
      <span class="val">${tally[k].toFixed(1)}</span></div>`).join("")}</div>`;
}

/* ====== 身強弱明細 ====== */
function renderStrength(s){
  const pct=Math.max(5,Math.min(95,(s.score+16)/32*100));
  return `<div class="score-big">
    <div style="flex:1">
      <div style="font-size:24px;font-weight:700;margin-bottom:4px">${s.strength}
        <span style="font-size:14px;color:var(--sub);font-weight:400">（分數 ${s.score}）</span></div>
      <div class="bar" style="height:10px"><i style="width:${pct}%;background:linear-gradient(90deg,#3b82f6,#6366f1)"></i></div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--sub);margin-top:3px">
        <span>極弱</span><span>身弱</span><span>中和</span><span>身強</span><span>極強</span></div>
    </div></div>
    <div class="note">日主 <b class="wx-${s.dayWx}">${s.dayGan}（${s.dayWx}）</b>，月令${s.ling.state}。${s.ling.note}。</div>
    <details style="margin-top:10px"><summary style="cursor:pointer;font-size:13px;color:var(--blue-d)">▸ 展開身強弱計分明細</summary>
      <div class="detail-list" style="margin-top:8px">${s.detail.map(d=>
        `<div class="di"><span>${d.item} <span style="color:#94a3b8">${d.note}</span></span>
         <span class="${d.val>=0?'pos':'neg'}">${d.val>=0?'+':''}${d.val}</span></div>`).join("")}</div>
    </details>`;
}

/* ====== 用神 ====== */
function renderYong(y){
  return `<div style="margin-bottom:10px">
    <span style="font-size:13px;color:var(--sub)">取用方法：</span><b>${y.method}</b></div>
    <div style="margin-bottom:8px">喜用神：${y.primary.map(w=>`<span class="badge good wx-${w}" style="background:#dcfce7">${w}</span>`).join("")}</div>
    <div style="margin-bottom:8px">忌神：${y.avoid.length?y.avoid.map(w=>`<span class="badge bad">${w}</span>`).join(""):'<span style="color:#94a3b8">—</span>'}</div>
    <div class="note">${y.note}</div>`;
}

/* ====== 十神分布 ====== */
function renderGodTally(gt){
  const max=Math.max(...Object.values(gt),0.1);
  const colors={比劫:"#3b82f6",食傷:"#16a34a",財星:"#d97706",官殺:"#dc2626",印星:"#8b5cf6"};
  return `<div class="wx-bars">${Object.entries(gt).map(([k,v])=>`
    <div><span class="wxn" style="width:30px;font-size:12px">${k}</span>
      <div class="bar"><i style="width:${Math.max(4,v/max*100)}%;background:${colors[k]}"></i></div>
      <span class="val">${v.toFixed(1)}</span></div>`).join("")}</div>`;
}

/* ====== 神煞 ====== */
function renderShensha(list){
  if(!list.length) return `<div class="empty-tip">命中無明顯神煞</div>`;
  return list.map(s=>`<div style="padding:9px 0;border-bottom:1px solid var(--line)">
    <div><b>${s.name}</b> <span class="badge gray">${s.positions.join("、")}</span></div>
    <div style="font-size:12.5px;color:var(--sub);margin-top:2px">${s.desc}</div></div>`).join("");
}

/* ====== 袁天罡稱骨 ====== */
function renderChengGu(cg){
  if(!cg) return "";
  const rows=cg.parts.map(p=>`<div class="cg-row">
    <span class="cg-k">${p.label}</span>
    <span class="cg-sub">${p.sub}</span>
    <span class="cg-w">${p.cn}</span></div>`).join("");
  const poem=cg.poem.length
    ? `<div class="cg-poem">${cg.poem.map(line=>`<div>${line}</div>`).join("")}</div>`
    : "";
  const note=cg.hourKnown?"":`<div class="cg-warn">※ 未填出生時辰，僅以「年＋月＋日」三項計算，補上時辰會更準。</div>`;
  return `<div class="card cg-card"><h3><span class="ic">秤</span>袁天罡稱骨 · 八字幾兩重</h3>
    <div class="cap">這是一套傳統「查表」算命法：把出生年、月、日、時各換成一個「兩錢數」相加，得到骨重，再對照一首評語詩。<b>與八字／紫微是不同系統</b>，圖個趣味參考即可。</div>
    <div class="cg-body">
      <div class="cg-left">
        ${rows}

/* ====== 紫微方格盤 ====== */
const GRID_POS={ // 12宮按地支固定位置（4x4外圈）
  巳:[0,0],午:[0,1],未:[0,2],申:[0,3],
  辰:[1,0],酉:[1,3],
  卯:[2,0],戌:[2,3],
  寅:[3,0],丑:[3,1],子:[3,2],亥:[3,3]
};
function renderZiwei(a){
  if(!a.ziwei){
    return `<div class="card"><h3><span class="ic">紫</span>紫微斗數</h3>
      <div class="empty-tip">紫微排盤需要<b>準確的出生時辰</b>。請回上方填入出生時間後重新啟盤。</div></div>`;
  }
  const z=a.ziwei;
  // 方格盤
  const cellByBranch={};
  z.palaces.forEach(p=>{ if(p.earthlyBranch) cellByBranch[p.earthlyBranch]=p; });
  let cells="";
  for(let r=0;r<4;r++)for(let c=0;c<4;c++){
    if(r>=1&&r<=2&&c>=1&&c<=2){ if(r===1&&c===1){cells+=`<div class="zw-cell center">
        <div style="font-weight:700;font-size:19px;margin-bottom:8px">${a.name||"命盤"}</div>
        <div style="font-size:13.5px;color:var(--sub);line-height:2.1">
          命主 ${z.soul||"—"}・身主 ${z.body||"—"}<br>
          ${z.fiveElementsClass||""}<br>
          生肖 ${(z.zodiac||a.sx.sx).replace(/座$/,"")}・${(z.sign||a.sign+"座").replace(/座座$/,"座")}</div></div>`;} continue; }
    const branch=Object.keys(GRID_POS).find(b=>GRID_POS[b][0]===r&&GRID_POS[b][1]===c);
    const p=branch?cellByBranch[branch]:null;
    if(!p){cells+=`<div class="zw-cell"></div>`;continue;}
    const stars=p.majorStars.map(s=>{
      const meaning=GLOSSARY[s.name]?GLOSSARY[s.name].split("：")[0]:"";
      const brNote=s.brightness?(BRIGHT_NOTE[s.brightness]||s.brightness):"";
      return `<div class="star wx-default">${s.name}${s.mutagen?`<span class="sh sh-${s.mutagen}">${s.mutagen}</span>`:""}${s.brightness?`<span class="br">${s.brightness}</span>`:""}</div>`
        +`<div class="star-note">${meaning}${brNote?`<br><span style="color:#b08900">${brNote}</span>`:""}${s.mutagen?`<br><span style="color:#2563eb">${(SIHUA_DESC[s.mutagen]||("化"+s.mutagen))}</span>`:""}</div>`;
    }).join("")
      || `<div style="color:#cbd5e1;font-size:10px">（此宮無主星，看對面那一宮借用）</div>`;
    // 浮動框內容（點擊跳出）
    const detail=palaceDetailHTML(p);
    cells+=`<div class="zw-cell clickable ${p.name==='命宮'?'ming':''}" data-detail="${encodeURIComponent(detail)}" title="點我看「${p.name}」詳解">
      <div class="pn">${p.name}<span class="pn-note">${(GLOSSARY[p.name]||p.desc||"").split("（")[0].split("：").slice(-1)[0]}</span></div>${stars}
      <div class="mn">${p.heavenlyStem||""}${p.earthlyBranch||""}</div></div>`;
  }
  const legend=`<div class="zw-legend">
    <div class="lg-title">📖 看不懂？這張盤這樣讀</div>
    <ul class="lg-list">
      <li><b>十二個格子＝人生十二個面向</b>：每格上面藍字是宮名（如「命宮＝核心性格」「夫妻＝感情婚姻」），下面灰字是它管什麼。<b>藍底那格是「命宮」，最重要</b>。</li>
      <li><b>格子裡的大字＝主星</b>：代表這個面向的「個性／能量」，星名下方已直接寫白話意思（如「紫微＝帝王星，主領導」）。</li>
      <li><b>星旁的小灰字（廟旺得利平不陷）＝這顆星的力量強弱</b>：<span style="color:#b08900">廟旺＝很強、平＝普通、不陷＝偏弱</span>。</li>
      <li><b>彩色小標＝四化</b>：<span class="sh sh-祿">祿</span>好處財祿、<span class="sh sh-權">權</span>權力能力、<span class="sh sh-科">科</span>名聲貴人、<span class="sh sh-忌">忌</span>牽絆阻礙。</li>
      <li><b>格子角落兩字（如壬午）＝干支座標</b>，排盤用的，不懂可以略過。</li>
    </ul>
    <div class="lg-foot">命主 <b>${z.soul}</b>＝先天主導你的星、身主 <b>${z.body}</b>＝後天養成你的星；<b>${z.fiveElementsClass}</b>＝決定大運幾歲起運的五行局。</div>
  </div>`;
  return `<div class="card zw-card"><h3><span class="ic">紫</span>紫微斗數 · 命盤
        <span style="margin-left:auto;font-size:11.5px;font-weight:400;color:var(--sub)">👆 點任一宮格看詳解</span></h3>
      <div class="zw-layout">
        <div class="zw-side">${legend}</div>
        <div class="ziwei-wrap"><div class="ziwei-grid">${cells}</div>
          <div class="zw-pop" id="zwPop" hidden></div></div>
      </div></div>`;
}

/* 單一宮位的浮動框內容 */
function palaceDetailHTML(p){
  const stars=p.majorStars.length
    ? p.majorStars.map(s=>`${s.name}${s.brightness?`<span style="color:#b08900;font-size:11px">${s.brightness}</span>`:""}${s.mutagen?`<span class="badge ${s.mutagen==='祿'?'good':s.mutagen==='忌'?'bad':'blue'}" style="padding:0 6px;margin-left:2px">化${s.mutagen}</span>`:""}`).join("、")
    : '<span style="color:#94a3b8">無主星，借對宮星曜論斷</span>';
  const starDescs=p.majorStars.map(s=>{
    const g=GLOSSARY[s.name];
    return g?`<div class="pd-star"><b>${s.name}</b>：${g}</div>`:"";
  }).join("");
  const palMeaning=GLOSSARY[p.name]||p.desc||"";
  return `<div class="pd-head"><span class="pd-name">${p.name}</span>`
    +`<span class="pd-gz">${p.heavenlyStem||""}${p.earthlyBranch||""}</span></div>`
    +`<div class="pd-meaning">這一宮看：${palMeaning}</div>`
    +`<div class="pd-stars-line">主星：${stars}</div>`
    +(starDescs?`<div class="pd-starbox">${starDescs}</div>`:"");
}

     <div class="card"><h3><span class="ic">肖</span>生肖</h3>
       <div style="font-size:18px;font-weight:700;margin-bottom:6px">屬${a.sx.sx}</div>
       <div class="note">${a.sx.trait}</div>
       <div style="margin-top:10px;font-size:12.5px;line-height:1.9">
         <div>三合（最佳助力）：<b>${a.sx.sanhe.join("、")}</b></div>
         <div>六合（貴人）：<b>${a.sx.liuhe}</b></div>
         <div>六沖（最不合）：<b style="color:var(--bad)">${a.sx.chong}</b></div>
         <div>相害：<b>${a.sx.hai}</b>　相刑：<b>${a.sx.xing.join("、")}</b></div></div></div>
   </div></div>`;
  return {html, luck};
}

function renderName(a){

    ${n.hasEstimate?'<div class="cap" style="color:#d97706">⚠ 部分用字筆畫未收錄，以估算值計算，僅供參考。</div>':''}

}

/* 命局綜評（自家公式，透明可解釋） */
function computeOverall(a){
  // 五行均衡(40) + 身強弱中和度(30) + 格局(15) + 姓名(15)
  const vals=Object.values(a.tally),mx=Math.max(...vals),mn=Math.min(...vals),sum=vals.reduce((x,y)=>x+y,0)||1;
  const balance=100-(mx-mn)/sum*60;
  const mid=100-Math.abs(a.strength.score)/16*55;  // 越接近中和越高
  const patScore=a.pattern.patterns[0].type==="正格"?80:a.pattern.patterns[0].type==="特殊"?75:65;
  const nameScore=a.nameInfo?a.nameInfo.score:70;
  return Math.max(50,Math.min(98,Math.round(balance*0.4+mid*0.3+patScore*0.15+nameScore*0.15)));
}

/* ====== 合盤用：個人命盤精簡摘要 ====== */
function renderPersonDigest(a){
  const dy=calcDaYun(a.bz,a.sex);const nowY=new Date().getFullYear();
  annotateDaYun(dy,a.yong.primary,nowY,a.bz.solar.y);
  const tl=dy.list.map(p=>`<div class="ty ${p.active?'active':''}">
    <div class="gz">${wxSpan(p.gz[0])}${p.gz[1]}</div><div class="g">${p.ganGod}</div>
    <div class="age">${p.startAge}-${p.endAge}歲</div><div class="tier tier-${p.tier}">${p.tier}</div></div>`).join("");
  return `<div class="card">
      <div style="font-size:17px;font-weight:700;margin-bottom:4px">${a.name||"此人"}
        <span style="font-size:13px;color:var(--sub);font-weight:400">${a.sex}・屬${a.sx.sx}・${a.sign}座</span></div>
      <div style="font-size:13px;color:var(--sub)">日主 <b class="wx-${a.strength.dayWx}">${a.bz.dGan}（${a.strength.dayWx}）</b>・${a.strength.strength}・${a.pattern.patterns[0].name}・喜用 ${a.yong.primary.map(w=>`<span class="badge good wx-${w}" style="background:#dcfce7">${w}</span>`).join("")}</div>
    </div>
    <div class="card"><h3><span class="ic">柱</span>八字四柱</h3>${renderBaziTable(a)}</div>
    <div class="card"><h3><span class="ic">五</span>五行能量</h3>${renderWuxing(a.tally)}</div>
    <div class="card"><h3><span class="ic">用</span>用神喜忌</h3>${renderYong(a.yong)}</div>
    <div class="card"><h3><span class="ic">煞</span>神煞</h3>${renderShensha(a.shensha)}</div>
    <div class="card"><h3><span class="ic">運</span>大運</h3><div class="cap">${dy.dir}・${dy.startDesc}</div><div class="timeline">${tl}</div></div>`;
}

          `<div style="margin:8px 0"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px"><span>${k}</span><span style="font-weight:600">${v}</span></div>

/* ====== tab 切換 + 流月 lazy ====== */
function bindTabs(luckCtx){
  $$(".rtab").forEach(t=>t.addEventListener("click",()=>{
    $$(".rtab").forEach(x=>x.classList.remove("on"));t.classList.add("on");
    $$(".panel").forEach(p=>p.classList.toggle("on",p.dataset.panel===t.dataset.p));
    window.scrollTo({top:0,behavior:"smooth"});
  }));
  bindZiweiPopover();
  const lyBox=$("#liuyueBox");
  if(lyBox && luckCtx){
    lyBox.addEventListener("click",()=>{
      const det=$("#liuyueDetail");
      if(det.dataset.open){det.innerHTML="";det.dataset.open="";lyBox.innerHTML=lyBox.innerHTML.replace("▾","▸");return;}
      const ly=calcLiuYue(luckCtx.nowY,luckCtx.A.yong.primary,luckCtx.A.bz.dGan);
      det.innerHTML=ly.map(M=>`<div class="ln-row"><span class="yr">${M.monthName}</span>
        <span class="gz">${wxSpan(M.gz[0])}${M.gz[1]}</span>
        <span class="badge ${M.tier==='旺'?'good':M.tier==='弱'?'bad':'mid'}">${M.tier}</span>
        <span class="g">${M.ganGod}</span></div>`).join("");
      det.dataset.open="1";lyBox.innerHTML=lyBox.innerHTML.replace("▸","▾");
    });
  }
}

/* ====== 紫微宮位浮動框 ====== */
function bindZiweiPopover(){
  const grid=$(".ziwei-grid"); const pop=$("#zwPop");
  if(!grid||!pop) return;
  const wrap=$(".ziwei-wrap");
  const close=()=>{ pop.hidden=true; grid.querySelectorAll(".zw-cell.active").forEach(c=>c.classList.remove("active")); };
  grid.addEventListener("click",e=>{
    const cell=e.target.closest(".zw-cell.clickable");
    if(!cell) return;
    if(cell.classList.contains("active")){ close(); return; }
    grid.querySelectorAll(".zw-cell.active").forEach(c=>c.classList.remove("active"));
    cell.classList.add("active");
    pop.innerHTML=`<button class="zw-pop-x" aria-label="關閉">✕</button><div class="zw-pop-body">${decodeURIComponent(cell.dataset.detail||"")}</div>`;
    pop.hidden=false;
    // 定位：在格子右側；若超出容器右緣則改放左側
    const wr=wrap.getBoundingClientRect(), cr=cell.getBoundingClientRect();
    const top=cr.top-wr.top;
    pop.style.top=top+"px";
    const popW=pop.offsetWidth, gap=10;
    let left=cr.right-wr.left+gap;
    if(left+popW>wr.width){ left=cr.left-wr.left-popW-gap; }
    if(left<0) left=Math.max(4,(wr.width-popW)/2);
    pop.style.left=left+"px";
    pop.querySelector(".zw-pop-x").addEventListener("click",ev=>{ev.stopPropagation();close();});
  });
  document.addEventListener("click",e=>{
    if(pop.hidden) return;
    if(!e.target.closest(".ziwei-wrap")) close();
  });
}

/* ====== 收合 / 展開表單 ====== */
function calLabel(n){return segVal["cal"+n]==="lunar"?"農":"國";}
function personLabel(n){
  const name=$("#name"+n).value.trim()||"未命名";
  const y=$("#y"+n).value,m=$("#m"+n).value,d=$("#d"+n).value;
  const known=segVal["hknown"+n]==="1";
  const t=known?` ${String($("#h"+n).value).padStart(2,"0")}:${String($("#min"+n).value).padStart(2,"0")}`:" 時辰不詳";
  return `${name}・${calLabel(n)}${y}/${m}/${d}${t}`;
}
function collapseForm(){
  $("#formZone").classList.add("collapsed");
  $(".page-content").classList.add("wide");
  const info = MODE==="couple"
    ? `${personLabel(1)} ✕ ${personLabel(2)}`
    : personLabel(1);
  $("#recapInfo").textContent = info;
  $("#recap").classList.add("show");
  $(".app-header .tag").classList.add("hide");
}
function expandForm(){
  $("#formZone").classList.remove("collapsed");
  $(".page-content").classList.remove("wide");
  $("#recap").classList.remove("show");
  $(".app-header .tag").classList.remove("hide");
  window.scrollTo({top:0,behavior:"smooth"});
}
$("#recap").addEventListener("click",expandForm);

/* ====== 啟動 ====== */
$("#go").addEventListener("click",()=>{
  const res=$("#result");
  try{
    res.innerHTML=`<div class="loading">排盤推算中…</div>`;res.classList.add("show");
    setTimeout(()=>{
      try{
        if(MODE==="single"){
          const A=readPerson(1);
          const out=renderSingle(A);
          res.innerHTML=out.html;
          bindTabs({...out.luck, nowY:out.luck.nowY, A});
        }else{
          const A=readPerson(1),B=readPerson(2);
          res.innerHTML=renderCouple(A,B);
          bindTabs(null);
        }
        collapseForm();
        window.scrollTo({top:0,behavior:"smooth"});
      }catch(e){res.innerHTML=`<div class="card"><div class="empty-tip" style="color:var(--bad)">⚠ ${e}</div></div>`;}
    },60);
  }catch(e){res.innerHTML=`<div class="card"><div class="empty-tip" style="color:var(--bad)">⚠ ${e}</div></div>`;}
});
</script>
