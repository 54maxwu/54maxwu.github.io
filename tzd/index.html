<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天知道 · 深度命理命盤</title>
<meta name="description" content="八字四柱、十神身強弱用神、紫微斗數十二宮、大運流年、神煞格局、雙人合盤 — 一站式深度命理排盤分析">
<script src="https://cdn.jsdelivr.net/npm/iztro/dist/iztro.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#f1f5f9; --ink:#1e293b; --sub:#64748b; --line:#e2e8f0;
    --blue:#3b82f6; --blue-d:#2563eb; --blue-l:#eff6ff; --blue-sel:#dbeafe;
    --card:#fff; --soft:#f8fafc;
    --wood:#16a34a; --fire:#dc2626; --earth:#d97706; --metal:#64748b; --water:#0891b2;
    --good:#16a34a; --bad:#dc2626; --mid:#d97706;
  }
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;
    background:var(--bg);color:var(--ink);min-height:100vh;font-size:15px;line-height:1.6;
  }
  /* Header */
  .app-header{
    background:#fff;border-bottom:1px solid var(--line);padding:14px 24px;
    display:flex;align-items:center;gap:12px;min-height:60px;
    box-shadow:0 1px 3px rgba(0,0,0,.06);position:sticky;top:0;z-index:20;
  }
  .app-header .logo{width:30px;height:30px;border-radius:8px;
    background:linear-gradient(135deg,#3b82f6,#6366f1);display:flex;align-items:center;
    justify-content:center;color:#fff;font-weight:700;font-size:16px;flex-shrink:0}
  .app-header h1{font-size:16px;font-weight:600;color:var(--ink);letter-spacing:.02em;margin:0}
  .app-header .tag{font-size:12px;color:var(--sub);margin-left:auto}

  .page-content{padding:16px 24px 60px;max-width:980px;margin:0 auto;transition:max-width .2s}
  .page-content.wide{max-width:1560px}
  .sub{color:var(--sub);font-size:13px;margin-bottom:16px}

  /* Mode tabs */
  .modes{display:flex;gap:8px;margin-bottom:16px}
  .mode-btn{flex:1;padding:10px;background:#fff;border:1px solid var(--line);border-radius:8px;
    color:#475569;cursor:pointer;font-size:14px;font-weight:500;transition:.15s;text-align:center}
  .mode-btn:hover{border-color:#93c5fd;background:var(--blue-l);color:var(--blue-d)}
  .mode-btn.on{background:var(--blue-sel);color:var(--blue-d);border-color:#bfdbfe;font-weight:600}

  /* Form */
  .person-grid{display:grid;grid-template-columns:1fr;gap:16px;margin-bottom:16px}
  .person-grid.couple{grid-template-columns:1fr 1fr}
  @media(max-width:820px){ .person-grid.couple{grid-template-columns:1fr} }
  .form-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:20px}
  .form-card.person2{display:none}
  .person-grid.couple .form-card.person2{display:block}
  .form-card .ph{font-size:13px;font-weight:600;color:var(--blue-d);margin-bottom:14px;
    display:flex;align-items:center;gap:6px}
  .row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
  .fld{flex:1;min-width:120px}
  .fld label{display:block;font-size:12px;color:var(--sub);margin-bottom:5px}
  input,select{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:7px;
    font-size:14px;color:var(--ink);background:#fff;font-family:inherit}
  input:focus,select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.12)}
  .seg{display:flex;gap:6px}
  .seg button{flex:1;padding:8px;background:#fff;border:1px solid var(--line);border-radius:7px;
    color:#475569;cursor:pointer;font-size:13px;transition:.15s}
  .seg button:hover{border-color:#93c5fd;background:var(--blue-l)}
  .seg button.on{background:var(--blue-sel);color:var(--blue-d);border-color:#bfdbfe;font-weight:600}
  .hint{font-size:11.5px;color:#94a3b8;margin-top:4px;line-height:1.5}
  .adv-toggle{font-size:12.5px;color:var(--blue-d);cursor:pointer;user-select:none;margin-bottom:6px}
  .adv-box{display:none;padding-top:6px;border-top:1px dashed var(--line);margin-top:6px}
  .adv-box.show{display:block}

  .go-row{display:flex;gap:10px;align-items:stretch}
  .go{flex:1;padding:13px;background:var(--blue);color:#fff;border:none;border-radius:8px;
    font-size:15px;font-weight:600;cursor:pointer;transition:.15s;font-family:inherit}
  .go:hover{background:var(--blue-d)}
  .go:disabled{opacity:.4;cursor:not-allowed}
  .go-save{flex:0 0 auto;padding:13px 20px;background:#fff;color:var(--blue-d);border:1px solid var(--blue);
    border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:.15s;font-family:inherit;white-space:nowrap}
  .go-save:hover{background:var(--blue-l)}

  /* 我的命盤（存檔清單） */
  .saved-box{margin-top:14px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 16px;display:none}
  .saved-title{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:10px}
  .saved-title .saved-hint{font-size:11.5px;font-weight:400;color:#94a3b8;margin-left:4px}
  .saved-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:8px}
  .saved-item{display:flex;align-items:stretch;border:1px solid var(--line);border-radius:9px;overflow:hidden;transition:.12s}
  .saved-item:hover{border-color:#93c5fd;box-shadow:0 2px 8px rgba(59,130,246,.1)}
  .si-main{flex:1;padding:9px 12px;cursor:pointer;min-width:0}
  .si-main:hover{background:var(--blue-l)}
  .si-name{font-size:13.5px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .si-sub{font-size:11px;color:var(--sub);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .si-del{flex:0 0 auto;width:34px;border:none;border-left:1px solid var(--line);background:#fff;
    color:#cbd5e1;cursor:pointer;font-size:13px;transition:.12s}
  .si-del:hover{background:#fee2e2;color:#dc2626}

  /* Result */
  #result{display:none}
  #result.show{display:block}
  /* tab 列＋命主摘要同一排，把右側空白填滿、省一行高度 */
  .tabbar-row{display:flex;align-items:stretch;gap:10px;margin-bottom:12px;
    position:sticky;top:8px;z-index:11}
  .result-tabs{display:flex;gap:4px;overflow-x:auto;background:#fff;border:1px solid var(--line);
    border-radius:10px;padding:4px;flex:0 1 auto}
  .rtab{flex:0 0 auto;padding:7px 13px;border-radius:7px;font-size:13.5px;color:#475569;
    cursor:pointer;white-space:nowrap;transition:.15s;border:none;background:transparent;font-family:inherit}
  .rtab:hover{background:var(--blue-l);color:var(--blue-d)}
  .rtab.on{background:var(--blue-sel);color:var(--blue-d);font-weight:600}
  /* 命主摘要常駐列（切 tab 都看得到，現移到 tab 列右側） */
  .summary-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:#fff;
    border:1px solid var(--line);border-radius:10px;padding:8px 14px;
    font-size:13px;flex:1 1 auto;min-width:0}
  @media(max-width:760px){
    .tabbar-row{flex-direction:column;gap:8px}
    .summary-bar{flex:1 1 auto}
  }
  .summary-bar .sb-name{font-weight:700;font-size:15px}
  .summary-bar .sb-sep{color:var(--sub);font-size:12.5px}
  .summary-bar .sb-pill{background:var(--soft);border:1px solid var(--line);border-radius:14px;
    padding:2px 10px;font-size:12.5px}
  .panel{display:none}
  .panel.on{display:block}

  .card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:14px}
  .card h3{font-size:15px;font-weight:600;color:var(--ink);margin-bottom:4px;display:flex;
    align-items:center;gap:8px}
  .card h3 .ic{width:22px;height:22px;border-radius:6px;background:var(--blue-l);color:var(--blue-d);
    display:inline-flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
  .card .cap{font-size:12.5px;color:var(--sub);margin-bottom:14px}

  /* Dashboard 瀑布流（內容多的總覽用，依高度填滿） */
  .dash{columns:340px;column-gap:12px}
  .dash .card{break-inside:avoid;margin:0 0 12px;padding:13px 15px;display:inline-block;width:100%}
  .dash .card h3{font-size:13.5px;margin-bottom:8px}
  .dash .card.span-all{column-span:all;display:block;width:100%}
  @media(max-width:680px){ .dash{columns:auto} }
  /* 內容較少的分頁：用會「撐滿整列」的 grid，避免右側大片空白 */
  .grid{display:grid;gap:12px}
  .grid .card{margin:0;padding:14px 16px}
  .grid.g2{grid-template-columns:1fr 1fr}
  .grid.g3{grid-template-columns:1fr 1fr 1fr}
  .grid .full{grid-column:1/-1}
  .colstack{display:flex;flex-direction:column;gap:12px}
  .colstack .card{margin:0}
  @media(max-width:900px){ .grid.g2,.grid.g3{grid-template-columns:1fr} }
  /* dashboard 內元素緊湊化 */
  .dash .kv{padding:5px 0;font-size:13px}
  .dash .wx-bars div{margin:4px 0}
  .dash .bar{height:7px}
  .dash .note{padding:8px 10px;font-size:12px;line-height:1.65}
  .dash .bazi-table{border-spacing:5px}
  .dash .bazi-table .gan,.dash .bazi-table .zhi{font-size:22px;line-height:1.1}
  .dash .bazi-table .gz-cell{padding:7px 3px}
  .dash .bazi-table .god{margin:1px 0}
  .dash .bazi-table .cangan{margin-top:3px;line-height:1.35}
  .dash .bazi-table .cs{margin-top:2px}
  .dash .bazi-table .ny{margin-top:1px}
  .dash .timeline{gap:4px}
  .dash .ty{min-width:60px;padding:7px 4px}
  .dash .ty .gz{font-size:16px}
  .dash .ln-row{padding:5px 0;font-size:13px}
  /* 清單在寬卡內自動多欄填滿 */
  .flow2{column-count:3;column-gap:24px}
  .flow2 .ln-row{break-inside:avoid;border-bottom:1px solid var(--line)}
  @media(max-width:1100px){ .flow2{column-count:2} }
  @media(max-width:680px){ .flow2{column-count:1} }
  .mini-h{font-size:12px;color:var(--blue-d);font-weight:600;margin:12px 0 6px;
    padding-top:10px;border-top:1px solid var(--line)}
  .mini-h:first-child{border-top:none;padding-top:0;margin-top:0}

  /* 表單收合 */
  #formZone.collapsed{display:none}
  /* 已收合時，Header 右側顯示重算膠囊 */
  .recap{display:none;align-items:center;gap:8px;margin-left:auto;background:var(--blue-l);
    border:1px solid #bfdbfe;border-radius:20px;padding:5px 8px 5px 14px;cursor:pointer;
    font-size:13px;color:var(--blue-d);transition:.15s;max-width:46vw}
  .recap:hover{background:var(--blue-sel)}
  .recap .rinfo{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
  .recap .redit{background:var(--blue);color:#fff;border-radius:14px;padding:3px 11px;font-size:12px;
    font-weight:600;flex-shrink:0}
  .recap.show{display:flex}
  .app-header .tag.hide{display:none}

  /* 四柱排盤表 */
  .bazi-table{width:100%;border-collapse:separate;border-spacing:6px;text-align:center}
  .bazi-table th{font-size:12px;color:var(--sub);font-weight:500;padding:4px}
  .bazi-table .gz-cell{background:var(--soft);border:1px solid var(--line);border-radius:8px;padding:10px 4px}
  .bazi-table .gan{font-size:26px;font-weight:700;line-height:1.2}
  .bazi-table .zhi{font-size:26px;font-weight:700;line-height:1.2}
  .bazi-table .gz-tip{cursor:help;border-bottom:1px dotted #cbd5e1;display:inline-block}
  .bazi-table .god{font-size:11px;color:var(--blue-d);margin:2px 0}
  .bazi-table .cangan{font-size:11px;color:#94a3b8;margin-top:4px;line-height:1.5}
  .bazi-table .cs{font-size:10.5px;color:#a78bfa;margin-top:3px}
  .bazi-table .ny{font-size:10px;color:#94a3b8;margin-top:2px}
  .bazi-table th .th-sub{display:block;font-size:10px;color:#b6c0cf;font-weight:400;margin-top:2px;line-height:1.3}
  .bazi-table .gan .wx-tag,.bazi-table .zhi .wx-tag{font-size:10px;font-weight:400;color:#cbd5e1;margin-left:3px;vertical-align:middle}
  .bazi-table .cell-note{font-size:10.5px;color:#64748b;line-height:1.4;margin:3px 2px 0}
  .bazi-table .cell-note.sub{color:#a78bfa;margin-top:1px}
  .dash .bazi-table .cell-note{display:none}
  .dash .bazi-table th .th-sub{display:none}
  .dash .bazi-table .gan .wx-tag,.dash .bazi-table .zhi .wx-tag{display:none}

  .bz-legend{background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:13px 15px;margin-bottom:14px}
  .bz-legend .lg-title{font-size:13px;font-weight:700;color:var(--blue-d);margin-bottom:8px}
  .bz-legend .lg-list{margin:0;padding-left:18px;font-size:12px;color:#475569;line-height:1.85}
  .bz-legend .lg-list li{margin-bottom:4px}
  .bz-legend .lg-list b{color:var(--ink)}
  .cs12-box{margin-top:10px;padding-top:10px;border-top:1px dashed #e2e8f0}
  .cs12-title{font-size:12.5px;font-weight:700;color:#7c3aed;margin-bottom:8px}
  .cs12-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:4px 16px}
  @media(max-width:680px){ .cs12-grid{grid-template-columns:1fr} }
  .cs12-row{display:flex;gap:7px;font-size:11.5px;line-height:1.55;padding:2px 0}
  .cs12-row b{flex:none;width:34px;color:#7c3aed;font-weight:700}
  .cs12-row span{color:#64748b}
  .cs12-row{border-radius:6px;transition:.2s}
  .cs12-row.hl{background:#ede9fe;box-shadow:0 0 0 2px #c4b5fd;padding-left:6px;padding-right:6px}
  .bazi-table .cs.cs-click{cursor:pointer;text-decoration:underline dotted #c4b5fd;text-underline-offset:2px}
  .bazi-table .cs.cs-click:hover{color:#6d28d9}
  .bazi-table .god.god-click{cursor:pointer;text-decoration:underline dotted #93c5fd;text-underline-offset:2px}
  .bazi-table .god.god-click:hover{color:var(--blue)}
  .bazi-table .cg-god{color:#94a3b8;cursor:pointer;text-decoration:underline dotted #cbd5e1;text-underline-offset:2px}
  .bazi-table .cg-god:hover{color:var(--blue)}
  .bazi-table .ny.ny-click{cursor:pointer;text-decoration:underline dotted #cbd5e1;text-underline-offset:2px}
  .bazi-table .ny.ny-click:hover{color:var(--blue-d)}
  .ny-row{border-radius:7px;transition:.2s}
  .ny-row.hl{background:#e0f2fe;box-shadow:0 0 0 2px #7dd3fc;padding-left:8px;padding-right:8px}

  /* 改名建議 */
  .na-ok{margin-top:12px;font-size:12.5px;color:#15803d;background:#f0fdf4;border-radius:8px;padding:9px 12px}
  .na-box{margin-top:12px;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:12px 14px}
  .na-title{font-size:13px;font-weight:700;color:#b45309;margin-bottom:6px}
  .na-intro{font-size:11.5px;color:#475569;line-height:1.75;margin-bottom:10px}
  .na-intro b{color:var(--ink)}
  .na-row{padding:9px 0;border-top:1px dashed #fde68a}
  .na-row:first-of-type{border-top:none}
  .na-head{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px}
  .na-who{font-size:12.5px;color:var(--ink);font-weight:600}
  .na-say{font-size:12px;color:#475569;line-height:1.6}
  .na-cand{font-size:12px;color:#475569;line-height:1.7;margin:2px 0}
  .na-cand b{color:var(--blue-d)}
  .na-egs{color:#7c3aed;font-weight:600}
  .na-fav{font-size:11.5px;color:#b45309;margin-bottom:8px;line-height:1.6}
  .na-sx{margin-top:10px;padding-top:10px;border-top:1px dashed #fde68a}
  .na-sx-t{font-size:12.5px;font-weight:700;color:#b45309;margin-bottom:6px}
  .na-sx-r{font-size:12px;color:#475569;line-height:1.8}
  .na-sx-r b{color:var(--ink);letter-spacing:2px}
  .na-sx-k{display:inline-block;font-size:10px;font-weight:700;color:#fff;padding:1px 6px;border-radius:5px;margin-right:4px}
  .na-sx-k.good{background:#16a34a} .na-sx-k.bad{background:#dc2626}
  .wx-木{color:var(--wood)} .wx-火{color:var(--fire)} .wx-土{color:var(--earth)}
  .wx-金{color:var(--metal)} .wx-水{color:var(--water)}

  /* 五行雷達 + 條 */
  .wx-bars div{display:flex;align-items:center;gap:8px;margin:6px 0}
  .wx-bars .wxn{width:24px;font-weight:600}
  .bar{flex:1;height:8px;background:var(--line);border-radius:4px;overflow:hidden}
  .bar i{display:block;height:100%;border-radius:4px;transition:width .4s}
  .wx-bars .val{font-size:12px;color:var(--sub);width:34px;text-align:right}

  /* 十神能量條（含白話註解） */
  .god-bars{display:flex;flex-direction:column;gap:9px}
  .god-bar .gb-top{display:flex;align-items:center;gap:8px}
  .god-bar .gb-name{width:34px;font-weight:700;font-size:13px;flex:none}
  .god-bar .val{font-size:12px;color:var(--sub);width:34px;text-align:right;flex:none}
  .god-bar .gb-note{font-size:11px;color:#94a3b8;margin:2px 0 0 42px;line-height:1.4}
  .dash .god-bars{gap:5px}
  .dash .god-bar .gb-note{display:none}

  /* 十神 × 賺錢方式 卡片 */
  .gm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px}
  .gm-card{border:1px solid var(--line);border-left:4px solid var(--gm);border-radius:12px;padding:13px 14px;background:#fff}
  .gm-card.mine{border:1.5px solid var(--blue);border-left:4px solid var(--gm);box-shadow:0 2px 10px rgba(59,130,246,.12);background:linear-gradient(180deg,var(--blue-sel) 0%,#fff 38%)}
  .gm-head{display:flex;align-items:center;gap:7px;margin-bottom:6px}
  .gm-name{font-size:17px;font-weight:800;color:var(--gm)}
  .gm-cls{color:#fff;font-size:11px;font-weight:600;padding:1px 8px;border-radius:20px}
  .gm-mine-tag{margin-left:auto;font-size:11px;font-weight:700;color:var(--blue-d);background:var(--blue-sel);border:1px solid var(--blue);padding:1px 8px;border-radius:20px}
  .gm-special{font-size:13.5px;font-weight:700;color:var(--ink);margin-bottom:5px}
  .gm-how{font-size:12.5px;color:#475569;line-height:1.55;margin-bottom:8px}
  .gm-jobs{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
  .gm-job{font-size:11.5px;color:#475569;background:#f1f5f9;border-radius:6px;padding:2px 8px}
  .gm-watch{font-size:11.5px;color:#94a3b8;line-height:1.5;border-top:1px dashed var(--line);padding-top:7px}
  .gm-watch b{color:#b45309;margin-right:5px}

  .badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:12px;font-weight:600;margin:2px}
  .badge.good{background:#dcfce7;color:#15803d} .badge.bad{background:#fee2e2;color:#b91c1c}
  .badge.mid{background:#fef3c7;color:#b45309} .badge.blue{background:var(--blue-sel);color:var(--blue-d)}
  .badge.gray{background:#f1f5f9;color:#475569}

  .kv{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);font-size:14px}
  .kv:last-child{border-bottom:none}
  .kv .k{color:var(--sub)} .kv .v{font-weight:600;text-align:right}
  .ny-row{padding:8px 0;border-bottom:1px solid var(--line)}
  .ny-row:last-child{border-bottom:none}
  .ny-top{display:flex;justify-content:space-between;font-size:14px}
  .ny-top .k{color:var(--sub)} .ny-top .v{font-weight:700;color:var(--blue-d)}
  .ny-say{font-size:12px;color:#64748b;line-height:1.6;margin-top:3px}
  .ny-trend{font-size:11.5px;color:#9a3412;background:#fff7ed;border:1px solid #fed7aa;border-radius:6px;padding:4px 8px;margin-top:5px;line-height:1.55}
  /* 五行性格×行業 */
  .wx-profile{margin-top:14px;border-top:1px dashed var(--line);padding-top:12px}

  .wxr-c-lbl{font-size:13px;font-weight:700;margin-bottom:9px}
  .wxr-c-lbl.sheng{color:#15803d}.wxr-c-lbl.ke{color:#b91c1c}
  .wxr-flow{display:flex;align-items:center;flex-wrap:wrap;gap:3px;margin-bottom:8px}
  .wx-arrow{font-size:11px;color:#94a3b8;margin:0 1px}
  .wxr-note{font-size:11.5px;color:#64748b;line-height:1.6}.wxr-note b{color:var(--ink)}
  .wxr-special{background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:12px 14px;margin-bottom:14px}
  .wxr-sp-title{font-size:13px;font-weight:700;color:#b45309;margin-bottom:9px}
  .wxr-sp-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  @media(max-width:680px){.wxr-sp-grid{grid-template-columns:1fr}}
  .wxr-sp{font-size:11.5px;line-height:1.55;color:#78350f}
  .wxr-sp b{display:block;color:#9a3412;font-size:12.5px;margin-bottom:3px}
  .wxr-sp i{display:block;font-style:normal;color:#a16207;margin-top:3px}
  .wxr-dynamic{background:var(--blue-l);border:1px solid #bfdbfe;border-radius:10px;padding:12px 14px}
  .wxr-dyn-title{font-size:13px;font-weight:700;color:var(--blue-d);margin-bottom:8px}
  .wxr-dyn-row{font-size:12.5px;color:#334155;line-height:1.7;margin-bottom:6px}
  .wxr-dyn-row:last-child{margin-bottom:0}.wxr-dyn-row b{font-weight:700}
  /* 地支互動 */
  .brx-grid{display:flex;flex-direction:column;gap:12px}
  .brx{border:1px solid var(--line);border-radius:11px;padding:13px 15px;border-left:4px solid #cbd5e1}
  .brx-he{border-left-color:#16a34a;background:#f0fdf4}
  .brx-chong{border-left-color:#dc2626;background:#fef2f2}
  .brx-xing{border-left-color:#d97706;background:#fffbeb}
  .brx-hai{border-left-color:#b45309;background:#fff7ed}
  .brx-tl{border-left-color:#7c3aed;background:#faf5ff}
  .brx-h{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:9px}
  .brx-item{padding:7px 0;border-top:1px dashed rgba(148,163,184,.4)}

  .brx-pair{display:flex;align-items:center;flex-wrap:wrap;gap:5px}

  .brx-op{font-size:12px;font-weight:700;color:#64748b}
  .brx-op.bad{color:#dc2626}.brx-op.warn{color:#d97706}
  .brx-wx{font-size:11px;color:#fff;padding:1px 7px;border-radius:10px;font-weight:600}
  .brx-tag{font-size:12px;font-weight:700;color:var(--ink);background:rgba(255,255,255,.7);border:1px solid var(--line);border-radius:6px;padding:0 7px}
  .brx-pos{font-size:10.5px;color:#94a3b8;margin-left:auto}
  .brx-sub{font-size:12px;color:#475569;line-height:1.6;margin-top:4px}
  .brx-detail{margin-top:7px;display:flex;flex-direction:column;gap:5px}
  .brx-d-row{font-size:12px;color:#475569;line-height:1.65}
  .brx-d-row b{display:inline-block;min-width:34px;color:#9a3412;font-weight:700;margin-right:5px}
  .brx-d-row.cure{background:rgba(255,255,255,.6);border-radius:7px;padding:5px 8px}
  .brx-d-row.cure b{color:#15803d}
  .brx-note{font-size:11px;color:#94a3b8;line-height:1.6;margin-top:8px;border-top:1px dashed rgba(148,163,184,.4);padding-top:7px}
  /* 天羅地網進階 */

  .tl-verdict b{color:#581c87}
  .tl-factors-title{font-size:12.5px;font-weight:700;color:#6b21a8;margin:10px 0 7px}
  .tl-factors{display:flex;flex-direction:column;gap:6px}
  .tl-factor{border:1px solid #e9d5ff;border-radius:8px;padding:7px 10px;background:rgba(255,255,255,.5);opacity:.6}
  .tl-factor.on{opacity:1;background:#fff;border-color:#c084fc;box-shadow:0 1px 5px rgba(124,58,237,.12)}
  .tl-f-h{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--ink)}
  .tl-f-dot{color:#a855f7;font-size:11px}
  .tl-f-hit{font-size:11px;color:#7c3aed;background:#f3e8ff;border-radius:5px;padding:0 6px;margin-left:4px}
  .tl-f-no{font-size:11px;color:#cbd5e1;margin-left:4px}
  .tl-f-d{font-size:11.5px;color:#64748b;line-height:1.6;margin-top:3px}
  /* 日主人格速寫 */
  .dg-grid{display:flex;flex-direction:column;gap:8px;background:#f8fafc;border:1px solid var(--line);border-radius:10px;padding:12px 14px}
  .dg-row{display:flex;gap:10px;font-size:13px;line-height:1.7;color:#475569}

  .dg-row .dg-v{flex:1}
  .dg-job{display:inline-block;font-size:11.5px;color:#475569;background:#eef2ff;border:1px solid #c7d2fe;border-radius:6px;padding:1px 8px;margin:2px 4px 2px 0}
  .guide-link{font-size:11.5px;font-weight:400;color:var(--blue-d);cursor:pointer;
    background:var(--blue-l);padding:3px 9px;border-radius:6px;white-space:nowrap}
  .guide-link:hover{background:var(--blue-sel)}

  /* 健康提醒（疾厄） */
  .hl-row{padding:11px 0;border-bottom:1px solid var(--line)}
  .hl-row:last-child{border-bottom:none}
  .hl-head{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px}
  .hl-wx{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:15px;background:#fff;border:1px solid var(--line);flex:none}
  .hl-organ{font-size:12.5px;color:var(--sub)}
  .hl-say{font-size:13px;color:#475569;line-height:1.7;margin-bottom:5px}
  .hl-tip{font-size:12px;color:#15803d;background:#f0fdf4;border-radius:7px;padding:6px 10px;line-height:1.6}
  .hl-avoid{margin-top:10px;font-size:12px;color:#b45309;background:#fffbeb;border:1px solid #fde68a;
    border-radius:8px;padding:9px 12px;line-height:1.65}
  .hl-yr{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;padding:4px 0;font-size:12px;color:#475569}
  .hl-yr-y{font-weight:700;color:var(--ink);min-width:78px}
  .hl-yr-wx{font-size:11px;background:#fee2e2;color:#b91c1c;padding:0 7px;border-radius:10px;font-weight:600}
  .hl-yr-org{color:#64748b}

  .score-big{display:flex;align-items:center;gap:18px;margin-bottom:6px}
  .ring{position:relative;flex-shrink:0;line-height:0}
  .ring svg{display:block}
  .ring .num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1.1}
  .ring .num b{font-size:28px;font-weight:700;color:var(--blue-d)}
  .ring .num small{font-size:10px;color:var(--sub)}
  .ring.sm .num b{font-size:22px}
  .ring.sm .num small{font-size:9px}

  .detail-list{font-size:12.5px;color:#475569}
  .detail-list .di{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px dashed var(--line)}
  .detail-list .di .pos{color:var(--good)} .detail-list .di .neg{color:var(--bad)}

  /* 大運時間軸 */
  .timeline{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px}
  .ty{flex:0 0 auto;min-width:70px;text-align:center;padding:10px 6px;border:1px solid var(--line);
    border-radius:9px;background:var(--soft)}
  .ty.active{border-color:var(--blue);background:var(--blue-l);box-shadow:0 0 0 2px rgba(59,130,246,.15)}
  .ty{min-width:84px}
  .ty .gz{font-size:18px;font-weight:700} .ty .g{font-size:11px;color:var(--blue-d);margin-top:2px;font-weight:600}
  .ty .gnote{font-size:9.5px;color:#94a3b8;line-height:1.3;margin:2px 0 1px;min-height:24px}
  .ty .age{font-size:10.5px;color:var(--sub);margin-top:3px}
  .ty .tier{font-size:11px;font-weight:600;margin-top:3px}
  .tier-旺{color:var(--good)} .tier-平{color:var(--mid)} .tier-弱{color:var(--bad)}

  .ln-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:14px}
  .ln-row:last-child{border-bottom:none}
  .ln-row .yr{font-weight:600;width:88px} .ln-row .gz{width:50px} .ln-row .g{color:var(--sub);font-size:12.5px;flex:1}

  /* 流年詳細卡（每年一張） */
  .ly-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  @media(max-width:760px){ .ly-grid{grid-template-columns:1fr} }
  .ly-card{border:1px solid var(--line);border-radius:10px;padding:12px 14px;background:#fff}
  .ly-card.now{border-color:var(--blue);background:var(--blue-l);box-shadow:0 0 0 2px rgba(59,130,246,.12)}
  .ly-head{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .ly-head .ly-yr{font-size:16px;font-weight:700;color:var(--ink)}
  .ly-head .ly-age{font-size:12px;color:var(--sub);font-weight:400;margin-left:5px}
  .ly-head .ly-tag{font-size:10px;background:var(--blue);color:#fff;padding:1px 7px;border-radius:10px;margin-left:6px;vertical-align:middle}
  .ly-head .ly-gz{font-size:17px;font-weight:700;margin-left:auto}
  .ly-god{font-size:13px;color:var(--blue-d);margin-bottom:4px}
  .ly-god b{font-size:14px}
  .ly-desc{font-size:12.5px;color:#475569;line-height:1.75;margin-bottom:8px}
  .ly-yiji{font-size:12px;color:#475569;line-height:1.85;border-top:1px dashed #e2e8f0;padding-top:7px}
  .ly-yiji .yj-y{display:inline-block;width:18px;height:18px;line-height:18px;text-align:center;border-radius:5px;background:#dcfce7;color:#15803d;font-weight:700;margin-right:6px;font-size:11px}
  .ly-yiji .yj-j{display:inline-block;width:18px;height:18px;line-height:18px;text-align:center;border-radius:5px;background:#fee2e2;color:#b91c1c;font-weight:700;margin-right:6px;font-size:11px}

  /* 紫微方格盤 */
  /* 紫微頁左右分欄：左說明、右命盤 */
  .zw-layout{display:flex;gap:18px;align-items:flex-start}
  /* 頂部：命盤總評 ｜ 一段話總結 左右並排 */
  .zw-top2{display:flex;gap:16px;align-items:stretch;margin-bottom:14px}
  .zw-top2>div{flex:1 1 0;min-width:0}
  .zw-top2 .zw-overview{margin-bottom:0;height:100%}
  .zw-top2 .zw-summary{margin-top:0;border-top:none;padding-top:0;height:100%;
    background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:14px 16px}
  @media(max-width:900px){ .zw-top2{flex-direction:column} }
  .zw-side{flex:0 0 320px;max-width:320px}
  .ziwei-wrap{position:relative;flex:1 1 auto;min-width:0}
  @media(max-width:920px){
    .zw-layout{flex-direction:column}
    .zw-side{flex:1 1 auto;max-width:none;width:100%}
    .ziwei-wrap{width:100%}
  }
  .ziwei-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;align-items:stretch}
  .zw-cell{border:1px solid var(--line);border-radius:9px;padding:10px 9px;background:var(--soft);
    font-size:12px;display:flex;flex-direction:column;min-height:118px}
  .zw-cell.clickable{cursor:pointer;transition:.12s;position:relative}
  .zw-cell.clickable:hover{border-color:#93c5fd;box-shadow:0 2px 8px rgba(59,130,246,.12)}
  /* 宮位吉凶底色（左邊框條） */
  /* 宮位吉凶＝右下角柔和陰影暈染（帶透明度） */
  .zw-cell.zwt-good{box-shadow:inset -22px -22px 26px -18px rgba(22,163,74,.38)}
  .zw-cell.zwt-ok{box-shadow:inset -22px -22px 26px -18px rgba(37,99,235,.32)}
  .zw-cell.zwt-mid{box-shadow:inset -20px -20px 24px -18px rgba(148,163,184,.28)}
  .zw-cell.zwt-bad{box-shadow:inset -22px -22px 26px -16px rgba(245,158,11,.42)}
  .zw-dot{position:absolute;top:7px;right:7px;width:9px;height:9px;border-radius:50%;
    box-shadow:0 0 0 2px #fff}
  .zw-badge{display:inline-block;font-size:9px;font-weight:700;color:#fff;border-radius:4px;padding:0 4px;margin-left:4px;vertical-align:middle}
  .zw-badge.ming-b{background:var(--blue-d)} .zw-badge.body-b{background:#7c3aed}

  /* 命盤總評卡 */
  .zw-overview{background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:14px 16px;margin-bottom:14px}
  .ov-head{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:15px}
  .ov-total{font-size:12px;font-weight:700;color:#fff;padding:3px 10px;border-radius:8px}
  .ovt-good{background:#16a34a} .ovt-ok{background:#2563eb} .ovt-mid{background:#64748b} .ovt-bad{background:#f59e0b}
  .ov-note{font-size:12.5px;color:#475569;line-height:1.7;margin-bottom:12px}
  .ov-note b{color:var(--ink)}
  .ov-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px}
  @media(max-width:640px){ .ov-grid{grid-template-columns:1fr} }
  .ov-col-t{font-size:12.5px;font-weight:700;color:var(--ink);margin-bottom:6px}
  .ov-chips{display:flex;flex-wrap:wrap;gap:6px}
  .ov-chip{display:inline-flex;flex-direction:column;font-size:13px;font-weight:700;color:#fff;
    padding:4px 10px;border-radius:8px;line-height:1.25}
  .ov-chip small{font-size:10px;font-weight:400;opacity:.92}
  .ov-chip.ovt-good{background:#16a34a} .ov-chip.ovt-ok{background:#2563eb}
  .ov-chip.ovt-mid{background:#94a3b8} .ov-chip.ovt-bad{background:#f59e0b}
  .ov-extra{display:flex;flex-direction:column;gap:5px;font-size:12px;color:#475569;line-height:1.65;
    border-top:1px dashed #e2e8f0;padding-top:10px;margin-bottom:8px}
  .ov-extra b{color:var(--blue-d)}
  .ov-legend{font-size:11.5px;color:var(--sub);display:flex;align-items:center;gap:5px;flex-wrap:wrap}
  .ov-dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin:0 1px 0 6px}
  .zw-cell.active{border-color:var(--blue-d);box-shadow:0 0 0 2px var(--blue-sel);position:relative;z-index:2}
  .zw-cell.sfsz{border-color:#fca5a5;background:#fef2f2;box-shadow:0 0 0 1px #fecaca;position:relative;z-index:2}
  .zw-cell.sfsz.ming{background:#fef2f2}
  .zw-lines{position:absolute;inset:0;pointer-events:none;z-index:1;overflow:visible}
  .pd-sfsz{margin-top:10px;padding-top:9px;border-top:1px dashed #e2e8f0;font-size:11.5px;color:#475569;line-height:1.65}
  .pd-sf-title{font-weight:700;color:var(--ink);font-size:12px;margin-bottom:4px}
  .pd-sf-intro{margin-bottom:6px}
  .pd-sf-intro b{color:#dc2626}
  .sf-line{display:grid;grid-template-columns:38px auto 1fr;align-items:start;gap:8px;margin:7px 0;line-height:1.6}
  .sf-line .sf-pal{color:var(--blue-d);white-space:nowrap;font-size:13px}
  .sf-line .sf-desc{color:#64748b;font-size:12px}
  .sf-tag{font-size:10px;font-weight:700;color:#fff;padding:2px 0;border-radius:5px;white-space:nowrap;text-align:center}
  .sf-tag.opp{background:#dc2626} .sf-tag.he{background:#0891b2}
  .pd-sf-eg{margin-top:7px;background:#f8fafc;border-radius:7px;padding:7px 9px;font-size:11px;color:#475569;line-height:1.6}
  .pd-sf-eg b{color:var(--ink)}
  .pd-verdict{font-size:13px;line-height:1.75;border-radius:8px;padding:10px 12px;margin-bottom:10px}
  .pd-verdict b{font-weight:700}
  .pdv-good{background:#f0fdf4;border:1px solid #bbf7d0;color:#166534}
  .pdv-ok{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af}
  .pdv-mid{background:#f8fafc;border:1px solid #e2e8f0;color:#475569}
  .pdv-bad{background:#fffbeb;border:1px solid #fde68a;color:#b45309}
  .pd-sf-rel{font-size:11.5px;color:#94a3b8;margin-bottom:4px}

  /* 宮位詳解：可拖曳浮動視窗（無遮罩，可同時看命盤） */
  .zw-pop{position:fixed;top:90px;left:50%;z-index:50;

    padding:9px 12px;border-bottom:1px solid var(--line);cursor:grab;
    background:linear-gradient(#f8fafc,#fff);border-radius:14px 14px 0 0;flex:none}

  .zw-pop-drag{font-size:11.5px;color:#94a3b8;font-weight:600;letter-spacing:1px}
  .zw-pop-body{padding:14px 18px 16px;overflow-y:auto}
  .zw-pop-x{width:26px;height:26px;border:none;border-radius:50%;
    background:var(--soft);color:#64748b;cursor:pointer;font-size:14px;line-height:1;
    display:flex;align-items:center;justify-content:center;flex:none}
  .zw-pop-x:hover{background:#fee2e2;color:#dc2626}
  .pd-head{display:flex;align-items:baseline;gap:8px;margin-bottom:8px;padding-right:24px}
  .pd-head .pd-name{font-size:18px;font-weight:700;color:var(--blue-d)}
  .pd-head .pd-gz{font-size:12px;color:#94a3b8}
  .pd-meaning{font-size:12.5px;color:#475569;line-height:1.7;margin-bottom:8px}
  .pd-stars-line{font-size:13px;color:var(--ink);margin-bottom:8px}
  .pd-starbox{border-top:1px dashed #e2e8f0;padding-top:8px;display:flex;flex-direction:column;gap:6px}
  .pd-star{font-size:12px;color:#475569;line-height:1.6}
  .pd-star b{color:var(--ink)}
  @media(max-width:560px){
    .zw-pop{left:0!important;right:0;top:auto!important;bottom:0;width:100%;max-width:100%;

/* ---- 讀取一個人的輸入 → bazi 分析 ---- */
function readPerson(n){
  const name=$("#name"+n).value.trim();
  const sex=segVal["sex"+n];
  let y=+$("#y"+n).value, m=+$("#m"+n).value, d=+$("#d"+n).value;
  const known=segVal["hknown"+n]==="1";
  const hour=known?+$("#h"+n).value:-1;
  const minute=known?+$("#min"+n).value:0;
  if(!y) throw "請輸入"+(n===1?"":"對方")+"出生年份";
  if(segVal["cal"+n]==="lunar"){
    if(y<1900||y>2100) throw "農曆轉換僅支援 1900–2100";
    const sol=lunar2solar(y,m,d,false);y=sol.y;m=sol.m;d=sol.d;
  }
  if(y<1900||y>2100) throw "請輸入正確年份 (1900–2100)";
  const opts={};
  if(n===1 && segVal.tst1==="1"){opts.useTrueSolar=true;opts.longitude=+$("#lon1").value||121.5;}
  if(n===1) opts.ziSchool=$("#zi1").value;
  const bz=buildBazi(y,m,d,hour,minute,opts);
  const analysis=fullBaziAnalysis(bz);
  analysis.name=name; analysis.sex=sex;
  // 命中最旺/最弱五行
  let _mx=-1,_mn=99;
  for(const k in analysis.tally){
    if(analysis.tally[k]>_mx){_mx=analysis.tally[k];analysis.strong=k;}
    if(analysis.tally[k]<_mn){_mn=analysis.tally[k];analysis.weak=k;}
  }
  analysis.sx=shengXiaoInfo(bz.yZhi);
  analysis.sign=sunSign(bz.solar.m,bz.solar.d);
  analysis.rising=known?risingSign(bz.solar.m,bz.solar.d,hour):null;
  analysis.nameInfo=name?nameAnalysis(name):null;
  // 紫微
  if(typeof iztro!=="undefined" && known){
    try{
      const g=sex==="女"?"女":"男";
      const ds=bz.solar.y+"-"+bz.solar.m+"-"+bz.solar.d;
      const hi=bz.hourIdx>=0?bz.hourIdx:0;
      const astro=iztro.astro.bySolar(ds,hi,g,true,"zh-TW");
      analysis.ziwei=extractZiwei(astro);
      // 紫微運限（流年盤）：以「今天」起盤，UI 可切換年份
      try{
        const now=new Date();
        const today=now.getFullYear()+"-"+(now.getMonth()+1)+"-"+now.getDate();
        analysis.ziweiHoro=buildHoroscope(astro, today, hi);
        analysis._ziweiAstro=astro;  // 留著供切換年份重算
      }catch(e){analysis.ziweiHoro=null;}
    }catch(e){analysis.ziwei=null;analysis.ziweiHoro=null;}
  }else analysis.ziwei=null;
  // 袁天罡稱骨（年干支+農曆月日+時辰，時辰依真太陽時）
  try{
    const eff=bz.effective||{y:bz.solar.y,m:bz.solar.m,d:bz.solar.d};
    const lun=solar2lunar(eff.y,eff.m,eff.d);
    analysis.chenggu=chengGu(bz,lun);
  }catch(e){analysis.chenggu=null;}
  return analysis;
}

/* ====== 五角雷達圖（戰鬥力風格，五行/十神共用） ======
 * items: [{label, value, color}]  共5項
 */
function radarChart(items, opt={}){
  const N=items.length, R=opt.r||78, cx=110, cy=104;
  const maxV=Math.max(...items.map(i=>i.value),0.1);
  const ang=i=>(-90 + i*360/N)*Math.PI/180;            // 從正上方開始
  const pt=(i,rad)=>[cx+rad*Math.cos(ang(i)), cy+rad*Math.sin(ang(i))];
  // 背景同心五邊形（4 圈）
  let grid="";
  for(let ring=1;ring<=4;ring++){
    const rr=R*ring/4;
    const poly=items.map((_,i)=>pt(i,rr).map(n=>n.toFixed(1)).join(",")).join(" ");
    grid+=`<polygon points="${poly}" fill="none" stroke="#e2e8f0" stroke-width="1"/>`;
  }
  // 軸線
  let axes="";
  items.forEach((_,i)=>{const[x,y]=pt(i,R);axes+=`<line x1="${cx}" y1="${cy}" x2="${x.toFixed(1)}" y2="${y.toFixed(1)}" stroke="#e2e8f0" stroke-width="1"/>`;});
  // 數值多邊形
  const dataPts=items.map((it,i)=>pt(i, R*Math.max(0.04,it.value/maxV)));
  const dataPoly=dataPts.map(p=>p.map(n=>n.toFixed(1)).join(",")).join(" ");
  // 頂點圓點
  const dots=dataPts.map((p,i)=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3.5" fill="${items[i].color}"/>`).join("");
  // 標籤 + 數值
  const labels=items.map((it,i)=>{
    const[lx,ly]=pt(i,R+15);
    const anchor=Math.abs(lx-cx)<6?"middle":(lx>cx?"start":"end");
    return `<text x="${lx.toFixed(1)}" y="${(ly+4).toFixed(1)}" font-size="13" font-weight="700" fill="${it.color}" text-anchor="${anchor}">${it.label}</text>
      <text x="${lx.toFixed(1)}" y="${(ly+17).toFixed(1)}" font-size="10" fill="#94a3b8" text-anchor="${anchor}">${it.value.toFixed(1)}</text>`;
  }).join("");
  return `<svg class="radar" viewBox="-30 -16 280 244" width="100%" style="max-width:300px;display:block;margin:0 auto">
    <circle cx="${cx}" cy="${cy}" r="${R+2}" fill="none" stroke="#f1f5f9" stroke-width="1"/>
    ${grid}${axes}
    <polygon points="${dataPoly}" fill="${opt.fill||'rgba(59,130,246,.18)'}" stroke="${opt.stroke||'#3b82f6'}" stroke-width="2" stroke-linejoin="round"/>
    ${dots}${labels}
  </svg>`;
}

const COLOR_HEX={"紅色":"#dc2626","橙色":"#ea580c","黃色":"#eab308","綠色":"#16a34a","青色":"#0d9488",

}

    印星:"「照顧你」的力量——學識、靠山、長輩貴人、被疼愛。強代表有貴人、愛學習、有安全感；太強則易依賴、想太多。"

  const intro=showIntro?`<div class="cap" style="margin-bottom:12px">這張圖把你的八字換算成<b>五種「人生角色能量」</b>——角越往外代表那股力量越強。<b>下面每條都附白話解釋它在講什麼</b>。你最突出的是 <b style="color:${colors[top[0]]}">${top[0]}</b>，個性與做事會偏這個方向。</div>`:"";

/* ====== 十神 × 賺錢方式 ====== */
function renderGodMoney(a){
  const order=["比肩","劫財","食神","傷官","正財","偏財","正官","七殺","正印","偏印"];
  const cls={比肩:"比劫",劫財:"比劫",食神:"食傷",傷官:"食傷",正財:"財星",偏財:"財星",正官:"官殺",七殺:"官殺",正印:"印星",偏印:"印星"};
  const colors={比劫:"#3b82f6",食傷:"#16a34a",財星:"#d97706",官殺:"#dc2626",印星:"#8b5cf6"};
  // 找出命盤實際出現的十神（天干十神 + 藏干十神），用來高亮「最貼近你的」
  const have=new Set();
  [a.chart.year,a.chart.month,a.chart.day,a.chart.hour].forEach(p=>{
    if(!p) return;
    if(p.ganGod&&p.ganGod!=="日主") have.add(p.ganGod);
    (p.cangan||[]).forEach(cg=>{ if(cg.god&&cg.god!=="日主") have.add(cg.god); });
  });
  const cap=`<div class="cap" style="margin-bottom:12px">每個人八字裡的十神組合不同，<b>適合的賺錢方式也不一樣</b>。下面把十種十神各自的求財路線、適合行業與要注意的地方列出來；<b style="color:var(--blue-d)">有藍框的，是你命盤中實際出現、特別貼近你的那幾種</b>，可優先參考。<br><span style="color:var(--sub);font-size:12px">（命理為趨吉避凶之參考，實際仍要看整體格局與大運配合）</span></div>`;
  const cards=order.map(g=>{
    const m=SHISHEN_MONEY[g]; if(!m) return "";
    const c=colors[cls[g]];
    const mine=have.has(g);
    const jobs=(m.jobs||[]).map(j=>`<span class="gm-job">${j}</span>`).join("");
    return `<div class="gm-card${mine?' mine':''}" style="--gm:${c}">
      <div class="gm-head">
        <span class="gm-name">${g}</span>
        <span class="gm-cls" style="background:${c}">${cls[g]}</span>
        ${mine?'<span class="gm-mine-tag">你有</span>':''}
      </div>
      <div class="gm-special">${m.special}</div>
      <div class="gm-how">${m.how}</div>
      <div class="gm-jobs">${jobs}</div>
      <div class="gm-watch"><b>注意</b>${m.watch}</div>
    </div>`;
  }).join("");
  return `${cap}<div class="gm-grid">${cards}</div>`;
}

    <div class="sh-intro">「四化」是你<b>出生那一年的天干</b>，讓四顆星各自「變化」出一種特殊力量，<b>跟你一輩子</b>。就像幫某顆星「加裝備」——星名後面有彩色小標的，就是被化到的星。</div>
    <div class="sh-row"><span class="sh sh-祿">祿</span><div><b>化祿＝財祿、好處、順遂</b>。這顆星帶來機會、收入、貴人緣，是你<b>最容易得到甜頭</b>的地方。</div></div>
    <div class="sh-row"><span class="sh sh-權">權</span><div><b>化權＝權力、能力、掌控</b>。這顆星讓你在那塊特別<b>強勢、有主導力、做得起來</b>，適合掌權扛責。</div></div>
    <div class="sh-row"><span class="sh sh-科">科</span><div><b>化科＝名聲、貴人、文書</b>。這顆星帶來<b>好名聲、考運、貴人相助</b>，遇難也較能化解。</div></div>
    <div class="sh-row"><span class="sh sh-忌">忌</span><div><b>化忌＝執著、牽絆、功課</b>。這顆星是你<b>最在意、最容易卡關</b>的地方，不是壞事，而是這輩子要學會放下、用心經營的課題。</div></div>
    <div class="sh-foot">舉例：「天梁化權」＝天梁這顆星被加上「權」的力量，在它管的事上你會更有主導力；「太陰化忌」＝太陰那塊是你較放不下、要多用心的功課。</div>
  </div>`;
  return `<div class="card zw-card"><h3><span class="ic">紫</span>紫微斗數 · 命盤
        <span style="margin-left:auto;font-size:11.5px;font-weight:400;color:var(--sub)">👆 點任一宮格看詳解＋三方四正連線</span></h3>
      <div class="zw-top2">
        <div class="zw-top-l">${ziweiOverview(z,a,cellByBranch,bodyBranch)}</div>
        <div class="zw-top-r">${ziweiSummary(z,a)}</div>
      </div>
      <div class="zw-layout">
        <div class="zw-side">${legend}${sihuaCard}${starDict}</div>
        <div class="ziwei-wrap"><svg class="zw-lines" id="zwLines"></svg><div class="ziwei-grid">${cells}</div>
          <div class="zw-pop" id="zwPop" hidden></div></div>
      </div>
      ${renderZiweiHoro(a)}</div>`;
}

/* iztro index(0-11) → 地支：固定 寅起 */
const ZW_IDX_BRANCH=["寅","卯","辰","巳","午","未","申","酉","戌","亥","子","丑"];

/* ====== 紫微流年盤（運限：大限/流年/小限/流月）====== */
function renderZiweiHoro(a){
  const z=a.ziwei, ho=a.ziweiHoro;
  if(!z||!ho||!ho.yearly) return "";
  const nowY=(ho.solarDate&&(""+ho.solarDate).slice(0,4))|| (new Date().getFullYear()+"");
  const cellByBranch={}; z.palaces.forEach(p=>{ if(p.earthlyBranch) cellByBranch[p.earthlyBranch]=p; });
  // 把一個 scope（流年/大限/小限）攤平成 branch→{宮名, 流曜[]}
  const layout=(sc)=>{
    if(!sc) return {map:{}, mingBranch:""};
    const map={};
    (sc.palaceNames||[]).forEach((nm,i)=>{ const br=ZW_IDX_BRANCH[i]; map[br]={name:nm, stars:(sc.stars&&sc.stars[i])||[]}; });
    return {map, mingBranch: ZW_IDX_BRANCH[sc.index]||""};
  };
  const yl=layout(ho.yearly);
  const dec=layout(ho.decadal);
  const sihuaTags=(arr,scopeName)=>{
    if(!arr||!arr.length) return "";
    const labels=["祿","權","科","忌"];
    return arr.map((star,i)=>`<span class="hs-sihua sh-${labels[i]}" title="${scopeName}化${labels[i]}：${star} 被化${labels[i]}">${star}<i>${labels[i]}</i></span>`).join("");
  };
  // 流年盤：在本命格局上疊「流年宮名 + 流年四化星 + 流曜」
  let hcells="";
  for(let r=0;r<4;r++)for(let c=0;c<4;c++){
    if(r>=1&&r<=2&&c>=1&&c<=2){
      if(r===1&&c===1){
        const ymut=ho.yearly.mutagen||[];
        hcells+=`<div class="hs-cell center">
          <div class="hs-c-title">${nowY} 流年盤</div>
          <div class="hs-c-sub">流年干支 <b>${ho.yearly.stem}${ho.yearly.branch}</b>${ho.age&&ho.age.nominalAge?`　虛歲 <b>${ho.age.nominalAge}</b>`:""}</div>
          <div class="hs-c-sub" style="margin-top:6px">大限 <b>${ho.decadal.stem}${ho.decadal.branch}</b>（這十年主軸）</div>
          <div class="hs-c-sihua"><span class="hs-c-k">流年四化</span>${sihuaTags(ymut,"流年")}</div>
        </div>`;
      }
      continue;
    }
    const branch=ZW_IDX_BRANCH.find(b=>GRID_POS[b]&&GRID_POS[b][0]===r&&GRID_POS[b][1]===c);
    const nat=branch?cellByBranch[branch]:null;
    if(!nat){hcells+=`<div class="hs-cell"></div>`;continue;}
    const yInfo=yl.map[branch]||{name:"",stars:[]};
    const dInfo=dec.map[branch]||{name:""};
    const isYMing=branch===yl.mingBranch;
    const isDMing=branch===dec.mingBranch;
    // 本命主星（小灰字墊底，知道這格本來坐什麼星）
    const natStars=(nat.majorStars||[]).map(s=>s.name).join("·")||"（空宮借對宮）";
    // 流曜（流年飛入的星，如流昌流曲流陀等）
    const flow=(yInfo.stars||[]).map(s=>`<span class="hs-flow">${s.name}</span>`).join("");
    hcells+=`<div class="hs-cell${isYMing?' y-ming':''}">
      <div class="hs-pnames">
        <span class="hs-yname" title="流年${yInfo.name}：今年這宮主管「${PALACE_SHORT[yInfo.name]||yInfo.name}」">流年·${yInfo.name||"—"}</span>
        <span class="hs-dname" title="大限${dInfo.name}：這十年這宮主管「${PALACE_SHORT[dInfo.name]||dInfo.name}」">限·${dInfo.name||"—"}</span>
      </div>
      <div class="hs-nat">本命 ${nat.name}：${natStars}</div>
      ${flow?`<div class="hs-flows">${flow}</div>`:""}
      <div class="hs-gz">${branch}</div>
      ${isYMing?'<span class="hs-tag y">流年命宮</span>':''}${isDMing&&!isYMing?'<span class="hs-tag d">大限命宮</span>':''}
    </div>`;
  }
  const yMingName=(yl.map[yl.mingBranch]||{}).name||"";
  const guide=`<div class="hs-guide">
    <div class="hs-g-title">📖 流年盤怎麼看</div>
    <ul>
      <li>這張是 <b>${nowY} 這一年</b>的運勢盤（會疊在你<b>一輩子的本命盤</b>上看）。每格上面：<span style="color:#dc2626"><b>流年·宮名</b></span>＝今年這個位置變成什麼宮、<span style="color:#7c3aed"><b>限·宮名</b></span>＝這十年大限這格是什麼宮。</li>
      <li><b>「流年命宮」那格最關鍵</b>——今年的整體運勢主軸就看它（今年落在 <b style="color:#dc2626">${yMingName||"—"}</b> 的位置）。</li>
      <li><b>中間的流年四化</b>（${(ho.yearly.mutagen||[]).join("、")}）＝今年被加成的四顆星：<span class="sh sh-祿">祿</span>今年的財路機會、<span class="sh sh-權">權</span>今年能掌權發揮、<span class="sh sh-科">科</span>今年的貴人名聲、<span class="sh sh-忌">忌</span>今年較卡關、要留意的事。看它們<b>落在哪一宮</b>，就知道今年哪方面有好處／要小心。</li>
      <li>格子裡灰字「本命…」是這格<b>本來</b>坐什麼星，藍框小字是今年飛進來的<b>流曜</b>（如流昌、流陀）。</li>
    </ul>
  </div>`;
  // 年份切換器（提供前後幾年快速跳）
  const baseY=parseInt(nowY,10)||new Date().getFullYear();
  const yrs=[]; for(let d=-2;d<=4;d++) yrs.push(baseY+d);
  const switcher=`<div class="hs-years">
    <span class="hs-y-lbl">看其他年份：</span>
    ${yrs.map(y=>`<button class="hs-yr${y===baseY?' on':''}" data-hy="${y}">${y}</button>`).join("")}
  </div>`;
  return `<div class="zw-horo" id="zwHoro">
    <div class="zw-horo-head"><span class="ic">運</span>紫微流年盤<small>大限／流年／小限 運限疊算</small></div>
    ${switcher}
    ${guide}
    <div class="hs-wrap"><div class="hs-grid">${hcells}</div></div>
  </div>`;
}

/* 紫微命盤總評卡：跑遍12宮排序，主動給整體結論＋最強/最弱宮＋圖例 */
function ziweiOverview(z,a,cellByBranch,bodyBranch){
  const name=a.name||"你";
  const scored=z.palaces.map(p=>({p, sc:palaceScore(p,cellByBranch)}))
    .map(o=>({name:o.p.name, topic:PALACE_SHORT[o.p.name]||o.p.name, ...o.sc}));
  const sorted=scored.slice().sort((a,b)=>b.score-a.score);
  const strong=sorted.slice(0,3);
  const weak=sorted.slice(-2).reverse();
  const avg=scored.reduce((s,x)=>s+x.score,0)/scored.length;
  let oTone,oWord;
  if(avg>=2){oTone="good";oWord="整體偏旺，是格局不錯的命盤";}
  else if(avg>=0.5){oTone="ok";oWord="整體平穩，有亮點也有要努力的地方";}
  else if(avg>=-0.5){oTone="mid";oWord="整體中等，運勢起伏看後天經營";}
  else{oTone="bad";oWord="整體較需用心，靠努力與調整補強";}
  const emptyCnt=scored.filter(x=>x.empty).length;
  // 化忌落宮（你的功課）
  let jiPalace="";
  z.palaces.forEach(p=>p.majorStars.forEach(s=>{ if(s.mutagen==="忌") jiPalace=`${p.name}的${s.name}`; }));
  const chip=(x)=>`<span class="ov-chip ovt-${x.tone}">${x.name}<small>${x.topic}</small></span>`;
  const bodyName=(z.palaces.find(p=>p.earthlyBranch===bodyBranch)||{}).name||"";
  return `<div class="zw-overview">
    <div class="ov-head"><span class="ov-total ovt-${oTone}">命盤總評</span><b>${oWord}</b></div>
    <div class="ov-note">這是<b>${name}一輩子的「先天命盤」，不是今年運勢</b>（今年運勢請看上方「大運流年」分頁）。下面幫你把 12 宮排好了：</div>
    <div class="ov-grid">
      <div class="ov-col"><div class="ov-col-t">💪 你最強的三塊（優勢）</div><div class="ov-chips">${strong.map(chip).join("")}</div></div>
      <div class="ov-col"><div class="ov-col-t">⚠ 最該用心的兩塊</div><div class="ov-chips">${weak.map(chip).join("")}</div></div>
    </div>
    <div class="ov-extra">
      <span>🏠 <b style="color:var(--blue-d)">命宮</b>＝你「先天的個性、你是誰」；<b style="color:#7c3aed">身宮</b>＝你「後天會慢慢變成的樣子、中年後越明顯」。${
        bodyName==="命宮"
          ? `你的<b>命宮和身宮在同一格</b>——代表你<b>先天個性與後天發展方向一致、表裡如一</b>，人生主軸清楚、不太會中途大轉變。`
          : (bodyName?`你的身宮落在 <b>${bodyName}宮</b>——代表你後天會越來越重視、投入「${PALACE_SHORT[bodyName]||bodyName}」這一塊。`:"")
      }</span>
      ${jiPalace?`<span>📌 你這輩子的「功課」在 <b>${jiPalace}化忌</b>——這塊最容易卡關、要多用心。</span>`:""}
      ${emptyCnt?`<span>⭕ 你有 <b>${emptyCnt}</b> 個空宮（沒有主星），代表那些面向個性較隨環境、看對宮，不是壞事。</span>`:""}
    </div>
    <div class="ov-legend">每格右上角圓點＝該宮整體：<span class="ov-dot" style="background:#16a34a"></span>強旺　<span class="ov-dot" style="background:#2563eb"></span>不錯　<span class="ov-dot" style="background:#94a3b8"></span>中等　<span class="ov-dot" style="background:#f59e0b"></span>偏弱</div>
  </div>`;
}

/* 紫微命盤白話總結 */
function ziweiSummary(z,a){
  const name=a.name||"這個人";
  const pget=n=>z.palaces.find(p=>p.name===n);
  const starList=p=>p&&p.majorStars.length?p.majorStars.map(s=>s.name):[];
  const starPlain=names=>names.map(n=>stripDot((GLOSSARY[n]||"").split("：").slice(-1)[0])).filter(Boolean);
  // 命宮
  const ming=pget("命宮"); const mingStars=starList(ming);
  let mingSay;
  if(mingStars.length){
    mingSay=`命宮坐 <b>${mingStars.join("、")}</b>——${starPlain(mingStars).join("；")}。這是${name}的核心性格與一生主軸。`;
  }else{
    const oppName={命宮:"遷移"}; const opp=pget("遷移"); const os=starList(opp);
    mingSay=`命宮無主星，個性較隨環境而變、可塑性高，要看對宮<b>遷移宮（${os.join("、")||"—"}）</b>來借用論斷——代表${name}在外、與人互動時更能展現自己。`;
  }
  // 事業 / 財帛 / 夫妻 三大重點宮
  const blocks=[
    ["官祿","事業","你的事業舞台與工作表現"],
    ["財帛","財運","你賺錢的方式與財運來源"],
    ["夫妻","感情","你的婚姻、另一半與相處模式"]
  ].map(([pn,label,desc])=>{
    const p=pget(pn); const st=starList(p);
    if(!st.length) return `<div class="zs-row"><span class="zs-k">${label}</span><span>此宮無主星，須參考對宮；${desc}較隨緣、起伏看大運。</span></div>`;
    const mut=p.majorStars.filter(s=>s.mutagen).map(s=>`${s.name}化${s.mutagen}`);
    const mutSay=mut.length?`（帶${mut.join("、")}，${p.majorStars.some(s=>s.mutagen==='祿'||s.mutagen==='權'||s.mutagen==='科')?'多為加分助力':'要多留意'}）`:"";
    return `<div class="zs-row"><span class="zs-k">${label}</span><span>坐 <b>${st.join("、")}</b>${mutSay}——${starPlain(st).join("；")}。</span></div>`;
  }).join("");
  // 四化：拆成「甜蜜點(祿權科)」與「功課(忌)」
  let sihua="";
  const sweet=[], task=[];
  z.palaces.forEach(p=>p.majorStars.forEach(s=>{
    if(s.mutagen==="祿"||s.mutagen==="權"||s.mutagen==="科") sweet.push(`${p.name}的${s.name}化${s.mutagen}`);
    if(s.mutagen==="忌") task.push(`${p.name}的${s.name}化忌`);
  }));
  if(sweet.length||task.length){
    sihua=`<div class="zs-row"><span class="zs-k">四化</span><span>`
      +(sweet.length?`<b style="color:#15803d">甜蜜點</b>（機會與助力所在）：${sweet.join("、")}。`:"")
      +(task.length?`<b style="color:#b91c1c">人生功課</b>（最該用心、易卡關）：${task.join("、")}。`:"")
      +`</span></div>`;
  }

  // 一句人物速寫：用命宮主星的關鍵特質拼一句
  const traitOf=p=>{const st=starList(p);return st.map(n=>{const g=GLOSSARY[n]||"";const m=g.match(/[：]([^，。]+)/);return m?m[1]:"";}).filter(Boolean);};
  const mc=ming&&ming.majorStars.length?traitOf(ming):traitOf(pget("遷移"));
  const speed=mc.length?`<p class="zs-speed">👤 一句話形容${name}：是一個<b>${mc.slice(0,3).join("、")}</b>的人。</p>`:"";
  return `<div class="zw-summary">
    <div class="zs-title">🔮 一段話總結${name}的紫微命盤</div>
    ${speed}
    <p class="zs-lead">${mingSay} 命主星 <b>${z.soul}</b>、身主星 <b>${z.body}</b>，五行屬 <b>${z.fiveElementsClass}</b>。</p>
    <div class="zs-rows">${blocks}${sihua}</div>
    <p class="zs-foot">綜合來看，${name}適合往「命宮＋事業宮」星曜的特質發展最順；想細看任何一宮，點上方該宮格會跳出詳解與三方四正連線。紫微為性格與運勢的參考，最終仍由自己掌握。</p>
  </div>`;
}

/* 單一宮位的浮動框內容 */
function palaceDetailHTML(p, rel){
  const stars=p.majorStars.length
    ? p.majorStars.map(s=>`${s.name}${s.brightness?`<span style="color:#b08900;font-size:11px">${s.brightness}</span>`:""}${s.mutagen?`<span class="badge ${s.mutagen==='祿'?'good':s.mutagen==='忌'?'bad':'blue'}" style="padding:0 6px;margin-left:2px">化${s.mutagen}</span>`:""}`).join("、")
    : '<span style="color:#94a3b8">這格沒有主星，看正對面那一宮的星來借用論斷</span>';
  const starDescs=p.majorStars.map(s=>{
    const g=GLOSSARY[s.name];
    return g?`<div class="pd-star"><b>${s.name}</b>：${g}</div>`:"";
  }).join("");
  const palMeaning=GLOSSARY[p.name]||p.desc||"";
  const opp=rel&&rel.opp?rel.opp:"";
  const he=rel&&rel.he&&rel.he.length?rel.he:[];
  // 把本宮＋對宮＋三合宮的星整合，算出白話結論
  const verdict=sfszVerdict(p, rel);
  const sfszLines=[
    opp?`<div class="sf-line"><span class="sf-tag opp">對宮</span><b class="sf-pal">${opp}</b><span class="sf-desc">${starsOfPalShort(rel&&rel.oppPal)}</span></div>`:"",
    he.length?`<div class="sf-line"><span class="sf-tag he">三合</span><b class="sf-pal">${he.join("、")}</b><span class="sf-desc">${(rel&&rel.hePals||[]).map(starsOfPalShort).filter(Boolean).join("；")||"借對宮論"}</span></div>`:""
  ].join("");
  return `<div class="pd-head"><span class="pd-name">${p.name}</span>`
    +`<span class="pd-gz">${p.heavenlyStem||""}${p.earthlyBranch||""}</span></div>`
    +`<div class="pd-meaning">這一宮看的是：${palMeaning}</div>`
    +`<div class="pd-stars-line">坐這宮的主星：${stars}</div>`
    +(starDescs?`<div class="pd-starbox">${starDescs}</div>`:"")
    +`<div class="pd-sfsz">
        <div class="pd-sf-title">📊 綜合這宮＋連線三宮，整體判斷</div>
        <div class="pd-verdict pdv-${verdict.tone}">${verdict.text}</div>
        <div class="pd-sf-rel">同時參考（紅線連到的三宮）：</div>
        ${sfszLines}
      </div>`;
}
/* 一個宮的主星簡述（含亮度），給三方四正列用 */
function starsOfPalShort(pal){
  if(!pal) return "";
  if(!pal.majorStars||!pal.majorStars.length) return "（無主星）";
  return pal.majorStars.map(s=>`${s.name}${s.brightness||""}${s.mutagen?`化${s.mutagen}`:""}`).join("、");
}
/* 把本宮＋三方四正整合成一句白話結論 */
/* 各宮的白話主題 */
const PALACE_TOPIC={命宮:"你的個性與一生主軸",兄弟:"手足、合夥與身邊人際",夫妻:"感情與婚姻",子女:"子女緣與創造力",
  財帛:"財運與賺錢方式",疾厄:"健康與壓力",遷移:"在外發展與際遇",僕役:"朋友部屬與人脈",
  官祿:"事業與職涯",田宅:"不動產與家庭",福德:"福分、興趣與心境",父母:"與父母長輩、學業文書"};
const PALACE_SHORT={命宮:"個性",兄弟:"手足人際",夫妻:"感情",子女:"子女",財帛:"財運",疾厄:"健康",
  遷移:"外出運",僕役:"人脈",官祿:"事業",田宅:"家庭不動產",福德:"福分心境",父母:"父母長輩"};
/* 純評分：把本宮＋三方四正的星算成分數＋吉凶級 */
function palaceScore(p, palByBranch){
  const b=p.earthlyBranch;
  const pals=[p, palByBranch[ZW_CHONG[b]], ...((ZW_SANHE[b]||[]).map(tb=>palByBranch[tb]))].filter(Boolean);
  const allStars=pals.flatMap(x=>x.majorStars||[]);
  const BR={廟:2,旺:1.5,得:1,利:0.5,平:0,不:-1,陷:-1.5};
  let score=0, good=[], bad=[];
  allStars.forEach(s=>{
    const br=BR[s.brightness]!=null?BR[s.brightness]:0; score+=br;
    if(s.mutagen==="祿"||s.mutagen==="權"||s.mutagen==="科"){score+=1.5; good.push(`${s.name}化${s.mutagen}`);}
    if(s.mutagen==="忌"){score-=1.5; bad.push(`${s.name}化忌`);}
    if(br>=1.5) good.push(`${s.name}${s.brightness}`);
    if(br<=-1) bad.push(`${s.name}${s.brightness}`);
  });
  let tone, word;
  if(score>=4){ tone="good"; word="強旺、是你的優勢"; }
  else if(score>=1){ tone="ok"; word="不錯、平穩有亮點"; }
  else if(score>-1){ tone="mid"; word="中等、看後天努力"; }
  else{ tone="bad"; word="偏弱、較需用心"; }
  return {score, tone, word, good:[...new Set(good)], bad:[...new Set(bad)],
    empty:!(p.majorStars&&p.majorStars.length)};
}
function sfszVerdict(p, rel){
  const palByBranch={}; // 從 rel 重建（rel 已含 oppPal/hePals）
  const sc=palaceScore(p, (function(){const m={};[p,rel&&rel.oppPal,...((rel&&rel.hePals)||[])].filter(Boolean).forEach(x=>m[x.earthlyBranch]=x);return m;})());
  const topic=PALACE_TOPIC[p.name]||"這個面向";
  const leadMap={good:"<b>強旺、是你的優勢</b>",ok:"<b>大致不錯、平穩中帶亮點</b>",mid:"<b>中規中矩、起伏看後天努力</b>",bad:"<b>力量偏弱、較需用心經營</b>"};
  const goodTxt=sc.good.length?`亮點在 ${sc.good.slice(0,3).join("、")}` : "";
  const badTxt=sc.bad.length?`要留意 ${sc.bad.slice(0,3).join("、")}` : "";
  const detail=[goodTxt,badTxt].filter(Boolean).join("，");
  const emptyNote=sc.empty?`本宮無主星、力量較依賴對宮，個性與表現較隨環境變化。` : "";
  return {tone:sc.tone, text:`把「${p.name}」連同對宮、三合宮一起看，<b>${topic}</b>這塊 ${leadMap[sc.tone]}。${detail?detail+"。":""}${emptyNote}`};
}

function renderBranchRel(a){
  const br=a.branchRel; if(!br) return "";
  const wxC={木:"#16a34a",火:"#dc2626",土:"#b45309",金:"#a16207",水:"#2563eb"};
  const zb=(z,w)=>`<span class="br-zhi wx-bullet wx-${w||ZHI_WX[z]||''}" style="width:22px;height:22px;font-size:12px">${z}</span>`;
  const sections=[];
  // 六合
  if(br.liuhe.length){
    sections.push(`<div class="brx brx-he"><div class="brx-h">🤝 六合（和諧相吸）</div>
      ${br.liuhe.map(h=>`<div class="brx-item"><div class="brx-pair">${zb(h.a)}<span class="brx-op">合</span>${zb(h.b)}${h.wx?`<span class="brx-wx" style="background:${wxC[h.wx]}">化${h.wx}</span>`:""}<span class="brx-pos">${h.posA}·${h.posB}${h.adj?" 緊貼":""}</span></div></div>`).join("")}
      <div class="brx-note">${HE_GENERAL["六合"]}</div></div>`);
  }
  // 三合
  if(br.sanhe.length){
    sections.push(`<div class="brx brx-he"><div class="brx-h">🔺 三合局（強力結合）</div>
      ${br.sanhe.map(s=>`<div class="brx-item"><div class="brx-pair">${s.zhi.map(z=>`<span class="br-zhi wx-bullet wx-${ZHI_WX[z]||''}${s.have.includes(z)?'':' faint'}" style="width:22px;height:22px;font-size:12px">${z}</span>`).join("")}<span class="brx-wx" style="background:${wxC[s.wx]}">${s.full?"合":"半合"}化${s.wx}</span></div></div>`).join("")}
      <div class="brx-note">${HE_GENERAL["三合"]}</div></div>`);
  }
  // 六沖
  if(br.chong.length){
    sections.push(`<div class="brx brx-chong"><div class="brx-h">💥 六沖（衝擊變動）</div>
      ${br.chong.map(c=>{const key=CHONG_DESC[c.a+c.b]?c.a+c.b:c.b+c.a;return `<div class="brx-item"><div class="brx-pair">${zb(c.a)}<span class="brx-op bad">沖</span>${zb(c.b)}<span class="brx-pos">${c.posA}·${c.posB}${c.adj?" 緊貼":""}</span></div><div class="brx-sub">${CHONG_DESC[key]||""}</div></div>`;}).join("")}
      <div class="brx-note">${CHONG_GENERAL}</div></div>`);
  }
  // 相刑
  if(br.xing.length){
    sections.push(`<div class="brx brx-xing"><div class="brx-h">⚔ 相刑（磨合損耗）</div>
      ${br.xing.map(x=>`<div class="brx-item"><div class="brx-pair">${x.have.map(z=>zb(z)).join('<span class="brx-op warn">刑</span>')}<span class="brx-tag">${x.name}${x.type==="三刑全"?"（全）":""}</span></div><div class="brx-sub">${x.note||""}</div></div>`).join("")}
      <div class="brx-note">${XING_GENERAL}</div></div>`);
  }
  // 六害
  if(br.hai.length){
    sections.push(`<div class="brx brx-hai"><div class="brx-h">🩹 六害（暗中損耗）</div>
      ${br.hai.map(h=>{const d=HAI_DESC[h.a+h.b]||HAI_DESC[h.b+h.a];return `<div class="brx-item">
        <div class="brx-pair">${zb(h.a)}<span class="brx-op warn">害</span>${zb(h.b)}<span class="brx-tag">${d?d.title:"相害"}</span><span class="brx-pos">${h.posA}·${h.posB}${h.adj?" 緊貼":""}</span></div>
        ${d?`<div class="brx-detail">
          <div class="brx-d-row"><b>原理</b>${d.why}</div>
          <div class="brx-d-row"><b>健康</b>${d.health}</div>
          <div class="brx-d-row"><b>性情</b>${d.mind}</div>
          <div class="brx-d-row"><b>事業</b>${d.career}</div>
          <div class="brx-d-row cure"><b>化解</b>${d.cure}</div>
        </div>`:`<div class="brx-sub">${HAI_GENERAL}</div>`}</div>`;}).join("")}
      <div class="brx-note">${HAI_GENERAL}</div></div>`);
  }
  // 天羅地網（含進階危險等級＋四要素）
  if(br.tianluo){
    const tl=br.tianluo;
    const which=tl.both?"天羅＋地網皆見":tl.tianLuo?"天羅（戌亥·天門）":"地網（辰巳·地戶）";
    const lv=tl.level||"低";
    const lvColor={高:"#dc2626",中:"#d97706",低:"#16a34a"}[lv];
    const hitKeys=new Set((tl.factors||[]).map(f=>f.k));
    // 四要素逐條：命中的亮起、未中的淡顯
    const factorRows=(TIANLUO_DESC.factors||[]).map(f=>{
      const on=hitKeys.has(f.k);
      const myHit=(tl.factors||[]).find(x=>x.k===f.k);
      return `<div class="tl-factor${on?' on':''}">
        <div class="tl-f-h"><span class="tl-f-dot">${on?'●':'○'}</span><b>${f.k}</b>${on&&myHit?`<span class="tl-f-hit">${myHit.v}</span>`:'<span class="tl-f-no">未觸發</span>'}</div>
        <div class="tl-f-d">${f.d}</div></div>`;
    }).join("");
    sections.push(`<div class="brx brx-tl"><div class="brx-h">🕸 天羅地網（束縛／戒律）
        <span class="tl-level" style="background:${lvColor}">凶性 ${lv}</span></div>
      <div class="brx-item"><div class="brx-pair">${tl.have.map(z=>zb(z)).join("")}<span class="brx-tag">${which}</span>${tl.adjNet?'<span class="brx-pos">緊貼成網</span>':'<span class="brx-pos">隔位·網較鬆</span>'}</div>
      <div class="tl-verdict" style="border-color:${lvColor}">${(TIANLUO_DESC.levelSay||{})[lv]||""}</div>
      <div class="brx-detail">
        <div class="brx-d-row">${TIANLUO_DESC.intro}</div>
        <div class="brx-d-row"><b>常人</b>${TIANLUO_DESC.common}</div>
        <div class="brx-d-row"><b>修行</b>${TIANLUO_DESC.spirit}</div>
      </div>
      <div class="tl-factors-title">📐 應驗核心四要素（命中越多越凶 — 你中了 <b style="color:${lvColor}">${(tl.factors||[]).length}</b> 項）</div>
      <div class="tl-factors">${factorRows}</div>
      <div class="brx-detail" style="margin-top:9px">
        <div class="brx-d-row"><b>關鍵</b>${TIANLUO_DESC.key}</div>
        <div class="brx-d-row cure"><b>化解</b>${TIANLUO_DESC.cure}</div>
      </div></div></div>`);
  }
  if(!sections.length){
    return `<div class="card full"><h3><span class="ic">支</span>地支互動</h3>
      <div class="empty-tip">你的四柱地支之間沒有明顯的合、沖、刑、害——代表地支結構較<b>單純安定</b>，不是壞事。</div></div>`;
  }
  return `<div class="card full"><h3><span class="ic">支</span>地支互動（合・沖・刑・害）</h3>
    <div class="cap" style="margin-bottom:12px">地支之間會彼此「<b>合</b>（結合）、<b>沖</b>（衝擊）、<b>刑</b>（磨合）、<b>害</b>（暗耗）」，這些是八字裡很重要、卻常被簡化帶過的環節。下面列出你命中<b>實際出現</b>的地支關係——吉凶仍要配合喜用神與整體格局看，這裡先讓你讀懂原理。</div>
    <div class="brx-grid">${sections.join("")}</div>
  </div>`;
}

function renderHealth(a){
  const t=a.tally; const avoid=new Set(a.yong.avoid||[]);
  const vals=Object.values(t); const avg=vals.reduce((x,y)=>x+y,0)/5;
  // 找出偏弱(<平均*0.55 或最弱)與偏旺(>平均*1.6)的五行
  const items=["木","火","土","金","水"].map(w=>({w,v:t[w]}));
  const weakOnes=items.filter(i=>i.v<avg*0.6).sort((x,y)=>x.v-y.v);
  const overOnes=items.filter(i=>i.v>avg*1.7).sort((x,y)=>y.v-x.v);
  const rows=[];
  weakOnes.slice(0,2).forEach(i=>{const h=WX_HEALTH[i.w];rows.push({w:i.w,kind:"偏弱",say:h.weak,organ:h.organ,tip:h.tip});});
  overOnes.slice(0,2).forEach(i=>{const h=WX_HEALTH[i.w];rows.push({w:i.w,kind:"偏旺",say:h.over,organ:h.organ,tip:h.tip});});
  // 忌神對應的器官也提醒（行運踩到忌神時較易出狀況）
  const avoidWx=[...avoid].filter(w=>WX_HEALTH[w]&&!rows.some(r=>r.w===w));
  const body=rows.length?rows.map(r=>`<div class="hl-row">
      <div class="hl-head"><span class="hl-wx wx-${r.w}">${r.w}</span><span class="badge ${r.kind==='偏弱'?'mid':'bad'}">${r.kind}</span><span class="hl-organ">${r.organ}</span></div>
      <div class="hl-say">${r.say}</div>
      <div class="hl-tip">💡 ${r.tip}</div>
    </div>`).join("")
    : `<div class="hl-row"><div class="hl-say">你的五行算是平衡，沒有特別突出的弱項，整體體質尚穩——維持規律作息即可。</div></div>`;
  // 算出未來幾個「忌神年份」具體是哪幾年（流年天干或地支五行踩到忌神）
  const allAvoid=new Set(a.yong.avoid||[]);
  let avoidLine="";
  if(allAvoid.size){
    const nowY=new Date().getFullYear();
    const years=[];
    for(let yr=nowY; yr<nowY+12 && years.length<5; yr++){
      const g=GAN[((yr-4)%10+10)%10], z=ZHI[((yr-4)%12+12)%12];
      const wxs=[...new Set([GAN_WX[g],ZHI_WX[z]])].filter(w=>allAvoid.has(w));
      if(wxs.length){
        const organs=[...new Set(wxs.map(w=>WX_HEALTH[w].organ.split("、").slice(0,2).join("、")))].join("；");
        years.push(`<div class="hl-yr"><span class="hl-yr-y">${yr} ${g}${z}</span><span class="hl-yr-wx">${wxs.join("、")}年</span><span class="hl-yr-org">留意 ${organs}</span></div>`);
      }
    }
    avoidLine=`<div class="hl-avoid">
      <div style="font-weight:600;color:#b45309;margin-bottom:5px">⚠ 你的忌神是 ${[...allAvoid].join("、")}，當流年（每一年）的五行踩到忌神時，那些對應部位較需注意。近年的忌神年份：</div>
      ${years.length?years.join(""):"<div style=\"color:#94a3b8\">近 12 年內無明顯忌神年。</div>"}
      <div style="font-size:11px;color:#b6c0cf;margin-top:6px">＊「水年/火年」就是該年干支五行屬水或火的年份，不是壞年，只是這方面多保養。</div>
    </div>`;
  }
  return `<div class="card"><h3><span class="ic" style="background:#dcfce7;color:#15803d">疾</span>健康提醒（八字疾厄）</h3>
    <div class="cap" style="margin-bottom:10px">八字五行對應身體臟腑（<b>木→肝膽、火→心血管、土→脾胃、金→肺與呼吸道、水→腎與泌尿</b>）。某五行<b>太弱或太旺</b>，對應部位就比較需要照顧。這是體質傾向參考，<b>不是診斷，身體不適請就醫</b>。</div>
    ${body}${avoidLine}</div>`;
}

function renderNameAdvice(n, favorWx, sx){
  let adv=[];
  try{ adv=nameSuggest(n.chars,n.grids,favorWx); }catch(e){ adv=[]; }
  const sxBlock=sxNamingBlock(sx);
  if(!adv.length) return `<div class="na-ok">✓ 五格沒有明顯凶數，姓名整體穩定，不需特別改名。</div>${sxBlock}`;
  const favor=new Set(favorWx||[]);
  const favorNote=favor.size?`<div class="na-fav">⭐ 標記者＝筆畫五行剛好補你的喜用神（${[...favor].join("、")}），優先考慮這些。</div>`:"";

        <span class="na-who">建議改「${g.who}」（目前 ${g.curStroke} 畫）</span></div>
      ${cands}</div>`;
  }).join("");
  return `<div class="na-box">

    <div class="na-intro">姓名五格中，<b>天格＝姓</b>（不能改），<b>人格／地格／外格／總格</b>都跟「名字的字」有關。某格是<b style="color:#b91c1c">凶</b>時，把對應的字換成下面建議的筆畫，那一格就會轉吉。筆畫以康熙字典為準，<b>實際取名請再確認字義與讀音</b>。</div>

}

/* 命局綜評（自家公式，透明可解釋） */
function computeOverall(a){
  // 五行均衡(40) + 身強弱中和度(30) + 格局(15) + 姓名(15)
  const vals=Object.values(a.tally),mx=Math.max(...vals),mn=Math.min(...vals),sum=vals.reduce((x,y)=>x+y,0)||1;
  const balance=100-(mx-mn)/sum*60;
  const mid=100-Math.abs(a.strength.score)/16*55;  // 越接近中和越高
  const patScore=a.pattern.patterns[0].type==="正格"?80:a.pattern.patterns[0].type==="特殊"?75:65;
  const nameScore=a.nameInfo?a.nameInfo.score:70;
  return Math.max(50,Math.min(98,Math.round(balance*0.4+mid*0.3+patScore*0.15+nameScore*0.15)));
}

/* ====== 紫微宮位浮動框＋三方四正連線 ====== */
function bindZiweiPopover(){
  const grid=$(".ziwei-grid"); const pop=$("#zwPop"); const svg=$("#zwLines");
  if(!grid||!pop) return;
  const wrap=$(".ziwei-wrap");
  const cellOf=b=>grid.querySelector(`.zw-cell[data-branch="${b}"]`);
  const centerOf=(cell,wr)=>{const cr=cell.getBoundingClientRect();
    return {x:cr.left-wr.left+cr.width/2, y:cr.top-wr.top+cr.height/2};};
  const clearLines=()=>{ if(svg) svg.innerHTML=""; };
  const clearHi=()=>grid.querySelectorAll(".zw-cell.active,.zw-cell.sfsz").forEach(c=>c.classList.remove("active","sfsz"));
  const close=()=>{ pop.hidden=true; clearHi(); clearLines(); };
  // 畫三方四正連線
  const drawLines=(srcCell)=>{
    if(!svg) return;
    const b=srcCell.dataset.branch; if(!b) return;
    const wr=wrap.getBoundingClientRect();
    svg.setAttribute("width",wr.width); svg.setAttribute("height",wr.height);
    svg.setAttribute("viewBox",`0 0 ${wr.width} ${wr.height}`);
    const targets=[ZW_CHONG[b],...(ZW_SANHE[b]||[])].filter(Boolean);
    const src=centerOf(srcCell,wr);
    let html="";
    targets.forEach(tb=>{
      const tc=cellOf(tb); if(!tc) return;
      tc.classList.add("sfsz");
      const tp=centerOf(tc,wr);
      html+=`<line x1="${src.x}" y1="${src.y}" x2="${tp.x}" y2="${tp.y}" stroke="#dc2626" stroke-width="1.6" stroke-opacity="0.7" stroke-dasharray="5 4"/>`;
    });
    svg.innerHTML=html;
  };
  grid.addEventListener("click",e=>{
    const cell=e.target.closest(".zw-cell.clickable");
    if(!cell) return;
    if(cell.classList.contains("active")){ close(); return; }
    clearHi(); clearLines();
    cell.classList.add("active");
    drawLines(cell);
    pop.innerHTML=`<div class="zw-pop-bar" id="zwBar"><span class="zw-pop-drag">⠿ 可拖曳移動</span><button class="zw-pop-x" aria-label="關閉">✕</button></div>`
      +`<div class="zw-pop-body">${decodeURIComponent(cell.dataset.detail||"")}</div>`;
    // 首次開啟：置中偏右；之後保留上次位置
    if(!pop.dataset.moved){
      const w=pop.offsetWidth||380;
      pop.style.left=Math.max(12,(window.innerWidth-w)/2)+"px";
      pop.style.top="90px";
    }
    pop.hidden=false;
    pop.querySelector(".zw-pop-body").scrollTop=0;
    pop.querySelector(".zw-pop-x").addEventListener("click",ev=>{ev.stopPropagation();close();});
  });
  // 拖曳移動（抓標題列）
  let drag=null;
  pop.addEventListener("mousedown",e=>{
    const bar=e.target.closest(".zw-pop-bar"); if(!bar||e.target.closest(".zw-pop-x")) return;
    const r=pop.getBoundingClientRect();
    drag={dx:e.clientX-r.left, dy:e.clientY-r.top};
    pop.classList.add("dragging"); e.preventDefault();
  });
  document.addEventListener("mousemove",e=>{
    if(!drag) return;
    let x=e.clientX-drag.dx, y=e.clientY-drag.dy;
    x=Math.min(Math.max(0,x),window.innerWidth-60);
    y=Math.min(Math.max(0,y),window.innerHeight-40);
    pop.style.left=x+"px"; pop.style.top=y+"px"; pop.dataset.moved="1";
  });
  document.addEventListener("mouseup",()=>{ if(drag){drag=null;pop.classList.remove("dragging");} });
  // Esc 關閉
  document.addEventListener("keydown",e=>{ if(e.key==="Escape"&&!pop.hidden) close(); });
}

function setSeg(key,val){
  const seg=document.querySelector(`.seg[data-seg="${key}"]`); if(!seg||val==null) return;
  seg.querySelectorAll("button").forEach(b=>b.classList.toggle("on",b.dataset.v===val));
  segVal[key]=val;
  if(key==="hknown1") $(".hrow1").style.display=val==="1"?"flex":"none";
  if(key==="hknown2") $(".hrow2").style.display=val==="1"?"flex":"none";
}
/* 把某人 n 的所有欄位打包 */
function snapshotPerson(n){
  return {
    name:$("#name"+n).value, y:$("#y"+n).value, m:$("#m"+n).value, d:$("#d"+n).value,
    h:$("#h"+n).value, min:$("#min"+n).value, lon:$("#lon"+n)?.value, zi:$("#zi"+n)?.value,
    city:$("#city"+n)?.value,
    sex:segVal["sex"+n], cal:segVal["cal"+n], hknown:segVal["hknown"+n], tst:segVal["tst"+n]
  };
}
/* 還原某人 n */
function restorePerson(n,p){
  if(!p) return;
  $("#name"+n).value=p.name||""; $("#y"+n).value=p.y||"";
  $("#m"+n).value=p.m||1; $("#d"+n).value=p.d||1;
  $("#h"+n).value=p.h||0; $("#min"+n).value=p.min||0;
  if($("#lon"+n)&&p.lon!=null) $("#lon"+n).value=p.lon;
  if($("#city"+n)&&p.city!=null) $("#city"+n).value=p.city;
  if($("#zi"+n)&&p.zi) $("#zi"+n).value=p.zi;
  setSeg("sex"+n,p.sex); setSeg("cal"+n,p.cal);
  setSeg("hknown"+n,p.hknown||"1"); setSeg("tst"+n,p.tst||"0");
}
function loadSaves(){ try{return JSON.parse(localStorage.getItem(SAVE_KEY))||[];}catch(e){return [];} }
function writeSaves(arr){ localStorage.setItem(SAVE_KEY,JSON.stringify(arr)); }
function savedLabel(rec){
  if(rec.mode==="couple") return `${rec.p1.name||"本人"} ✕ ${rec.p2.name||"對方"}`;
  return rec.p1.name||"未命名";
}
function savedSub(rec){
  const p=rec.p1; const cal=p.cal==="lunar"?"農":"國";
  const t=p.hknown==="1"?` ${String(p.h).padStart(2,"0")}:${String(p.min).padStart(2,"0")}`:" 時辰不詳";
  return `${rec.mode==="couple"?"合盤・":""}${p.sex}・${cal}${p.y}/${p.m}/${p.d}${t}`;
}
/* ---- 自製浮層：確認框 + 輕提示 ---- */
function showConfirm(msg,onYes){
  const ov=document.createElement("div"); ov.className="tzd-modal-ov";
  ov.innerHTML=`<div class="tzd-modal">
    <div class="tzd-modal-msg">${msg}</div>
    <div class="tzd-modal-btns">
      <button class="tzd-btn-cancel">取消</button>
      <button class="tzd-btn-ok">確定刪除</button>
    </div></div>`;
  document.body.appendChild(ov);
  const close=()=>ov.remove();
  ov.querySelector(".tzd-btn-cancel").onclick=close;
  ov.querySelector(".tzd-btn-ok").onclick=()=>{ close(); onYes&&onYes(); };
  ov.onclick=e=>{ if(e.target===ov) close(); };
}
function showToast(msg){
  const t=document.createElement("div"); t.className="tzd-toast"; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.classList.add("show"),10);
  setTimeout(()=>{ t.classList.remove("show"); setTimeout(()=>t.remove(),250); },1800);
}
function saveCurrent(){
  if(!$("#y1").value){ showToast("請先填入出生年份再存檔"); return; }
  const rec={ id:String(Date.now())+Math.floor(performance.now()), mode:MODE, p1:snapshotPerson(1) };
  if(MODE==="couple") rec.p2=snapshotPerson(2);
  const arr=loadSaves(); arr.unshift(rec); writeSaves(arr); renderSaves();
  const btn=$("#saveBtn"); const old=btn.textContent; btn.textContent="✓ 已存"; setTimeout(()=>btn.textContent=old,1200);
}
function deleteSave(id){
  writeSaves(loadSaves().filter(r=>r.id!==id)); renderSaves();
}
function applySave(id){
  const rec=loadSaves().find(r=>r.id===id); if(!rec) return;
  // 切換模式
  document.querySelector(`.mode-btn[data-mode="${rec.mode}"]`)?.click();
  restorePerson(1,rec.p1);
  if(rec.mode==="couple") restorePerson(2,rec.p2);
  runChart();
}
function renderSaves(){
  const box=$("#savedBox"), list=$("#savedList"); const arr=loadSaves();
  if(!arr.length){ box.style.display="none"; return; }
  box.style.display="block";
  list.innerHTML=arr.map(rec=>`<div class="saved-item" data-id="${rec.id}">
    <div class="si-main" data-act="load" data-id="${rec.id}">
      <div class="si-name">${savedLabel(rec)}</div>
      <div class="si-sub">${savedSub(rec)}</div>
    </div>
    <button class="si-del" data-act="del" data-id="${rec.id}" title="刪除">✕</button>
  </div>`).join("");
}
$("#saveBtn").addEventListener("click",saveCurrent);
$("#savedList").addEventListener("click",e=>{
  const t=e.target.closest("[data-act]"); if(!t) return;
  if(t.dataset.act==="del"){ e.stopPropagation();
    const rec=loadSaves().find(r=>r.id===t.dataset.id);
    showConfirm(`確定刪除存檔「<b>${rec?savedLabel(rec):"這筆"}</b>」嗎？刪除後無法復原。`,()=>deleteSave(t.dataset.id));
  } else applySave(t.dataset.id);
});
renderSaves();

/* ====== 雙人合盤：從存檔挑人填入 ====== */
function showPicker(n){
  const arr=loadSaves();
  const ov=document.createElement("div"); ov.className="tzd-modal-ov";
  const list=arr.length?arr.map(rec=>`<button type="button" class="pk-item" data-id="${rec.id}">
      <span class="pk-name">${savedLabel(rec)}</span><span class="pk-sub">${savedSub(rec)}</span></button>`).join("")
    : `<div style="text-align:center;color:#94a3b8;padding:20px;font-size:13px">還沒有任何存檔。<br>先在單人命盤填好生辰、按「💾 存檔」即可。</div>`;
  ov.innerHTML=`<div class="tzd-modal" style="max-width:380px">
    <div class="pk-title">📁 從我的命盤選一位填入「${n===1?'本人':'對方'}」</div>
    <div class="pk-list">${list}</div>
    <div style="text-align:right;margin-top:10px"><button type="button" class="tzd-btn-cancel">取消</button></div>
  </div>`;
  document.body.appendChild(ov);
  const close=()=>ov.remove();
  ov.querySelector(".tzd-btn-cancel").onclick=close;
  ov.onclick=e=>{ if(e.target===ov) close(); };
  ov.querySelectorAll(".pk-item").forEach(b=>b.onclick=()=>{
    const rec=arr.find(r=>r.id===b.dataset.id); if(!rec) return;
    restorePerson(n, rec.mode==="couple"?rec.p1:rec.p1);
    close();
  });
}
$$(".pick-save").forEach(b=>b.addEventListener("click",()=>showPicker(+b.dataset.pick)));
</script>
