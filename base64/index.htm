<!DOCTYPE HTML>
<html lang="zh-TW">
<head>
    <title>圖片Base64工具（DataURI資料）</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="index.css">
    <script type="text/javascript" src="evalCore.min.js"></script>
    <script type="text/javascript" src="vue.js"></script>
</head>
<body>
    <div class="app-wrapper" id="pageContainer">

        <header class="app-header">
            <span class="app-title">{{ toolName[curType] }}</span>
            <button class="switch-btn" ref="btnSwitch" @click="trans">切換為{{toolName[nextType]}}</button>
        </header>

        <!-- 圖片轉Base64 -->
        <main class="app-body" ref="imageBase64" v-show="curType=='image'">
            <div class="pane-grid">
                <div class="pane">
                    <div class="upload-zone" ref="panelBox">
                        <img id="preview" alt="" :src="previewSrc" v-show="!!previewSrc.length">
                        <div class="upload-placeholder" v-show="!previewSrc.length">
                            <div class="upload-icon">
                                <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <rect x="2" y="2" width="36" height="36" rx="8" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="5 3"/>
                                    <path d="M13 27l5-6 4 4 5-7 6 9H13z" stroke="#94a3b8" stroke-width="1.5" stroke-linejoin="round" fill="none"/>
                                    <circle cx="27" cy="15" r="3" stroke="#94a3b8" stroke-width="1.5"/>
                                </svg>
                            </div>
                            <a href="#" class="upload-btn" ref="uploadBox" @click="upload($event)">選擇圖片</a>
                            <p class="upload-hint">或將圖片拖曳至此處</p>
                        </div>
                    </div>
                    <div class="upload-tips">
                        <p>支援 <strong>螢幕截圖</strong> 後直接貼上轉化</p>
                        <p>支援 <strong>複製圖片連結</strong> 直接貼上轉化</p>
                    </div>
                </div>
                <div class="pane">
                    <textarea id="base64Result"
                        class="result-textarea"
                        title="點擊自動選擇"
                        placeholder="內容會自動生成..."
                        readonly="readonly"
                        ref="resultBox"
                        @click="select()"
                        v-model="resultContent"></textarea>
                    <div class="result-info">
                        <div class="info-item">
                            <span class="info-label">原始圖片大小</span>
                            <span class="info-value" id="sizeOri">{{sizeOri}}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">DataUri 大小</span>
                            <span class="info-value" id="sizeBase">{{sizeBase}}</span>
                        </div>
                    </div>
                </div>
            </div>
            <form action="#" style="display:none">
                <input type="file" id="file" accept=".jpg,.jpeg,.gif,.png,.bmp" ref="fileBox" @change="convert()">
            </form>
            <img id="img" alt="" style="display:none">
        </main>

        <!-- Base64轉圖片 -->
        <main class="app-body" ref="base64Image" v-show="curType=='base64'">
            <div class="pane-grid">
                <div class="pane">
                    <textarea id="base64Input"
                        class="result-textarea"
                        title="點擊自動選擇"
                        placeholder="在這裡貼上 DataURI 資料..."
                        v-model="txtBase64Input"></textarea>
                </div>
                <div class="pane">
                    <div class="upload-zone preview-zone">
                        <img id="base64Image" alt="" :src="txtBase64Output"
                            v-show="!!txtBase64Input.length" @error="loadError">
                        <div class="upload-placeholder" v-show="!txtBase64Input.length">
                            <div class="upload-icon">
                                <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <rect x="2" y="2" width="36" height="36" rx="8" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="5 3"/>
                                    <path d="M13 27l5-6 4 4 5-7 6 9H13z" stroke="#94a3b8" stroke-width="1.5" stroke-linejoin="round" fill="none"/>
                                    <circle cx="27" cy="15" r="3" stroke="#94a3b8" stroke-width="1.5"/>
                                </svg>
                            </div>
                            <p class="upload-hint">圖片預覽會顯示在這裡</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <div v-show="!!error.length" v-cloak class="error-banner" v-html="error"></div>

    </div>
    <script type="text/javascript" src="index.js"></script>
</body>
</html>
