<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script>
</head>
<body>
    <script>
        $(function(){
            $("#diff").on('click', $("body"), function(event) {
                var left = $('#left').val().split('\n');
                var right = $('#right').val().split('\n');
                $.each(left, function(i, v) {
                     if($.inArray( v, right)<0){
                        $("#result").html($("#result").html()+"右边没有: "+v+"<br>");
                     }
                });
                $.each(right, function(i, v) {
                     if($.inArray( v, left)<0){
                        $("#result").html($("#result").html()+"左边没有: "+v+"<br>");
                     }
                });
                event.preventDefault();
                /* Act on the event */
            });
        });
    </script>
    <textarea id="left" rows="40" cols="50"></textarea>
    <textarea id="right" rows="40" cols="50"></textarea>
    <button id="diff">比对</button>
    <hr>
    <div id="result"></div>
</body>
</html>
